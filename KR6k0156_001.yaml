body:
  text: 天台沙門釋允堪述南山所撰大部凡有三焉曰刪補鈔戒本疏及茲疏也其諸述作亦裨助此三而輔翼至化者也豫嘗於講餘探賾群籍纂事鈔等記一旦諸弟子升堂稽首曰南山一宗諸記備矣獨乎業疏未廣發揮願一記焉豫遂然之告曰夫尸羅者止之妙門也羯磨者作之清範也能仁所以立斯二者猶車之兩輪焉昔吾祖御之於前復作疏以廣其道但後之駕說者鮮矣惜乎斯文旨淵而理密文博而義富苟不引而伸之則辜吾祖之訓是我罪也汝曹有起豫之興若孔門之卜商矣弟子設禮循墻而出於是嗒然隱几摛毫而述因思羯磨乃曇諦始傳派於法正之遠源也越明年記成遂以正源為目後之鴻筆無誚鼠伎云時大宋皇祐三年辛卯正月三日於錢塘淨住白蓮池上序四分律三字當部之通目刪下八字茲疏別名又四分百年方有應在於後律則成道便有應標於前今謂非百年之別無以簡五部之通故先標四分後言律也至於梵漢音義如戒疏解又刪下六字為四分部內所詮之法但刪補隨機是南山著述之用由繁故刪削闕則裨補今取要行者引而伸之非要者但標名而已故曰隨機羯磨者明了論疏翻為業也所作是業亦翻為所作百論云事也若約義求翻為辦事謂施造遂法必有成濟之功焉疏者通意之辭疏也決也為踈通決擇條暢於文義也又文心雕龍云疏者布置物端撮題近意也序者爾雖釋宮曰東西墻謂之序郭璞注云所以序別內外也又序者敘也敘述此經之宗要及製疏之因由也爾雅云舒業順敘緒也注云四者又為端緒任奉古云序與緒字義同也緒則繭之緒也凡繭之抽絲先其緒緒盡方見其絲猶如經之有序序終則見其經也大唐河唐晉陽是唐虞之舊封也及神堯入隋受恭帝禪位始號唐國京兆者即長安之郡名也京者大也兆者數也十億曰兆故億兆之人所居亦曰京師師者衆也天子所都必以衆大稱之沙門者或云沙門那或云桑門唐言勤息謂勤修善品息滅諸惡寶積經云沙門者寂滅故調伏故受教故戒身淨故如實義故得解脫故離世八法故堅心不動如地故護彼我意故於諸形相無染著如空中動手無所礙故成就如是多法故名沙門道宣大師名諱字法遍然詩書不諱臨文不諱講者具稱故無咎也又西土以稱名為尊如諸佛菩薩名使人稱之而獲福諸行業具如李雍撰行狀嚴厚本及僧傳中敘也終南山者福地記曰終南太一山在長安西南五十里左右四十里內皆福地也豐德寺案戒疏批文云終南太一山豐谷內太平作豐德寺若然寺從谷以受稱而復安有德也又應知戒業兩疏俱在彼作又二疏廣略凡經兩回批文云貞觀四年遠覩化表北遊并晉東達魏土有礪律師當時峰岫遠依尋讀始得一月遂即物故撫心之痛何可言之乃返泌部山中為擇律師又出鈔三卷乃以前本更加潤色筋脈相通此說事鈔又出刪補羯磨一卷疏兩卷含注戒本一卷疏三卷此皆初作本也後往南山有樂戒者請廣其文又出羯磨并疏四卷永徽初又出戒本含注并疏四卷此皆重修本也今所解者即後修本也寺者梵云僧伽監摩或云僧伽囉摩此云衆園五分律云瓶沙王施伽蘭陀林園為始園者生植之義佛子居之能生植道芽果本也或云毗呵羅此云遊止處今言寺者華言也釋名曰寺嗣也謂治事者相嗣續於其內也國家有九寺焉因漢明帝永平十年丁卯佛法初至有摩騰竺法蘭以白馬馱經像屆于洛陽敕於鴻臚寺延禮之至十一年戊辰敕於雍門外別建寺以白馬為名即漢土佛寺之始也又吳主孫權赤烏年因康僧會所化遂於江南立建初寺為始也自此伽藍因彰寺號撰者述也定也謂訓述文義以為楷定也又禮云述者曰明作者曰聖仲尼曰述而不作是也觀夫觀視也夫發語之端亦指事之辭也聖人者指釋迦是大聖人也列子引孔子曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉利見者周易九五飛龍在天利見大人王弼曰龍德在天則大人之路亭也夫位以德興德以位敘以至德處盛位萬物之覩不亦宜乎又仲尼曰聖人作而萬物覩今謂大聖出世則為一切衆生之所利見也妙下以如來出世推其益妙在乎澄清三界繫縛之惑業亡滅我人顛倒之執計然後暢以大慈廓於真智開無方之應揚出世之言是我佛化世之本意也故者因土生下之辭張開也三學戒以捉之為律所詮之學也定以縛之為經所詮之學也慧以殺之為論所詮之學也故成論云戒如捉賊定縛慧殺三行相因斯須攝濟源即源流八正者一正見謂修無漏十六行見四諦分明故二正思惟謂見四諦時無漏心相應思惟動發覺知令增長入涅槃故三正語以無漏智慧除四種邪命攝口業住一切口正業中故四正業以無漏智慧除身一切邪業住清淨正身業中故五正命以無漏智慧通除三業中五種邪命住清淨正命中故六正精進以無漏智慧相應勤精進修涅槃道故七正念以無漏智慧相應正念道及助道法故八正定以無漏智慧相應八定故此八通名正道者正以簡邪為義今此八法不依偏邪而行皆名為正能通至涅槃故名為道四部者即四部衆僧尼士女或天龍人鬼也五衆者比丘比丘尼式叉摩那沙彌沙彌尼也又應知三學八正約能被法四部五衆據所被機又清訓良規亦屬法也橫厲論語云深則厲包曰以衣涉水為厲重關鄭玄注禮記云關境上門也謂三界纍縛有情堅密故如重關耳令以三學八正之法橫涉五趣之境高步翱翔於極有之地也乃見大聖人揚清訓樹良規不虗設也多位即上三學八正之法誠戒居先者戒疏云行者務先學戒檢䇿非違三業清淨正定正慧自然而立豈下謂一切善法皆以戒為基本也宏大也依下遺教經云依因此戒得生諸禪定及滅苦智慧若無淨戒諸善功德皆不得生兩途即化行化教即經論是開演化導之教該乎人天七衆故曰道俗今識別邪正生於信解故事鈔別序云化教則通於道俗但泛明因果識達邪正科其行業沉密而難知顯其來報明了而易述又戒疏云化通道俗名理無乖意在靜倒離著為先教本化人今開慧解本非對過而立斯言行教者䇿其五衆防護戒行也別序云行教唯局於內衆定其取捨立其網致顯於持犯決於疑滯等又云內心違順託理為宗則準化教外用施為必護身口便依行教然犯化教者但受業道一報違行教者重增聖制之罪是知雖分二教收乎三學亦不亂也三輪者即神足說法憶念也戒疏云如來化用必約三輪創開道務要先神足為無信也既信是聖人身雖伏從智開無路改次說法為無解故神解乃明煩惑猶結非可口說為得清除義須依行尅證有已故須憶念為無證也今此戒學是後輪收故曰三輪則攝於憶念四藏者三藏外加一雜藏合十二部經是雜藏今行教即當四中毗尼之一藏也約義下戒疏云行教起必因過隨過制約言唯持犯事通止作故教所設非為靜倒但隨行科戒律一宗局斯教矣從文下約能詮之文則歸於法聚法聚者梵語犍度此翻法聚本律有二十犍度等故云從文則歸承法聚止作兩善者即止持作持以兩行順體體既非惡故名善也持犯篇云方便正念護本所受禁防身口不造諸惡目之曰止䇿勤三業修習戒行有善起護名之為作名實名者實之賓也實即是行即機者猶今機也謂止作兩善名行相應於今劣機其實暗昧也有作曉思之受隨者受即據本戒體隨即依體起行故大師云受謂壇場戒體隨謂受後對境護戒之心方便善成稱本清淨故也願行著願對上受行對上隨故釋相篇云受是要期思願隨是稱願修行譬如築營宮宅先立院墻周匝即謂壇場受體也後便隨處營搆盡於一生謂受後隨行若但有受無隨直是空願之院不免寒露之幣若但有隨無受此行或隨生死又是局狹不周譬周無院室宇不免怨賊之穿窬也必須受隨相資方有所至而言二戒者俱有遮約外非之義也故大鈔云受隨二戒遮約外非方便善成故名戒行時衆目三時出家之衆也前修楚辭注云遠賢也後進論語注云後輩也謂前賢脫進於其戒律雖成就於受誦綱維於住持然而三時更變以至像季時轉澆訛也㳂順也自法流下案釋老志云釋氏之學聞於前漢武帝元狩年中霍去病獲昆耶王金人帝以為天神列於甘泉宮燒香禮拜此佛法流傳之始也及聞西域遣張騫使大夏還云身毒有浮圖之教哀帝元壽年中景憲往月氏口授傳浮圖經然時未敦信道未通行猶大江之初源若巨木之毫末耳今以漢明帝時二沙門齎四十二章經及白氎𦘕釋迦像至為其始也自後經教漸流廣開事務故曰實繁實爾雅云是也公羊傳云實來者何是來也而言東夏者對西得名孔安國云大國曰夏戒本下含注戒本序云逮乎曹魏之末戒本創傳終於隋運之初芟改者衆若羯磨之始者釋相云曹魏之初僧徒極盛未稟歸戒止以剪落殊俗後有中天竺僧曇摩迦羅此云法時誦諸部毗尼以魏嘉平年至洛陽立羯磨受法中夏戒律之始也準用十僧大行佛法改先妄習出僧祇戒心又有安息國沙門曇諦亦善律學出曇無德羯磨即大僧受法之初也準此則戒本羯磨俱肇流於曹魏又有多家所出故曰年分異轍轍謂途轍也良下配釋二持故羯磨序云持戒之心要唯二徹止持則戒本最為標首作持則羯磨結其大科如別即含注戒本序及戒疏中委辨諸家互出戒本是也注古本者懷素律師云曹魏鎧律師即康僧鎧於許都集題云曇無德雜羯磨以結戒場為首受日加乞不入羯磨纍有增減乖於律文一家依文者即曹魏曇諦於洛陽集題云羯磨一卷出曇無德律以結大界為首受日增乞牒入羯磨魏郡礪師受持此本分為兩卷并造義釋光師所述者即元魏慧光律師於鄴下集此同曇諦集本但述録不順正文故曰義用首云即首題云三藏者其本已亡願師即隋法願律師於并州撰題云羯磨卷上下出曇無德律片無增減然詳律本非無增損兼造章疏并汾盛行子注即小注也讎挍左傳注云讎對也校撿也考也諸本即上四本紛綸紛衆也亂也綸列子云獨繭絲為綸今謂將前四本成用被事紛亂如𮈔也增下如受日加乞或加不加解戒場法或出不出分亡物法或二或三立緣作法或六或七增則成繁減則成略單翻即鎧律師本由單翻出則於能詮文言所詮旨趣不能委辨但包羅通奉而已至於行用卒難尋撿故事鈔云或單題羯磨成相莫宣依文用之不辨前事依本本或作文即曇諦依本律出者執據依律緣起隨有隨書故云執據至於篇次義類竟不排顯則使覽者易成迷惑也准下即光師出本則多約義用如受日著乞準乞覆藏法故羯磨大塗規猷在故依受不失故曰理雖無爽事鈔云大途無失是也藏迹下或暗引律文或出已見故曰也今則不爾憑文據義標顯昭然羯磨序云律藏殘缺義有遺補故統關諸部撮略正文必彼此俱無則理通倒決並至篇具委便異古藏迹緣據者即願師所集本由廣子注故似其具周然非無增減是止存別見故素師云願師則非無增損等是也並下結非由前各有得失致使後人雖隨有結界受懺等事起尋而誦之至於成敗善惡冥然不知是則斯文但可卷而收之不可以為後世龜鏡以鏡鑑妍醜龜示吉凶綴疏即礪光願等遊詞即浮游詞句也鈔序云多列游詞而逗機未足至於附記本文摘採義理使文簡而理具濟時而得用者則少遇於作者之器也逮及也自願師已降不無繼作後至乎素師亦再出本辭費猶徒費其辭也至於下謂將此文濟機行事未見有可歸者所以按撫事務反壞昔賢增勞想爾勞想謂暗傷也不揆揆度也庸昧鈔序云余智同螢曜量實踈庸是也試莊子云嘗試言之郭象云以其不知未敢正言試言之耳纂集也聖言即四分本文也削下古文有繁雜蕪薉者則削而去之遺墜漏略者則引教而增之正量即聖言量傍出行用即引諸部也故下刪補羯磨序云然律藏殘缺義有遺補故統關諸部撮略正文必彼此俱無則理通例決並主篇具顯便異古藏迹義舉即下或約義申舉指下指斥古瑕則知過者不宜復用故曰宜改摘下或採摘正理並皆思審揀擇有蹤緒者方立而用之時下如現行結界受戒安恣等法為時所行之務則下廣為樹立其儀同下如小房等法於今少行但略題其名耳故下文云為法既少在文蓋闕也本雖行世者本即羯磨行世理既未陳遂作疏以廣之故曰相從勒開文義也余爾雅云我也以大師再治此疏年當十故曰老矣禮云七十曰老而傳日影也妄損下謂虗妄損廢也正功能觀身心境界遠離煩惱是也此乃大師自說作疏通經據流通邊功無邊際故華嚴經云佛法無人說雖慧不能了又云若不傳法度衆生畢究無能報恩者燈燈相照六萬修齡者非流通而奚尅若約自利如大集經皆非法行智者亦云吾為領徒太早於己無證等淨心誡觀云若當逐講論見諍終日喧放本求枝末不能拔斷根有涯者四大成身百年能幾況復七十者稀莊子云吾生也有涯法行者大集經云若有比丘讀誦如來十二部經樂為四衆敷揚廣說思惟其義是名樂讀誦乃至是名思惟不名法行若有比丘能觀身心乃至境界都息遠離煩惱其心寂寂我則說之名為法行常一之教者亦大集之言也彼云無邪命者心清白故心清白者常正一故常正一者性殊勝故乃至其心淨者能斷破戒是則斷破戒者由常一故又常一者是律所須如云常爾一心念除諸蓋等是律所詮故餘下言於此而不審諦辨論者而於餘事竟何言也京兆如上解崇義者伽藍之別號也按西京塔寺記云本是隨朝延壽公于銓宅至唐武德二年高祖賜與桂陽公主駙馬趙慈景為宅尋趙公薨公主捨宅為寺以妻為夫故敕為崇義餘如前解集撰謂聚集律文以申撰述原夫者考事之前式發語之端由也大雄者目至聖之人也以修行大趣理大證果大所化大雄雄然非吾佛而案誰本法內傳阿含等經皆云周昭王二十三年七月十五日現白象瑞降摩耶夫人胎明年四月八日於毗嵐園中波羅樹下右脅而誕又周書異記曰昭王二十四年甲寅年四月八日江河泉池忽然泛溢并皆騰沸宮殿震動其夜五色光氣貫于大微遍于四方作青虹色時王問大史蘇由由對曰有大聖人出于西方故現此瑞王曰於國無損乎對曰一千年後聲教當被于此又隋費長房以瑞應及普曜本行等經校讎魯史定知佛以姬周第十六主莊王他十年即春秋魯莊公七年四月八日也普曜云光照三千即左傳說常星不現夜明也既而生下感九龍吐水沐浴金體引步十方各行七步蓮華承足為降魔梵一手指天一手指地發誠實言天上天下唯我獨尊後雖處東宮不染欲樂十九踰城五載遊歷六歲苦行年及三十以二月八日明星出時於摩竭提國成無上道按此成道當周十八主惠王十九年癸亥也示滅即第二十一主匡王五年癸丑二月十五日也時年八十矣御宇臨御宇宙也一人者如來出世興慈運悲極拔含情離三有苦證四智身故云拯拔一人一人即成佛也法華經云如來為一大事因緣故出現於世莫不開佛知見悟佛知見入佛知見道故又云今此三界屬于一人此一人即釋迦自謂也大教總彼三藏也膺期膺猶當也即如善見當機熟時如來出世雖曰法有萬差而所趣歸一譬彼衆流會歸大海也故無量義云法水一也江河井池分其異爾著欲即五欲也經云勿令放逸入於五欲我心即意識也經云此五根者心為其主是則心生則法生心滅則法滅已上舉病止心下說藥也又藥之所起次第要先戒次定後慧今所以先論慧者蓋推斷欲之功親在於慧也又推慧之所起在乎定也定之所起在於戒也故經云依因此戒得生諸禪定及滅苦智慧是則生起功推於戒故曰特須尊重等經云即華嚴偈言戒是無上菩提本應當具足持淨戒若能堅持於禁戒是則如來所讚歎二轍轍車迹也今謂教迹塗轍大要不出止作先論止持者戒相止行相作又順初受故止持為先受已隨行故作持居後南山引古德示云誦戒本一卷攝一切止行行盡羯磨一卷攝一切作持法盡由道本根本行別止作統攝佛法綱要也後進下結勸也妙下要妙在於宗承戒本羯磨二法耳慧日西隱者即如來化緣將畢示歸涅槃故於娑羅林下右脅而臥寂然無聲猶日之沉西也一切衆生痛乎困暗又可知矣法水東流者取洗衆生心垢也佛法從西流至于東故曰東流像正者佛法有三時正法一千年像法一千年末法一萬年至南山出世早當像季故鈔序云逮像季時轉澆訛又云豫生居像末等淳薄者淳正浮薄也二部文殊問經云謂上座部及大衆部也南山云上座大衆創分結集之場五部曇無德部薩婆多部彌沙塞部迦葉遺部婆麁富羅部此如來滅後一百年分十八即二十部中去本存末也即年將四百分出二十部也廣如十八部執論五百部智論云佛滅度後五百異部聞畢竟空如刀傷心等末下末則衆鋒互舉自此之後時移機劣各競分途莫知其數故曰互舉也先驅驅馳也人或下指上諸師始自分部終乎衆鋒互舉蓋各從緣而分異雖然皆是助揚正法使無傾墜耳故涅槃說由此異想朋黨相援互相諍訟皆悉悟道又大集云五部雖各別不妨諸佛法界涅槃鈔云爰及四依遺風無替是也道由下謂信為道源功德母也弘下以人能弘道故也人下即鈔序云爭鋒唇舌之間鼓論不形之事是也古今者始曹魏終有唐也增繁下如光律師增乞辭願師廣子注者考下謂稽考彼之實録但師徒口傳耳聞為是也核下謂研核其綱宗頭緒略無正本依據師心制法即增加乞辭等披下當時有披而誦持者尤衆也侮無古切慢也詩云外禦其侮刑網不學無知罪也皆下務事也異同互望成異宗之曰同是昔者執己行者為是宗之前聞曰昔反隅者隅即方隅也謂遍執一隅之見若能舉一知三方曰通解潛地猶言墜地也慈誥誥亦作告劉熙釋名云上敕下曰告告覺也使覺悟知己意也如尚書大誥等佛語既是覺語比丘令知佛意故從稱誥又律藏是大慈門中流出故言慈也論云依大慈門說於毗尼妄指言不可妄有所指增加乞辭等聖意既楷定妄指是難也關輔關即關內禹貢雍州之域尚書曰黑水西河惟雍州輔即三輔所謂在馮翊右扶風中京兆立此三輔以輔王幾也具羅下即三十篇也鈔序云但境事實繁良難科擬今取物類相從者以標名首雜相如諸雜要行諸部別行之類但下即上卷攝於衆務承用有儀中卷遵於戒體持犯立懺下卷隨機要行托事而起隨卷約相備已酬校非夫積學卒亦難了故今於通辨羯磨一法推為作持之要恐未能該綜故別標此法集成其文以貽後學也銓應邵注漢書云銓權衡也又常昭曰銓稱錘也如下別立十篇之題各詮量有次使不亂也出納下謂廢出非三義即駮除異說也納興是三義即搜其同見也鈔序云搜駮同異並皆窮核長見必録以輔博知濫述必剪用成通意是也今不盡論故指鈔也此下此中但明羯磨一法有須當世盛行者隨法被事令有楷模仍引諸教以證行用則在此羯磨上下兩卷以明也殘缺或結集時或分部時或傳譯時抄寫時文有殘缺者約其義理乃必具之故須裨補先則從親至踈如下引僧祇五分等是也次則引諸經衆論是也故曰撮略正文厥或教藏無文則須以理決通如下義立七非等是也並各至下篇隨事具顯異古藏迹者即光師准義參混聖言前云藏迹可嫌是也以下疏文云僧及一人法各分三對首一法但分二品故有八相也一號即羯磨也七衆如下八齊五戒等法則收在家二衆并出家五衆共成七也豈下示謙周易云謙謙君子學司司存也譯者周禮正義云譯易也謂換易言語使相解也法鏡者戒疏云能照達万法也又云法正明慧卓朗除邪倒也又言法護能興建正法不墜於時也運下謂分部時運當佛滅百年興斯名教斷丁亂切章者言說有斷截也章刑昺云積句以成章章者明也總義包體所以明情者也又戒疏云四度傳文盡所詮相故云四分此據說之所至非義判也又如八十誦一夏之功也五分十誦其例衆矣言律下以律屬能詮教戒屬所詮行今言律乃詮行之教也對下繁即光願集本略則曹魏出者上云單翻直誦是也今所出者對彼之繁故刪對彼之略故補潛務即古於見行有不出者今為出之令隨機有用也天音即天竺之音也翻為業者即業務也以一百八十四法悉是作持業務也所被以法為能被生善滅惡等事為所被因其羯磨無不成濟大略略即簡略也言於序中略述大塗未盡聖意隨至後篇廣闢要義以開學路也從所題曇無德下至廣要如後來此一段文即懸釋名題也如藏師解心經亦於序中懸解經題可為高例矣疏題十字如前懸釋已解卷者可舒可卷第者居也此卷居此故云第一注集法等者居士篇之始此卷釋盡此一篇故舉頭尾以括之訖止也尚書序云斷自唐虞以下訖于周篇之名義如下所釋決務開決法務也初下分文具現方成謂此四法具足現前作法方成缺有之機戒疏云缺有之士今謂三寶降世豈為憎生大意在敦崇殘缺三有之機器也戒疏又云大聖降臨創開化本將欲拯拔諸有同登彼岸滅惑止為滅除結惑也律言云何為學為淍三毒令盡明功下薩婆多云新受戒人與佛齊德以此而推出家僧尼真是功德善法之聚位尊人天良由於此又大師云夫受戒者超凡鄙之穢流入聖衆之寶位也顯下明其戒德上既為三乘因種下則為六道福田也大師云所以為世良田者實由戒體故也內外分塗即內凡四外凡三屬七賢位凡聖者小乘從見道已上入無漏名聖下皆凡也若大乘依法華瓔珞明位有八一五品弟子位外凡二十信位內凡三十住位聖初四十行五十回向六十地七等覺因位末也八妙覺是罪位也約寶者第一義諦僧稱寶故薩婆多云若施僧寶者塔中供養第一義諦僧若施衆僧者凡聖俱取分今謂白衣中亦有證果者如律中見諦學家是也故曰通於緇素也就儀約外相也以外儀雖同持毀有異持即體相俱備可應滅惡門事也毀則體穢相淨可應生善門事也情見相投者六和之二也以情同即意和也見同即符一正解也上善即生善等事因和而得成登成也下惡即滅惡等事因忍故得滅又和必該忍忍亦收和生善滅惡和忍須備今且偏對耳聲教即法辨之教所謂羯磨也若非此法何以通成僧務弘理弘大也別佳梵云四摩此云別住即隨逐僧所居住並使同遵又凡作一法須具十緣如下所明功能而翻者以此法能辨生善滅惡故衣食受降者衣須受持限內說淨食則通收四藥俱有手口二受但七日一藥開說淨蓋免第八日犯長故人法人即受戒法即說戒自恣結解諸界等後謂下懺夷殘等罪治罰滅擯殄四諍四違諫等皆名滅惡事也名通善惡者懺罪名善治擯名惡俱在除過𠎝耳夷平也同太虗即善生云虗空無邊戒亦無邊懺重即夷罪能令下目連問罪報經云犯波羅夷罪如他化自在天壽十六千歲墮泥梨中於人間類九百二十一億六十千歲阿鼻具云阿鼻至此翻無間應法師云無間有二一身無間二苦無間業義通者十善業等緇素同修故云非局在僧若存業名義有相濫去華存梵知非俗行故言揀異絶聽猶惑耳也正翻即上翻業也舊解即上云今有翻羯磨為辦事也但廣明非不離七非也翻其非者即名如法內外內即有情外即非情相續揀一報實色聲也今於報色聲上起方便色聲名相續又以報屬無記相續通善惡故以善色聲為體戒業章即出三宗戒體中業即業體三聚以三聚之名出於成論法相所收律中全無攝法隨相明體者如下云據法本體義張三位隨相略分以為八品故云但有等然則下以羯磨聖法託彼情非情等事而興事既不一法亦彌廣不可以定出其體十誦下彼對首心念分衣佛言是名羯磨又四分三語中及為白衣說法中言羯磨此皆誠實之文也常念四儀行住坐臥心念自策也如下云來往繫心衣食起觀止得獨運是也對首及衆法二種心念皆為集界無人故例開作受淨即受衣藥及說淨也捨墮說恣者亦為界不漏故開對首作和白如非時和法論法毗尼白說戒自恣單白等結解即結大小界法并解等受懺即受戒懺重擯治諸違諫等法是也小事即心念事未假餘人證明成就如晨朝六念法是也中猶通者中非正訓通義如通也謂微通大小故微亦分也若無下謂界若無人則通為對首心念是微通小也衆法下以衆法合須四人已上今為不滿開作衆法對首故微通大也故此下合結住持如結界等注下受戒等息邪如與狂癡法等靜謗如諫擯謗法等悔除如學悔出罪等僧得者言僧可得自在或作德適緣適從也上得兼下即衆法無人可作對首心念也下非潛上心念對首法不可使衆秉也故說下示上得兼下之法雖作下如說戒本是衆作今對首似乖而表半月一淨是同又以彼此相對故曰戒法相攝自他雙被餘有下然衆法未必皆通下作如結界受戒等理須僧秉故曰限當位也來往繫心者即四儀中有犯輕者開責心悔輕吉及衣食念念作觀說戒座上發露等假證一人作證也今無人故名緣闕待形言形有所待也今若無人理開心念為濟形命也衣服施緣者如分亡人輕物法當界無人開心念受等以濟形苦心無別求告白證成者如受七日法白僧殘諸行法白入聚落法等持懺即受持衣藥懺波逸提法乃至懺重吉羅法等如懺捨等者即捨墮法等取說戒自恣受僧得施受亡五衆衣物也不同下此說對首心念也本是對首緣通界無人開成心念得人對首即是本位本對一人外不須集故曰得人別衆衆法心念衆法對首都緣本界無人次第開之有一不集並是別衆故曰大略同此逸提同故決蘭得名中上三境即大衆小衆一人也如受戒者受戒有差教授師召入衆對衆悶難并白四成四白三羯磨捨鉢中有行鉢正懺時懺主白和受功德衣中有差五德并付分五德白和正受功德衣和法等亡物中有分亡人輕物法差五德分付法賞看病人法從下雖法有三四而止成於一事故局稱一緣古人下大鈔云亦可引用十誦彼則定有百一一百三十四者就緣約相都合一百三十四羯磨略言如此更張猶有單白有三十九白二五十七白四有三十八若通五十別法則有一百八十四法也僧尼不同者僧有差教授尼法并受戒懺殘法尼有差求教授法差自恣人往大德僧中法遣信受戒差使法尼與僧作不禮法等同秉即受戒懺殘法也二部即僧尼也結集諸白者如差往王城結集法問優婆離法優婆離答法問阿難法阿難答法此皆佛滅後和作故知事如理亦通得然則下以學不猒博博則通矣瞻富瞻也古云博學為濟貧此言誠驗資益也大鈔云若全未預法則隨人一部為依持順文謹用行之可以為準的通觀觀視也經遠言垂之無疆也以其通覽必有所稽則取信於未來斯為學之用也大鈔云若四分缺於事法他部自有明文理必準行不乖二是管見謂若執一部之見其猶以管窺天耳南華真經云是直用管窺天用錐指地也不亦小乎三品單白白二白四也又心念對首衆法皆同當律也求聽即求僧聽許也下云唱事開聽是也亦名中間羯磨也大鈔云受日諸部不同僧祇有二初七日同於四分後事訖便用中間別法蓋皆無異品亦同僧祇三品羯磨如此所明亦不別立中間羯磨唯十下引證以五分不出別法名相衆法別法俱名羯磨若古師云五十名別法是非博贍之咎也所作望僧為能作也唐梵者梵當為翻字恰苦洽切猶正也然是也百論翻云事也言事即是所作業故得符合解云即真諦所立事或僧中立條約等事問下釋羯磨義以僧聽忍又不遮障即是所作事名為羯磨此亦名直白法打木即今白捶法是唱白一分者如請白法云大德僧聽某甲比丘於此處雨安居若僧時到僧忍聽無白如是是一分也又云某甲比丘為僧事塔事出界行還此處安居僧忍默然故是事如是持此云羯磨一分後二即白二白四前三即所作單白中間也準下似問辭今下是釋改辭者如三人但改云諸大德理通無失論即了論彼云中間直白此三羯磨三人等通作餘二必四人已上九種法即上三位各有三也十緣即稱量前事乃至第十答所成法竪義者勸後講解之人引下文來此明之也下文即辨七非中自解也三情事合云情非情事合離衣衣屬非情老病屬情造房屬非情也付鉢即展轉取最下鉢與之今持為非情人為情也是非互有者不出人事法三皆附一法而起有非成失反此名如想下如舉受戒事為宗人無遮難名實異比輒加名妄破戒者和尚犯提餘僧得吉是自惱令彼虗受是惱他又請日事虗出界招譏妨道皆是也有智隨時配之不可盡論生善生世善心也出世之田言為出世之良田也果向俗人言俗中有證四果向者授必在於出家者須要五衆為彼授也比衆即比方於衆以譯僧名加和合言和合衆也佛法衆衆即是僧非四不成大論云以四樹成林為喻不明僧義者餘經不說羯磨說戒是為僧和合義也所以但從衆翻恐濫濫三二人衆單兩但言衆名單加和合名兩然和合亦以衆為本故然此下若依儒教則以三人為衆故漢書功臣表曰三人為衆攬假攬方便假色之用也今四僧為本攬和合為僧之用也故曰義相類也凡聖凡則收內凡已下聖則收見道已上儀寶儀取外相約住持也寶據證真據理寶也功用即功德力用也理約達會為言事約六和無別為稱機教是今用教之機水乳無二者戒疏云如乳合乳如水合水不得云乳合水以相合非體鵝能別故以下三人言下三人亦名為衆又四人衆假下三人以成故還攬四人以成僧體其猶攬指為成舉體也緣成即一人二人三人具成四之緣故下云分兼衆義小論即俱舍婆娑五陰即色等實法揀方便假色即一報色等別用如一人俱作心念別法用也不隱沒即現見五陰也無記以一色三心未流入行心俱屬無記持犯云流入行心方成別因此則顯以五陰實法為體行陰即善行陰所攝人假即實法上起方便假用為體以實法屬無記不通善惡故曰無用陰本即實法以實上起假假還依實故如下取例也身口鼓動是假也報得色聲是實也報色例陰本鼓動喻假用也今存下即依成實為彼與四分宗計同皆空宗也然下雖云律與成實同計則不說假用為體但出一人乃至二十衆也與上不同故不廣引也然則前後五科俱無斷割今以義意評度約數假用內外相須氣味還同為今所取思之三根見聞疑也持說即持衣說藥若不足僧數亦不足別人故等者等取二十僧也法務下但據法事合用現集多少而論也能所俱體者即能所說聽共為體也如四人說戒一為能說三為所聽除所為如受日人等不屬能秉僧體俱非盡辨者別非辨僧法僧非辨別法故大鈔云僧者但得御衆法已外對首心念法之與事決定不得衆作別法例亦不成當分通辨衆法別法各有當分核下正顯當分通辨三緣即一人衆多等僧次引證一人也功用極大者如別衆食但得一人入則免別衆豈非一人以濟衆乎通界下謂盡界集僧若不滿者作衆法心念此法既成與百千人所作衆法同等敷教即敷揚正教一與多同也有下結前四義然下起後所解法成即具六和方成僧義經即華嚴正戒以戒正則可為淨慧之宗本也又淨戒為萬德之基址也同受即同一受體同行即同一隨行有缺隨缺於緣成者不名僧也見慧即同一正見所發之慧非同邪人六十二見之邪慧也同界別法雖同一界各自作法不犯互別如調達之黨不入正見之僧也淨行即行和同修也當離四邪五邪以活其命也利乖由邪命故受利則乖也上三則戒見命也三業則身口意三和也身和同住口和同默意和同忍苟前三體同而後三不和亦乖僧義德用三體為德三和為用又於體於和各有德用故合而言之也三位即大中小事也三法即心念對首衆法也三相即一人衆多人四人已上也異法分人即四人可行說戒五人可隻差五德行自恣法邊方五人中國十人受戒等乃至略五人十人也前二四人五人對後得前名法爾言約法止用四五也以說戒能說所聽既無所為故相綰用四得成自恣以隻差五德牒名入法不入僧數故須至五治罪收懺捨墮也以懺主單白和僧不入數故舉證者舉收五德是舉罪人也證收衆僧是證明彼所犯者又收懺主證明彼悔罪故後二即十人二十人對前得後名逐情者中國制十人受戒以僧多故恐所受怠慢人多必生殷重下云善心浮雜故又二十人懺罪緣所犯者情重增受戒之一倍方可濟彼中邊即中國用十人受邊方僧少開用五人受隨下對上受體故名隨也專精第二者由來不犯名專精犯已起悔名第二對專精可四人行說戒對起悔可二十人行出罪非四不名者以大聖知三人已下勢力未勝辦事未竟故限至四也邊受即邊方受戒但下顯用五所以無言表淨五德無言方表已淨已上說自恣須五也方下說邊方受戒別問即差威儀師下壇問難反白上壇召沙彌入衆和白也前受即能受人以五人僧境少故容起彼慢若加至十境勝心猛故可發戒情浮情意浮慢也中受即中國受也三僧五人十人二十人也濃薄後為濃前為薄也前境即三僧之境也猶如也三品即七日半月一月此取倍增義可類也同五邊方受用五人自恣亦五是同也減半減中國之半也據下正難意云邊受既開五邊懺殘應可十人不機侯即渾儀也上符天輪一無差失以候於時也今但取差失教旨之儀謂減惡從急故不例開也除中國律若云除即顯邊方開十今既無除則中邊懺殘皆二十人矣大疏即首疏朝夕諸念即晨朝六念懺輕吉等諸白告即白入聚落衣藥說淨等諸結解此約白二法如結二同三小等等取作房分衣諸法也不相通者如六念不可對首及僧秉等對首亦然通下應知上法無人可以通下下法者人不可以通上即前中事是也亦爾開作對首心念也人位即通一人二三四人也分三即本衆法并衆法對首衆法心念既開三位據作之緣應合有異未知何者是邪少多多容四人已上少但三二一人通下二位對首心念三別衆法對首心念僧局要作法界也別通通自然作法也唯在結界以不許傳欲故一則地弱不勝二則要知界畔餘法則開俱閉無有開欲義也三別律云應來者來應與欲者與欲來現前訶得人不訶是名和合反上三和成別衆也若對衆下即對衆多人於上三別中但無第二一種前後二種俱有若對一人下即作衆法心念對首心念但具一別也文中對字但對望之義半月即行半月摩那埵一白問難此約對衆時問各行衆法即各於本衆作法差人徑也如請教授是尼差徑僧也具德應教授是僧差往尼也至彼此部那僧尼二部部即部黨部類面對作非正對彼面作法前三即受戒半月出罪也二十衆下引事證也一相約僧被尼說而未顯尼被僧如次科明律云下此說餘不通之法也受誦即尼或不解開於僧中受誦已歸寺當部作之受戒等等取半月出罪二法也不禮見僧不禮不語不恭敬三法不得對面作但可遙秉被之又下如此一法亦不對面但遙為尼作以違反僧捨教授也有三即對首衆法心念又衆法有三是也二三此約小衆懺也一人但可懺下品蘭今若中品用一人懺則無教可準除三法即受戒自恣出罪也四僧即四人五人十人二十人僧也形法二同者與剃髮乘白形同與出家受十戒白是法同觸惱中因前綺語作法轉與身綺重惱於僧也諸制受功德衣難事略自恣等白是也差人如差人說粗罪差人分臥具法等被緣還衣離衣等法是也處分作房指授等法此皆用白二羯磨也七法即訶責擯出依止遮不至白衣家等七羯磨也諫證即四違揀等證則憶念不癡罪處所等正證知法等者等取餘式叉學戒法受具法學悔諸法也此皆秉白四被之故法雖多者即單白三十九白二五十七白四三十八以二攝盡者不出同一說戒同一羯磨二種僧攝也四下以四人通秉一切法止由事有大小故加至餘五人十人二十人也初僧即四人僧也除三法即五人法十人法二十人法倍三人者五人十人二十人皆倍倍增人除三單白除自恣五德和僧并邊受二白並是五人攝即和召二白也二白四中受出罪也通乘三法者言只通秉上三單白耳餘不通之約事下正顯三單白二白四義三白差教授一白教授白召一白對衆問難一白白和方是主五德自白和却入數同僧用也四人僧收以教授不入數故只四人成也方五人者以召沙彌入教授在數又羯磨師和僧問難亦入在數故曰五人僧攝也若據正受四人應成事須別問故用五人戒師即羯磨受戒師也身非下顯不入數義但秉下須顯入數義以戒師一白和僧為僧秉也故非別持請訖即作白請和及不忍者說俱在僧中故戒師與餘四人相從成五也受衣即受功德衣人不得利即不得受五利也始終重作者意謂初始為能秉僧至終亦名能秉僧可名僧攝若前後互入即須五人以成僧用便是所為觀古人意似四人攝將前科今師意點對可曉白和為他所量必須身外有四人僧也未必同席以長衣隔宿還故威儀入衆即教授師也全別不同懺主和白為僧所量也此問似順古學悔以無人能秉說戒自恣二法開學悔人秉學悔自不入數可以為例邊受邊方受戒要須五人三十捨懺亦須五人故云諸尼薩耆也不同下以結界唱相人及說戒人皆為僧作故不為他所量也成四即行言滿四即可行也以自他同遵故事中須之言須用之也何不列者即四人僧中但云除三法謂自恣邊方受戒出罪何不言除結界也以結界中有唱相人故據此應五人攝有人下此初解也謂律文略舉非謂餘者不除列之便言不得揀數約之半減五人也專精不犯者第二是犯者犯已須懺第二白法方起故文云有二種智人一者專精不犯二者犯已能悔即第二白法起人也結界下結界雖有唱相人功德衣有受衣人並為僧作務皆在五僧所攝但下但非正所為人皆四人攝也四衆即四人衆也以布薩無正所為人故一切拜人如罵知事戒中引僧祇云罵正拜人指歸云拜者全取受命之名也以為僧故在四人收非屬所為相涉僧別上正唱時相似別唱也已入僧相有涉也五百下彼問云一人三四人行道或在白衣家得結界否答不得五人已上得結核下是大師推核不取五百論也入教即羯磨四僧四人僧也三人者一人衆多人四人也三法即心念對首衆法皆收僧盡者以四人能被一切羯磨故若爾何須後三五人下是釋八人古師妄出謂懺中品蘭既是小衆上品蘭要倍四人以懺也夷邊方便即是方便蘭也十誦下彼說上品蘭界內集一切僧懺中品出界外小衆懺下品一人懺本無八人之目四別四人至二十人僧但三單白二白四也初僧即四人僧餘三五人等淳薄即厚薄也心輕罪重要境勝故令彼心強也假多緣故拔彼重罪也情事望僧為情事問和連詞但言和合說戒情事則決不勞至於二也諸差即差分臥具差受自恣等諸結即結大界戒場小界等治諫治則訶責擯出等諫即四違諫等問下意云所秉法中約事不論體能秉僧中要說體既許說體何獨四人今五人亦可說為體耶以為僧本本即本體為事如懺主單白為他所量為此事故不入僧數三僧即五人十人二十人以前四為本故其猶枝葉雖茂必藉根本故前得本名當白自體言各當單白白二自為其體由附事有大小故次第隨增無非是體自是為事為受差及和召事此外四人獨名僧體若爾何須差問但下是釋法自是體下重明法體言當白即是自體非待白外重加白亦為體也以三法各有根被事各有成故就從四僧對前衆多一人僧名後減下如減一人白說戒不成等過限俱非者律云如白作白如羯磨作羯磨不可以單白增至白二白二減作單白等未審何意不得增減耶乖別過起者假其數定容有不集也非情惱者法是非情本無所惱不同別衆不和成惱聖教即白與羯磨也缺不成務或缺或剩俱不成辦前事也制僧數定四人行說戒五人行自恣等是定不可減也越度減之成越法度也過數四本開說戒今若過者蓋益善更無方便易集則須盡界難集理須出作除此二緣更無方便而開別也若准下彼以法例人唯多益善如單白增作白二白二增作白四彌善減則不成此乃部別不同若四分則法須楷定加減不成三種教心念對首通於二界白等三法除結界於自然上作外餘專唯作法界也今且通而舉之初是下示通秉之處也緣隨開作者隨六念持衣等緣皆開於上作之聚下即聚落蘭若水界道行開秉結界白二以是草創所依故不得說欲以結界不許傳欲故特限之是所行處以開自然地作故五人以有隻差五德之義故須結界已行之初從兩對此約取欲時兩人對首未至僧中故因也終下及後傳來是應僧法法既依結界欲豈容自然故成果在僧也若爾下此難因前大界等中云對首心念緣隨開作本是衆法要五人行捨墮故下通別人為僧不滿故開作衆法對首有人不許非謂約界不合相體即法相體見九品加小衆對首如云二大德一心念是也或只在對首中收則成法八般也二合即情非情合如老病離衣望人老病為情望衣重為非情若具方可加法通號僧者始從一人終乎二十七位之人皆名僧也以一人亦能辨心念故雖四聚落蘭若道水也在緣即上四緣九品即上云廣為九位是也相有緣相具足曰有可得被事名成反此全闕名無被事不成曰壞則通成壞者如說戒僧闕者開對首心念則成僧滿不結而說名壞兢勵兢兢勉勵也日月即黑白大小日月及衣鉢有無也二合望某年太歲是非情望受具人是情身下即無病行道有病當治捨請如己有兩處食請捨一處與同類免背請提也望作法捨是對首故諸界作法自然通得通三情非情二合二難為情者五分云欲安居時先思量有難無難無難應住此約自妨難邊屬有情也約處所邊屬非情也淨藥藥非情患為情也持說若就人持說亦合情收今約法邊非情之限獨秉約無人故開作對首心念三大界即人法二同法食二同法同食別界也不許住以場非攝僧住處故借使王立房者慚愧比丘剔壞之安居篇云若依大界安居戒場及餘小界內不成受日以非本要心處故若先無大界依伽藍結者若後結二界隨界受日並成莫非所要地故今約先已結場說餘法餘對首心念法也如受三衣并捨等於上作之無妨以通作法自然故約事望說戒事是非情也二合望機淨是情望應法是非情唯是非情約衣邊說自量屬情望衣等非情又成二合今約下文自釋二合義自恣下望自恣法邊屬非情約人應法名二合局一上約一法事上為言也通界可行意云通界集人無者可行有則成別若有二人已上當改作衆法對首四人已上改作單白說戒故曰改法也三小不通無難不可結三小界而作也戒場時有如大界內都無人又大界中別有難者可於戒場上作之此非恆作之地也二合如七日藥望牒病緣是情望藥鉢邊屬非情白事望比丘為情望作事通情非情不得向二以但對首無別衆過故縱有旁人亦不須集邊和四人捨懺懺主受懺須問邊三如後白者白行行法白僧殘諸行法白入聚落法尼白入僧寺法此界於自然作法界但對一人白皆通成也說恣等者等取受僧得施法受亡五衆衣物法二合望衣罪邊屬非情望能悔人屬情說恣非情者局望戒與罪邊說也若據所被并能恣人即又二合也久廢言不可用四人和白也以僧祇正斷五人為捨隨故不可自和自忍五緣一請懺主二為說罪名種相三捨罪四訶責五立誓小衆具六緣加第二受懺問邊人五人已上又加初從僧乞也大鈔云三人二人法亦大同既是全別初捨衣云衆多大德一心念然後自陳云捨與衆多大德捨罪中問邊人若對一人大略可知捨財還衣直對而已若論除罪無問邊人但具五法是也故曰隨機不定前境滿四意謂懺主單白為所量可言不入只如能懺之人應可足數所為未除言能懺之人正在所為中收而未及除之也縱使懺畢尚屬所為終非僧攝通七者三大二小并場共成六界四種自然為一故成七界不開小受者一席作法曾無再用故也因舉便捨即懺捨墮說戒小界行四人法自恣小界行五人法若將一是所為止是三四人法今且甬能所為言也懺蘭約中品也輕者即下品事是情過者如摩觸女人身上衣破羯磨僧盜三錢已下僧私之物是中品蘭攝界亦可通通七種也如上五即衆法對首中餘語妄作異語惱僧又喚來不來名身觸惱故以單白制斷也形法與剃髮名形同與出家法名法同此皆情事也諸僧即修道增自恣白諍事增自恣等結集法如差往王舍結集法問優波離法優波離答法等望法邊屬非情也滅下即滅諍非時和白受功德衣和白望諍與非時德衣邊名非情望比丘邊名情故曰二合對人剃髮但滿四人差教授須滿五人兩分人少行衆法對首人足行自差也非分者然作三法人多益善今且望單曰三十九法不同受戒懺殘限定十人二十作故曰非分作法以自然地不堪秉故四種即聚蘭道水七界者三種小界并結大界法結二同法結一同界法七結戒場法故下文云三大三小名多義一戒場自分故須圍繞是也差問三白即差教授白召白對衆問白唯在受戒小界中秉不通餘界上作也餘自恣差人白二及五德和白又說戒單白皆上局自恣說戒二種小界上亦不通餘法界也又三種互望亦非通也非無下應先問云說恣小界中舉得罪時為即於此小界上懺己說恣為就別界耶將文通之如下云不無因舉便即治出事由後生不在現作是也又但發露已後於大界上通行亦可行鉢以場無罰鉢入厨之義故德衣以制前坐比丘賞勞場非住處故形法剃髮出家要和白大界僧律文因輒度巧師兒來問僧不知故制白告不爾房房語知故場非秉處差使差說粗罪差教授尼等諸結即結大界戒場不失衣界等離衣老病衣重聽作法離房即指授造房處所并持故房與道俗經營法也守差人守藏法也差人守功德衣法但望人為情衣房等為非情問下謂白二五十七法中有差自恣一法上既云自恣要五人今又何云就人唯四不通五人則成相違答下如此立難蓋自己不明爾今自說四人為能秉五德為所差故曰前境不定人乃是緣即所差人也乃是差法中所牒緣也斯人未可足成僧法至後自秉白和方得入數故相從是五餘差下即差人分亡人輕物法差分臥具法等皆是正差時牒名入法不入僧數差已通入故曰例知非謂下謂非謂百人千人不舉行白二法又只制五人局行單白白二專在四人餘五人等在制立之限外也若爾下若云所為不入數者且如捨墮中還衣有遠行緣即日還者作法付彼同友今展轉還彼得衣已屏處付之須作展轉羯磨其文如亡人輕物法加云僧今持是衣與某甲比丘還某甲比丘若爾豈非受展轉羯磨人不入僧數便成五人何言除所為人外只用四人耶答下猶是四人者意云受展轉法者即是所為之人不入僧數此外須自有四人以所牒名入法故何得又疑七箇白二即結三小界大界戒場二同一同法也重加結竟不可於上復作也如攝衣謂攝衣就僧界上起故場非秉處若行秉者便成遙結受日要依本安居處故場非安居地也下鉢乞鉢戒中折伏之法令展轉收最下鉢令持有罰鉢入厨之義場非廚故房舍即指授造房法場非造處故此皆不通場上乘也餘還衣等法可通場作生善滅惡者如受戒白四是生善也覆藏等法是滅惡也餘二即不通非情及二合也四人如諫破僧等四人可為能秉五人不通非謂不通五人但制五人單為別事也唯不言五人中只通自恣和僧一白也若爾何故前云三白耶答此猶順古也廣如下文十人受戒中白四十人作出罪白四二十人作說恣小界以說戒但單白自恣通單白白二故無白四也事由後生即前云非無舉罪即有白懺大界通作三緣即事僧界也四緣加法之一種也有三懺輕吉六念說戒座上發露自局不須對人也七法即安居說淨受藥受七日受三衣捨三衣持受鉢本是對首無人故開作心念故曰通於對首也四法說戒自恣受僧得施受亡五衆衣物本是衆法故曰通僧無人開作心念故又通對首在文即正解文中七種即上安居至受鉢五種即衆法對首有五謂捨墮說戒自恣受僧得施受亡人五衆衣物望本是衆法無人開作對首故曰通僧別也於中捨墮不通心念故前文云四法通僧別是也餘下即餘二十二法但對一人即得若除小衆則但二十一法也懺蘭局小衆以但對首有懺偷蘭遮法此收中品蘭也然以中品小衆正對亦只一人至如下釋上通僧別義三白一差教授二白召三戒師對衆問難一白一白四者即正受時一白三羯磨共成白四辨前多法方發起無作戒體相有謂結界須唱方相畜衆要須有德律中制未滿五夏及滿五夏愚駭者今依有德是也不得重加謂結已不可於上重結就事即所被事分三即情事非情事情非情二合也口言要口陳詞令耳聞也為前證境即二三人為他作證明境也又能作之人意在通己言情告以事緣波須互相領解方被事成遂雖下即衆法對首皆衆不滿故開成也四下以四人能秉一切羯磨故乃三即五人十人二十人由事大小故加三位核其本體但在四人故曰宗歸初位故前云四人成體加一為事故後三僧不名本也若減即減四人也是弱者謂四處六相是自然地也弱不勝衆法故唯開結界一法爾相接則成錯涉之過也要須中隔自然方分兩界名多義一者如二同一同等雖有異名不妨同作法界也戒場不爾雖有中隔自然及外有大界圍繞方可受戒若先結大界後結戒場卑公云恐無所獲雖下即場相并大界內相空下即中隔自然也紹興府會稽縣廣孝卿蘇墟里屯頭村前莊西保居住清信奉三寶弟子進勇副尉顧宥伏念先妣樓氏五娘傾亡往日思乳哺以恩深純質何方念劬勞而德重少伸報效須伏妙緣特啓誠心施淨財七十貫開記一卷永助傳通三寶光輝功嚴樂報先妣然願蠲除五障清淨六根萬行齊修十身圓滿次冀顧宥根塵清淨福壽增延法界冤親同登妙果時戊辰紹興正月上日謹題
