body:
  text: 天台沙門釋允堪述集法緣成篇第一集法者聚集一百八十四法也雖舉其法亦總於事事為所被法為能被非能無以收所故但舉法以標之緣成者凡作衆法必假十緣所謂稱量前事終乎答所成法緣具名成緣闕名壞今雖舉成義亦收壞下文云已前略明緣集已後辨緣成壞是也篇者戒疏云文義集處則名為篇篇字從作從篇乃是簡名自漢已前本無紙筆削用竹木兼之紈素而用圖録後漢蔡倫創造於紙用易簡素古書簡册可有一章以事編之號為篇故宣尼讀易事編三絶是也第者小雅云次也又南山僧傳云第者為居一者為始此既居先故稱第一造七到切至也文即所解羯磨正文也科條也釋解也分齊分段齊限也三分序正流通也西土始自親光菩薩此方元因道安法師肇開三分之文以判一家之典今蹱前式亦判為三法不下以羯磨聖法必不孤然發起要在假託如法之緣方能成遂由下生起正宗分八下生起流通分也僧私僧收衆法私收心念等靜念離緣者下文云初明念法緣身而求敬使常爾一心繫想除蓋毗贊即下文云佛言有五種持律由行得成立識途邪正曉明持犯進止有儀故吐言成律非律不證隨相起行非聖不摸是則正法由興方復懷遠斯大意也末葉末即末末之世及所被機也下文云夫欲昭影裔葉住持嘉運必依憑行摸方能光遠是也文散難尋者以諸羯磨於二十犍度中散在諸文也臨機即臨對也受説安恣等機緣起時人滿不通作人少不能別作人不知此屬僧作此屬別作混然一亂也由是故加法被事成之與不渺漫莫知也綱網上繩摸法也遲慮遲滯疑慮也齊降降歸也言歸在成濟也依位舉數如云單白三十九白二五十七等是隨下如下注云受懺法行鉢法作房法差分臥具法是也通塞盛行名通如受懺法等鮮行號塞如王城結集法是又隨衆法對首心念法中人數應教可行名通反此名塞此義不一猶綱下有網網下有目焉領下有裘裘下有毛焉此明下二句結牒上文歸篇題中集法二字三法即心念對首衆法也然下釋注中緣通成壞等立緣即下稱量前事等十看作何法然後對緣或具或闕任時顯相如上前云以三羯磨攝一切故若隨事者事則無量何止前數是也三種收僧法即單白白二白四五種收別法即但對首衆法對首但心念對首心念衆法心念縱羅一切事亦不越八種內收也故曰一切攝盡也三位即大衆衆多人一人非時即非時和合法和僧懺悔法因諍即諍事增自恣法諍滅説戒法觸惱即身作觸惱喚來不來等論法即七百中論法白作比丘論法白餘語即妄作異語惱僧白此皆是稀行之法今集法者即大師自指謂此中且通列其名向下一一解之及乎行用或有或無以在將來也故今不一一顯所被事以對彼法以明也三十中即三十戒中有二十七戒對僧捨餘貿寶畜寶二種對俗捨蠶綿作臥具斬壞和泥塗埵亦非對僧捨也須白告量即懺主單白告衆衆為量其可不好者奪留即罰入僧庫惡者轉換即展轉取最下鉢與之令持餘語律因闡陀犯罪餘比丘問以餘事答以過白佛便訶已作餘語白戒疏云口業綺者名作異語即餘語也後作下戒疏云未白隨作犯告白制後犯違制故提因前下律因闡陀作餘語白後便惱僧喚來不來等以過白佛訶已作觸惱白戒疏云身業綺者名作觸惱段前餘語合云改前觸惱恐沿上寫濫下具顯緣剃髮至對衆問如受法篇説戒和至僧發露如説戒篇互求更互推求也具德即知法具德之人為和滅於諍也説不待期四分鬬諍來久不得説戒今暫和合須非時説隨何日諍滅即曰和説以僧具六和戒見利身口意等今不同見戒則無僧義不成和合清淨僧法故常和尋常所行和白也難事即八難餘緣也四分云若賊等急難不可間緩者五德至上座前互跪白言今有難事不得一説當作羯磨各三説文云大德僧聽若僧時到僧忍聽僧今各各共三語自恣白如是便各各相對人別三説即説自恣詞句故曰一時兩對難事轉近若欲再説一説亦須單白無非下以此自恣不對五德進不無由故須作白今衆同聞若對五德則多少量時得自在故不須白也三白廣再一説各有一白故忍位即加行中四善根人燸頂忍世第一言忍者從上頂善根後有善根生名之為忍有二義一者印可義印可四真諦理時苦諦實苦乃至道諦實道故二者決定義謂此善根決定更無退動故待時解脫者解脫是果中之號俱舍頌云阿羅漢有六謂退至不動即一退法二思法三護法四安住法五堪達法六不動法前之五種名鈍根即從前修道位中信解所生名為時解脫所以頌云前五信解生總名時解脫謂此五種羅漢必待好時方得解脫依婆娑論有六種待時一須好衣服二須好飲食三須好臥具四須好處所五須好説法人六須好同學待此六種好時方得解脫故故名時解脫第六一種名利根即從修道位中見至所生名利根號不時解脫謂不待好時衣服等便得解脫故名不時解脫令多末鈍故在時解脫所收故白末代便多一夏䇿修不階聖位須至內凡今時澆薄證果者稀雖然後五百年亦有修福持戒何為自怠白停謂今臭白告僧停罷自恣延至八月十五日也會正即證聖果只如天須菩提得好房舍等事一盡夜修行便得聖果今更加功一月豈無所得十八下四分為外界鬪諍比丘來佛令增減自恣若已入界當令入浴界內比丘出界而作若不得者白僧言今不得自恣後十五日當自恣十九下有過不肯本界自恣恐僧舉過故來此界謂衆不知坌污清流故聽更增至後十五日也不首伏首也名實名實即德也由前坐之人有功德故可受賞也然既有五利潤濟行人又得五月故曰多也上下此説頭陀少欲不在受利之限也故須一白和僧中下同受或盡下四分中聽齊冬四月竟應出有二種捨一持功德衣比丘出界宿二衆僧和合出又應明惡心失捨法文如彼明增説戒者四分為外界鬪諍比丘來佛令增減説戒若知於十四日來十三日前説戒若十五日來十四日説若已入界當令入浴界內比丘出界而説若不得者白僧言今不得説後十五日當説此一增也又不去者更增至十五若不去強和合説但明二度至三必須同説亦無三度不説法滅之文廣如大鈔如自恣亦取兩增之義也多不自量恐執己迷故難為自斷必假他也息後息後再起諍也不誦下祇律云受具已應誦二部毗尼不能誦一部又不能者當誦五衆戒即五篇也四三二衆如初句不能誦二衆當誦一衆及偈今不肯誦故作白遣之戒下釋戒與毗尼義謂戒是所詮行毗尼屬能詮教今下謂闕此行教而居處在衆也出言無本是不誦毗尼之過也內行又乖是不誦戒之過也雖下言此人處衆施之無用也以不解律人是不足數故上二即戒與毗尼也偽下即用假偽之辨以亂正法也瑕疵玉病曰疵叵三蒼云不可也猗靡美順貌選云後庭猗靡或作綺靡歸負歸伏負墮也律中佛在舍衛比丘共諍經年難滅以事白佛聽彼二衆相對共滅應一衆中上座作白言我等行來出入多犯諸罪除遮不至白衣家此以對俗懺故餘罪共諸長老作草覆地滅彼一衆中上座亦如上作白已彼此和合罪諍俱滅更不相問如草掩地也與尼受白即僧受尼懺白大略是同王城集法者壇經云阿難迦葉在王城廣結集文殊師利與大菩薩在鐵圍山略結集並如此土諸經所説須待資緣者律云諸比丘皆作是念我等當於何處結集論法毗尼多饒飲食臥具無乏邪即皆言唯王城房舍飲食臥具衆多我等宜可共住時迦葉即作白也若智論云結集時有得通者皆來集會正選千人彼復問曰是時有如是等無數羅漢何選千人答頻婆娑羅王與八萬四千官屬各得道果王勑官中常飯千僧迦葉念言若我等常乞食者廢闕法事王舍城中常供千人是中可住是知行道先假外資故須白告本事者即結集為本事也迦葉後作白云大德僧聽若僧時到僧忍聽僧今集論法毗尼白如是若下謂不作一白通告無以顯示此集之意優波離者此翻近執即佛為太子時親近執侍之臣也律是法命者即佛法壽命也住法圖贊云窟內立三高座一問法人坐一答法人坐一抄上貝葉人坐律云大迦葉欲結集時即作白言大德僧聽若僧時到僧忍聽僧今問優婆離法毗尼白如是答下波離即作白言大德僧聽若僧時到僧忍聽今令上座大迦葉問我答白如是大迦葉即問言第一波羅夷本起何處誰先犯乃至一切犍度調部毗尼增一隨問隨答都集為毗尼藏也阿難者具云阿難陀此云慶喜世尊成道夜生淨居天來白王太子已成菩提王聞欣喜後宮又奏白飯王夫人誕一太子顏容端美舉國欣慶因而立字出家之後多聞第一二十五年為佛侍者律云阿難是供養佛人常隨佛行親從世尊受所教法故迦葉又秉單白問阿難阿難亦秉單白並同前四句成白迦葉問梵動經在何處説僧祗陀經大因緣經天帝釋問經在何處説等阿難隨問隨答集成二藏佛法下二句結前律藏通下生今結集傳之有本者即一切經首唱如是我聞也七百者即律七百結集法毗尼中云爾時世尊般涅槃後百歲毗舍離跋闍子比丘行十事言是清淨十事者何一足食已不作餘食法得二指抄食食二足食已不作餘法兩村中間得食食三在寺內得別衆羯磨四在界內別衆羯磨已聽可五得常法言大德長老此作是已言是本未所作不檢校法律也六足食已得以酥油蜜酪和一處食七得用共宿鹽著食中食八得飲闍樓羅酒九得畜不截坐具十得受金銀也伽那者律具云那舍伽那比丘聞毗舍離比丘行如是事即往跋闍子所言是非法彼即和合與作言若離婆多作伴便可得如法滅初至婆呵河邊乃至三國求之故曰遍國後往人聞求索伴黨合七百人以斷前十事也因數下律云毗舍離七百阿羅漢集論法毗尼故名七百集法也濫委訛三量一聖言量二比量三現量一切去律云毗舍離有長老字一切去是閻浮提中最上座故言高座時離婆多欲問此上座即作白言大德僧聽若僧時到僧忍聽僧今問一切去上座毗尼白如是上座答白者律云時上座一切去即復作白大德僧聽若僧時到僧忍聽僧今令離波多問我答法毗尼白如是離波多問言大德得二指抄食不等云云屏意即傳已定之意計後下上座一切去答問竟對衆行籌審定和忍方顯衆心律中無此一白大師據理合須先白之大意亦同於前四句成也小房即無主不處分過量房故得小名多事下律云佛在羅閲祇德諸比丘作私房室曠野比丘便作大房乞求煩多惱亂居士乞既難得遂斫神樹故曰惱亂二趣也大不依量者不依長佛十二磔手內廣七磔手遂過作也制乞下即戒本當將諸比丘指授處所是也專任自由大不制量也但有不乞殘并妨難二告耳節度即指授處所律云爾時衆僧觀此比丘若可信者即德所作若不可信者衆僧往看若僧不去應遣僧中可信者看若有妨難不應處分是也分臥具即常住物或因分房亦暫分用義亦普周故作白二和告也僧徒下多論云為護佛法故向俗説罪令於佛法無信敬心調達此云天熱以生時人天心驚熱也律中除僧羯磨開説方可如調達始作破僧結三聞達等家家乞食佛令作白二差身子告白衣是也王族教闍王殺父為新王自欲害佛為新佛也示令人別知也二十七即三十中除二寶蠶綿三戒也後文即懺墮中一衣聽離僧伽梨也恆業即三乘道業也緣礙律云有比丘得乾痟病糞掃衣重不堪持行佛言從僧三乞便作新者當白二與之也乞多下律云若好者應奪留置取最下不如法者與之便作單白以鉢次第向上座易之持上座鉢與次座若與彼比丘如是展轉乃至下座十德者一具持戒行二多聞三誦二部戒本通利四決斷無疑五善能説法六族姓出家七顏貌端正八堪為尼説法勸令歡喜九非為佛出家被三法衣而犯重法十二十夏若過不具斯十皆不成差見諦下律云佛在羅閲城居士夫婦俱得見諦無所愛惜乃至身內供養既多衣食乏盡居士譏謙比丘舉過佛令白二制斷後富當解請法即半月請教誡法不同以此三法全是尼有比丘無也廣如尼鈔所明諸見即六十二見也恐反成難者今方破外若受以反歸則成破內便成破內外道也永障出家律中以四月試外道也陶冶戰國䇿云範土曰陶冶即鑄冶也莊子曰大冶鑄金釋老志曰陶冶粗鄙或音遙六和戒見利等也六無遣背故俱稱和生靈即初受戒者不有後法即不通作後法事也當座便解恐起迷方故也説戒堂凡有二種律中因相待疲倦及奔馳頑極時諸比丘白佛佛言自今已去隨所住處人多少共集一處説戒諸比丘不知當於何處説戒佛言聽作説戒堂白二羯磨白云大德僧聽若僧時到僧忍聽在某處作説戒堂白如是羯磨準知既云某處則未唱方相但標指之法令衆委知也諸方來者還有疲極諸比丘白佛佛言自今已去隨所住處若村邑境界處説戒聽結界白二羯磨作如是結唱界方相白云大德僧聽如所説戒相若僧時到僧忍聽於此住處一説戒結界白如是羯磨例準須解又結恐別移堂故不失衣界即攝衣界也此齊攝僧界上起為藍狹界寬者開結而心不會者惡比丘為留難情見有乖也下道非顯處也貴彼來不見故互缺如東寺有法無食西寺有食無法開各解本界合結為一界使兩相濟也一則即一寺也全乖僧體者利非和也六和既缺是乖僧體非是結界此是唱和法也不必各解合結心亂壞神下是狂癡貌據下聖開狂病故不犯約下或憶或來似招世疑也雖下謂雖在當界不妨作法得乞僧須待彼乞法方為解也須法者須行自恣法也恐僧分散有罪難懺故又一夏盟要有瑕可舉今若不作後會誠既不下説結小界小界自恣法分僧物分四方僧物也若無法束八現前後來之僧難約奔得羯磨聲者方得分也賞贍病即看病有功具德方賞分亡人物大同上分僧物法也僧物須重以通四方僧受用故不可輕也理須和定結指一處商可商度可不相倚不收互相倚恃不肯收舉也故定差一人以為主掌則物有所綰也若有盜損望護主結是也難活以貧人取活為難捨少財入此衣功德勝如須彌大衣聚施也堅固五利非速朽也明了論又翻為堅實能感多衣無敗壞也古翻為賞善罰惡衣賞前安居人後安居人不得也亦名功德衣以僧同受此衣便招五利功德也故曰為功非少非德不持者十誦云守衣人具不愛等五德謂知得受不得受了了分明又明了論疏云於初結安居時欲受迦絺那衣悉須白僧我欲受衣僧觀此人不多緣事不好失衣不此人從來不貪聚財物有慈悲心好行惠施者僧即許可若不爾者不須許之不出界四分持功德衣比丘出界宿即捨故須五月不出為僧守之付衣者初秉差法已彼從座起禮僧足在上座前互跪合掌當作羯磨持衣與之緣兆云僧持此衣與比丘某甲此比丘當持此衣為僧受作功德衣於此住處持和擬謂先差時僧已和合擬付也解紛下律因質多居士先供養善法比丘後請身子別辦食味善法不忍乃譏言所辦甚好唯少胡麻滓以居士父壓油為業彼聞不樂居士得宿命通及觀善法昔為烏雞子乃喻云昔有商人採寶得雌雄二雞歸國雄被狸食雌者在後烏來覆之生子子作聲時父説偈曰此兒非我有野父聚落母野父為烏聚落母為雞共合生兒子非烏復非雞若欲學父聲復是雞所生若欲學母鳴其父復是烏學烏作雞鳴學雞作烏聲烏雞兩兼學是二俱不成善法因斯不往佛令作此法遮彼不去律差阿難具八法送被治人至彼求懺若未受應安眼見不聞處令遙求懺使人自向居士求懺若又未受應令比丘自求懺又不受者應令作覆鉢羯磨如下自明八德者一多聞二能善説三説已自解四能解人意五受人語六能憶持七無闕失八解善惡言行籌即多人滅也律云應差比丘行舍羅行有三種一者顯露二者覆藏三者耳語若上座標首智人和尚闍梨住如法地應顯露行若住非法應作下二法行若非法語人多應作亂起去故曰三種五種者律云有五非法捉籌若不解斷事若無問意若無善比丘非若法若別衆有五如法受籌反上句是絶貌者此女容貌超絶可傾國寶也賊人於中塗擬圖謀路而得之故開遣信受也本法在尼中受也遙作法但尼僧遙秉法被之以尼無治僧之理耻悔即所被比丘後時愧耻心悔者尼方秉法解之却行敬禮治房五百論中破而不治犯提律中若有俗人能治破房者白二與之久故即久故故即舊厝置也停止者四分營事比丘作房成莊嚴香熏所須具足與房住九十日十誦云治壞房者六年與住作新房者十二年住僧祇先是僧房破壞更易戶嚮二三年隨工夫多少羯磨與住若空房不住住治事者與一時住若床几枕褥垢膩破更染浣補治者亦一時住覆鉢律云白衣有八法應與作覆鉢罵謗比丘作損減無利益作無住所鬪亂比丘在比丘前毀佛法僧是為八也告覆鉢家令彼家知衆僧為作羯磨遙被也老病下釋開捉杖之理也如儒禮八十杖於朝今我教年小捉者理容長慢多不具文即羯磨文更有如前云若隨事者事則無量何止前數是也邪五法者提婆告三聞達言我今有五法亦是頭陀勝法少欲知足樂出離者所謂盡形乞食著糞掃衣露坐不食酥鹽不食魚肉我今持此五法教諸比丘足令信樂此即五邪破四知足故曰替正四依破主即調達伴即三聞達及五百助破也戒疏云衆僧作法諫主之時四伴影響助成破僧尋設諫拒而不受故曰助破曉喻喻合作諫也擯謗者即污家擯謗律云佛在舍衛阿濕婆等羈連聚落行惡行污象比丘舉過令舍利弗等往彼擯舉當作法時謗僧言有同犯者不驅而獨驅我言僧有恚怖癡也六人者戒疏云六人同犯二人逃走身不現前不得治擯相似有怖二人逆路改過伏從無罪可治相似有愛故曰來去兩乖二人見在非走非懺僧為作擯相似有恚故曰二人不悔令反前意非僧有怖有愛有恚依法舉治何癡之有若不諫諭無由自曉是故諫彼表內無瑕故曰無私涉也中人下反顯中人已下不可以語上也戒疏云夫人之性非生知義無獨善要須善反互相近導方能離過修善有出道之益而令闡陀迷心造罪不肯見過得他如法勸諭理宜從順反乃倚傍聖人恃己陵物便言我是佛法根本正應教諸大德何用大德教我也由是制諫惡邪法律云佛在舍衛阿梨吒惡見生言我知佛説行淫欲不障道比丘諫諭而猶不捨白佛問自言已令僧白四諫之諫擯沙彌佛在舍衛跋難陀二沙彌共行不淨自謂從佛聞法行淫欲非障道比丘舉過佛令白四設諫若不捨者應擯理諫正理也如戒本云世尊無數方便説行淫欲是障道法等是也隨舉比丘尼者尼律云佛在拘睒彌瞿師羅園中闡陀比丘僧為作舉如法如律如佛所教不順從不懺悔僧未與作共住時有比丘尼名慰次往返承事諸尼言闡陀僧為舉汝莫順從慰次答言此是我兄今不供養更待何時少欲尼訶已白佛因制違三者即違三諫不捨者是比丘尼犯波羅夷九下尼律云佛在舍衛有二比丘尼一名蘇摩二名婆頞夷常相親近住共作惡聲流布共相覆罪諸尼呵已白佛佛聽僧與訶諫白四羯磨令別住也違諫者犯殘十下尼律云佛在舍衛蘇摩婆頞夷為僧訶諫已六群尼等教言汝等共我亦見餘比丘尼共住乃至覆罪衆僧恚故教言汝別住作如是言汝等莫別住當共住是比丘尼諫時不捨者犯殘然下淮南子曰墨翟見染絲而悲為其可以黃可以黑言人性之亦爾也朱紫朱喻善紫喻惡論語云惡紫之奪朱孔曰朱正色紫間色之好者惡其邪好而奪正色今若縱之使善惡一混則令邪正不分也是以須諫十一下尼律云佛在舍衛六群尼趣一小事嗔恚不喜便作是語我捨佛法僧不獨有沙門釋子更有餘沙門婆羅門修梵行者我等亦可於彼修梵行乃至白佛因制三諫不捨犯殘十二下尼律云佛在拘睒彌有尼名黑喜鬪諍不善憶持後遂瞋恚作是言僧有愛恚怖癡是比丘尼三諫時堅持不捨故犯殘又律下單提中自有發四諍戒則不因諫而犯此既言諫則可通收上戒十三下尼律云佛在舍衛時有比丘尼親近居士共住作不隨順行諸尼設諫呵責不受因制居士子者彼戒經云若比丘尼親近居士兒共住等比丘尼三諫不捨犯提式叉具云式叉摩那此云學法女不別得戒先以立志六法練心為受緣也四分十八童女應二歲學戒又云少年曾嫁十歲者與六法薩婆多年十二得受具者為夫家所使任忍衆苦加猒本事下誦六法者練心也試看大戒受緣二年者練身也可知有胎無應立離聞處著見處白四受法後召來與説六法名字乃至答言能持如常説十五僧尼受法者僧即大僧尼即尼衆僧無本法尼有本法古人遂立二部羯磨也今以文相大同故不別出學悔僧祇云若犯罪者啼哭不欲離袈裟深樂佛法者令與學悔羯磨永障一生者言此生不能證聖果也故大鈔云斷頭之喻望不階聖果為言是也又母論云但此一生不得超生離死然障不入地獄素下四分云若比丘及尼犯波羅夷已都無覆藏令如法懺悔諸師廢立互有是非今括其接誘理無滯結但使覆與不覆臨乞時都無覆者盡形學悔恕以心度物曰恕乞法律中應教言大德僧聽我某甲比丘犯淫波羅夷無覆藏今從僧乞波羅夷戒願僧與我波羅夷戒慈慜故三乞已方與羯磨佛言與波羅夷戒已當行隨順奪三十五事略同僧綱中唯加不得衆中誦律無能誦者聽訶責明了論中比丘心高不敬計他輕慢大衆為作怖畏羯磨猶是訶責異名與法并解法略如大鈔僧綱中戒下出過多種今且舉倒説四事謂破戒者破前三聚破見者謂六十二見破威儀者下四聚等破正命者謂非法乞求邪利活命則有五邪四邪也中表中即內表即外難顯淨穢也隨從亦奪三十五事若順從者待彼三乞僧方解之乞詞亦如僧綱其行法中威儀坐處準僧殘中下行坐也若有一人三人隨名牒用不得至四擯出如隨戒中污家惡行倒亂佛法污他俗人善淨之心以非為是故須遣出本處折伏治之使世俗識非達正無復疑惑此之過罪人多有之恃須禁斷若論治法隨順及以解辭略同上法然初擯中牒其過已離此住處為異律本委具若隨順乞解不得輒來當在界外遣信來請難革革改也依止者涅槃云置羯磨謂安置有德之所義亦同也沉浮沉即是犯浮即是持大鈔云與依止已親近知法律人學知毗尼明達持犯者當為解之遮不至者大鈔云須僧作法遮斷不許使離遣謝白衣故譏弄即善法譏質多之言是也調喜即自己調柔檀越復喜也大鈔云若俗人歡喜即為解之已上四種但壞其行心猶有信律足僧數應羯磨法而是被治不可訶舉等等四等取儀命二種此亦倒説四事也且下源謂根源母取發生也若不信善惡二因感苦樂兩果邪見在壞障於學路或由不達教或知而故犯僧問何不見犯答云不見舉棄衆表者僧即遮舉與作不見舉治之為欲折伏從道且棄衆外不同僧事後若下四分云三舉人令在有比丘處行之若無比丘處不得為解罪從下謂罪無定性從緣而生既生則能招集將來有漏苦果理應悔除應本清淨今下不揆下器輒言罪福性空故不肯懺也大師云今學大乘語人心來涉道行連大少二乘口説無罪無懺淫欲是道身亦行惡隨己即是違己為非並合此治後下僧祇云被三舉人心意調柔白僧我心調柔願僧為我捨法白已却行而退衆主比丘當量義可不然後乞解收歸足數惡見者大鈔云欲實障道言不障邪心決徹名之為見見心遣理目之為惡亦於戒見四法倒説不信須僧舉棄永不仕用隨順無違方乃解之此三羯磨名為三舉信行俱壞棄在衆外不足僧數過狀深重不可攝濟故制極法律簡此色同於犯重乃至死時所有資産入同舉僧賞功能故涅槃云為謗法者作是降伏羯磨又示諸惡行有果報故朽壞遺棄乃同無用之材爾次重即僧殘知而下謂識知犯相而故藏之隨下始從一夜乃至百夜等皆隨覆日長短以行覆藏法也半壞者毗尼母云僧殘者如人為他所斫殘有咽喉故名為殘若然則簡異初篇斷頭名全壞也行法即行覆藏時奪行法也若行覆滿則奪行亦滿今未滿而犯當從初日再行如行百夜覆藏今至五十夜已再犯者則前五十夜已失理須從初日再行使滿百夜也行六夜摩那埵亦爾故大鈔云若二法中重犯者各壞二法皆重與本日治之此法合在摩那埵後出今取覆藏本日治二法俱是有無不足故在六夜前列若六夜出罪其必定行故鈔云若覆與前法不覆與後法俱同出罪是也意喜亦翻悅衆意隨順僧教咸懷歡喜枝條即方便并覆藏罪也二十論云若二十清淨比丘出僧殘罪則我法不滅減則不成清人被謗者律云沓婆摩羅子為僧知事六群中得惡坊臥具惡請處起瞋謗言有愛恚怖癡遂以淫事誣謗親於衆中佛問虗實彼言我從來乃至夢中不淫況於覺悟比丘以事詰問六群便言沓婆清淨無如是事佛言沓婆無著人不故犯戒應白四羯磨與憶念法也不癡者律云難提比丘得癡狂病行來出入不順威儀多犯衆罪比丘詰問便言癡時造罪病差不作以事白佛佛言應白四與不癡羯磨證知病時造過差後不為應僧清淨得足僧數黠胡八切慧也言慧性明白時不曾犯也罪處所者律云象力釋子善能論議得外道切問前後相違僧中亦爾比丘以事白佛佛言僧應與白四羯磨治取本罪奪三十五事勘劾劾謂推窮罪也不無者含注戒本云若狀首本罪者應白四羯磨如法為解有云覓罪相意同多位下即互作別作及通學也問難既為尼受戒故須先問遮難教授即差教授尼法正作是僧今望差被尼邊為言律云若已差應教授捨教授彼此有緣也別住下此僧為尼作三法也次下本律與十誦尼為僧作三法也謂不禮不共語不敬畏問訊此三羯磨不須現前自言結集諸白即差往王城結集等諸白諸諫殘即諫習近住勸習近住等法同戒除互無外餘淫盜等戒是也事義下雖曰戒於中或輕重不同或對境差別如是事義不可分辨令盡也三四如自恣滿四只作對首無別可彰者言無餘別義可以彰召也三語即彼此三説也説恣下以通界集人不滿方開對首三人四分滅諍中小衆者二三人也持説即持衣説淨前人默證便成安居如前證問言依誰持律者有疑當往問是也諸懺即懺主呵責等入聚即非時入聚明了論疏云我為如是緣須至某處白大德知答言聽者是名白法又如作餘食法彼云此是我殘汝取食之斯皆對證人有言告示也説恣清淨即彼此各陳三説言某甲清淨等隱顯隱則默證顯則語證雖然並屬對首一位斟酌也二三而已此亦略舉按本鈔中懺偷蘭提舍尼等皆出四分持説即受持三衣并説藥等當部文無故大鈔序云當部闕文取外引用仍自注云即用十誦持衣加藥之類諸部如捨三衣出僧祇受鉢及捨出十誦等是三語歸依佛法僧即名三語受具後便止之者下疏云以成道初用三語法八年制斷今興羯磨俗戒即三歸發五八戒亦名羯磨對俗境即對彼俗人境授五戒既名羯磨例今對首豈不名羯磨故知名義齊矣有三者一者二人二者衆法對首三者小衆對首合衆多人即合小衆在衆在衆法對首中收事局中下如持衣説藥等不下簡去僧秉告下正顯但對首捨懺即四人已下懺捨墮但問邊人也説恣皆展轉三語不可秉白及隻差五德也兩被下彼此得成名兩被互與一人名單對時須即時所要行者文多廣顯指諸部律文也今此且總其名六相以衣有三受捨各對成六當下即當受之時但隨分三衣牒名八法其餘詞句法且無別若下暗斥古人若言受捨各分於六相者今受捨百一衣物應分説者必來加害應作念言如失火燒舍但自救身焉知他事此則不告亦許不犯已上俱出本律總奪諸務即奪三十五事總而行之別緣即生善別緣如應受戒事是也事止續行故故曰還須白行白入聚落即非時有緣當白已入已上白行出十誦白諸行出五分白入聚出祇律通白僧祇云尼凡入僧寺當在門屋下先白比丘當籌量若尼賢善自又無事著衣服具者聽入反此不聽比丘入尼寺亦爾尼請教授四分白二差一人已口差二三人為伴往僧寺中至所囑人所曲身低頭合掌云某寺尼衆和合禮比丘僧足求請教授尼人三説此之二種上出僧祇後出四分餘食法中能中有三一是比丘二先足食除不正及不足三身康和除病對法亦三豐時除儉二所對是比丘三未足食者食體亦三一時食及清淨多論不淨食不成遮二新淨食非病人殘三不覆藏食自作三法一自言現前應從淨人受已共未足比丘互跪云大德我足食已知是看是作餘食法二授與前人三舒手相及處彼作三法多相義既不爾例上三衣受捨但可分兩受三衣出十誦捨出僧祇受捨鉢出十誦受尼師壇準見論不合説淨義加受捨文也捨長下下根畜長説淨上根但三衣中根百一萬事萬或作百以應上百一故大鈔云隨身所者各得畜一自外一切盡是長財事鈔即釋離衣中云三衣五衣得波逸提餘衣突吉羅非謂畜長之衣此乃百一供身服者佛令受持違受故結吉又三衣是制通上中下違故得重百一衣助身開於中品違受故輕捨請如一日有兩處請聽捨一請與他重戒即夷佛言若有比丘不樂梵行聽捨戒還家復欲出家於佛法中修梵行者應度出家故曰通往反也請依止初受戒已依止有德咨承法訓也上三出四分十二三四亦出當律三藥即非時七日盡形藥也此是義加受法七日出十誦僧欲即説欲法可訶即四提舍尼悔法偷蘭此下品蘭也未及良緣即此處小明律人行懺及人數不滿等三根見聞疑也期必欲犯不唯隱他自亦欲作故彼聞向一比丘説便上有危知他性強我若一彼受為食二口云我止汝取食之三度與他此三五種並出律文溢位即上標中言二十八及今注解中却有三十一疏中不解白僧殘諸行法故言三十中二即尼白入及尼諸教授二法局尼所行不通僧也所以標與列不同口和問邊即懺主無白和之義但得口問邊人若單對一人亦無問邊之義三語律云若三人各説言大德一心念今僧十五日説戒我某甲清淨三説若二人相向彼此如上三説四人已下當盡界集不得受欲四人相對一人別説云諸大德一心今日衆僧自恣我比丘某甲清淨三説不可差人即隻差五德也受僧施即非時僧得施道俗以施主通七衆故極量盡一化僧來者皆得分也以俱為解脫出家故局三若滿四人準母論直作分衣羯磨若三人者彼此相語云二大德憶念此物應屬我等餘二人亦如是三説亡僧衣毗尼母云四人共住一人死三人應展轉文同上也如下即分衣法中若據大鈔衆法對首中指云同前衆法心念但有四法無捨墮一種彼云四分説戒自恣外部受僧得施及亡人衣十誦有受施僧祇受亡衣義加猶言約義開加三位也時須時所要行者非下言廣張更有也具如前辨恐下恐云法是心念故不名對首對首故不名心念又一向局定不分三位之別故為張之使帶本受稱不失自名但者專獨之稱恆須如晨朝六念日日須作若假他證召之則數數故勞擾故開獨秉令自行成法本下二句推本為言然下示開作心念託處即安居所資收説淨受日即受七日法濟道俗者如安居䇿修是濟道也受日出界為檀越是濟俗也衣即受三衣文略受鉢藥即七日盡形獨住如蘭若無比丘對首皆開作心念也而下結歸本法故曰對首又帶初位心念之名故言對首心念正法即説戒等財如受僧得施受亡五衆物是也法如説恣是也餘法但心念等法本宗即衆法大鈔云本是僧秉亦界無人故開心念故曰衆法心念輕吉責心一説悔也房衣下如毗尼母中鈍根總作一念利根比丘口口作念著衣著著作念入房入入作念不二食出腹中念除諸蓋如云防心顯過不過三毒又對施篇云然衣食房藥四事供養能施捨慳受施除貧此則能所俱淨生福廣利若彼此隨情縱逸任性者則俱墮負處聖賢同非計是對首據理於清淨比丘邊發露今為護衆説戒恐成喧亂故開心念兩設但心念及對首所待以身是有待之形也若不濟之法身慧命無以存託故開如下各如本法明之有三心念對首衆法開成八種所攝一百八十四法故曰毛目往分各有部類若亂綸者便成相擾自陷陷他可不慎歟故律云若作羯磨不如白法作白不如羯磨法作羯磨如是漸漸令戒毀壞以滅正法當隨順文句勿令增減違法毗尼當如是學具緣下初約成法具緣中辨成敗次約羯磨如非中辨成敗又二即秉法人與緣具如上即定僧體中云四人作務通秉衆法以體成僧故也又云四人成體加一為事故後三僧不名本也皆約下如前云但四人僧本是僧體餘之三僧隨事淳溥故隨分耳僧體加一得遂前事房五人憎事情難發倍五加十號十人僧心輕罪重倍十加人號二十人僧上已明之即四人成體但下四人為本作一切法只為事情大小故加之如隻差五德四作無由今下對二十人僧以收衆事攝之既備故收一切法耳過彌成勝者言人過轉勝也此過下言何但説過二十而不言過四五十人耶將若上下答通或是下約頭數少相乖四儀相乖別也睡下即睡眠入定憒鬧亂語由本無心同秉法故隔障詞同覆障而別隔者不成同相三根見聞疑也若分明委練前則失也大鈔問云犯邊罪等十八人及尼中四人為自言故不足為體不足答解者多途今言此等體既非僧若僧同知故不足必不知者成足而性不足性即體性此亦約知故不足昔人以體不合故不足即將破戒和尚在十人之外此非正解何者若不知犯則不得輒用他部以四分制十人僧若知他犯羯磨則不得牒以實非比丘且下此之十門且約今師總被一切羯磨廢立古師或具九緣如結界無與欲又如受日差遣無有乞詞等今家並須立之如下云結界無欲立緣顯之受差無乞豈不須告告即等八陳情也又如稱量前事諸家則廢今師立之是也衡斗衡即稱橫木也黍絫輕重儀云衡分在初黍絫居首量之所起主抄在初孫子算經稱之所起於黍黍者食之黍也十黍為絫顏師古云作來戈切十絫為銖二十四銖為一兩又量之所起起於粟為抄十抄為撮十撮為勺十勺為合十合為升乃至十斛為鍾今謂衡起黍絫斗分圭合蓋稱量不失其所今亦然也法通能所者羯磨屬法能被説恣亦法非羯磨而不成即屬所被如下引證互通者如舉衆犯罪律開通秉單白共作懺悔提罪已降皆滅故曰諸懺單白等法約事下約有本作物非也以諸法名通隨事召法法名是通又豈可約地處不名法攝如白二加結處即名大界戒場等就人即約能秉人也如律指律滅諍中文故自引云三法現前等言三法者律云三種現前法毗尼人也云何法現前所持法滅諍是云何毗尼現前所持毗尼滅諍是云何人現前言議往反是既不言僧則合僧歸人通所也五法即法毗尼人僧界也云何僧現前應來者來應與欲者與欲得訶人不訶者是云何界現前唱羯磨若別人對首心念三種現前即得若四人五人已上僧法若作羯磨必須五法現前以羯磨所起必作法界故則知五法現前人與僧別通能也具德如差敬尼須具十德差受自恣人自恣人須具兩種五德等受日先觀彼是如法緣者可加之捨衣觀彼是畜用失方者可捨製造失方者不可捨等須幾成僧合用多少僧作此法事又須明律藏識達網緣成敗清淨應法預僧數方可覆下加覆鉢羯磨者須是彼懷信方可加之五八即受五戒八戒亦觀其機器先受不曾破等所謂五戒中破一重受八戒不得等是事現在前即所被一百八十四事或事如可加法及此不可故文云非法則息八種即但心念乃至白四行藏應教可作名行反此名藏達下利害七階即七聚各有階降也疑即猶預不決迷即本不學知律據學教迷心不犯不學之人迷教須結理須分辨不可一槩與法事等晨昏言分辨明暗如晝夜也觀其犯事亦當如此不可無犯加藥有病不治則成持犯相亂也同篇合懺為多各犯別懺為少不可委曲罔冒也人法物人法如上物者如賞看病人六物觀德有無隨事牒賞等重輕又如犯長物尺六八寸得提名重減則犯吉名輕又初一日得衣名前次下九日名後衣物散落各捨離多既成束通捨名合同篇合懺異聚別懺方便為因根本為果又因不可與果同懺如此諸事未可事至便施當先一一窮考研核得其實者方可加法則稱量無失具下具則人法事俱起單則別起合則兩具故作法隨有差別也稊稗爾雅蕛音啼苵徒結切郭璞似稗傍卦切布地生穢草也又云稗草似穀也或下隨諸羯磨有義則通反此則塞何止此也非淨不預律云有犯者不得聞戒亦不得問犯者説等望此則是約人然下以説戒自恣之法僧別同遵也專在者在法收也但下釋事也非情即界也人興據理屬人也和僧唱相本屬法也今總斯兩緣皆為結界故望正為邊屬事也前後難準者或事在前法人居後如前結界界畢行説戒受戒等或但三分如結界經久後方行受説豈非起之不定故三分也有下此約一事上自具三種量衣是非者如布為是又絹離煞者乎亦名是也羅綺紗縠等非也并條數長短染色皆屬事也相解互解已言也如中邊人加法不成不一如六念及座上發露衆罪是望境非一也心生口言要須口説令耳聞之方成非但心念而得成就本緣如受戒緣非緣界緣若有乖差法不成就何得混三種俱陳即界界即事也人病衣重此舉作法離衣羯磨中牒必須具也不具不成故成合也如是語此多人語法如前行舍羅白是也全籌簡破籌語屬人也籌屬事也此亦二合七緣三單三雙一合也異篇別法不可將提與吉懺等同下同或作當即同是一提而種相雖別同皆一懺名合各懺名離於理無妨故曰皆得臧否臧善成也否不就也徒取至法式來釋文據次從即如至成準釋義來且初僧事者即羯磨也難事惡比丘留難也居宗宗本也此羯磨即結界一法如下引例如上即通局相攝獎務獎成也務事也言不能獎助法事爾金石二物者鐘磬本此方樂器也金作鍾石作磬禮云折如磬隨鳴者本與銅鐵凡可鳴者皆得作爾唯除添毒樹擊鼓誡兵周禮曰以薣音墳鼓鼓軍是法也有本作世字非也周易云鼓之以雷霆則其所像也禮記曰伊耆氏蕢桴土鼓蓋其始也七相即量影破竹作聲作煙吹唄打鼓打犍雜打地若唱諸大德布薩時到今文聲色可攝七種又唱令局收後一下位即沙彌鈔云使舊住沙彌淨人打是也具道即大比丘二人沙彌淨人微稠即虗揩十下也軌度圖經云量時約衆粗習先模執杵定心虗揩十下稀著者從十一下去其聲漸稀漸著也直至三十七下待此聲絶別打一下名一通集聲聞衆又撾一下名二通集緣覺衆復擊一下名第三通集菩薩衆故曰加三捶也圖經云莫不三通為節用集三乘至於律制成述三通即三下也故云結三通義也有定不定者假人熏修有勝劣即能遷業於後世或後後世受或不受等必定者業報俱定雖至聖位亦不免之有緣便止如付法藏傳中罽膩吒王以大煞害故死入千頭魚中劒輪繞身而轉隨斫隨生若聞鍾聲劒輪在空如是因緣遣信白令長打使我苦息遇善即鐘聲打者發願如智興律師事是又王先於馬鳴處懺悔為因今聞鍾脫苦是緣此皆因緣相感威儀經即三千威儀漢安世高譯二卷彼第二云揵稚有五事一常會二旦食三晝四收盤五無常復有七法一縣官二火三水四賊五會沙彌六會優婆塞七呼私兒以上合十二時於中打有多少如常會大擊二十下旦食八下乃至會沙彌三下會優婆塞二下呼私兒一下彼經下文復有三十二十十下五下法避煩不引亂倫倫理也言紊亂常理也盜僧祇即盜衆物也分異不成和同相也知鍾者言使人鳴鍾時作知是看是也元下凡作知淨語是自不得作故以淨語代之今既通自作教他何須此語故知用者謬矣人畜對者情上論人則如云打比丘者提打下衆者告欲心打女人僧殘畜則如云道人行殺牛羊罪重而戒輕不得杖擬畜生等非情者如打故衣者提或椎打刀刺傷地者隨故上云其事極多咸有戒文中既有打字亦可改之作知淨而為之耶並以下二句申知淨之意也別有所為即有生長者故得用可如令人打草木花果等故須用此亦對外道俗流執有生長義若許自壞生被譏謗故特遮之故下出擊撞檛打義蓋隨此方呼召一相以翻也文似不次念於擊撞鐘鼓下著之將並下二句却於聲發下安之義方貫爾巨大也忌畏也言為事雖是小而為學者之大畏忌儒云無擇言今若有用者是有擇去之言喪我之方略者若乖異則各執我人今制同界和集是亡喪我人法道也餘界即攝食後當廣説即諸界結解中訶人即惡比丘如後即下結小界中二處一在界內二在限外作對首心念界內通作諸法但除餘解界結界不得妄秉咸有制約等者若作説恣二界亦須通集若作餘法則二界各集無內以衆僧叢坐內無餘地下得言無內可集若身外既有自然地何不同前無場大界有外可集答下謂元制小界正遮惡比丘也雖有不集不妨成法不同大界非法惡人故説無場有兩集有場四處集也如界外作對首加藥界內作受日羯磨中隔對首持衣戒場體中行受戒法四處各集四法各成並不相礙若作説恣必要盡集大界體中説恣以是衆同之本故理須四處集來必私逃叛遠出亦犯見相便求見有一人等便須求集多有句數本律説戒犍度云時有一住處説戒日客比丘來見舊住比丘在戒場上見而不求便作羯磨諸比丘白佛佛言成羯磨説戒有罪一句若見為便求求已不喚成羯磨説戒有罪二句若見已求求已喚成羯磨説戒無罪三句聞疑亦如是同上三句又有住處説戒日舊比丘見客比丘在戒場上三句并聞疑三句並同上落漠渺漫貌必本非法必若究本結法不成則令後法不就後緣即受戒懺罪等豈非冒濫使後法不成乎以後法緣從前界起故此言下謂此言甚易解爾恐臨時人情固執卒難改革故使通集以驗成不問下意謂大界中説戒自恣四處集來如向已陳今壇上有四集之理不兩集即説恣也亦須四處集來兩或作四難開如下云説恣云衣此三本制大界難開戒場是也諸律即僧祗下誦等如列如注諸列者是各解即注中別解四種是也約僧即人不可分別也約處即處不可分別也僧祗下證處不可分七樹為量總計七樹之相合得六間七弓一弓五肘一肘尺八計六間即六十三步謂六尺為步一間得十步半六間即六十三步也相去即東西二衆相去中間有七樹之量則不犯別錯算古謂七樹而有七間是錯算也衣界即離衣界要八樹為量諸師算之成七間爾今例七樹止有六間明矣各有勢分合初樹與第七樹兩頭枝葉勢分各有半間可共成一間是亦成七於義善成斯之下指上諸非豈不是我執情愛致使穿虗鑿空以符自見且僧祇律中有人問佛種樹法佛答弓七種一樹波離續來問集僧量便以七樹答之是知假以樹相示人何處實有種樹等相皆半折之即彼此二衆各面有三十一步半是隨分自然者有人者但令異界自然在我自然界外無錯涉之過並成法事今行事之家恐有別衆但為深防故於方面各半倍之實而言之各半減是已上如文餘之自然即道行水界等半約如有難蘭若有五十八步四尺八寸此亦二衆相望也若半減之可例上作令為深防故半倍之行迹到處此謂古人準彼律自然外更加大小便行來處棄糞掃處等皆是勢分所收空有空即蘭若有即聚落此乃自分盜相且不干集僧之事何得引彼證此今下若可分別自依籬墻等集只為不周故約步限何得更取行來處則成遠近通漫若無僧坊即一聚中先未有便坊及結界處也今若結者要齊聚落界盡集也縱彼即十誦下齊行來處此制分齊通攝恐妨界內作法故若四分聚落界但取院相必下大師準彼意亦有不約勢分內集以云約籬塹集故蘭若亦云阿練若即間靜處諸部即僧祇十誦等皆云僧界盡一狗盧舍而互説大少之量不定如僧祇即二千丘弓長五肘十誦即五百弓弓長四肘乃名同而量別矣爾推曰小鼓謂之應纂要曰應鼓曰鼓亦曰朄鼓轉音胤亦曰田擊鼓以引大鼓鼓胤者引也言先也文見三禮圖鼓苻分反大鼓曰鼓長八尺也皆是下出大小所以亦由智論説由旬三別大者八十里中者六十里下者四十里皆謂中邊山川不同致行李不等斯可例知雜寶藏此經是元魏吉迦夜共曇曜譯八卷以彼第二云拘盧舍注云秦言五里大鈔云相傳用此為定有難為惡比丘來作留難也故開蘭若集僧界校異前五里通計下即七箇二十八肘七箇二十成百四十肘又餘七箇八肘成五十六肘每肘長尺八十肘成丈八尺六尺為步十肘得三步百肘三十步又九十肘得二十七步共成五十七步更餘六肘在成一丈八寸將六尺為步添前成五十八步四尺八寸彼文即善見各行謂各行法事互不相障也故下結歸有難薩婆多者此引彼別衆食戒文廣如會正所引部別有由者言有因由也以婆論為能解之論雖不定量而所解十誦却立其量也故次引十誦顯之六百步計二里也不妨內法言不妨擲水砂內比丘集作法也此論指善見以上引云水中不得結作法界故今解之今則下今師出可結意也除無船橋反顯有者亦得以來去無障故下云水難不恆卒增障集既無津度結不成也如下指結界中六相即上四處中聚落蘭若各分出二故成六也方面所向方隔也彼此各收即彼之六相在我六相限量之外各集各結各作別法理可通成反此錯涉便成別衆集結不成故須善視時緣不可濫妄委託也紹興府會稽縣廣孝鄉蘇墟里屯頭村前莊西保居住正信奉三寶考女弟子陳氏一娘伏為亡考奄終仁壽已捨浮生痛思鞠養情深生成義重欲伸報謝必仗勝緣遂發志誠抽施淨財七十千足開此律宗記文一卷助廣流通光榮佛祖所鳩妙祕式薦去程先考陳大郎伏願罪山傾倒業海乾枯頓超九界之身速證一乘之果然後河沙品彚法界冤親俱藉良因齊登彼岸時戊辰紹興正月上日謹題
