body:
  text: 天台沙門釋允堪述義分兩相者即和合與別衆也又疏中勸勉成業復為二也或上下如説戒篇云若有一方衆生綱維從衆者每至説時小食上應告僧云今説戒目十方賢聖所共同遵並願衆僧同時集會或上座親自房房按行以時勸勉或有病者告云可得一禮覲否脫就後世知復聞乎三業通僧者身和到衆口和説欲意和同忍此則通成僧體能成辦所作業務總上兩義但歸和合一種反和便成別衆故下引證成上二義三別四分云應來者不來是身口心俱不集二應與欲者不與欲來是身心不集三現前得訶人訶謂心口不集尼等四人即大尼式叉沙彌尼十三難即遣尼賊破黃五逆非畜二三舉不見不懺惡邪不捨舉二滅已滅擯應滅擯重病簡輕者癡騃收三狂人并聾啞之類此等或本非是僧或中途被罰形差病報緣礙等故不應集也非欲緣若有犯戒事非緣而與欲者由事非故不合不成堪欲緣律云佛法僧塔者病人六事是緣僧祇等律守房等緣並開令若有緣而不開與欲即是教意太急復成過分限約今若許送心達僧則教寬濟物僧私兩成欲即心者欲是希欲之心也不合訶者即訶責擯出三舉等人義無證正他事具下即律云應訶者不訶又云舍利弗見僧如法羯磨而心不同應作默然是如法也非相指下七非相中明有人下古不立上三業入為僧體但是順成僧義然非無此一致今師要以合三和相以四人等僧共成其體相體如法方顯和別之理識相要須識和別等相也合下正破古若不會合三和之相而從四僧體説者則應法之是不應之非終不可以明諫豈下意云豈只是此三和而入四僧體內便成作法苟或別有不足數者可亦得為僧位所收有此濫故是不可也一説戒言同一説戒也二和即約事辨和約法辨和也一位即和合一位第四門即指上弘法人中第四廣顯是非文也前亦指此云如後門中不足數説此則前後互指也出一即下釋云未受具者非成滿者一得滿不訶二不滿應訶三不滿不訶四得滿得訶所下言所以有滿不滿義者數定即四人五人等非法如以十三難三舉二減等人足數也唯二即初得滿不訶及第四得滿得訶中間兩位既曰不得滿何須引之莫不下是釋合法猶言應法也亦可下別解從初即得滿故次以不滿交絡句法互相顯示已方可離隔不滿之人是不應法由四分中訶責等四人應一切羯磨但為僧治故不得訶即體雖犯法得成足數不毀本信者言此人信心未壞也奪德用即奪三十五事中七五奪其證正他事是也欲受大戒者此約利根知法非者又捨戒再來素亦知法故有非者亦開訶也三十二人即注中從比丘尼下至罪人是也并十誦等人如下疏文隨解不用他部言不用十誦僧祇等不足人是唯執四分不能取外引用也今下言律中但通列其數餘不出者欲使後人準例而知文律無定結人數蓋欲含攝多人不足之相耳二十八下今師謂此數是出四分律疏家於大律中合集以成始下文云豈唯如舊但二十八且如四分瞻波中但有六人所為羯磨人神足在空隱沒離見聞處別住戒場上六人餘者非無此義故捨戒中有顛狂啞中邊死人自語前眠人自語前人不解並不成捨謂不足數故今取他部明文證成不足如何氷執不取十誦等文耶若有下反語意云若許狂睡等人得足數者捨戒應成且捨戒還家作惡對捨尚不成反顯今作善法如何令狂癡等人可得足數故須下要廣大觀覽諸部也報別男女報別收尼諸不足相遊辭耳又解下是今師義相有僧用三根未彰四儀無別也故下引證既云先言即是自言也反顯不自言是理開足數律論下如四分云當以肉眼知他持犯又犯戒和尚田不知故得成法事又雖言竟無人知者亦成僧用薩婆多云以有天眼者不説人惡乃至若聽以天眼耳者得淨穢者人誰無過但有大小無往不見若開説者則妨亂事多故不聽言如鈔指足數篇文中下受欲已自言我是十三難等人由自陳故非足僧用與彼即下誦古謂通生善滅惡皆得足數局二篇悔唯自行懺殘四位時不可足他懺僧殘也餘請懺罪理開足數開餘懺主猶言開作餘懺悔主也不了不言但應生善不應滅惡故預加廁預加秉也差結秉差教授法結界等生善法者皆開足數事鈔云覆藏等不足僧殘等羯磨不妨應餘法事是也清過言不能清他人過也非罪羯磨即受戒等非是懺罪法也始終初八為始作畢號終皆得在數故曰無妨互下言上七人互不相足約遠近者六夜竟是遠將出罪是近但約遠近分此二位壞分者非不也言本日治是全壞也如行覆百夜今行將滿忽再犯者前行多夜全壞也若不再犯於覆藏中隨不自行但失一宿故名分壞由此以分故於覆藏中別開重犯本日治一位也用此例上六夜并將出罪亦有少異故得分耳又伽論者彼第七卷具云別住人擯比丘成擯唯除受戒羯磨以是發彼一生大事故也餘羯磨盡得作已上正文今引彼文既許作擯法約此四分言不足者僧殘四位法耳餘法亦可通成上通即向引有罪人不合解罪則滅罪羯磨不可預也反此非滅罪法者並開作也憒閙心亂曰憒前比丘即所為人具二聾而復啞也以大德僧聽不忍者説既闕二能故不足也六群以多犯衆過又亂誥憒閙無心緣法故及下佛審問前六群言不委因而立制與罪即不應告或無知提聞聲若聞大詰聲者得成法事此與下似問辭意云白衣一種與前邊罪等人有何異故而重流出此一種來流出義也如云戒經中來是也前下似答語加法參差即正受時秉法有錯脫等致令前人戒體不起仍存本名號曰白衣故大鈔云十誦白衣謂本受戒不得者有下立非今下正破大鈔云亦有受復難緣須著俗服者亦應同法由本是僧即知作法之時窮問界內俗人之中頗有曾受具戒不捨者否要答無者方無別衆五大色青黃赤白黑既聽在數反驗通成重病人由心昏沉不樂無情緣法兩不成捨即互對不成捨戒也以言語不相領解故必後知語二通相足癡鈍人不知言義者和忍要和忍可解意即文下義意即世猶近世也渺同河漢莊子曰大而無當往而返吾驚怖其言猶河漢而無極也疏云弘而無的當一往而陳梗槩曾無反覆可尋聞之驚怖猶如大上河漢迢遞清高尋其源流略無窮極也今斥愚者不分羯磨成敗是非亦猶此也緣入非違如急誦故細緣不分或瞥爾起心緣於他境是名非法乖違也能所者且如受戒羯磨中大德僧聽僧今授誰諸長老忍等皆屬能秉僧也沙彌某甲等屬所為人也彼我猶言彼此也如召沙彌入云彼正受時云此又彼屬所為能為也今若不分皆屬迷也或約下二句反前二句由約文謹誦故非不辨文相能所由深練自他故非不識彼我雖然由於羯磨增加減略乖於正務文牒事法恭錯訛濫當時同秉不解訶住此又成迷或文下反上句雖文句乃明事法不濫只由人有背別之緣是之與非通皆忍默又是迷也界境今所作法要結界地而不辨先結是非界分邊近也觀下觀即觀察五迷即下四法也初一迷總明法事人處四法二下別明可見徹少也若能觀察五迷明四法少可弘通羯磨足數所收故曰僅涉僧倫也僅近也隨法若隨所作羯磨法明非非相之多如雲霧之擁結也若非博觀諸部通練是非者故曰餘復何論約下如前觀察五迷四法通心情亦可粗為弘法人也餘下如七非中廣辨也堂下如三人説戒以送欲人在數也大鈔云與欲之人心同身乖二下謂同一覆處而別有隔者不成同相三下具云半覆半露等此下準大鈔更有義加露地而隔者今文闕一行有三者如以行為頭歷住坐臥三也乃至以臥為頭歷行住坐三三四成十二句也今且從四儀單作成四句并前與欲等五成九也行等等住坐臥也説戒下以人多不聞故開立説教授師入衆召沙彌入以為僧所使故立病者坐立不便在衆開臥亦成面向僧是相順之義開制言開中復有制也我往即六群二十八古人但據當律為言已上結前義必下生後廣如事鈔彼更有不解之人是不足攝又上言不解人等是也四句即是別衆非足數等通列即第三位所列人也是非持戒名是犯戒號非但下如隱沒人不妨體淨但為緣差等二人等取應與欲者不與欲來在等字中收隱沒以在井窨同屬陸地故成別又不足數離見聞亦爾七人即行覆本日治摩那埵將出罪并十誦行覆竟本日竟六夜竟共七人也通局者通於生善不通滅惡故云局也四別即半覆半露中聞隔障等兩位即是足非別身廁下釋足數口下釋別衆四人尼至沙彌尼也報別即尼中三人十三難中黃門非畜是法乖即賊住二破是行違二滅三舉是治重邊罪污尼是體下釋非別諸人即睡等十二人雖在衆中釋非別不成業釋非足靜慮即禪定二緣由聾者不能聽啞者不能説是乖羯磨中聽説二義也兩能即説聽也委界外地即委墜在地也若不委地須從根斷故曰內外俱別非二攝非足非別也體通道如作房受日俗如出家剃髮學家覆鉢等相具四儀同也非具如諸治罰法不可坐也前加法前人作法被己也自作白者戒師懺主和白也皆身在衆中而威儀不同是非別非足若下釋上俗也以無義得收為足別人也同上即同前第三句亦別衆亦足數所謂得訶者訶等是也初句即是別衆非足數非不足數也若據別住等體淨故是足數人也今以緣故非二種即非足非別也斯法謂邊罪法及擯法等報殊男女不同也法隔三舉七行法也心差睡眠等人相轉如比丘上樹儀相轉也必能下反上諸句也皆為清淨應法是足非別也反上可知者即反上離見聞處也語傍人文有四釋初中語謂得訶人越己己即所為人為僧所量也餘人即能棄僧制合證正者居所為外也又下次釋約外來人望正秉僧故得傍名三中即比座望訶得為傍人第四扶於初義似倒以注中據律云語傍人故召令語默故誰諸長老忍是默不忍者説是語從初下將經注分對可見如門所列者即初門中制意釋名辨體形居世纍者為世之纍也通允爾雅云允信也制下衆僧作法制身到衆口能訶默今既有緣故開送心大鈔云設若有緣不開心集則機教莫同將何濟拔彼我齊舉者彼則衆法得成我則弘緣又辦鈔云彼此俱辦文意同爾舉亦成辦義也希須者希謂希望須謂應須以希望僧作己有緣礙應須送己之心以違清衆也如下舉五欲中二種此五為世人之所欲也今秉聖法為比丘所欲耳詳集詳而後集也如下似濟渡復得船筏也事違為事緣於衆法互有違反也致心致送詣也大鈔云欲明僧作法事意決同集但由緣差不遂情願今送心達僧知無違背從法者即心法也如雜心者彼問曰云何心法等聚答曰想欲及觸慧念思與解脫億定及與受此説心等聚彼論自解云想者於境界取像貌欲者於緣欲受也餘如彼論第二卷心行品中解身色如五分病人不能口説聽現身相與清淨欲聲相如律云若言我説欲若言與我説欲若云為我説欲是也單僧下即受戒捨懺等僧須我和我不必須佛不正制故互須即僧私同須也有罪即別衆作法遠出縱出界外亦須結犯制開立制開説之本也不成是別者言非緣故縱説亦不成又不免犯別衆也僧事指衆僧作法事也無心下指送欲者無至誠崇尚心也妄語大鈔云無病不淨言淨不欲言欲令他傳此妄語僧而説隨僧多少一一人邊三波逸提所傳之人知而為告一一三罪惡業不輕何為自怠有五即中佛事至看病事大鈔準不與欲戒更有塔事成六下文衣緣即六群作衣説欲雖非正制以當時僧受行之故亦開也僧下引證以欲下辨制也謂自然地弱不可秉衆法羯磨也衆法既不可作欲法亦不可傳唯除下辨開唯結界一法自然地上開秉然於欲法則不開之如上即法起託處中云結界一法非作法界由是草創所依開此居宗也又下文云云何界現前作羯磨唱制限者是也若結下謂結界若開欲者終不諳委界畔也即下望上二門得第三名也四略指注中前四種一廣指後廣説一種也又略者對重病廣者對輕病疏言廣通輕重者此有輕中之重也故大鈔云前四唯重病後廣説者健病俱用得成大師云律文如此而取欲者須知同別之相方得成就若違心不同而現相者雖取不成終為別衆前既非法者目説欲比丘也能所者諧能持欲所與欲若俱乖法律者亦須更與餘能受欲者如持欲人受他欲已自言我是十三難人等文云皆不成與欲當更與餘者欲二途初制時集清淨非時集與欲後因非時説戒而得傳欲來妨僧法事佛令合傳大鈔云並須雙牒由文正制不同僧祗猶行廢教不正出文者謂説戒犍度云若廣説欲成與欲不出其辭轉欲謂受欲已更忽緣礙欲轉與他毗尼母云得齊七反説辭云大德一心念某甲比丘受某甲比丘欲清淨彼及我身如法僧事與欲清淨今但比云某甲比丘如法僧事與欲清淨是約義比度也故大鈔云義設是也心本心收與欲本收清淨由清淨者以戒為本故人語梁武帝撰出要律儀中牒事也如忘下如傳欲者忘記前人名類者但云我與衆多比丘説欲簡非法事以僧事非故不須與欲也如和僧作媒嫁等事是本為事者隨僧中所作一百三十四事而與欲也及初傳為此事後為彼事起不應前欲若復往取則有停礙僧務今但以如法僧事之言可以通應一切羯磨也時集即半月説戒制有時限也餘既不局故曰非時應僧體者即六和中意和也假用即前云攬陰成人人假為體實法無用四人假用為僧之體而用無別體還以四人陰本為體今謂陰本無七支之過則成清義三一之言即三説一説之言也自明者四分云三説成者即云第二第三亦如是説若但一説成者皆無結略之文衆多下取例也如律中我與衆多欲若受欲人睡入定若忘若不故作如是者成例今一説豈不成乎必準下縱也言必欲依被部亦住情也以四下奪也言四分無之制三説故事鈔云準白二羯磨説淨等法依文直成不須云云取他外部姓四姓相謂相貌名即名號類約流類多據衆人少但一人大鈔引律中若不記姓名當説相貌猶不記者當言我與衆多比丘説欲等如斷下既言諸人亦是通混律乃開成一界四處者彼云一界內四人一時受具者得四處展轉與欲不同下若五分要與欲人少見集人多取心而已者言彼衆多既俱有心今雖不憶驗知得成以彼本有送欲心故必下若待欲人能明記者不可言衆多人也如五分云令至如法僧中為我稱名字説及捉籌若不如是一一皆不成又僧祇明文令在上座前稱名字説意亦可見四分云應更相撿校知有來不來者此言彌顯受時約未離病者所也中道離已未到僧中也至僧持欲到衆也房內即受時二十八即注中命過至離見聞二十八人也而僧猶用前欲者此約到僧中説也若房內及至中道命過可説言非欲到也若在下再簡上到借中成不有下此師約若未説付僧持欲人命過則不成若説付僧僧自任持故言成也如忘等例律中持至僧中忘為説欲既成例今已到僧中不説命過亦應成也以俱是到僧中故或下斥第二解若然取初説為正非數對彼捨不成也例今持亦不成非本欲者人抵説欲為應本界作法不犯背別之過今若應外非本欲意餘房者昔解云受欲已在寺內餘房行者失欲此非解也一同説戒法及自恣法中兩處列命過等七緣前後六種俱同唯有此一有異説戒中云餘道行自恣中云出界外今師會之是語別理同當知餘處行即是出界外以此證知寺內餘房行者此解為謬言還俗自言我捨道還家也作此言時欲法早失本心即再責本所起心也釋李李即此方道士老子內傳曰太上老君姓李氏名耳字伯陽釋老志曰其為教也蠲去邪黑澡雪心神積行立功纍德增善乃有白日升天長生世上此亦與西竺外道髣佛耳五法者律云調達執五法盡形乞食著糞掃衣常受露坐不食酥鹽及魚肉也戒疏云乞食糞衣露地似佛四依故為相似語然本不同四依開制託緣此三調達説必盡形後二妄語調云酥鹽味重魚肉損生故立斷二見殊戒等者謂戒雖同等而見解有殊者亦不可持欲入彼以六和中見和闕故各説各説戒各秉法俱成故壇經云釋尊一代僧具六和一見不和兩不足數疑前下謂出界外故失此戒場在內往應非失而不知場有中隔與外無殊故往亦失宿受欲如後夜受欲羯磨明相故失欲也問下意云此律宿欲不成者若明相未了羯磨已竟而説戒自恣未竟得經明否答下言能被所被俱不可以夜分侵明而作僧下引證減衆各作即減衆界外自恣以此校準故知宿欲不被所為事也非數言不足數義已顯也故非持欲之人五分云自説罪人不名持欲反成即成十誦取欲清淨人始取時若取竟自言白衣沙彌非比丘乃至十三難皆非清淨欲不成不到僧所雖復下謂雖復自言已至作法睛同座之僧先不同聞彼之自言既乃不知故復通取為得成不佛下似釋既曰三根無濫今不知故是三根闕也亦可得成故大鈔云此等體既非僧若僧同知故不足數必不知者成又云若雖言竟無人知者亦成僧用例今亦爾三處房內中道僧所也與者即有緣比丘望伴如二人同往一人取他欲已至於中道作不送意望離此同伴見聞名失有下立難今下正通不問有伴無伴若無伴者望至中道作不送意離此不送意處見聞亦失故曰離生念處也非弘贍者言上但以見聞對三處辨失不以見聞説下四種乃非弘廣博贍之士也隱沒如持他欲或在彼房或至中道等入井窨也倒出即持欲到僧中已復出也隔障與僧不同一障覆坐也遠坐露地申手不相及覆處太遠坐不見面不聞聲也初受即在房內具兼四失即隱沒至遠坐也同坐即同一席中又須取比座也大鈔云見聞失者通望比座展轉離也如下律中若衆大聲小不聞説戒令作轉輪高座立上説之又僧祇八萬人自恣何得聞羯磨者聲此則見而不聞也又如多人説戒何由並得見作法者面此則聞而不見也彼既互離得足數此亦互離成持欲三種羯磨即單白白二白四雖簷前後并露地等但使展轉不相離皆成如僧祇下彼謂同障覆而別隔者不成同相或露地而隔者亦成失欲又是別衆如下皆證聞而不見也自別豈成者謂自是別衆豈成持欲一尋即八尺據理亦可聞也今須約一尋外閙亂不聞衆中聲者方應見而不聞白也空有互與如僧在地持欲在空是也不成受具蓋不足數也足既不成持欲豈就文云下牒注上據房中二十八緣今中道僧中亦爾亦須德人持欲者此自持欲人也若據説付僧已是僧任持今若説竟言我是十三難人前所傳者亦不成就故須在德人與僧共持也自言下謂上須德人不爾成非者如自言我是十三難人則可爾且如餘道行戒場上神足在空隱沒等人並是戒具之者豈是體乖德不具也答下言此等人戒雖具足慧解且昏既持他欲只合在界今或出界升空入井往別部衆等是不明辨法律雖復有行而識等同於夢各解昏人也故制取餘明法之人也持欲應僧説戒羯磨圓具之教豈下顯上戒具解昏不能濟於神用要必行解兼具常倫足別必約體淨秉法傳欲乃揀智能故曰用人不同也形生即二形生恣謂上二十八人中何不盡列耶有三上中下也常憶即下品常憶來人此成持欲若中品或憶或來上品不憶不來持欲非就故曰計餘不成有濫此二故不出也有下此斥上不勞異説有濫所以但是律中略不出耳如下若云狂者有濫何以不足數中却出狂人以常憶常來下品是足數中品開以法被上品定不足此亦有濫何為出之驗之前説義非律下自申正義謂律中前後出有具略如不足數者瞻波中但出六人至捨戒中出顛狂等但通括前後成不足位今亦可同要須通括取之又復應知狂既不足數持欲豈能成例之可解相通互相通會也以下若不該明則自他成別衆羯磨又不成周行言周備具引諸部行用方為優勝耳如不足數者即覆處隔障半露中間障半覆半露申手不相及若一切露地坐申手不相及據上所列和與欲人成五故言等也若約大鈔中義加露地隔障者亦成五也能所即能説所受二俱非法審下若僧審知前持説人在界外則僧法自成以二界各別故七下謂受他欲已持出界故成失欲是受者非反令説者欲不到衆有皆別過又僧若不知持出可言法成若知者亦須再取不爾別衆四分文云應更撿校知有來不來者義可者也自出界有緣説欲已己身在界方成出則成失後復回來僧法未了豈非入界是別此非僧過故法得成以先欲言以仗先曾與欲故前緣久廢即前欲緣已廢也久可作已十下此約説付僧了後因難驚起但得一人往即可任持前欲後再集作法不用重取彼律下釋注中等字或事儀同或世希有故不出也三人即行覆藏竟本日治竟六夜竟四下以本律覆藏法中亦云行覆藏等不足數豈合持他欲也四人大尼式叉沙彌尼以非同類故狂下此約無心持欲故倒出約無心傳故若有心者雖出亦開專局唯取四分也同苦能與所受及僧所為並皆不成故云自他同苦翻種苦業本為生善滅惡今非法別衆故被事不成則使多人反流生死故曰不利反則即不自言也同他部即十誦五分不了謂四分不云自言及持欲足數成不云義理非二攝非持欲非足數也不犯如睡定人非心過故若不去放逸須犯告羅別住波利婆沙人也得戒沙彌即得十界者以下統斷上二人也二但要比丘對比丘方成異宗所廢者於彼雖為所廢於今却為所興如是至七將一人欲次第付七也大鈔引毗尼母云得齋七反是也不得籠通要牒彼名也如大鈔云我某甲比丘受某甲比丘欲清淨等又移受字在上除與字文又巧也第四門即持欲應緣門後義望初持為後後顯雜相指下注文屬第五雜相分別門非第四門分科至文當見空設雖傳不成是空設也更成愚罪言更得愚癡波逸提罪我受下釋上兼兩義也求聽求僧聽許舉罪也準此下上言誰應説故我某甲清淨文略今據大鈔云大德僧聽我某甲比丘如法僧事與欲清淨四分無文此大師比轉欲出詞也別緣隨行人所修大小等定名利也迷忘顛狂等病發舉而起身已到衆非心故違故開成也故大鈔云若睡入定等並謂在僧中若在中道並名不到無入捨受以無作不送意入捨受須得吉羅以睡眠屬無記無記屬三受中捨受也後法即隨作羯磨事對前索欲名後作所為即不以欲緣作羯磨中事也故大鈔云不以欲緣為羯磨事也相成假自他和合行相以成也小罪即吉羅開中即開緣中就下且律文病者有輕重病相廣略與欲今何不欲仄令僧就彼者何耶病下是釋多種即有輕中之重重中之輕重中之重堪相對晤即重中之輕是重即重中之重故不説有別開就彼也五分下亦是重中之輕恐增動故聽説欲也若下若是重病律自開別何須舉至僧中就彼耶答下此人雖虗羸微弱不妨神識明爽故有別衆若又神之昧則理自開別表和彼以和應僧也法濟僧以法濟病也相連下僧與病者相接連不及方開移出界外作草䨱下兩衆皆舒手伏地掩泥牙相懺悔準此草䨱之式病者在衆仰伏坐臥開成但背面是別在於衆內又是足也必下四儀堪與僧同也今故不同仄就開位並成於別非心隔有持欲心也事遮有命梵等難事遮障也若準下例上亦可有命梵等難來訃不及雖在房中彼僧法應成亦非心隔故若四分不開故大鈔云必界內有難不往僧所僧又不知羯磨成不文云有比丘無想作法不成若五分母論開成也若出不來即出外不來并難遮不至也四分無文即無有難在房法成之文也有作無想即界內有比丘作無比丘也更無下謂除上與欲輿主就彼出界作外更無方便得開別衆也引此二段文重簡止若遮不至俱得清淨之説也前下指上逢難外來非心隔是開不失欲也此有難在房雖非心隔不開別衆兩緣下不失欲與別衆是兩緣異也未可同以非心隔故不犯名一例也問下意謂説欲為三寶事今事畢僧作法未散不往僧所法成以不治之但治不往之吉不言別衆也得罪得成自已得罪衆法得成如下引例病止法存病雖止住而被法尚存以未秉解法故若僧作法其法自成不犯別也不同下應先難云若爾受日何以事休法謝將疏釋之謂受日出界牒事入羯磨故所以前事若止其法則失理數宜然若此也欲本下説欲辭中不稱事故事止法存僧為又別故也通意下説欲不牒事緣應僧但云如法但知通𭏚大意故事休不往無別僧中作法又成故曰兩無違也義下䨱釋上文言應往不往治之之句也互跪即同坐義隔也二人即教授師説戒師也僧使教授師也僧聞也彼義若犯重罪人賊住詐作比丘本白衣時破戒人等若先言有是過作羯磨不成若不言者一切成就前三句律有四句一問云汝知和尚破戒否二問汝知不合從此人受戒否三問汝知從此人受戒不得不次第皆答不知佛言得戒故曰前三句也第四句佛問云汝知和尚破戒不知不合從此人受戒不又知受戒不得不答知佛言不得戒欲法即下第七門中別住下出今義也大鈔引古曰昔云同一界不盡集今謂界外比丘濫將八數非謂眼見在界外以界分不知冥然在外作法不成故云不足此二指上別住并戒場也言俱是異界兩列不足有何意耶由下出所以謂上別住是外界今戒場在內應可足場外大界僧數然下申正理空地即中隔自然既分兩界豈將戒場上僧足大界僧法事耶神足言得神足通者或身處空中衆僧在地作法不可將空中人作足數毗尼母亦云空中無分齊故與陸地別也分限分局限齊也入地僧在地上作法比丘地中井窨內也大鈔云井窨之類是別非足窖窨上音教下音蔭地窟穴也非現示上隱沒義離見聞僧祇中謂同䨱處離見聞也有多或云取離説戒師或云取離羯磨者見聞今但比座展轉相離見面聞聲處即是是不足如欲法者下云受欲已不作送意互離見聞勢分未越故未成失例今亦然所為下以正作羯磨為此人故為僧所量又乃牒名入法故云安得成數又下別明受戒和尚前乞畜衆正是所為牒名八法後正和受又屬能秉僧和尚為得戒根本故佛專制訶足俱成除此之外餘所為人無訶足之理故云餘不合語也根本未拔即未與出罪故也壞衆義備以初二兩篇有壞衆義今既未拔根本故壞衆之義猶在故云義備是兩不合壞衆未拔是兩不合入僧數也四羯磨即上訶責等四此與上復何異前足此不合足耶小犯如僧納云破威儀者下四聚等又云然此治罰不必大罪但令聖所制學愚暗自纏皆得加罰文云若不知不見五犯聚謂波羅夷乃至吉羅與作訶責是也以此義證既通小罪故前四開足數次死鄰斷頭故也衆法皆通説戒師也如前即五分中皆説戒羯磨坐臥等是別衆僧祇中行作羯磨坐則別衆四儀互作十二種人是也四分下即六群往説戒所不坐佛言非法不必下律中默坐不呵亦名和合故之下即舍利弗見僧如法羯磨而心不同應作默是如法也相乖心順者謂同一界住相中有乖雖曰心順是名別衆七百下彼云在寺內得別衆羯磨此跋闍妄執十事之一也離婆多言不應爾問言在何處制答言在王舍城布薩犍度中制疏言後聽可準是跋闍子義又須下是離婆多義兩開一為僧使二為僧聞被治下大鈔云僧坐中聽有立者除被治人以是所為作羯磨者不足僧數被諫亦爾極三立治但容主三人又治是違情惱處重故若至四者四即成衆容有不和壞衆義也大鈔云於治舉所為不得至四名非法也諫下如一法諫五百伊黨是也大鈔云若諫喻和諍得加多少莫不用情求和不慮破僧別衆也下情即乞受乞懺者仰上下即衆僧非具下若不具處跪等儀則成倨傲之相理須互跪僧前無容與僧同坐也兩緣即僧私兩緣則四謂私各有二也故注文云私事亦二是也一違治罰是也二順即乞受是也衆常制即半月説戒是也四下治道即治罰比丘治俗覆鉢羯磨是也五下制僧即四分方僧物法結二同界等是制別受日法是也六下即試外道法前文云外道我倒未忘匆爾發心歸投大法乃至性既未調恐仄成難且為沙彌四月同住前四即上云通列則四今六種不出前所收豈多為是即上云有分為六然雖有六合亦成四大師意在前解地既無法者是自然也今欲行僧事要須先結方相初緣即十緣中第一稱量前事如前文云結界攝衣淨地庫藏等為事故作然下若望正唱相是今第八正陳本意所攝故注云堅標唱相也則知竪標亦屬初緣但相連而言也無欲言結界既不許欲何須第七欲清淨一緣耶答下謂雖不許傳欲亦須知故不爾受欲而結令界不成故今結時問云結界不許傳欲盡標盡相僧集不初量即初稱量前事也竪在第三此中十緣據具足論若據正行事時竪標正在第三位收以竪標訖方説集僧故可例前者由問第七方至第八在第四謂作相集僧後理須行籌故宜居第四劫轉第四集僧約界居第五謂行籌數僧後方辨界內有集不集等故説戒篇正説儀中有十門第四鳴鐘集僧第五明供具謂摘花香水槃檠鉢貯等第六明雖那行事唱大沙門入等以彼次第驗之可解道俗道如訶責擯出等俗如䨱鉢法也尼如諫隨舉比丘尼法諫習近住法是也能所被情非相順故曰違情知法智人即具德舉罪人也大鈔云謂僧中德人舉告僧是也僧法以行籌告集理在僧作今何言私事耶折伏如訶責等邪疑如惡邪不捨等求解律云應來僧中從僧乞解等望此為私也事或有無如受日法無乞辭受戒法有乞也又此科為僧差等亦無乞也然律文順情事多有乞者一下謂事唯假僧僧不假自故必須乞二下謂假於己故無乞也如差分臥具教授尼等白告如論法毗尼白等自量如捨墮中懺主和白等此白即是從僧乞故不須更乞也若輒下釋不定所以也謂若自加乞或僧和不和前事成不即是不定所為乃僧如差受自恣人和白即是為僧文中列別即是牒五德名入法是別牒僧如説戒白云衆僧説戒大鑑明也詳集安詳會也集意今之所集意作何法也故舉而問之四法一差教授出問難二教授白召三對衆問難四正受白四既行法別故須重重問也雖然俱為成受戒一事又是通也如下答中四句辨之通一者雖云法別及問但云僧今和合何所作為於諸羯磨上皆通此一問也故下云止是一言以言下如問差教授出時且非問教授白召為待前緣而起大事不疊生必假對待生故縱下縱有事含通別及問但是一也此事即治舉等私事也二法即説戒自恣是衆所同遵故不敢散多事如三十捨墮隨事不同律許同篇合懺故一法通捨但一答耳各懺即前後懺也一答如云受戒羯磨即一日內不須重問答也夜分簡明相也攝衣如秉攝衣時非時僧得施法已便行付分攝食如秉攝食法已更作白和唱法也如下云四方僧資局處已定不作僧法理無輒分要須通和方得出界自下如受日只作一法更不通餘以事類別故一家望不通後師我自為一家也即目目即名目此師意云如差人問難白非召入白各由假前名目以召相因而起何有通耶今下大師斷上兩解雖各無文所證然亦無妨如但知事端通問通答亦得故大大鈔受戒篇云若總答云受戒羯磨已後更不須和乃至多人例通問答若要委審別問別答亦得遲疑遲滯疑阻也如律既云法緣通別但隨前通答即作亦是決定無宜攻異以革聖言理無雙答謂一答不涉二法之義也由下釋所以一答即不通結捨也下文指注並先須詳委等文重囑大師所以重重囑纍者恐作法不成故也第下撿前十緣對之可解非不評於人法者以首稱量前事中注云事謂人法也第八門中注云謂僧私兩緣即是人也或創立法處即法也前事即初稱量前事第二下即十中第二法起託處也唯局兩界即自然界中唯結界一法目餘僧法並作法界中并對首心念二法通二界略則下據略而論止立四種今為行相微隱故開成十文盛談處處即是界也答下謂即非法界地無以秉法故界為法之所託也以在前第二法起託處中辨今雖明界正在辨約界集僧得言並攝在僧故蘭若界集僧最遠水界集僧最近是也第七即説欲清淨無乞即無乞辭第八即正陳本意立緣顯之今行事家應問云結界不許傳欲盡標盡相僧集不此即顯須立之豈不須告如敘意陳述即是第八情事望差人為情房名或唱一房或一角隔道兩邊即是唱義鏡明也是非是則成非則不成持犯冥會由法成屬持反此名犯條貫終始即隨舉一事為綱條貫攝人僧界法然後稱量為始成法為終斟量既畢方可引彼事緣以作業務五大上色謂五方正間色也若將此色加法於義不成即屬第一稱量前事也兩界作法自然加法俱得即是第二法起託處故前注云若對首心念二法則通二界也口召對人即自口請召一比丘也即是第三集僧方法約下謂約二界集人一比丘者可作對首無一人者開心念即成第四僧集約界前對即前對首人印證堪可而不訶者即是第五應法和合鈍下若集得人來是癡鈍人邊地人等即非足數雖對不成便屬第六簡衆是非取下今作對首本不取欲若令取者却成非法故屬第七説欲清淨執下即手執本衣出言陳受非其錯謬即屬第八正陳本意敕下即告前審諦證實不虗即是第九問事端緒問下即此問彼答互無乖謬便成第十答所成法誰下彰繁所以義在張羅所為令人解也心念中比前可領諸律先和後欲如十誦作羯磨者唱僧和集欲作何事答云作某羯磨又唱不來諸比丘説欲説已唱白羯磨也由下待答作某羯磨方與欲也故云由取答緣以應欲務也四分先欲後和如戒本序云不來諸比丘説欲及清淨了方問僧今和合何所作為功德衣中亦然既云如法僧事知何不通豈待先如後欲耶必下會前後無妨第三即一稱量前事二法起有無若是自然順先竪標相故當第三也第八即正陳本意中注云或創立法處則竪標唱相注雖合言須知竪在第三唱在第八二即法起託處四謂僧集約界五是應法和合六屬簡衆是非七乃説欲清淨並須事是現前方成緣辨二界舉第二法以示為法不同如結界要自然餘在法地對首心念通二界也餘四即前五中後四緣也則重既不成分望監護人滿五得夷故曰也據下如欲和合為某事立法今不集者立法雖成終是違教已上證輕故下説重但下説不犯謂打後自不集隨有現集僧望不集者通皆不犯故下約打相為通集法也律下此説作法時雖打還須撿校不爾成別故曰終須身集不作相有得成者即前句云據立羯磨成而違教和舉如云僧今和合是和義何所作為是舉義合云某事羯磨通含和舉以僧和故方可舉法今若不問於法雖失作法自成四法即事法人處可行名是則開反此是非號閉皆須務叶時緣方可施動也徑述言不可簡徑陳述要在加功勇勵精擇是非方曰稱量前事也餘九方陳由稱量後方陳後九緣也布薩如籌水有闕作法亦成以衆具但是助説戒之軌儀也其實在於能説所聽行淨方應布薩縱衆具違教但有不應輕吉耳若結下即結界須假立標相也或少缺者結法不成以下釋所以并部即願師於并州撰德衣即功德衣法著序即彼和合下先問和合後問僧集也至於下彼無法起託處頭緣不足故致行事非也相部即礪律師宗曹魏本素師云魏礪律師受持此本鋭想針規雖去尤非未袪諛過分為兩卷并造義釋是也六五者如差人無元七中除一又結界不説法起處及以無欲七中除二也合緣同本上六為緣條第七是根本今師凡作羯磨要具十緣彼以第七作法根本合在緣中收故問下斥第六以問在此人不可合一又下斥第五因本即陳本意中乞詞也又云下斥第四古人結界不問欲故今云下大師十緣中要須法起託處故立第二以明作法界有三自然分四又雖結界不許傳欲要須問之故立第七若不審者何以得知無令傳欲故曰無欲也佛制下以云律稱量比丘及白衣稱量羯磨等通塞作法界可辨三法是通自然但辨別法是塞三下非打犍稚無以顯集時故須也四下謂作法三種自然四處各有限齊並律誠實文也和相即茅五應法和合簡人即第六簡衆是非欲淨即第七説欲清淨緣緒即第八正陳本意謂僧私兩緣也問答分兩即第九問事第十答成義通相會者然亦有同古師者則相和會而安立也非敢下此二句其間十緣亦有分同古人立者非敢苟且欲與之同乃於理合自不可異也前云苟異者乃古人不立今依教立之則於理也自不可與同亦非敢苟欲之也若然乃見吾祖依法不依人不求其異而異之不求其同而同之古本曹魏師即曇諦於洛陽集本光師即無魏光律師於鄴下集本初舉名者示巨文也二依相解示子注也略示即上約對首歷十緣是也一二法即注中引持衣説淨等法是若對二人反顯是非但對一人即成如法小衆問邊大鈔云必有邊人有須問者若三十捨墮須問邊人九十單墮但對即得亦有通須問者謂同䨱處露地尋內故須問之心在外有障亦不在通問若持衣説淨不論通別墮下即提至重吉也僧下此説懺捨墮蓋懺主不可輒受故須和白及至懺時只對一人人非則有者如大鈔辨七非中衆法對首如自恣等一者人非四人秉法第五受欲如此事類頗多皆是別衆也非數即非淨戒等知而同法者是若論下謂法非事非隨所被事緣而辨各自有異也四初僧用者謂四人初得為僧用也爾時能懺者可對捨衣及至捨罪懺主作白和僧為他所量不入僧數但有三人三非僧數何由可作白和此義破斥除廢已盡如上即法通僧別中云捨財還衣僧中作法正悔本罪須問邊三單白自和如前久廢約數則異如對三人則言諸大德聽二人則言二大德一人但言大德一心念至時隨改義下律中衆法對首但出五法故大師加此一種中蘭以上蘭對大衆下蘭一人故如上前云悔蘭限三應歸中品又十誦云重者界內輕者界外四分下文小衆故也下文即指注中並前等下文也舉位分相即舉但心念對首心念衆法心念各分法事人界相貌其義可了人事者人即獨秉事如六念等對人下即對首心念本對一人作衆法心念本對僧作今界無人故例開心念具分其位者前云但心念者不假他成對首心念法本須證衆法心念正法僧中別人非分但以財法兩慧誠顯六和若不傍流何名僧體故開獨秉何慮不知以一音普被故重説善哉經云善哉蓋美彼能順法也重言如是如經云如是由即定不虗也集法雖多謂五十別法雖分位是多而顯示非相粗亦明矣義須下言但憑數理仄照舊非妄心何可託矣約人分三謂四人已上僧法二三人對首一人心念也文義文即指律中七非義即約今師義立七非恐人下雙示所以疏指首疏舉名如下云一者非法非毗尼等是得離離其非也此即下言此僧法七非正當前四門中最下文也通凡聖言小聖猶者事迷也四心即識想受行下文即正解七非文中若下大師囑後講者引用下六非名文相來此釋用之亦資談柄闕二似者即闕法相似別衆羯磨法相似和合羯磨下自注云謂先作羯磨後作白名相似今既約單白故闕此二大疏即首疏此非下言此二似非對單白體上而起三羯磨約白四為言文略白二餘下離二離二似外餘五非也皆是約人法事中顯相出非如文即下引律文以解也初非即非法非毗尼羯磨中次五下謂七非中從二至六皆是人法相對辨非唯第七是單就如法明非以注文謂如法羯磨須僧同秉但以訶不止邊名非也故云末下等就中五內亦同上中間五非除第一第七也非似二別下即第二非法別衆第五法相似別衆望非法與相似名法非俱是別衆名人非非似二和即第三非法和合第六法相似和合望非法及法相似名法非俱是和合名人是法別衆即第四如法別衆望如法邊名法是望別衆邊名人非恐下儒云天網疏而不漏今恐方便漏非是以交絡而明以廣羅也及下網喻七非之位魚喻人法事非雖備張七位之網及羅其非者但在一目耳苟一位入非則法不成就莊子云得鳥者羅之一目問下以前云約事明非不離人法及事又事法人界四種須具今但説人法非而不顯事界者約文即律文語下如云白此事為彼事則法非中攝事非也又云應與欲者不與欲來是約界內別衆則又人非中攝事非也兩界則自然作法如自然地上作法亦屬事非如下釋事非中云界非聖制是也亦須能秉必在人也故舉人以收事界也或下以律七非中全不説界又似略也三性善惡無記二論即多雜方便身口色聲正屬多論三聚中色聚所攝以作時正屬方便假色故以此為體若或約當宗則用非色非心聚中名句味為體以名身句身乃至無作一十七法在成論非色心聚所收名句味亦曰名句文故俱舍師能詮教以名句文為體是也增減白二作白四名增白四作白二名減斯則妄有加減也善色聲望非惡心邊身為善色語為善聲也不善色聲望彼不來是色惡望呵邊是聲惡也然作下非法指第三似法指第六二俱法非也若下謂二俱和合是人如故非惡也故下是結文不顯無記今望應來不來應與即第七收若止則何非攝答既應乞不乞增減文句即前六收也如法明體者此師見律云謂如法羯磨須僧同秉召説即訶者如羯磨云誰不忍者説今或有人説者理須止住今不肯住者便是非體蓋對望如非以辨也有人下此師意云如初非中非毗尼縱不訶者體自成非第七要訶方成非耳如下取第二第三非為例以二三皆言非法是同也莫下釋非法同貌但下釋成二非所以謂第二是別衆第三是和合約此和別故分二非其實法非本同一耳此亦下合成此中如非義也謂訶止即如不止即非體自明矣向下訶不止牒第七非與得訶人訶牒上第二為同耶別耶答下情不同者此師謂心乖故訶訶成別衆故屬前第二非攝是人非也約法下即心同故訶訶成法非屬第七法非中攝也故與前異又下再示第二得訶人訶是訶事故前云謂白此事為彼事作今若訶者是對事也訶法下釋第七是通對人法處三而訶也且約如法羯磨用五人秉今用四人合作單白今作白二合就大界今就欲不與欲前人睡定即是無記為集即非法之因屬集諦也能感下屬苦諦也大鈔結界中云自陷陷人脫作受法不成令他一生空過自身未來還逢此界則因果如影響矣終是集諦雖善惡不同是有為俱屬界內因也若離非就如又於如不著者則成界外道滅二諦斯為要也故受戒篇云如此發心尚名邪想此皆破邪心中語使離著為言也餘人下指六非也三緣即人法事也人事非文略法非前文云初非中三種俱非僧舉僧等人也羯磨增減法也無病有藥事也故律下顯非法通收人事則下六可收攝矣能攝為總所攝為別故上總而下別也一位以人法共成與位也非別言是別非總也就律本釋七非文前六下此師意云如初非法非毗尼是出名也注中依律陳人法事三非相貌是出體也及至第七云訶不止羯磨但有其名而律不顯訶不止之貌是無體也應乞不乞如受戒乞今不乞又合作單白今作白二等今若訶不止即是第七非體相貌也何言第七無體蓋不能出耳問若訶不止戒場今若訶者俱屬法非也但分為二如初約有無三約如非四約不訶有訶皆是立二以收七非若爾律不應立七非此未通解故今斥云未當也若然則第二師云七體皆具義似長也違順如受戒是情中順事治擯是情中違事又衣鉢具名緣是不具號緣非又不問心同心乖但使德人於七中訶而住者即非和同之相故曰住則是別由住故法不成非故曰法不可非不可由訶故是人非不住故是法非餘下指解七非文也依情能秉人情也故次云想見紛馳緣數即下約人法事等以收也通塞通則為是塞則成非並是下謂前已論人法事等但為散在諸處今復明者蓋約義收束對是非相校以辨使道理通貫耳戒同治隔者謂三舉戒雖是同但為治法隔故難者指上十三難人行缺一生即二滅人也前文云形報未終斯法不絶舉法少時大鈔云須僧舉棄示不任用隨順無違方乃解之故知解竟復入僧用緣相少乖者或入定緣差或四儀相互別衆收如應來者不來或非數攝如神足在空等向下四科歷對三業以辨也露在下謂露地作法一人在八尺之外兩不相足䨱下即䨱處此約比座展轉離見面聞聲或䨱處有隔障見而不聞聞而不見應來者不來此皆屬身業乖也應與欲者不與欲來是心業乖也應訶者顯非奪三十五事人也此是應訶人望法邊是口業乖不妨心同身到故曰身心集也三下心同僧秉口不訶法但身四儀乖耳背面病雖開隨意坐臥等而面背僧者是身業別也心無非欲非不也言心非不樂欲也未開言未開通耳捨性以三受中捨受攝入無記性也相務相收三業務總羯磨下云但本應務是也誡其身以耳根屬身故斯等指上癡鈍人六和戒見利身口意和也四凖即四人五人十人二十人此四僧以為一化秉御之準的而見下壇經云釋尊一代僧具六和一見不和兩不足數而心不集即心乖故訶也故下引證心口集者由傳語表之口希欲之心而至也戒下并上三種成六和義難遮即十三難舉滅三舉二減也法下如式叉等三衆法不具啞聾具二等是報不具當下出可足義事從下謂常塗皆言因親緣疏也今約作法時三業相同是親也往時帶難等是緣疏也又法對前情非情等事起是因也今但同秉是緣也但下謂本應生善業務今三業之相無乖外又不知可入僧數得作前法故下引證既曰知者不足反顯上不知是足受已謂受戒已方知和尚等破戒然前法已起故曰並是天通多論云不得以天眼觀人善惡但以肉眼意亦可見辭定醉約須漿誤飲人也若約相如如入定人與僧同坐應可足耶答文可領問下一問足數輕重二問別衆輕重睡定語語即閙語人前事如受戒等則令他一生無戒豈非重乎準與未滿人受大戒和尚得提亦是令他空受例今亦應犯重提也遮難體非者遮難無戒但有業道體非之人有戒可違故云自他俱重他即僧也由下伸自他意也以知彼犯何得同秉大鈔云知何不説若下例如和尚雖破戒準他部在十人之外由彼知故是自得重既在十外故三師七證但犯輕吉也餘法準之若欲免者不應納之則吉亦非者不妨自成前法好人即清淨者以犯戒人別亦無過故大鈔云別衆一種唯據清淨一色今或好者不集自惱惱他故業重也聖或下竟云有聖人在界內而不知不以不知故在界不集而不犯別律云有比丘無想羯磨不成而犯別具障僧別者即障僧法及對首心念別人法皆不成故體淨重簡上好人意謂若體應數不集須犯提若別犯僧殘已上失法之人但得吉罪故曰輕若然則重輕之義明矣如前者指上集法緣成中彼云總集三法區分之意又曰依人弘法人分三位即僧位二衆多人三一人今言三階階即位也九品者前云略分為三謂心念對首羯磨廣為九位心念分三一但心念二對首心念三衆法心念對首分三一但對首二衆法對首三義張小衆對首羯磨分三一單白二白二三白四是也識鏡通塞識知明照故取鏡喻衆法無人開作心念等號通心念不通衆作名塞若能了此可以即事即行不患有壅滯罣得依持謹唱唱即誦也文句明了即前三後五句分明曉了增減非相者若綱骨中增加減略一字者即便落非今則無也一不參涉謂一百三十四法中綱骨緣兆略無參涉也聽忍説默聽則耳聽忍即忍可不忍即説忍則成默泠泠然無有異也緣本騰結者如受戒單白中衣鉢等是緣具足戒等是本又第二句緣中緣本雙陳第四句緣略緣牒本乃至最後再騰前事結歸亦無有濫者並由秉法者聲音曲折之相唱白告令分明同秉之僧六和相順約此已來名為相是也乃作二三本作一單白今作二三單白羯磨亦爾者本作白二今增白三白四或本作白四今減作白二即事鈔云以法例通於無準是也二似即第五六法相似非為先作羯磨後作白纍罪積纍其罪而加罰也如合作訶責止可應作訶責今又加擯出羯磨也等者等取第三依止四遮不至白衣家五不見罪六不懺七説欲不障道羯磨也䨱藏等四謂有䨱行三法無䨱行二法若再犯者與本日治今不論有無具足行四法也滅諍等七者合與現前毗尼今又加後六毗尼斯皆無病輒加藥耳故成非也白中下如單白有四句成白五句成白今於四增為五減五為四又於文句前後顛倒羯磨亦爾者如緣兆中前要緣本雙陳令却單牒根本是減也後要略緣牒本今却緣本雙陳是增也不同下先應難云此與前第一增減非者有何別耶將文通之全白重者應作一白乃至二三故不具者或網中落字或緣中辭意不足前下即文不相貫也互合即情非情合事如離衣杖等如已前辨不枉猶不虗狂也人下舉作法離衣説並下結成其實下解上實字形法兩具形須規頂矩袍法須先受五十而不破重受體非是正要蓋受時儀相必須之也多罪下約懺罪以明一悔即同篇合懺也相下即折伏之相應教也體下即上云懺非濫疑六聚體別故餘下上舉受懺情事既然餘非情互合亦可比類而知也難障即十三重難障戒不生故下云盡形障故詐下實有狂病者方可加法今詐作乞法不可輒被無相不竪標唱相也或虗指山谷不了分齊或無留難妄結三小也反前即體是中諸遮即十六輕遮也兩是戒非由帶遮故於戒不發故成非也不同前體言不同前體中十三重難永障戒此若改轉理是通得如衣鉢非具年小待滿之類律文下引現前毗尼中文處現前處即是界以羯磨所起必在作法界故事無容隱生起事現前也五此即律中非法別衆羯磨等五向下為引又前增減等五非也為四非人法事處為四非也二合為六一合三合為三一人法事合二法事處三事處人四俱非也不可限約言其多也總含者於人法事是非違順之外別立第五通雜一門以攝非相知何不該故云望攝為盡也佛下示注已下各牒隨解故於此不分但總言七羯磨非法別人下此解能秉之非以一人不可行羯磨故四人下雖能秉滿四是強然不可舉四人故便成僧舉僧也大鈔云若有一人三人隨名牒用不得至四亦蘭者恐眷屬助破故一羯磨牒一切僧者如行懺法通衆多人以一法懺是也如上即前義説中廣約事辨非是也又上引律云或法不稱事事不應法或法事俱互皆號非法非毗尼下可知者示注中毗尼母下等文白下以攝衣從攝僧界起今於場上時到前用白牒云此住處比丘稱四方小界相於忍聽後却牒結不失衣界是也若牒下如白二轉牒作白四事是名非法非毗尼中收刈割也此立非法制三別衆即應來不來是應與欲不與欲現前得訶者訶訶前兩別此師意謂第三自無別位但是訶前應來者不來應與欲者不與欲來二種別衆故此下正行若只立二種不應增三文也故佛言有三種和合反此別衆當知後之一別正約訶法非謂前二種第三下既曰羯磨又曰強作顯是法也非是訶前二種不同得訶人不肯同也遮成亦是約遮障羯磨也若以此五分十誦二律證之則知昔人之妄解矣相翻前云應來者不來等是別衆今翻云應來者來是和合也又前云白此事為彼事等名非法今翻云白此事為此事是如法初非所收者即第一非法非毗尼中也反上謂反前別衆成今和合即應來者來等律出其人即出訶人不出訶人不止非體如上即體有無中訶止如法不止非法是也人解即古師能訶下言得訶人訶唯屬於是不屬於非故曰唯是非非上非訓不通是非者如法羯磨名是反此號非又受戒等法名是媒嫁等法屬非非人非善比丘也屬不得滿不得訶人訶已不住此法自成故曰去即是是若住者反上成非如人即善比丘此得滿得訶人也或彼訶而即住者是名為是故曰是是若不住者即名為非故曰去即是非去即秉法不住貌持律行淨者是得訶人也反此不得不同即不肯同秉也僧不得強作若作者得吉界外不成即界外訶不成訶也二難即命梵二難見不欲言聽説見不欲謂不忍見此事心不欲故如是三説則止不得至四鈔引云當語傍人言此非法制止得三人是也若至四人則成一衆衆以和為義今若乖見客致僧破故但至三餘下彼律又云若作非法制者應訶令止不者當説如法欲已起去又毗尼母論云見衆法事獨不須諫應作默然不遮下意云衆中有如法比丘不能遮彼非法又不能不與欲又不説見不欲故犯吉過別者隨事約過實有別也三十九舉單白數也四緣即法事人界文中相有并相無對翻可解下文指注白二等文界非不無若據作法須約四緣今七非中不言界者謂攝在事非中故事非文中注云界非聖制是也離下遮人見之局也不得聞者以有犯者不得聞戒故能所能即能説所即所聽故律下證所聽非即訶不成凡別衆者豈成訶也以得滿方得訶也威下即四儀不同也僧祇云行作羯磨坐則成別等故曰不應教相非法和以衆不滿故倒錯倒謂顛倒錯即錯脫在三四分三日説戒即十四十五十六十六難開有緣即八難餘緣開略説戒少即一篇多至八中間對望可知緩急者緣緩可廣緣急可略故律有十五略七略一直是也而合作法契合緩急作略法也今並反之無難別緣言無惡比丘作留難而為別緣結小界説戒等即解若起迷方無由再會故不應不解而去錯互交錯綺互也上三下言四五六三非不可一時頓現故得交互織成以為綱目羅非令盡耳因解下因上説無難別緣結小界又不即解等故此泛評也須解羯磨者謂前曾加法後須用法解也無心領約前無心領受也只如訶責等七種羯磨雖面而作以是違情故終不諦心領受也以至學家覆鉢不禮非情等六例之可解七治即訶責擯出依止遮不至白衣家不見舉不懺舉惡見不捨舉罪處律因象力與外道論議不如前後相違佛言僧應與彼白四羯磨治取本罪奪三十五事若便首本罪者應白四為解顛狂即中品狂人先以法被後狂止當以法解學家即見諦之家供養既多衣食乏盡居士譏嫌佛令白二制斷比丘後當更解覆鉢彼檀越家不肯受懺僧作法被無任受用義同覆鉢後若起信當以法解不禮律因迦留陀夷作説語佛令尼作不禮羯磨後若敦慎開以法解擯沙彌即説欲不障三諫不從宜即擯遣後若從順亦當為解二義分之者謂十三種所以立法解者有二種義一者鹵為解後再得有用體應僧數二者治日無限則盡形不復失接機義故須為解如下引二事為例功德下應先難云此六約無情説解者且如出功德衣衣亦無情何不在數將文釋之日限從七月十六至臘月十五日開受五利此為限也恐人妄越故須法解縱若不解至限自失故不在數也則不同大界等六以非數者謂先受不得故又犯重則財法兩亡故須解此約捨戒論也為緣逼己不能防制開捨戒引後戒若不解者帶戒犯重便成邊罪一生永障捨已後開重受俱作五非律四十三云爾時有住處僧為比丘作非法別衆羯磨時衆多僧共諍或云非法別衆羯磨一或言非法和合二或言如法別衆三或言法相似別衆四或言法相似和合五故曰俱作五非又曰或言羯磨成就或言不成就此屬兩人并前執五非成諍共成七人也故曰七人共諍成不成也今意謂如來在世比丘尚有迷暗成非况滅後乎理須詳審為要故戒壇經云佛世執法猶行五非豈是不學為知人邪臨機心境逆忘故也以非下雖隨事有異若以非相之義攝之則通也何者莫不對首之人要是足數淨者此示義逼據下若以對首之法施於持衣説藥等事上不妨託相有異如持衣非説藥等雖然於彼衣藥之緣必須符教故曰如也此示相異故須類例通解也持説持衣説藥也重緣犯夷也三根見聞疑也答下境既不一戒亦別發今雖犯重於持衣説藥上先已發戒故豈得不行學悔即學悔沙彌由自他兩穢復又知聞故乍下言乍可作心念持衣也若下此約類同故可互對首加法證語證陳説之語或陳詞有闕者須訶令止不問前人住與不住皆成人非以得訶人訶故僧是別位以四人僧自作衆法故下流七衆之末非同類故二名者謂不牒己名及衣名也今下以僧祇通夜護衣四分但護明相若用彼法加受即隨行不應受體今宜用十誦則理通文順以同護明相故五色五方正色所謂青黃赤白黑也上染則五方間色所謂緑紅碧紫黃也交絡者四者人法非不妨事如五者人事非不妨法如六者事法非不妨人如七具三非並同上五里此約無難蘭若須五里集餘處界即餘四處五相也能敗法人由彼訶故其法敗壞所謂心乖故訶訶成別衆即人非者法由被訶故收皈人非若下或有訶已前人不止者此法已被訶不論是與不是俱屬法非聞止故去者言耳聞前人訶止而故意秉去雖去非法若隨訶而住者是如法也不忍而説謂證對人內心不忍故説法成之義既非獨建故法敗矣捨懺等三即注中三事人法和合戒疏云身口意和所謂人也戒見利和所謂法也僧私如捨財還衣要在僧中乃至捨罪但對別人故曰私也義既不一故須分別小大長尺六廣八寸財過十日限者作提懺不滿尺六八寸作吉懺故知大小俱在懺限今下行非論有誠文者多論云不應量財得須説之不説過限則結吉羅既言不應若大若小知何不説同染者大鈔云能染應量所染云何答通應不應如足食竟正不正俱犯足若能染是不應量財而染應量不答大小雖殊捨懺義一律結大提論結小吉故皆一染雖下結行古人雖懺應量不懺不應者其罪不脫通下結歸正義重物即被褥等律云若他與作被不犯大師解云以是重物不應輕財不合説淨既無違説之過故非捨懺小鉢即非應量者不許受持及説淨也正色即衣作五方正色亦不可加受持離亦無過邪求即五邪四邪求者亦非正教所許皆墮但犯提罪不合捨懺不合受淨言不應受淨法也既爾何有捨懺之理非疑盡捨乃謂過分故經中並結無知罪也次下引律識者懺悔疑者發露有䨱不治日月者開疑罪不結䨱藏也鈔云不憶有疑不識並不成䨱對與非對者輕吉但責心重吉須對首如下謂捨墮中有覆藏之吉對一清淨人悔則當正儀也異篇非律者謂同篇合懺異聚別今䨱藏吉不可與墮罪合懺也又輕重二吉名字雖同亦不可合懺餘二即對首心念及衆法心念有人依本若界有人者須依本作對首衆法例然餘文下指注並須準例隨事曉知之文也紹興府會稽縣雷門即皋平里皋部堰西大湖南岸居住敬奉三寶弟子魯濟妻丁三九娠自念年當成立之餘奇偶和歡而經久未産成家之胤常懷忒忒之心欲遂夫妻之願望須憑佛法之良因虔施淨財鏤茲記板贊釋毗尼佛壽流通後末世時善果難量祈求有託然冀佛慈副禱天意冥休妻躬懷福慧之男子位有昌隆之望時紹興戊辰三月圓日魯濟謹願
