body:
  text: 天台沙門允堪述一家者令自為一家著撰簡異先師等餘家也已依界而生非羯磨地不可行僧事已行猷猷者道也勿高於戒以戒為萬行之本故鈔序云戒德難悉冠超衆象隨相隨依受體而起相遂事境而生事申之要衣食為先故得次受而明之願行願對受行對隨衆別者衆則四人已上別則三人已下諸説戒者即衆法對首心念説戒也又白黑非時廣略不同故言諸也又下引僧祇乃至清信士女九十六種出家之人皆半月三受布薩故彼文云佛説清淨是名布薩居法即諸安居篇舉法即下自恣篇明恣舉法也諸施法即諸衣分法篇明時非時等施上篇通括上結界等篇也諸懺法即下懺六聚篇也光師下謂彼所撰約僧尼兩位自分篇次若據律文不無先僧尼後之法如尼律在僧之後雖然今師意謂至於結界等法僧尼有同者但在本篇隨時分取若更各立徒盈卷軸今但下出今家意於下八篇中僧尼同作曰通各行曰塞一篇之中隨類自分蓋準隨戒之下有僧尼同犯不同犯及三衆結吉之科律中既有此式故令得隨當篇之通辨也若然則於一篇有被五衆之機也立題之意于以見矣釋諸界結解篇第二人衣食等不同曰諸隨事分限曰界作法如約名結捨舊要期號解篇者章品之異名跋渠別號應法師云跋渠正言伐伽此云部謂部類也人即攝僧界衣即攝衣界食即攝食界據下以律説戒結界在先衣藥居後蓋當初時約緣起立法以顯今亦約此義次排其次於此下釋上通僧體義也由有界故方顯六和外衣生下攝衣界內藥生下攝食界形別有須者謂有待之形既別故須衣藥又界闊藍狹須結攝衣中下根人故須淨地故次攝僧而起兩緣即衣食羯磨下由此二法是建立正法住持之本也由下出能弘之人通遵羯磨説戒一化之僧通須遵奉理無限礙隔別此則剡浮之洲境通為一集也故大鈔云剡浮洲境彌亘既寬每一集僧期要難尅是也但下生別結之意為奔馳難集妨道等緣也界約通濫言若約剡浮之集則用約束濫在於通漫也縱下雖有同和之心而形影趨赴為難能也徒損正業由奔赴故損功廢業也前緣即機緣隨境隨四處六相之境集僧局結也一開開結別住也作業即羯磨崇和崇尚於和也先開即開別結也後制即制崇和也諸本諸律本也非正本音顯上四摩是本梵音也今下出今界意四種聚蘭道水六種即聚落蘭若開二成六如上緣中即作法十緣中第四約界明緣中辨也為三下即有戒場大界無戒場大界三小界也七界就大界又有三種謂人法二同法食二同法同食別并三小界成六兼戒場成七也相攝即上四緣相攝中初三即注中大界又有三種是也大者須制或結大界不可越量以隔明相者大鈔云後夜受欲羯磨在明故告欲也準此下準上十四日先往之言約可強百里也四十里者智論由旬三別大者八十里中者六十里下者四十里此謂中邊山川不同致行李不等四分衣法中由旬準有八十里者此據上品為言通用所歸準律文意應百二十里以下品為定僧下即僧祇五分善見並云三由旬為量合角量取顯方維俱三由旬也一拘盧十誦多論計二里十拘盧共二十里也若下約山寺上下互明寬廣也但在十拘盧內也不下恐高下大相攝故特顯之河水以律有合河結界故岸相如從彼岸唱相過則河水結入此界要須有船梁方可恐卒集為閡故易陵辱由女弱故也薩婆多云尼結界唯得方一拘盧舍也必有難緣可用僧祇三由旬內隨意結取駃疾也除下若淺水無難準理應得多云即多論僧祇下彼云河水中有洲應五處作羯磨具如下明爾雅云水中可居者曰洲攝衣有文即結攝衣界緣兆云除村村外界反驗攝僧界既無此文故知得合結也於中布薩既行布薩必須結界故合村得結不能僧中猶言不能同一僧界中求別結一屋也不持下恐有離衣過故亦除下因而明之由佛僧位別也僧表表外也四邊開路即中隔自然此中隔不屬兩界屬自然空地也以蘭若翻空處故下文云內外兩相前後別唱所除之外明是空地鐵圍山應法師云梵言柘迦羅此云輪山舊云鐵圍圍即輪義本無鐵名譯人義立耳今圍輪界名取此義也誠文即五百了論二十出罪即出僧殘罪兼所為者釋上一人僧住以場非住處故縱使王立有慚則壞餘材草送住寺比丘依坐而結此據不立方相故直取僧集坐處為界內相也不開身外此冥破古也事鈔云比人行事若結小界受戒多立院限此未通知準如律文為遮惡比丘故令猶坐外有界終不免遮又下指上大界相戒壇也一時即一席作法也作已即解不爾起則迷方矣後解辨小界中自然勞倦即統通自然有奔馳之勞也故開隨處局結濟利時機界限下為界中數有四人事起有妨自行故開結戒場也上二大界戒場非務即惡比丘障彼事務故開結三小如文向下對文次第自解二同即人法二同餘二即法食二同及法同食別如位指文分三位中依僧地為所依僧為能依也前言初結時羯磨聖言後轍若有乖違則後之説恣等事不能成辦若顛墜而傾覆何有軌轍迹可存乎四門今師斥古太略今以十門舒括則免叢雜交參之過也浮漫浮泛渺漫現行無臨機之用也故下生下立十門意披文獲事言披閲正文隨獲事類以作十門依標識體依標相次識界體也豈直指山言不得直指山過恐不識分齊故四分中東方有山稱山有塹稱塹等大師云準此立法誠所不可據下要於山邊峰畔別立標相故曰指別處所明了彼有十七種別住所謂長圓四角水波山巖半月圍輪等皆有分齊無容渺漫準此下準別安石之文若山上別立標者理可分通別也草竹下次草則不堅竹體空依邊要傍樹穿樹心過方得不可通漫標指樹林極小如針此約大針為言也以終有合抱之義故窮途言不通餘處乃窮極之道也短下至經三四村者此略必不廢也蟻封相蟻子運土封起成相也好王下謂明王治化雨不愆期此江不可為也若一年不雨水流不竭者此可為相以久故自然池亦取泉源不竭者若下以不久故一時規域猶一席之間作法規定限域以作羯磨作畢即解者用上草𧂐等可也律論即本律善見明了大鈔云準論徵律城塹等緣成相可知文意同也十七者疏但列十今為具引彼云一長圓別住二四角三水波四山五巖六半月七自性八圍輪九一門十方土十一四廂十二二繩十三比丘十四優婆塞十五籬墻十六圓滿十七癲狂別住得在下言得之在妙者要十緣具也鮮少也必在體外以相為包體之法也隨約內外即內唱即外唱俱得也終識尺寸反顯漫指不可也三相一戒場相二大界內相三大界外相無則一重無戒場者但立外一重標耳遠近闊狹也一肘尺八寸明了下古人引證既云一山一石故知標大者得又如下此引十誦四十七卷中並結即相並結也佛答下言內外兩相各説起盡周匝又相隔遠古人準此標不可狹也今下出正義也二繩蘭若聚落為二繩以繩引法繩下即體豈俟一肘已上耶又若取山石為例者縱闊不分此亦不成當知標雖寬狹若解分兩相之異何往石可由下釋上使舊住意也雖下大師約義斷但取解者不定主客義當去平俱通言容有解者約義可當於舊住之者五分下既言使一比丘彼亦不定舊住又唱下此約先唱大界內相隔除內地也今下出今行事謂先唱戒場相已次唱大界內相後唱外相則不須先除內地也所除即今中隔自然至文指下結解文中又解文中亦指此云即初義第四門也結下是縱恐下是奪安人立望即未受戒者人八即比丘也當先下順著衣法也非數何損破戒不解律者本不足數縱別有何所損是足可遮者謂持戒明解是可足數人若不集者遮障法事相寬自然界寬於標也標寬若竪標寬於自然界者當盡標集不爾則唱時結時別衆在內自然古謂縱使標寬亦只要依自然界集以下申所以也故僧祇引比類文也三由旬此遮難寬結百二十里界尚並呼來故知盡標內須集若出界即三由旬界尼界不妨者以僧尼在望為自然不相足也亦不須喚以自然地弱無集作法界僧來之理反此未結理須通集不可下即依法不依人依義不依語四依之二也自然本弱大鈔云作自然界弱僧事不行即不勝欲等羯磨也不開上應先難云若爾何以開作結界白二耶將文通之未緣因僧作故方許傳欲又結界是諸法之本故不可例也界是下言若結已界地屬強可攝欲法反此未結是弱故不可也依正兩報依即界地正即比丘若開傳欲而結者則不練依報之寬狹也又何以辨護夏別衆護食等制乎初依自然者即初是統通及指説堂以隨僧到處身有界起約此而集也混亂猶無標相定指故不定處大鈔云每一集僧期要難尅是也立相加結者因上奔馳故故開別結既許別結則有審知説處等四益也弘義弘者大也又弘通也恐同法界前雖誡約猶恐怠者不來同於作法界比於常時而與欲故又約之初文後義者此點示注中從是中至隨有稱之已來是律文也應須義設下是示後義也初中至行事來重點示文義也此一下迷意言此一法最是衆法之宗本若不先成後法起無所從故曰羣宗也故須下生下義設之意也疏者下申繁之所以凡作疏大意在疏通次擇文家之壅滯今未通暢故又疏決也未勞下言未勞後人煩其思慮隱括尋討虗喪纍世世猶積年也唯在自然次不許重結故約標若標寬須依標集界寬須依界集四人言四人可行結界也簡異五人為唱相人入數故非數神足在空狂亂睡醉雖四不成引文告令即先指四標在四維已告示內外唱法等恐濫為別恐云牒名入法故濫在別人所收不入僧數若爾或有稱名為得以不亦下是釋言雖稱名不是私為故入僧攝後云下以羯磨緣中云結作大界顯是為僧故名則是緣所以唱相不用稱也相則不爾以羯磨緣中牒四方相故如下簡他文通約山水者此舉蘭若唱法如東方有山稱山有塹稱塹等是不委分齊也從門直過此約聚落唱法也如內外兩唱不解屈曲唱出入等廣下彼云如從院外唱云從東南角直至西南角乃至一周正南寺門則有別衆之過以界限從墻外直過門限外則成界內若寺內作諸羯磨之時墻限外有僧不集豈非別衆故知唱相必須屈曲唱出不令後悔亦不可籠通云隨屈曲屈曲亦通深淺遠近終成不識分齊若從內唱相從門直過則限內是界外也便有別衆破夏離衣等過如寺中作法有人説欲訖至門限內還復到來豈非出界入界是別衆也若破夏者有人依界安居明相出至門明了及反豈非破夏言失衣者依界結攝衣界明相未出不持衣往明出界外豈非失衣故委示過然後唱已上鈔云唱下注釋三唱所次前二即上座次座後二即誦律及堪能羯磨者上無人言在上無人即名上座母論彼云從無夏至九夏是下座十夏至十九夏名中座二十夏至四十九夏名上座此約夏次名若局就德顯須準下十誦以上座説戒正是補如來處也豈非約德解具乎所壞即識智簀昏朽也身子以其母好身形而聰明之相在乎眼珠因名珠子亦名身子言是身之子故也法輪大將者謂身子智慧第一能持正摧邪故以名也智論問曰五千比丘中有千餘上座所謂漚樓頻羅迦葉等何以正説此四人答曰舍利弗是右面弟子目連是左面弟子須菩提修無諍法空第一摩訶迦葉行十二頭陀第一乃至是名知識比丘誦文即三誦律識義則第四能作羯磨者若下釋四能作所以謂雖不能連句纍紙誦文而能曉義者也斯為上矣餘律即五分應預者既是有能必已曉達成敗應預宣秉如未間習羯磨之法乍許學悔之人亦下大鈔云若論學悔是不足限必無解法亦開秉之別亦無過則中間人也九等參差者即始乎但心念終至白四九等差別也緣非即前辨十緣并七非聖教即羯磨也能詮文言所詮義理但綱者為通緣非為塞耳後文指後諸羯磨文也次了此意故後文不須復用申解也不能下如次科廣明未有所用爾學者當省此意也銓漢書應劭云權衡也韋昭曰稱錘也今謂平量敘述也誡耳識者令攝耳動識聽所作法也兩聲別召者戒疏云此聽心用和忍之聽異上初句耳識所得也不解此二聽聽同聲者則言表不通不成羯磨也前聽即在去聲後聽即是平聲恐不解此違損事多自説戒時罪福由可脫臨受戒惱害尤深故須極誡也第二第四指兩句緣兆也但前句緣本雙陳後句略緣牒本結界下言結界是令所為事二同則非也蓋本因説戒故相因牒八律本多然言諸律皆如是也為界是本故情事若望結界本屬非情今望比丘僧和同結邊故屬情耳語默律云忍者默然不忍者説不可久言即説也在事即結界是所為事今重舉陳此約羯磨也兩告一單白中告二羯磨中告俱已忍默也後語即默然下至持字時牒二即緣本也白四法者一白三羯磨故曰白四及至羯磨説必制三可為高例也上三今師與二古人也司南即指南車崔豹古今注云大駕指南車起於黃帝帝與尤戰於涿鹿之野尤作大霧皆迷四方於是作指南車以示四方遂擒尤而即帝位後故建為舊説周公所作今謂各有指示之義顯晦顯則存第二句晦則略之有下如有緣起等須五句成白無則但四句成其二即緣本也差人如律差人分房舍臥具及差人作功德衣尼差人請教授是如前即前云無則略之無下言不可論四五句也第一即大德僧聽第三即若僧時到僧忍聽第五即白如是第二即緣本雙陳句第四即略緣牒本句一事隨結界受戒等事義通皆是前廣後略通告僧也試下生次科也布薩説戒華梵雙舉今云衆僧説戒疏中改布薩字為衆僧非也南山依律而書非謂後人錯誤何得擅改是一俱屬緣非也結翻非淨者即結集翻譯言有重雜故使文不淨也故下文云洛文不淨故失剪耳何下言此羯磨緣中亦只牒本括束文也文義皆通者既屬綱骨則通九十五法也義通文局者緣本雙單陳告和默是義通也隨事牒緣是文局也更牒一兩者謂文局義通之式下徵起中更牒一兩事法重明也拏奴加反牽引也頭踵踵足也言以後著前以前著後也及言詞回互顛失脫是此之者或求為他和尚良由不識是非安謂得成蓋未見此疏理之文也此詞即上斥辭相似比丘以無戒故但外兒似比丘也大集有言無戒滿洲此言信矣何下前言義通文局可領何謂義通耶治文即治理其文不淨失剪截爾尚書序云剪截浮辭一準羯磨者將緣非與綱骨一同不許增減也大鈔云然須知處所不得電同文義下説綱骨也所言無詣者謂綱中或少一字則令所置之言無所至詣文下説緣非通增減也豈得二別意云亦可牒二同也今何不列蓋是略耳如下彼云共住共布薩共得施如諸界即四分結戒場及小界等大界由大以簡小兼正是業本故不可略文通略義通即網骨句文局略義通單復文略名單詞重名復但使不失其旨尚書經中也例今緣兆增減無損如下引例彼翻三衣為臥具但得衣之相貌全失袈裟之體尚自用之如戒本云作新臥具應滿六年持等是也如諸下言網骨增減無殊文局言緣非增減有殊只如五分結界文單白尚無第四句羯磨中又無第二句尚自得成以緣通增減故部別各言耳不可增減故並無異詞故云意可見也假用即上辨能秉僧中云佛法顯僧其必四人莫不攬假成用又定僧體中云攬陰成人人假為體實法無用四人假用為僧之體今雖同秉六和假用未顯成不要在一人已上語默表和若一人不和是法不就故須問別稱事不成但言如法僧事故餘法不成者若云同一説戒顯是結界後只通作説戒餘法不成耶前總説事則局者如云為説戒事故與欲則不應分衣請日等事今但言如法僧事則隨應僧中一切善羯磨也別有事起不用停住別往取欲今結界不爾是結後為別別作事故所以緣非中結作大界後方云同一説戒不似下以欲詞中牒如法僧事在前後云與欲故不相並故下引證可解答下因説戒故方立羯磨故説戒為本矣命行見具命正命以離四邪五邪活命利和也行即戒和也見即見和上舉三業次舉三和下云六和具顯本結也本結者以本結界正為説戒故羯下此師意謂羯磨或為僧作或為別作説戒不爾通為僧別故牒説戒不言羯磨也異界詳集如有戒場大界行説戒時必須詳悉四處有僧盡集乃至圍輪中有僧亦集所以牒説戒唯同界同者言羯磨唯簡同一作法界者方同行之異界不須也次下申所以反顯説戒諸界僧須假也有人下此師意謂不牒二同結界亦成今所以牒者當時為説戒故結是以隨牒如下此説不牒得成大下若大界不牒不成者餘小界戒場不牒亦應不成內有諸界如圍輪別住之類既有多界後若結時必須各隨諸界牒出不可依文誦云於此內外相內結作大界耶答下遮繁也言不要一一牒諸小界以除空地亦只言於此四方內外相內結作大界亦得以此界望彼界皆在我界外故以相下以此相望彼相但先唱結在裏名內後唱結在表名外又如大界內相望外相亦得名為相有內外以體下即中間法也望內外相相必在體外也言無謂無法起也然下申所以與行者心俱行者指所被也謂能秉所被二俱同心則有無作無心則無如受戒師秉資受期心有法得可得故今下此師正顯謂結界所為是地地屬非情故無法起如律下引證以律云云何界現前作羯磨唱制限者是故知無有法乃至下義例也如衣鉢藥加法受淨則免其罪何有法起大鈔斥古人引證云此謂加法之所不論法起有無若然乃是吾祖取下科也以作下善生經云世間之法有因則有果如因水鏡則有面像故知作在前生無作後起又成論云因心生罪福等故名無作善行陰以善行心中遷流造作成故屬善行陰攝亦爾惡行心中成也業力因心業力以感法起也水輪以金輪之下有水輪水輪之下有風輪大鈔作水際義同以界是色句絶是別非數由在界故是別衆十誦樹上比丘故非足數若枝下謂比丘亦在界外枝上者開不犯界外下此約根在界外枝覆界內望從根斷且説開之十下引證此亦律文未了準此下大師義斷須根枝俱在外比丘又在枝者得餘如鈔枝結界法中引小法滅盡經云劫火起時曾作伽藍所不為火焚乃至金剛界為土臺也優婆塞以受五八戒心奉三寶屬七衆收故得守界不失若聚落下以聚落為賊所得諸比丘必於一切界悉皆外之外即棄捨之貌也後若作法當復結之故次文云由棄故一切界外下文云捨界背相一切界外意並同上不失淨地以淨地屬能依僧界是所依令能依既不失所依故知在餘下彼復云若疑應解已更結故知界在不淨即宿煮等僧尼互解如二衆同行受戒必須互解互結彼此不失今雖明結必須先解故可例知不得相差言二衆既同秉故不得界相相差也故論言得共結者則二衆共行事時尼須結界不得與僧界相差又恐出僧界外非成同法故異見六和中見不和故兩不足數諍見下文云如拘睒彌亦不同和同界別説開也僧破如邪正二部分破如法僧於上開重結彼此無妨已壞言已破壞也法語即如法語者成捨成捨界也反上即非法語者雖解不成也中邊二方語言不通故若後通者不開反上反上即九門也如相是則成非則不成等相接二界無中隔自然也錯涉二界相參也無濟即無橋船濟渡也緣非單復者收羅七非也纍言猶囑纍而言也四攝即下人法處事為四臨御臨蒞秉御也大猷猷法也道也多人一僧結已經六萬延年通未來僧於上作也非蹤不合教迹也彼我者自結不成復令他於上作法被事不成是同陷也遮障也二同即同一住處同一説戒今解不可同也何下應問云結時云此住處比丘唱四方相及云此於四方界內等今解時何不牒云於此四方相內解界者將結界下文通之文下即在注中引律文也俱是外故者約體望之兩相俱在體外又以此界望戒場戒場又在相外此下皆歸前總科也以總科名結解差別門屬第四今明結解已竟故收歸所屬爾即道之具言是修道之器具也機至下謂有此機至教豈不隨機而通乎還用人法即還用同一住處同一説戒今所以言同説戒利養者隨本緣也又雖牒同利豈不同住乎故知俱含也利豐彼此釋本別利也一住無法釋今欲同法也以道及因此皆目法也以正法各明釋別説戒也利養下釋同利養僧施簡現前施也四方常住者義通衆用故曰四方物存當界故曰常住物在如床褥等利通通衆用也餘下即戒疏第二卷中僧和作業言僧若和合羯磨作業方得成就機會即受懺等機緣會合時若不開者無由取濟通收正行者謂一切善行悉皆所收正以揀於邪行對法而言則除説恣行鉢法外皆可行也精鹿如世舉場精者揀留粗者擇去異品品即品類勝利殊勝利益也如國得賢則利國安民釋之得賢則奉教衆濟皆於此場而招集豈非利乎有本作類以濫上句諸部下善見云外國戒場多在露地如祭壇郊祀之所律中戒名戒壇作法多者即除説戒自恣外可作也今大界亦通多作應亦名場以上云莫非聚結異品等住結即為比丘同住也不下反顯戒場為懺罪是專滅惡為受戒是專生善今大界既無此專局故不得場名若爾三小界正為受懺何故不得場名將小界下釋通通法通辨諸法也和作下以僧多故和難由難和故作法難也乖難乖差留難也又無有乖別難集也平去二呼俱通受捨德衣即受功德衣捨功德衣並在大界以依本安居處受捨利故衣食界以俱依大界故四法者戒疏云單白受懺本罪二取最下者白二與之三單白與鉢次第授四白二以下鉢令持或下別義以攝僧得大界名受懺等得場名互彰其美第二門義即此內外先後門當第二也叵不可也若在下若本制在外則無數集煩動之過故知約大界難集別結在內意亦可見善下引證由緣起律中雖制大界緣在前戒場在後及論行事不必依緣起次第為結界法式理下彼云應先結戒場後結大界若先結大界者當捨已更前結之然後唱相結大界毗尼母善見亦同此説以此文證則光師不讀聖教唯信意言依人涅般云依法不依人母論下出彼第一卷中外無大界此證大界在後圍繞若忘下彼第八具云差人先結淨地次結衆僧房舍後結大界已上正文彼約從內結故爾不同今時結淨地於僧界上也備如次科卑公即卑摩羅叉也即可下釋上僥幸義也以僥幸者非分過福之言今若下大師義約如欲依彼論者當結一小界已復於上結淨地不然則濫處分法亦在自然地故一體二是作法體一是自然體必下謂必若約緣須立諸界者亦隨形勢以安之知圍輪別住既有衆多亦隨界立相或三四重相等盡下前約唱結雖爾及論初集必盡自然以戒場多小於自然界也後法對前結得後名由寬故集難難故成別斯成妨也所以不開小界相據大鈔中加云四方小界場相亦好住處即攝僧界應具二同雖無同説合有同住何以例除耶答如文問下意云説戒自恣二法何須盡集戒場上僧來也況已結成二界故答下説恣二法同收犯淨二位有犯懺罪令淨本制僧私同遵所以大界戒場圍輪諸界有僧並集也餘法不爾非制同遵故有人下此成他部行事也大師不用文無偏局但云解界何不通之初無二同救云戒場結時不牒二同及後解時正是解二同與結時相稱故亦可成也不類者豈可結無二同解有二同是則不類俱無其相以齊比丘坐處結故外不立相又是權開一席法耳作畢即解起必迷方今場是久固又立相故如何用彼法亦不類也比量比度可知也故大鈔云今準難事界但翻結為解理通文順僧住以解文云僧今集此住處故上既已斥今何又著答下前斥不許者是同一久住之住此是四儀一時之住故不同也故曰多種若一例不許言住者則前結戒場法中云此住處比丘亦應不可言住故須善了言義通界即大界下云通圍大界答下欲易明之故後明解及至行事未必結已即解任在解律者行用藏捨耳卒增約水有泛溢故障集約僧來赴是難故拯溺以僧寶為人天拯拔沒溺之人今若機緣不赴僧義不成則空彰斯號矣乘權以難集故不能應權乘之濟物是喪其實行也無津渡簡有船橋則可也五處彼第八云若河水中有洲者應五處作羯磨一摩頭羅精舍二水中三洲上四水中五仙人聚落兩邊下彼又云比丘受欲來應羯磨為水所漂出界去殆死得出白諸比丘我向持欲來為水所漂殆死得出今可廣結界否諸比丘言得汝去上下水三由旬作識若樹若石等作羯磨者應作是言大德僧聽從摩頭羅精舍至仙人聚落精舍河水上下從分齊以來羯磨作一布薩如是白此證合水通結為界三下彼又云陸地道兩邊各二十五肘此是小也或避難結三由旬此是大也如上説竟即前云若論自然約界則四種不同定量分六相差別故水陸在不攝也僧下以作通結為一界理得無礙如本律正通合河結界如上即所引古義今師準了論文既曰二繩豈曰在尺八通唱三重即於場上唱相已遙唱大界內相及外相也或於下即於大界遙唱場相并加結法也但唱外相者中無大界內相便成兩界相參若又但唱內相而不唱外相齊何處是界分齊又雖唱二相而不周匝皆名非法又出自然即出中隔自然也依標相集或標寬當依標集或自然界寬當依自然界集律無下以律中無通圍大界結法但集法者行事之時必準誦之故特出此一法耳注中云如初結大界法無異者若準大鈔云唯足內之一字云僧今於此四方內外相結作大界若據律文亦不加字但云於此四方相內結大界於理亦得隨意所存大途無妨藥病藥對上教病對上機以教由機設藥為病施凡夫情見既有異類聚結故聖特開如法同儔一處結界作此三法拘睒彌彼因鬪諍來久二十來年不同説戒事見事即諍事見謂知見上云由諍見故兩無別衆今則正見是同但客遮法或來而不坐或坐已故訶恐成別衆故開結耳未出界是出彼作法界也下道即無同師善及下道各集一處結小界説戒等異處即律云若不得合和者隨同師親友移異處結小界自恣雖下以當部中但言界外曠野不言在自然界也今準文中既云移異處及下道當知即是自然界也此實誠文也道下文言道路行即道行一界也又云下道即蘭若以文中云無村曠野當時者如在道路行可準十誦六百步集或在蘭若可準善見七槃陀量集不須五里也有人下此師約坐處集人斯理非也以律文約結已齊坐處故非約集云時若爾則有難蘭若無集僧之量律下既云未出界顯是未入我自然界也常塗即五里七槃陀一槃陀二十八肘計有一百九十六肘肘各尺八總有五十八步四尺八寸也彼下彼云不同意者於外得作法事即是四分出界義意同上也無有二會無重集也顯是一席法故不和不至非和合者不可造至席中故明以下即用比丘坐身為標標畔為相相內坐下是體總門第四故特簡云總門中第四也解不類結者以結時云此住處比丘唱四方大界相又云於四方相內結大界等至解時則無此文但牒二同以解也又前人竪相結後人背相解不類此三當座人結當座人解人處相應人即同座處即身內能結之人即為解之餘人非後來比丘即第五門義言正屬此門非義也緣難有無大界無難故寬立相使久固也小界有難反上不立故知立者不徒然也法事相違者以事是難緣今反立相令其間緩則事不稱法故説不成專權結小界為無緣而專事權開者正違教也如下引例如有難持欲出界外來應僧法者開反此無難不開儉下謂儉時方開內宿內煮等八反此非儉亦不開也離衣下如離衣為道路隔斷歸會不得方開九等上中下根各開三位以成九也雖下結上開緣俱是曲被矜自賢曰矜言凡夫不準聖言輒自開故僧祇下證上立説以通四儀故尉下言此為問遮處也指擬方隅此顯身外別指標為相也誦結即誦八羯磨結成義下今斥可領疾疾恐惡比丘來故翻下翻上四是以成四非文下律云界外問難不成顯須界內也今身外無相如何問難殷鑒殷厚鑒察也與博觀義同冰執情見也開間納取納取沙彌也大鈔云十人叢坐前結足開一人之分必半身出界亦準十誦善見之文足成僧數初結正結三小時彼若來呵此結不成同自然故古謂若未唱結時同是一自然界也惡心觸即惡心觸淨食不成觸也今惡心倚我身界不成訶別今下正結時及結已隨作三法時倚身者俱成結下顯無外相故前閉斥古初結不成後開斥古結界已雖呵不成以律中無此前閉後開語故如下如向所論一開一遮不勞分結已約身初結同自然界但使初後俱為防訶人故又初結時身外不立相故則不容訶人故文下引律誡證既言善比丘及顯惡比丘雖倚身界亦不成訶問若約結時不成訶者何以律文不同意者未出界疾疾結之答此約集時深防之意也及至正結時縱倚身界以是惡比丘故兩不相攝大鈔云別衆一種唯捩清淨一色又正結時無外相故用大界為猶言用大界何為也一教謂臨機開一時之教非圖重集也前緣即為難故開受戒託恣緣也場界無難理須就本結場界也多人不益者謂行事不應於教則令多人不得戒益戒既不具行無所從以行從戒體而有也四是即上知無異外等四是四非即此非是開緣等四揣度也謂古出羯磨不解度量今所合行為顯不行可藏晦一例連寫是不適悅於時投世機耳即今下意謂今時怠法者多設有戒場大界欲行法者尚須邀命延請方肯一臨豈有來作留難者乎所以徒出無益若然則知今家之略意問脫或有者如何將必下通之準誦準律通之自成今恐後學未見故曲為引之律云大德僧聽今有爾許比丘集若僧時到僧忍聽結小界白如是羯磨可準界與藍等即作法攝僧界與藍齊等或結界狹小而藍墻寬大此二不須結攝衣界也以下謂自然衣界依藍院墻起也但四相周匝外更有十三步勢分在若結衣界反令狹小兼無勢分所謂有法故無也或界下此顯界在勢分內反令衣界亦小全夏失衣者謂但全得護夏以依界安居故而有失衣以自然衣界但齊藍故今出藍外雖曰在界不免失衣今若齊攝僧界上結衣界則護夏護二俱全矣故曰衣夏兩會如下緣説即頭陀比丘厭世樂蘭若窟住佛聽結不失衣界是也十誦墻壁籬柵來者顯從籬外來至界邊際也五衣約尼説有下此師約現有村可牒除村若無者不須牒除也如下彼引律證是無事有法例如無病有藥而妄加耳現除現有村在界內村內不得護衣懸不結村去之後此處更不得護衣故曰後村移出不合攝衣無村下即現今無村也現結謂現法結取衣界也懸除村若後來當於衣界中不得護衣村若去後此處復可護衣也故曰村去還會衣界便解正斥上村來不攝便成衣界自然解也衣界不遍此斥上現除懸不結村若去後不合攝衣則成標相之內衣界不遍況復衣界齊僧界上遍標相內起故但村下正出今義不言除村顯是衣界遍以律先結衣界村內攝衣後為緣礙因比丘寄衣在村往取有礙因制村中不得著衣故曰方始除村此顯除其妨礙非謂除其村體後遂下今用此義也村在不得此約除其妨礙也村去攝衣男女出後不妨護衣以結時遍標相內起故同住地齊僧界起故不同古人除中空域今言除者但除界中障礙耳豈在下意謂豈在今院內本無村故不牒結除若村後來又須秉法豈非煩重又下若今不牒除村後村來入便言村內得護衣也由斯義故所以須牒除村如下引例如月一日結界便牒二同豈可便同説戒耶亦俟於後也故預牒之今衣界亦爾初結既牒除村後亦同之問含二意並問有結攝衣法無結法村來障衣是同何須結法中有村無村例著除村之語耶故二問意並云何須著除答中內外字倒合云院外界內未免失衣者蓋攝僧界藍外攝相弱車樹等界攝相強結攝衣竟自然諸界滅名唯村界不滅恐疑村界亦滅故云俱著除如論即薩婆多論不定或有無或多少散亂也誹謗由寄衣在村取招譏故鬪諍因往村故容有夫婦之諍及無彼覓衣之諍故梵行即淨行嫌疑嫌故不敬疑恐非法無情不為防村男女故十誦下二句即村及勢分也結空地及住處以十誦許預結也衣界不生下雖云預結以村在故不得攝衣義同不生即無遍矣善見下證勢分也人即解指古人也現除懸結者古謂現有村現除不可護衣懸結者即結取空地及住處也後村移出更不須結以懸結故四分下古人謂四分但云除村村外無須結村體及勢分之文却成懸不結也故下破此非正解以本律何嘗不言村去攝衣即現結村及勢分矣明有所牒是懸牒除也以村後去隨得置衣但村在時除其障礙有本明有所下闕牒字僧坊外地即藍外地也正是藍狹界寬故開結取餘下所餘之地如聚落及聚落界望有村不護且言不遍不同古人衣界不生懸不結邊名不遍也僧下此證藍狹界寬須結開眼林其可以肆目也同住即牒云同一住處令既有村村內不得護衣應非同住何得牒之答下謂衣界從僧界上起僧界既言同住故令從本稱之未必下以村來暫不許住故且言未必相可非為永不許住牒之何各或下言衣界本遍攝僧界故牒同住村礙暫隔故牒除村有二即古約體不遍今約緣不遍也障人以結竟僧不住中則犯同宿故僧祇下彼約聚蘭二處通結為一攝僧攝衣界也後下辨廢兩通聚落蘭若俱通結攝衣界也既下既牒除村明知聚落中僧界亦許結攝衣既許故非廢也聚落小即村界也先雖是小後男女多村轉增大也先所攝衣處亦不得攝也為村所侵若先大後小先所除處却得護衣也準下結成上義約緣即村也文乃無橋言此除駃水者是無橋耳又若有橋義亦通許例如攝僧界有橋船者開之下地即男女安下地是村內也或可下是內宇田村去後可以攝衣以先懸結故結住及空者現有村名住村勢分名空古人謂以律但言除村且不言村去後有攝衣界此下一今斥如上即前云本村還出衣界仍攝非時下證名同也以九十中有非時入聚落戒鈔列緣中云向俗人舍仍自注云即寺內淨人家院是證今除村即是除寺院內男女所居處同名村也亦即下不唯村聚是同抑亦是食家等單提中食家者律自釋云有男女也豈非是同宿屏坐露坐皆是約男女住處當知亦即是村也單士女有女無男等善見下既云既不失衣界僧顯衣界外有僧不得以言有所屬也緣相但約有村緣及施者之言為限相故不約作法時通僧界所攝以僧作法時村中有僧亦須集故餘下十五種自然如戒疏解離衣戒中也文下證知為攝衣也説戒等取知攝衣攝食也先解下以衣界為能依僧界為所依故先解能依此則有敘也又順脫衣之法故假本本即僧界而非下大師意在結既次第成解宜次第失未可各結而合解也又體既四分而受反用十誦為隨則亂倫獲罪矣為除疑者恐上云本失未亡則例今亦可言除本喪故又遣也三品上中下三根也非一者上根教行毛食中下教開結淨知量經云知量知足分衛正言儐茶波多此云團墮或云儐茶夜此云團團者食團謂行乞食也溝壑者所墮處也中下之器形報微劣制上行乞食則成過勞進道不前因病致死故曰終喪溝壑也又孟子曰凶年飢歲君之民老弱轉乎溝壑三等亦三根也以上根康則乞食病則開濟豈不收乎穢染曰同宿惡觸等故喜生貪染味香也體乖儀節以上士高節親臨食廚非大人相故且儒中君子尚遠庖厨況出道淨行之人乎此從緣者從除宿染緣邊得名淨耳非對未結時地穢得名為淨外道下如次科引僧祇十誦譏言禿居士舍與俗無別是也多罪即有同宿內煮自煮惡觸等過也集因以貪穢食是下界業因招集苦果也食噉不淨舉果中云報如墮不淨蟲永離上妙香潔豈非惡集以招乎苟未能行乞而但遵護淨足不履庖屋乎不觸食具不經殘宿又不壞生一鉢多羅從淨人受復在中前而修觀進噉者此則末世上行佛子矣播汁上浮還反珠叢云汰米汁也乞多食少翻為外乞令僧食少他物淨作他物想為淨也外責即外議責也兩罪即有宿煮二罪既有如何開他物淨待明即明相現也為人即比丘等大小大即楞伽涅槃為了義教小即僧祇十誦又是明文不許涅槃本制有緣亦開時世飢饉乃至為住正法皆開緣也要須以檀越為淨主故云必施等四法即法四依中依法不依人也聖行即乞食是四聖種行故正願彼經乞食時若得食持當願衆生為法供養志存佛道若不得食當願衆生遠離一切諸不善法諸律初受下謂初受戒已即説四依元行即本行僧常即僧常食也前廢以楞伽後制廢前教也本制即乞食令中下不堪故大下即楞伽等上達之機可依行也分河而飲以小乘各計則分河飲水如序中即別序第一專執四分不引外宗也若望第六終窮所歸大乘至極僧坊無煙則四分開結者是小乘持律也必下若力壯道充依楞伽涅槃僧坊無煙義復何疑無淨厨下此母論許有則接下根宿煮來敘古人約僧界成犯別結即別結一淨地便以大界圍繞也廣如前引母論解也相順言且得隨順於中下之機有所濟也此得下言此得在從順開文失於涅槃制不許結之意也準論準上母論也雖下古約露地大界中雖無四周院宇亦不得同宿煮字有云者非也今下今師約院周生過不成儲畜今師約是不周淨也若約界成正斥上云大界成無院宇隨犯宿煮若爾則不應四種淨地文開四種者何一者籬墻不周淨二檀越淨三處分淨四白二結淨半有下出不周相四分云半有籬障多無籬都無籬障謂露地也非儲積相故開之非唯下不惟自然地上不周故開若攝僧界上不周亦開故向云縱結攝僧無僧坊院不成儲畜無界有院正難上院雖周成不結攝僧界亦是宿攝文也方相合者即四方籬墻周合是儲畜義故招議耳法下本結攝僧界意在取和作法今有僧在界豈不集耶不可相類義自逈異文中下律言未施與僧則顯是他物自許即僧自有者既下處既是他物食因執心薄故曰絶起俗有檀越寄食在界若道下斥上妄判云並為他物淨文意云若言寺是俗造故屬他物淨者一切寺院皆是他物淨望俗推繩若盜損者但望損於檀越事在無作邊計五犯重應無對三寶上結義又若人施佛法者亦應無福以物自屬檀越不屬佛法故無在言無定不結有罪者古謂不結淨地有罪結又難為持護今檀越淨則其理頗長由檀越倚傍故勝得不淨地也佛下佛所立制貴益智解明白不為暗昧魯塞今明白心中親知而反致誣罔覆冒聖之儀軌則增不學無知提吉二罪此外自得內宿內煮根本罪也若言下牒斥不以難護故不結五欲色聲香味觸此五能牽人五情出家之士要一一斷之豈止於食味之一欲獨為纍縛而涉於言議哉寧結減罪者大師意謂寧可結淨地以減罪不可言結難護罪何下推釋以先未結時通界有罪今既結竟故免其過豈非結能免罪乎一有益也善下即持戒之者本懼其犯今結竟食在藍內雖曾經夜食自成淨惡下即破戒惡心故觸名淨謂雖在淨不淨地觸其食其亦自成淨故曰無染今為持戒故結豈非二有益兩失內宿內煮如下如何言若結難護則向謂愚暗不學之罪責是自貽贈之也春秋云自貽伊戚伊是也十八籬墻垣柵塹五種各有半有多無都無三種共成十五此是單歷若將籬等五種總為一亦有半有多無等三自成三種足前共成十八也二合至六合者一籬與墻合二墻與垣合乃至第六籬墻垣柵塹合或更互參則多相略出二十句以籬為頭自成四句一籬墻二籬墻垣三籬墻垣柵四籬墻坦柵塹籬為頭既爾餘墻等四皆然也初成屋宇初成僧未曾經一宿者可行處分何哉由壅滯貪結未多故也隨人即檀越經營人也佛塔下以中國伽藍門皆東向故佛塔廟皆向東開乃至厨廁亦在西南由彼國東北風多故神州尚南為正陽不必依中土法也行來之處即比丘間時經行來往之處以避塔廟故多在西南也以繩量度謂爾許比丘住爾許為淨屋過時彼約不得過初夜四分約明相彼教又急也善見下此約初竪屋持作也若已成即已竪屋了語令知告本施主隨指一處老宿此約本主若無者開召聚落耆老指之彼若不解教之亦得自然中彼約在自然地上結準下僧祇要須攝僧界上作餘下指如前解大師意謂若要依母論存僧界外者當先別結界已上結淨地免於自然上作也依處分者謂解已或要行處分淨者須是荒廢來經二年者可行初一即檀越淨是約他物也下三即不周等淨約自物也餘者即餘三淨俱約處周匝也無法檀越不周本無法故加法第三口法四是僧法別人以一人處分亦成故支尼梵志別名也言羯磨下覆釋上未結羯磨之文也少多三二人皆得七衆在家二出家五也通諸界作法自然也如於作法地上新立厨屋亦可行之二緣一者是病緣二者要邊靜處若觀科末似邊靜自為二緣在邊非靜在靜非邊俱不可也以下釋所以包者厨屋也且儒之高士尚遠庖厨者一則存大人相二則惡聞殺聲也以君子聞其聲不忍食其肉我教則離雜穢之咎也離穢雜則清修之道成大人之相著何莫由斯也奄蒙説文奄䨱也言奄䨱蒙閉也即是相恐人言淨地不唱四周相便言無相今稱房名是齊房而起豈非即是相也四句若僧時到前無緣本雙牒句得在依文以依律文故是得也失於緣唱謂第二句緣非中不牒所唱處是失也欲下大師立理以定緣本某處是緣淨地是本今隨文且依律文也結集非波離時也部主尚云盡所詮相一宗周備豈有缺文當知是後時結集也覺明據翻譯時竺念約筆受時比下比諸結界法中白皆是五句唯此一法四句成之反驗可明為僧造以施主通七衆通僧坊作以淨地散多而僧住有限故曰通也將熟下雖曰不長以將熟故須早結淨地如律云就食者離地物一切通犯未離地者未長足者不犯已長足逢霜露等並是宿限又云下即不得以羯磨結機架為淨地也取土出妄解也謂淨地土取出不淨地中亦是淨地而況淨法依本地起豈得隨土而有今本土若移出何有淨不淨言俱是不淨故隔道兩邊即中間是道兩邊結淨地亦通緣淨約不覺緣故成淨也僧祇並謂比丘不覺在不淨地者成淨若知不淨障僧制僧不得入中又下言同淨地中結又有何患大抵法要簡處豈可同在地結不得耶故下以結竟反例言已惡觸尚只壞食具不損淨地豈可初結在中不得耶又初結與後解二種俱是約法宿煮穢染是約罪豈以結法而坊患有罪乎況法與罪兩不相干今若同處行結縱使律云牒某處蓋是牒相耳雖有兩解且從初義以律云僧在院外遙唱遙結故如上即前云應唱房名即是相也以食下二句大鈔注云故須遙結在中相雜以僧下二句復注云淨地有僧不免別衆不攝別衆罪也若是衆法彼此同犯若是私法僧有不集之過不同戒場不集無過以各自攝故今準方土此方説東屬木木能生火是熟食之象也無施不可言皆可也以順方土故吹氣散吹西南食氣散也陽氣東方屬春陽明之氣盛故北辰爾雅釋天云北極謂之北辰郭璞云北極天之中以正四時然則極中也以其居天之中故曰北極以正四時故曰北辰故下結屬陽位故厨在東爾下引證隨方土所尚不可偏執但不得以晝為夜爾何不開宿言何不開在淨地內宿耶答文可領局僧住食入僧住地方犯又僧入淨地住亦犯豈非偏約免通藍之過歟本制以九十中食殘宿食故宿煮停貯過者今結淨地正為安食故無此過餘二即惡觸自煮是約自造邊成犯或在兩地俱有過也是以不防加法對下造房合云乞法答下説淨為免長乞法為作房有此益故開豈有説乞了而復與罪則説乞何為淨地本為同界有犯故制別結以防罪故今結竟反入同宿豈能防之況佛是一切智人一開一間莫不合於法度知了根機也故鈔序云佛是窮機之人僧唯應藥之器雖非律文以律無解之辭句也雖然以聽解故準説無苦者即準餘翻結為解也其理善成故曰無苦苦患也初一須翻者謂本是淨具遇緣染汙故須翻穢令淨儉開荒儉之世律開八事若乞食易得而私順開通之文者不可縱實有儉難遇於豐時則不許律云若時世還賤故依開食佛言不得如法治之扶持下謂釜器傾溢佐助料理佛開為緣此不須翻後須下説須翻也不入者言膩不全入也有少膩沾者當削刨之六衆七中除比丘也博之即於尼寺俗家沙彌淨人處一石一石更互博之雖得本物以入手兩相捨故船車下律云若在船上載十七種穀上覆以蘧蒢席比丘得在上坐不得名字若為風吹回波漂在岸上者一切不淨必繩篙不離水名淨大車上載諸穀上覆者比丘得坐上不得名字等今言住四儀停住之住四分下即比丘惡心觸淨食令諸比丘得不淨食罪觸者成觸不觸自淨覆蓋僧祇曬穀時必天雨無淨人得自遙擲淨廗物覆蓋捉淨甎石鎮之忘覆食器亦爾壞生一種大鈔云如水陸果子不受而食豈令淨耶謂必無人為作火刀等淨文開內噉即上七事儉故存命開充內噉不開外損謂壞生一種也以大鈔義加故若開則外生譏謗豈非損乎有此濫故八事中不顯壞生故云濫故不顯文開至不顯重明壞生也如鈔指四藥篇緣會儉難故開也緣靜儉緣靜時不許名閉前下釋開意也前門即緣不淨門觸宿是不應而反為之是為不淨應為即儉緣本開之宿煮而不敢為兩乖法網者前乖佛制意後乖佛開前後各犯不應之吉故曰一罪販博販賣交博也治生即以販賣為業治理生命也道人比丘也縱得財來作福設會尚不免罪何況得福持戒比丘不得食等何也以販賣罪重於屠穽者謂屠者止害一生販賣一切皆害不論賢愚持戒破戒無往不欺雖下是體不淨故以下僧若隨順受之則令彼續作不止也不許翻即不許翻穢令淨也以心絶故者無再作義也以食不淨鉢合云以己不淨鉢及食與淨人一心與不作再得心也大師云準此器下殘食令淨人益授有觸失又下準大鈔具引云比丘與沙彌擔食在道中食時與沙彌沙彌還與比丘者若先不共要得食及此不得今言以先共要以先下合有不字文脫明下合有日字皆下證決棄無染者得津塵取微細食分也以異別人下別人觸僧淨器有犯者據受膩者為言又四分諸比丘相嫌故觸他淨食令得不淨佛言不觸者淨觸者不淨吉羅體無下釋器新淨無穢可翻緣去即船漂在陸牛尾離車便成觸染無心謂本無心同宿也未得聞言未得淨地間無文開護謂無教文開二煮成護淨義由下申所以不同前文明相即出蓋時之促也今則反上故曰時長唯下約儉開八事故口法盡形即口法加盡形藥者是通開也如前緣淨即忘誤捉僧家食及扶佐等非難非儉世之難也失聖儀以三來聖賢皆離惡觸故如彼即五百餘年不見漿水正欲趣廁護廁鬼神打不得近智論彼云若沙門福田食以不淨手觸或先噉或以不淨物著中後入沸屎地獄中又護淨經中云由有宿捉等衆僧食不淨食後墮臭屎池中互百萬歲受苦惱竟復各五百萬歲墮豬狗中常食不淨後出為人生貧窮家衣食不具佛告比丘衆僧住止之處作不淨食不足往食如法持鉢乞白衣食是明淨命惡觸下雖開非時七日盡形不顯自知越限如七日外觸還犯七日下由不列開四罪即是犯也未加法前云事同時藥是也逝爾雅云往也可為心師言不可師心也隱括隱占括度也排斥教網言於我大乘本無時節又云不以小節為礙如斯之儔不知己身位地輒擬大聖罪流長劫長劫者拂石芥城也文不了者不顯示三人也故引十誦明之三種人即比丘及僧學悔沙彌也但使一人與同宿則不可食一具戒下至有一具戒人與食同宿則一切比丘皆不得食故曰皆被染也或下恐人疑云衣不説淨亦是別人過應同內宿纍餘比丘亦齊犯邪衣有下是釋疑行違體順者以學悔人雖犯重一行有違而諸戒全體尚淨故同成染彼文即十誦也若下即後制斷淨地通皆不可也故云義通淨地約相下即約淨地之相從後制斷之文但有違教之吉不犯內宿罪也故云無宿可知僧坊內煮顯淨地自通自熟通兩地三人互為俱不可食而後受噉顯有期心若本無心亦開不共同宿此句同鈔中是殘宿非內宿彼注云今日受食已安界外不共宿非內宿也若食不受下是第二種此內宿者又同鈔云宿而非殘亦吉彼注云謂未受食或共宿吉不宿不犯若下第三種也此亦同鈔云殘而非宿吉羅以作己有想故義豈下謂本律雖曰無文豈在通許之限餘二處分作法若僧坊下以食在淨地僧坊有人斯亦何咎有本將有人作無人非有人下二種淨地正障僧也故云不開於淨地二淨即白二處分也在三如上解雖然又須知方犯若不知者非心過故遠下即遠持食入界覔淨地未得明現也非罪不犯惡提罪以體變故不可言宿者若未長足則無內宿若長足者不可言無內宿也就處不通者即僧住處也局二作法者處分并白二結地通於中煮二地之外是僧住處不開煮也若煮成惡即非淨若檀越不同二淨通煮非犯晝夜若晝若夜俱犯七衆下至優婆夷在界內煮清淨比丘亦不得食生熟如阿難溫飯在祇桓門外故知界內熟食亦犯通坊淨即通僧坊淨地皆有自煮也三位即上比丘等三種人也有四加式叉問下此問上尼中有四何閉式叉過授即過食授食行儀即乖聖行儀也以式叉學法漸優故通坊淨僧坊淨地惡觸俱犯有三即比丘等尼中無沙彌式叉亦開所除即不開也膩塵是食餘津通染故令後淨亦成觸也義加義恐是若字本觸即自觸也淨人有一者大鈔云若沙彌淨人但有膩觸仍自注云謂捉比丘鉢已食膩在手不洗而捉僧器是也由下即比丘先受之食被淨人觸故失受令授令淨人捉己食器彼有食膩在手不洗反捉僧器故曰觸餘淨故下結示淨人有此一也若如下即鈔中遇緣失受彼注云淨人觸失如法莫觸洗手更從受之淨人不須洗手文義同也又下此説大僧又有四種不成惡觸一下如俗器中盛食與比丘仰手受取前食雖僧俗執不成惡觸如下即淨人觸失如法莫觸洗手更從受之故曰更加法也如上緣淨不須翻也見淨人者應置地淨手更受如文即四分諸比丘相嫌故觸他淨食令得不淨佛言不觸者淨觸者不淨吉羅三下即十誦持戒比丘懈怠故觸名不淨自種下即下子成菜也子雖成觸菜體變故未可論罪壞相壞上蒼翠等相以正生不已後時色變亦無先惡觸罪也故曰本生故互生如下淨地生果菜長足者抹令入厨互覆者淨地生果枝覆不淨地者從根斷如四分安食具在上並從根斷是也有淨則非犯不淨則成犯若知下即知在不淨地不得食獲罪非威儀也若準五分成惡觸有命外道計春生夏長故自傷物自損也如瘡淨是高勝即淨法多故高勝於彼初人下即使淨人作淨時人果俱在淨地上也不妨餘衆鈔注云餘四衆食以非處即在不淨地故後之二句指上四句中後二句十種謂初五種是淨種次五種淨根文中合云五種淨種五種淨根文略且初五者謂火淨刀淨瘡淨鳥破淨不中種淨此五種中刀瘡鳥淨去子食不中種火淨都食次五者若皮剝若㓟皮若腐若破若瘀爛此應是淨根種火淨聽食四分火淨通五生種故一提壞生種也一越食皮肉吉也如鈔云亦四藥中蓼蘿即蘿勒蓼令蘭者是若僧祗中揉𫝽蘿勒蓼等不可壞種種即子核也蒿草有隔即有草菜所隔也又鈔注云準此蒿草之類子果散落無淨法非謂下是了疏解文也他加行即淨人為淨也一物成非但約一被淨者成淨餘不淨以同一聚故
