body:
  text: 天台沙門釋允堪述釋諸界受法篇第三七衆者出家五在家二也故下釋上四位二衆即比丘比丘尼以同受大戒故沙彌文收式叉雖學六法同受有願如下所問兩部在家即優婆塞優婆夷五支即五戒也支分也下文云若受一戒是名一分具持五戒名為五分淨行信心即受八戒者以前五戒屬盡形八戒約一宿故分兩位報恩經云波離白佛言若七衆外有波羅提木叉戒否答曰有八齊戒是以受八齊法應言一日一夜不殺生令言語決絶莫使與終身戒相亂也問受八戒法得二日三日乃至十日否答一日過已次第更受如是隨力多少不許日數若約成實隨日長短及重受並開九支齊八戒外加一齊也亦言八支八齊即八戒外更帶一齊報恩經云齊法過中不食為體八事助成齊體共相支持名八支齊法是也由下上四位體各同也如比丘轉為女即在尼位攝餘六亦爾報殊女男位別也儀異儀相有差也就緣對彼機緣授法有異故得名諸異持即六法轉根驗謂式叉轉根為男時但在沙彌位收以僧中無式叉一位故有違缺戒者尼篇云若學法犯者更與二年羯磨若犯根本者滅擯犯餘行法但名缺行今言缺戒即缺行也又隨犯一法即名缺戒虗羸虗故稟性不堅羸故操心劣弱更學重與二年謂下即戒是禁約義止制義也然禁約止制四名異理同莫不禁防制約遮止為義也有作禁止善者非也非無一相但收止惡一相且如聖人未必有惡故抑又但解得善戒而不通惡戒也故曰不可偏解別顯鈔釋相初云因明正義戒者性也性通善惡故惡律儀類亦通周故云不律儀也若此立名戒當禁也惡法禁善名之為律樂殺前生行順此法名之為儀若於善律儀反解即是楷模所謂楷式軌模皆訓法也緣相如受五八十戒緣相非具戒緣相也餘可例取韋下熟皮曰葦如仲尼讀易韋編三絶蔡倫初以魚網後搗木皮也王候之宅即第宅也又各有次第也僧傳云第者居也從文謂從前諸界結解之文今次前二故當三也約義由結界故方可行羯磨受戒是從義乃當三也類同空界言空則總包諸有今立一切法義在通收豈以戒法不攝下衆故立五八義在通該五體即五戒之體詮云體相明練謂一戒有違受十不得乃至具戒無由造八反上能持則可通八道矣又五中犯前四則成難犯後一則是遮齊須則而約之書紳紳大帶也語云子張書諸紳謂得一善言則書之於紳帶也選云感贈以書紳冥目言合眼誦習不廣覺也背此背於教也言不師於教而反師於心故下生起今意啓開也梗舌今唇舌呼召難也本文正本經律也蒼雅篇統即三蒼三雅等皆此方字書三蒼三卷三篇李斯造上篇司馬相如楊雄造中篇賈舫作下篇又埤蒼二卷張揖撰廣蒼二卷樊恭撰等今並未究辨辨指此為例如辨辨有寫以辨當辨字且辨周冠名也辨辨別也甄簡也蠲除也文理迥別今並不分轉增後學心昏迷惑翳文言隱翳其正文略指不盡授引也又令人不能辨別自非將彼正文對校彼讀方可解了不然須別作文疏解出方顯如此著撰為世之病故下生今意也謂今師摘去古人之病意在通顯教旨豈在藏隱沉密令他不解方為能著撰乎餘下離上三難外更有文繁共文略共如鈔序所引徑下今但徑直顯示是倫理已故大鈔批文云直筆書通世間法彼談十善以去十惡但報在三界遠出界繫即三界繫縛也集生有本者萬行集生以戒為根本也唯下即具戒三歸義鈔引婆沙論云成道八年以前三歸度人八年以後止三歸興羯磨也為性性即體性教無教者即作無作也以教屬能發業體性無教屬所發業體性無由教示釋上無教義大鈔云不可教示於他也即下雖無教示即假此體能感來報故今下涅槃云戒有二種一者作戒二者無作戒又十住婆沙論云戒有二種作者是色無作非色義例同者多論云教餘經云作作即教也大鈔云教者作也因具因即心也以三業具則發無作能存於有有三業不虗也因即意業謂善五陰簡惡五陰也謂色身是一識等四心是四俱修斷惡故名為善善行斯法皆自於戒也後有即後有之身也論即多論無如之何言魔不害也四念處身受心法也五欲色聲香味觸法也加鬼應法師經音中作磨字後人言磨乃是鬼故於磨字退石加鬼此字先不入字書也又如下引緣證上歸是救護義云唯佛全矣乃至者文略佛有大慈大悲舍利弗無大慈大悲佛三阿僧祇劫修菩薩行舍利弗六十劫修苦行以是因緣鴿入舍利弗影猶有怖畏也入佛影中而無畏也提婆即調達此云天熱以生時諸天心熱知害佛故三逆打殺蓮華色尼得無學故并出血破僧叵訓不可也以業輕則如來可救業重則佛力不禁故致生入阿鼻一劫競化與如來共競行化也遂令衆生疑云為王舍城是真佛耶象頭山是真佛耶雖下佛有威神之力業深障重不契所化故云息機譬若日月雖明不照覆盆之下也解心能改以謂調達非謂不解為名利故因執不回望解邊終名救濟不同闡提人永無信也如報恩經中佛令阿難往獄問調達報言我在此得三禪樂為佛所讚造逆即殺父王也黑繩地獄名也俱舍疏云先以黑繩拼量支體後方斬鋸故以為名以獄受苦時長假先歸信之力故回轉獄之長夜如人中七日也又下準論問曰若調達不可救者經云若人歸依佛者不隨三惡道是義云何將文通之論亦多論下同不名歸者歸不普故若下正難也彼論云有諸天自說我是迦葉佛弟子等別語且各指一佛也非諸天通語也以諸天中亦有歸依三世諸佛故毗沙門北方天王也此釋下大師語意謂下釋歸依三寶名義也因下正出論文答語回轉義亦云返還義以先隨邪師學邪法狎邪侶今悉返還回轉正師正法正侶也一切下彼論云歸於法身謂一切智無學功德五分所成法身器以法身依色身故今害色身即害法身所依處也泥銅像喻色身成法身相喻法身滅諦涅槃即滅諦無為之理也可歸者以自他涅槃理體是一故三諦即苦集道也由諸下先示道諦因修出世道故世間集因苦果則傾喪也誠下結歸道諦病喻苦集藥喻道諦盡諦即滅因此滅故方會真諦即因滅會真滅非真諦若藥不除即存道諦也如筏喻筏編竹渡水曰筏方言云𥱼謂之筏今渡水已而執其筏則其滯也莊子尚云得魚忘筌不但言說意在依教悟解起行也既下言說既是非情未知有何功用邪上下是釋三結謂三諦不除則成結若能傾者則轉歸滅諦無為也鸚鵡能言鳥也雖解學語而不知義人之不解其猶是乎矚對也第一義諦即真諦僧雜煩惱涅槃云如雜血乳未得淳淨未來有僧即俗諦僧以第一義諦僧常在世間故豈未來邪第一義諦僧所依由第一義諦僧依此身得故又下恐一向歸真諦僧故所以存立未來俗諦僧使後尊之不成者以佛出世方說法故此就化儀邊說若約悟法成佛則法在先今準初義故曰不成自不得罪以無所曉知也由不知故得成得罪不成知而故犯違教得罪故判不成多論授受三歸前後差互得罪不成理既是一何有顛倒耶答中相有差別故不可亂也無下分差別相一語但言歸依佛也乍得乍兩向辭也言乍可重受增法不可制具受而却略也而言弗者以音不正故成受三皈以弗佛音相近故客許得成若俱言弗則能所全乖兩不應教故判不成傖吳上助更切楚人別種也今謂吳楚音異耳答不得者以斷絶故隨日或一日或半月皆可謂接機故損葉之喻者案大方便佛報恩經云譬如樹葉春夏則青秋時則黃冬時則白隨時異故樹葉則異而其終始故是一葉例今師者終始是一五趣六道中合修羅道報重即二入之獄除不解即揀上五趣也不解言義及無所知覺者不得齊即不發淨戒但得善耳四分下彼受戒法中云畜生中初受三歸伊羅鉢龍王為首賈人律云世尊受四天王鉢已受彼賈人蜜勸喻言汝等賈人今可歸依佛法即受佛教言大德我今歸依佛法是為優婆塞中最初受二歸依是賈容兄弟二人為首皆下即受翻邪三歸未發戒也餘下此皆說通得者如次科簡知解約解法師語者如上成實等說得戒不解者當準多論等不得戒律中下即故斷畜生命戒中若能變化者殺則犯蘭餘不能變化者殺犯提罪例今解即得不解不得故曰可以類也無戒以是翻邪三歸故不同五戒八戒三歸言下發戒體依緣即言音相順等為發戒緣也無作但三皈無作法起耳能所即能授所受經云涅槃第八卷中偈文彼又云歸依於法者則離於殺害歸依於聖僧者不求於外道為除下古用翻邪三歸當授五戒今特默示云但依前誦無戒等也晦惑晦暗惑亂也計是能授以文言受則屬優婆塞若對師言理合云授故隨列者今亦隨律文列耳經即出家功德經初門即戒德高勝門三施者施財施命施法也財有量言財施有限量持不殺等施無限量也以行化他自既能持復轉教他豈非法施集散財集可行散施能下非清修故是煩惑分親疏故有得不得是惱害以利下即以不淨利施求當來利也惡求非善心也粗惡衣著毛皮食噉糞穢也清淨行施即以戒法施也因此故能生佛果在心持戒清淨心也不在事事即財也第二即簡器堪能門性重以問不盜淫殺故行務務事也始終初受為始盡壽為終不取下言不取有終有始能持不能持便為受戒致有缺犯不如莫受具字目於戒也六月供養令彼六月修供養恭敬之法也目驗下非器不可強授二俱能授所受也虗妄善惡者不堪強受是虗善後致毀污是妄惡其蹤迹不可追及故囑誡慎之也能障聖道言此生無聖果分也由此故不許出家世間戒即有漏世善準下大師斷也二教即化行二教不發具足反顯懺已得受五戒順違俱罪者無明不了故雖順理事而有法執者亦有罪也違則可知是故俱須洗蕩簡略即甄簡除略隨分或能持一二戒者觀機授之此則誡意無遺接機不失生死際約有識神已來涅槃際約後趣極果為言中間所有惑業俱須懺悔不具要須具受五戒不可分受一二等經即善生不言受體意謂生善經中止是奉持二三之語不言得五戒之體如下大師斷文也未融通也如下反例只如比丘是具足戒以法界為量若不能全持可亦名少分戒善耶五師受一謂五戒各師受一皆開若多論不開薄俱羅此云善容以彼好容儀故正言薄矩羅婆羅門種天竺國人也昔毗婆尸佛滅後有一比丘患頭痛善容作貧人持一訶梨勒施病比丘服訖病愈以施藥故九十一劫天上人中受福快樂昔持不殺戒得五不死報無病無夭五不死者一其母早亡遂因後母惡之就母求餅投之餅爐上父見救援投火不死二又嘗就母求肉投於釜內湯不死三牽母之衣推於河內四大魚吞之五會其父買魚歸割其魚腹善容在焉至年長大求佛出家得羅漢道具諸功德年一百六十歲未曾有病蓋持不殺戒之力也若準下薩婆多宗戒不重受罪不重犯依本常定故下證重受也末利西域記云譯為奈由昔施奈得報故彼既重受驗是通開佛制定言不可受一夜二夜也必下不可受一月半月也此則接俗楷定於時數也一日以是一宿戒故乃至略隨日多少獲善俱獲戒善耳歸誓言誓歸依三寶及持五戒故如下云少滿等戒正是本誓發戒之緣以五戒體從三歸下發是屬即囑付戒所歸耳非關上體緣境寬狹薩婆多云五戒於一切衆生乃至如來皆得四戒以無貧三毒善根得十二戒并一身終始三千界內一切須上咽咽皆得三戒以受時永斷故設酒滅盡羅漢入般戒常成就自誓自於形像前立誓受也五衆謂從五衆邊受俱得如後即下云約此問答從他受也回向回自心向他境境即三寶善宿簡異破戒惡宿也古録即往古傳録來成佛龍樹云來成正覺義亦同也言三授點注文也前受既輕恐前受人心容輕法故至三授利鈍謂一說獲者蓋取利根今舉三說通攝利鈍由來即先來諸師皆言後說五戒相時方發體也護行護此五戒淨行所以在歸後說也四依即糞掃衣長乞食等多緣多力要人僧界法衣鉢具足等制後即制羯磨後不得用三歸世尊成道八年前亦用三歸受具結以屬人即優婆塞也約此下言既有此問答顯是從他受也此應即例此五戒自誓受亦應可得觀下無人可準自誓曰進有則反此曰不實戒即性戒以業道不虗故四戒即殺盜淫妄盜殺雞此一句收二戒也人問下乃妄也悉由酒故四逆殺父母羅漢出佛身血惟下以醉則無人信是佛故無破僧亂報即狂亂報也由下言有上多緣故配四性戒同列為五也三十五失第十三卷云一者現世財物空竭二衆病之門三鬪諍之本四倮露無耻五醜名惡聲六覆沒智慧七應所得物而不得已得而散失八伏匿之事盡向人說九種種事業不成十醉為愁本醉中多失醒已憂愁十一身力轉少十二身色壞十三十四不知敬父母十五不敬沙門十六不敬婆羅門十七不敬伯叔尊長十八十九二十不敬佛法僧二十一明黨惡人二十二疏遠賢善二十三作破戒人二十四無慚愧二十五不守六情二十六縱色放逸二十七人等憎惡二十八貴親知識所共擯棄二十九三十行不善法棄捨善法三十一朋人智士所不信用三十二遠離涅槃三十三種狂癡因緣三十四身命壞終墮三惡道中三十五若得為人所生之處常狂駭餘不斷綺語兩舌惡口也如鈔即九十妄語戒中亦號齊者韓康伯云洗曰齊世立齊館即取此義今亦取一分清修義也過中下釋上容有別義此得下今師反片也緣防假名時中有時非時故非時乞食多生惱故所以如來制時食而限非時也何關齊體頭齊是齊一其心也約下且約前八曰戒後一曰齊是一往得義分用以解齊戒之名六日即每月六齊日也即八日十四日十五日等位五戒上以多三戒故處五戒人上坐也故下云約期乃少取行則多先自恣色聲貪著六塵難事即種種留難也緣具即人作人想殺等五緣具故善生下此說受善失惡戒受惡失善戒也多云即多論經說即善生十六分一智論云如聲聞經中常以十六不及一為喻大乘法中則以乃至算數譬喻所不能及為喻由於下釋大懺義也無著即如來戒經云無所著等正覺是也軟將喻五戒無動喻五戒但離於邪淫健將喻八戒功蓋天下喻八戒相同無漏成實彼云若無人時但心念口言我持八戒是戒有五種清淨一行十善道二勝前後諸善三不為惡心所惱四以憶念守護五回向涅槃如是八戒四大寶藏天王福報亦所不及帝釋說偈佛訶止之言若漏盡人應說此偈以偈云則為與我等故偈如疏引既曰與我等故知超天福而與佛福等矣以應泥洹果故第四即受法差別門四天下立世毗曇中佛說偈言是四王大臣八日巡天下四天王太子十四觀世間十五時最勝四王好名聞故自行世間觀察諸善惡奏聞天帝釋行惡帝釋憂行善帝釋喜故令此日奉於齊戒如鈔彼導俗篇引智論云以六齊日是惡鬼奪人命日劫初聖人教一日不食為齊後佛出世語云汝當一日一夜如諸佛持八戒過中不食是功德將人至涅槃下座即能受人隨後師聲後布薩護即清淨持護食已亦得以先作意故縱食已亦得受之觀他因緣即觀能授師也不起犯戒心彼此無染濁過失也縱引十誦皮革即多論自問曰若不得者如皮革中說億耳在曠野見諸餓鬼種種受罪或晝則受福夜則受罪或夜則受福晝則受罪所以爾者以本人時晝受齊法則夜則惡行或夜受齊法晝則惡行故曰半日夜如上說即五戒中云隨力所持少滿等是何以下推與上五戒不同所以五下正釋行足願自謂行如人之足願如人之目目足更資方有所主長引釋相篇云受是要期思願隨是稱願修行多論云若殷重心則有作與無作輕浮心者不發無作又如受後具持可是願行相應依論得戒有受無持但有空願無行可副則不得戒非徒徒虗也言不可虗受也前相即戒相如俱舍指彼解也義門未當第五顯戒相門也前四殺盜淫妄也次一即飲酒諸學處即餘諸戒後三即華鬘高牀非時食修分是修奉之分下二分放逸與修分由下雙釋因放逸故妄著華鬘等及上四戒故曰非事念也離莊嚴釋文中離華香瓔珞等非舊不同未受戒時也若常顯非逸蕩於人故高勝即高大牀臥合云坐破戒不遠則破餘戒不遠矣若無下謂若化第八過中食則厭離隨助二心不起也猒對前四助對後三以節食故自然遠離隨修也有下除非時食外餘八自為戒不同此戒中第八是非時食也本論即俱舍以前云如俱舍分別故增一以前標八戒下注引增一阿含後復引之彼既合之知今有據癡覺覺即覺觀謂尋伺也六念即念三寶及念戒念天施也勝境即諸佛上同亦謂上同於佛也制他開自謂制他妻有犯也八戒亦爾者此誤解耳以八戒自他俱斷故加辛肴即於酒下加五辛正文雖無義必俱斷如論即俱舍彼云莊嚴者除非舊莊嚴不生極醉亂心去取於中者古人去中國之禮法取此土修整巾履之敬然下大師斥古也然此土劒履亦不登王者之殿為敬豈得止事裝束為禮耶亦須從法得中庸平淡為禮之本語云禮與其奢也寧儉故云人不可依也散慢對伎樂慢對高牀八指即如來指計尺六也俱有不必高而復廣單高亦犯排優或作憂謂排遣人之憂愁耳今優是盛見八音金石絲竹匏土草木也去人加口此說倡字體也知何下言既知何不說示倡下是正示若將倡作唱音字義全別若知排憂曰倡義自異也斷食之方法也齊齊以齊訓齊也謂齊一其心天下在天曰神在地曰祇宅其間室宅居也不擇下言不擇早晚在乎攝靜精肅專處為得也儒云致齊散齊祭如在等八難者三塗長壽天北單越佛前後世智辨聰聾盲啞滅障聞思即不聞正法既不聞故無正思惟他惡即文攝取一切衆生之惡慧人即文功德惠施於人正道即正真之道方便經云無二亦無三除佛方便說一乘經云十方國中唯有一乘法此則使一切皆歸大乘極果也三會即慈氏三會度人故經云彌勒疏標慈氏華梵互舉也近下以彌勒位補釋迦故指近佛為寄心耳鳥翅翅必須有二輪必須具兩若但有一致遠莫由大士即菩薩郁伽彼云居家之穢為諸魔行出家之德名譽闡聞居家多有瑕垢出家功行難量等又涅槃云在家逼迫猶如牢獄一切煩惱因之而生出家間曠猶如虗空一切善法因之增長大利機證以心出家苟身出家而心不出家者名字比丘禿獵師也苟心出家而身不出家者真淨行也超世之士也淨名者梵云維摩詰此云淨名舊云毗羅詰新翻無垢稱無垢即淨稱即名也彼經云無利無功德是為出家有為法者可說有利功德出家者為無為法無為法中無利無功德乃至諸長者子言居士我聞佛言父母不聽不得出家維摩詰言然汝等便發阿耨多羅三藐三菩提心是即出家是即具足爾時三十二長者子皆發阿耨多羅三藐三菩提心既下第一句雖下第二句如下第三句形沒即在家滯著耽下第四句初雖欣出創發情殷也終下久參事慢破戒論苦也六情對六塵上起情愛也根收六根唐虗也欲樂下舉禽獸所知方便修道彼所不知既下傷嘆同禽獸也與彼彼即禽獸也龍樹舉造論主也以畜方人故曰極誡封著也四科即財色名見見謂邪見上云見即四邪五邪求利也金鎖孤山云其猶金鐵二鎖貴賤雖殊縛繫義等引出鈔中作勸出有益本緣經云一日一夜出家故二十劫中不墮三惡道廣如彼引一道即出家和忍即柔和忍辱等大願即發菩提心付引文倒應云引付引謂引文付謂付囑四天下即四大洲也欲界繫散心布施為六天因由未有禪定業故不能生色無色也下地即欲界非靜業非上二界業也華色彼自引云如優鉢羅華比丘尼本生經云佛在世時此尼得羅漢果後化諸婦女出家彼云我等持戒為難恐破戒墮地獄尼云墮者從墮久有出期因自說云我昔曾為戲女因著袈裟至迦葉佛時乃得出家由破戒故墮地獄今值釋迦却得出家解脫以此證知若都不出家寧獲聖果如鈔即沙彌篇癩說文云癘疾也暗獄即黑暗地獄為防罪業即十句義中為斷現在未來有漏是也彼文即寶積也知來實苦謂知來世實苦果報決定者必須現世不造苦因如下舉喻以顯更增增甚也如鈔沙彌篇引涅槃云我涅槃後濁惡世時多有為飢餓故發心出家名為禿人見有持戒威儀具足清淨比丘護持正法驅逐令出若殺若害若論罪行且列五種所為貪欲瞋恚愛親求利慳嫉也為解脫者為作也謂下轉釋上解脫義也不下以為解脫者方得受僧次請又除僧次外餘供亦不可受之無心在道即不修無漏定慧也達纍纍縛也戒取結與下見取即五利使中見取戒禁取二種結惑也下業若但持戒而無禪定但生下六欲天望上色無色界名下又望非因繫因非因繫因非道繫道執劣為勝體非出離名下業也若修世禪即色界四禪六行事觀也緣色對色界緣心對無色界即識處乃至非非想等頭藍此外道也坐得非非想定後因觸女身而失禪定為淫女騎頸後再於林下水際所修為魚鳥所喧發願為飛狸能飛空入水食噉禽魚因前定力故生非非想天後天壽終墮飛狸中無出則無有出期多聞如阿難多聞未全道力尚遭邪呪攝入淫席況常常者乎如淨心誡觀廣有所斥我著我我所也下趣如下約鬼趣釋是也由下申所以自愛愛己所作憎他嫉彼所為行諂內心不正也行誑妄作外施也雜惑福與惑雜則罪福不精也故受鬼趣相似果報以因中罪福相雜故果時亦苦樂並受苦故為鬼樂故處勝若能去罪惟福者亦是欲有之報安如修無漏清淨之福乎非實謂諂誑已勝處即多財鬼也九想即不淨觀中作青瘀爛壞火燒等想也大利則若提涅槃故曰謂解脫也未經言未經歷修習也皆下推昔過今下勸誡禽下儒禮尚云人而無禮不亦禽獸之心乎今出家之士不修出家之法誠堪為比觀事即小乘修折色明空等觀謂觀色至一極微觀心至一剎那分別不可得處名勝義諦蘊性既空我人何在則善惡等性本自空故小菩薩者即地前加行菩薩亦可小乘四聖中皆有回心向大之類大非全大已得小果小非全小回心向大異於前後故云小菩薩也修相空觀乃知色相當體即空不同小乘所破方空故曰無善惡等相大菩薩即登地已上觀事是心外塵實無皆是心故唯識云現前立少物知是唯識性以唯遮外境識表內心當了萬境唯一心耳意言下即第六識言即名言謂大菩薩觀此名色境不離內心但是識心語言分別也願樂位即加行位究竟即無學位此加行見修無學四位即大乘凡聖觀中緣於色心事境意識了達外境不離內心但是意言分別也離行離上三行所修外無別也術也行法即道慗禪師所撰凡聖行法中惜乎期文今也則云三心即上性相唯識通下欲趣三乘正道之門必先習戒定慧三學身口收七支也問心以律云無心不犯故執下成戒禁取違下破故墜獄今但順而修之大抵為發定慧作萬善根本不可一向執戒偏修為勝名色五蘊也論云一切諸法中但有名與色若欲如實觀亦當觀名色謂若以色為禪門即修白骨觀等若以心為禪門即觀心無常等緣修下以二乘人未究真體常住但約緣修之慧觀生滅為理也佛性下彼第四云此虗妄觀唯因有果地則無是故此如或成或壞因中則成果地則壞菩薩如者離於虗妄約真性以觀真如此如於因果中二處無異故唯成不壞是故二乘如者逐其定滅去而不來菩薩如者因果恆有去來不異捨因到果故稱如去從果出用故曰如來已上本文今謂二乘未有此用也故曰但見生滅等行心下大師正示故語下示八正道即以無漏智慧除四種邪語攝口業住一切口正語中名正語以無漏智慧除一切身邪業住清淨正身業中名正業以無漏智慧通除三業中五種邪命住清淨正命中名正命此三於八道中屬戒也念下又以無漏智慧相應念正道及助道法故名正念以無漏智慧相應入定故故名正定方便即正勤也以無漏智慧相應勤精進名方便禪靜言此三屬定也正下即正思惟謂見四諦時無漏心相應思惟動發覺知籌量謂令增長八涅槃故名正思惟及見即正見若修無漏十六行見四諦分明故名正見此下言二屬慧也四下釋上思見即於四威儀中緣念籌度惟正慧也道明即見諦分明也斯據法忍言上所配釋是得苦法忍初心已去入見道得無漏時說非內外凡也然下說內凡分通故下引證世上正見即忍位已去無退墮故俱舍云忍終不斷善即相下重釋上論文也正斂下是義約也道戒三即正語業命也道定三即念定勤也又定共戒亦從有也本唯下顯正思正見也發生無作即慧功德也道有即思見二種從道慧故有亦如上言故道定三從此有也三品即攝律儀戒攝善法戒攝衆生戒收緣即戒緣惠命地持云菩薩依戒住戒修聞思修惠乃至有疾患者起悲慜心瞻視供給有侵犯者悉能安忍是名攝善法戒準此即惠彼命也非無下案大鈔云大乘戒分三品律儀一戒不異聲聞非無二三有異進彼應加有異字於遮戒下文方具也寶壁開制者且如珍寶凡夫貪著捉故是犯菩薩反此故開如涅槃隔壁聞鐶釧聲分別是男女相即犯小乘不爾依夏坐則無別菩薩僧也無別者菩薩遮性等持也多少少乞喻吉多乞喻夷如常所明無分別智謂初地菩薩得人法二空證遍行真如於諸塵境性相皆空無有分別實唯一識所變但用善行方便示作殺生等十事為利前生自己又無過失如涅槃說佛為仙豫王見五百婆羅門邪見擊而殺之等是也縱下若但能利他自有過者亦不許行也此下準此初地已上方得用此無分別智故地前不合淨名說者彼云雖為白衣奉持沙門清淨律行雖處居家不著三界示有妻子常修梵行現有眷屬常樂遠離乃至入諸淫舍示欲之過等至下據大乘定惠合更為廣明之以劣機故非復所聞設聞但誦其語約心起行但劣故可悲也縱欲明之具如淨心誡觀又前三種觀門理可明也上下即上據出家無緣等七科並約標題注文引義判釋如前也後人學之可資心用分別位即分僧尼兩位以列也飲乳者四分云因二歲比丘將一歲弟子往佛所佛訶責云汝身未斷乳應受人教授云何教人耶行立立即住也身下攝七夫象鼻垂前一角也樹葉者垂前兩角也褶皺細褶已安緣也高下律云下垂過肘露脅高過腳捻鉢緣律令左手一心擎鉢右手扶緣今兩手捻緣故是非法鎔銅灌咽以因中食不淨食故果中獲此報也其相多者言不獨灌口之苦耳假食假托食故發也儼若思鄭氏云儼務莊貌人之坐思貌儼然安定辭審言語也易曰言語者君子之樞機傲不可長下上舉曲禮中三種文略樂不可極今言欲不可縱理亦同也鄭玄注云四者漫遊之道桀紂所以自禍志不可滿亦出曲禮在心曰志不可滿也道俗知非言此十惡是通制道俗故俱知非也初猶都也既曰知非言其未可陳過也然下正申衣食緣也悠悠遐遠也言向道遠者則未能成其相也因白即白佛而立制也覩壞覩前行壞故興此白二之教以補之短右袂論語云褻裘長短右袂亦執作之便也裼音錫祖衣也紲私列反繫也左傳曰臣負羇紲社預云紲馬韁偏袖衣偏指歸云偏不全也袒肉袒也露一肩之稱然偏衫右邊因先一邊露故今用覆之強立偏衫之名今兩袖衣號偏衫者西土本無蓋元魏宮人見僧祖膊不以為善遂施此衣綴祇支之上又云偏袖衣小袖者非也指歸云今詳西土無袖蓋右穿頭著者綱大繩也系下計反繼也說文云繫也靴釋名云本胡服趙武靈王所服屨居芋反字書云麻曰屨皮曰屣黃帝臣於則所造事別式樣不同也盡集須大小俱集也儀軌和成今行禮具足是威儀中教法也蓋須和敬方成今法闕師資者言此時不可敘師資之禮也以為能秉僧勝故也四僧即偏祖脫屣右膝著地合掌多種彼引四分至上座前脫屣偏袒合掌手執兩足云我和南義云度我而作禮也出要律儀云和南為恭敬也聲論云槃那𥧌此翻為禮此云下即指注第三位也多少於上或別禮下但總禮故曰任力也三輪即左右足并右膝頭也至地若輪也距可也腿吐猥反欲作腲誡行注想上說身業此可通收口意言口說誡約之行目注心想無敢暫移也自下斥今人叉手如新歲經云佛從座起自叉手向諸比丘悔過等指掌齊合則束身心不散也今時後生對諸聖前或攘臂張目籠袖戴帽設復合掌又拳十指一生無訓自我長慢是故聖人作禮以教人使以有禮知自別於禽獸儒禮尚然況佛教乎後學誡之律據從緣今有緣乞故禮也禮有從俗正云禮從宜鄙玄注曰事不可常也晉土陶師師侵齊聞齊候卒乃還春秋善之使從俗亦事不可常也牲幣之屬則當從俗所出禮器曰天不生地不養君子不以為禮鬼神不饗僧下言僧無別僧則假別以成僧用反依敬者餘時弟子却敬師也世下上引禮經為況則不足為疑也具有兼者律中簡和尚為具戒亦有兼於十戒和尚剃髮和尚也然二師行德三種一簡年十歲已上二須具智也三相即單白白二白四也若據俱有白和之義即不須分但下釋分所以大小者受懺事大也作房分具行舍羅等事小也有皆結過僧不和合背叛布薩遠出亦犯故但以一白和告也差使即差教授尼差人守功德衣差分衣等處分作房等受懺大儀即受具戒法學悔法也治擯即舉治擯謗等法綱文乃局者單白白二白四三位不同名文局各有辦事表和之理號義通但白下此約白與羯磨各主一義名局單下此又約辨事表意是同故曰通也結集據波離翻度據曇諦等雖然亦當時佛意也通曰羯磨一百八十四法俱有辨事之義同名羯磨不同古師五十名別法也如上即前體相中分成八種是也答下上約事有小大乃有八種故對首但二今若細分一中有三也下下但心念法是下中對首心念下上衆法心念也上下單白是上中白二是上上白四是又一位中約事輕重自分三位可以情求上以下重揀上偷蘭分三品今即中品也小衆四人也揀上品偷蘭大衆懺依律即四分下文又十誦初篇生重此是近方便謂身口相加未得暢遂應一切僧中悔若初篇生輕二篇生重應界外四比丘少衆悔若僧殘生輕應一比丘前悔其懺法與波逸提同今云問邊人謂受懺者問邊人許可無則不得亦與懺提不同即歸中上據下引例釋意謂說恣既不開別衆懺蘭亦不可別懺故曰說恣應上以說恣亦在衆法對首中故此別釋中品即中中以但三人只問邊故通對一人捨財還衣及與正悔通對一人故在中中悔蘭必問邊人故歸中上界內者一切僧中悔也界外者四比丘中悔也界亦通收者此與說恣是同不得別衆只由中品蘭須對多人說恣客對一二故有差降也聞成對首者約集人說恣客對一二故有差降也開成對首者約集人不滿故開也據理本非屬中中如何例中品蘭耶以中品蘭二三人邊亦通悔故既通得成應非中上也悔必衆人即小衆也四分滅諍中小衆者二三人也縱有四人上是小法以懺無單白之理初二篇十誦云若初篇生輕二篇生重應界外四比丘衆悔若僧殘生輕應一比丘前悔其懺法與波慧三能勤教授弟子有七種共行法更相攝養如和尚法中慧命增長法身慧命也形纍形命患纍也親疏親在於法也十誦和尚有四種與法不與食應住與食不與法不應住法食俱與應住法食俱不與不應住不問若晝若夜應捨去又僧祇云若和尚能除貪等三毒此名醍醐最上最勝不得離之取勤即取勤教授弟子具下若具可以統攝於人由此義須和允於僧然後與法二受即受十戒并具戒德退德行容有退者故須別請多緣慈戀緣著父母妻子故起慈戀今且令止息此小慈大哀哀亦慈慜之稱異上文耳於空奉散意在供養羅睺也為敬其始故問羅睺久沒何可供養將以下答言報身雖盡法身在故三味無上誦經等三種滋也四山成論云行者見死有大力勢如大石山從四方來無逃避處多猒求樂言多猒苦好求樂耳慈許初出家時云我行慈許拔一切恐有後退故先說苦事等三等取誦經勸助衆事諸蓋即五蓋也開二為病比丘緣故開食粥也非常途開四十二章經云日中一食樹下一宿慎莫再矣兩類今時末法兩頓尚希嗟乎淳風既喪正教陵遲衣競鮮華食慎心腹略無少頃留心學道如此之儔出家何為也思之味重禪坐之重也倚臥即邪倚而臥欲使不久耳分下謂分辨星位行度及月次至某處當起等故蘭若比丘開讀星經也尋起緣念即經中初夜後夜亦勿有廢常運誡在勤修不可中道而劃使浮溫散亂也問對無戲僧既通知彼來問時對答不差也七日觀其所由也事鈔即沙彌篇通別二知即通和知別告知二緣即通白緣別告緣成問答即上問對無虧僧義僧以和為義頂髮表除有預一地惑惑既難斷無漏方可斷之今假和尚表法為優也四邊即下四邊髮表除下八地惑此通有漏故但假闍梨表法又次也今屬和尚故曰不在羯磨但為沙彌緣中正為巧師兒比丘輒度有不知者故曰使知下結僧罪以尼律下文制僧同犯故先與下今時器劣若先與五十戒者恐沙彌因有毀犯能障大戒不生今但可受翻邪三歸而己亦適時之變沙彌戒歸等者以下三歸文方云我今隨佛出家故經列者案大鈔住清信士度人經授者傍教今即十戒闍梨問遮文略難也謂亦須問十三難十六輕遮今時不行或能行者則令正法久住自他陷者沙彌不得十戒為他陷和尚闍梨各結不學無知是自陷三境即佛法僧也所重即我今隨佛出家親依某甲為和尚也答可知者前文對五戒亦有此問彼答云五戒初離邪緣故以正隔之今八戒於五戒重增勝行復何須也又十戒自對別部邪師故簡又與上不同也物養即五德為度人故七支身三口四大小通結五衆罪故如下例如羯磨受後但樂四重也四重之外既有餘戒十戒之餘豈無別犯若爾與僧何異答結罪在第五篇故與僧別問下意云何故羯磨受具而列少三歸受少而列多耶下篇即僧殘等易有陵犯也有文即戒本及廣律文闕文少文示也以沙彌學非廣故人畜取生類形像為義此非解也如下古自引證比擬大師謂古人約戲具與藥器俱是逸蕩之物故取為比量解之然下出正義生色天性黃色不變也似色謂銀可塗染亦似金也唐梵兩舉若據西域呼金㕧剌拏又云蘇伐羅又云捺陀呼銀為阿路也又云惹多此五印度正音也及翻梵至諸差胡言音涉漢遂翻㕧剌拏為生阿路也為似及至漢地故翻金銀今合而言之乃曰生像金銀當知是胡漢兩音耳故大鈔云生像金銀胡漢二彰本梵下謂說銀為像同此似像義也蒙俗蒙昧庸俗諸有即二十五有出要即出離惡道帶持之者如夫子佩象環五寸天子佩白五詩云將翱將翔佩玉瓊琚文云青青子佩注曰佩佩玉也皆弃也於義既非故指為誤反形易性者在家則束髮出家則剃除又在家恣己所欲出家捨離愛染故形性互相反也所重即羅綺等所輕即糞掃衣也靡儒云美色兩捨親疏釋注中適莫問疏本已捨今何言捨答親謂六親踈謂外黨對親得名非全不識又親故捨愛踈故捨憎故言兩捨死而有已即為法已軀心亦足也志大即志求大乘極教即大乘也於他釋度人也斯德指上五德始終始則發慈心出家終則求大度物非專小學意在通行故曰五德物養猶使物之長養也既有是德則人天以為師範也受體即十戒等體形服使護體以應法服也段食謂粗段食起世經云閻浮提人等飯豆肉等名為粗段食舊云摶食取義則𥤲觸食如眼根對色塵是也又如戒本觸食諸男女各以為食也卵生多思食起世經云若有衆生意思資潤諸根增長如魚鱉蝦蟇等識食識能持身亦通八識也此食最細故說上界又起世云地獄衆生及無邊識處天等皆用識持以為其食兼者通對餘道說也且如人中思食者昔有一人父時遭飢饉欲造他方自既飢羸二子嬰雅意欲擕去力所不住以囊盛灰掛於壁上慰喻二子希望多時延命有人取囊為開子見是灰望絶便死識食者成論云中陰地獄無色衆生入滅盡定者雖無現識識得在故亦名識食若瑜伽師云識以了別為義謂有漏第八識因餘三食勢力所資便能任持諸根大造令不滅壞有長益義通第八阿賴耶識為體以能任持身命不斷壞故若經部中通取前五識并獨頭意識為體本非非無也謂無願為言不用修行也故以施之大鈔中具出破相擬輒賊住者問之餘九即下九種皆擬賊住故名色一蘊是色四蘊是名心不可見即識受想行既無形質可見止可以名召之初始識支俱舍云識正結生蘊謂於中有未位才沒隨於胎卵涅化受生之時一剎那間有了別義名之為識即染謂赤白二精不淨染分以持其識從託胎識支後一七日名揭邏藍此云雜穢狀如凝酥者是歌羅邏與揭藍梵音轉耳含心即初識三十八轉如阿難問經佛為難陀廣說胎相在母胎中凡經三十八箇七日初七日如薄酪乃至三十五七日人相具足三十六七日生猒離心不樂三十七七日生穢獄想三十八七日風力所轉頭向産門伸兩臂出每一七日各有一風吹令變易風各有名具如彼經是則三十八七計日成二百六十六日計成九月所以少四以半小故故曰九月便生問世教及經並云十月何故唯九答九即十也何者經涉十故如月初一日受胎者則定九月二日已去日數滿時即跨至十月即受異名者言是三受之異名耳假事痛癢想三事為三受之目梵天因即破梵天為因外道也以下申彼所計創下下欲界也佛法下陳今正意本陰即五陰中識受想三心也三想想以分別為義蓋對親怨中庸境生三想故因此三想生故見親起樂受見冤起苦受見中庸生捨受三受既生則起三行謂對親起貪行對冤起瞋行對中庸起捨行由行以遷流造作為義故持犯云流入行心方成別因造善作惡自此而起由此故淪墜生死經歷惡道也苦集苦為有漏果集為有漏因故曰世俗因果又滅為出世果道為出世因無諦者諦以審諦為義為衆生不能審諦觀察故曰無也諸聖反此故有諦也涅槃彼云善男子所言苦者不名聖諦何以故若言苦是聖諦者一切牛羊驢馬及地獄衆生應有聖諦乃至是名為苦非苦聖諦廣如彼經第七卷中為在色中下是彼所計或云我大色小色在我中色大我小我在色中乃至云我大識小識在我中識大我小我在識中計下彼外所計若云在五蘊中則隨陰成五我今一一推求五蘊本空我依何住如此觀之便了人空相似若能如是觀者此亦相似聖人之類也如有下示外執也一識通行通應六根門也外計云如人打南窗時猴即至南等佛下正破若是一者於眼中便合聞聲嗅香等今既不爾故知非也逆順逆觀過去順觀未來各八萬劫不見有生死之身此外觀所不及便言八萬劫外生死自盡涅槃自證不須勤修也如轉縷凡彼舉喻也如人以線卷一泥丸從山擲下線盡泥止身亦如是佛下正破謂佛法須在精勤方盡生死煩惱未斷安得無身故七覺支中有擇法精進等覺支八禪四空定并下四禪等四等取納衣樹下腐藥等八等取業命見思勤念定也妄計下即破色無色天計涅槃外道也非想即無想天在四禪也有頂即非非想天在無色界頂謂此二天定心想不行見其沈沒謂是窮理盡性涅槃也夫下以涅槃體寂不為諸相所遷今是三界輪回之處正是衆生所居何得指為絶有涅槃之法諸人即十一切入亦名十遍處以外道所計空為至極故緣色青等色以住其心等但是下如觀青遍處時即取少分青色觀之使遍一切處皆青也乃至觀空亦如是此皆是自心運用周遍或增多或減少本無實境但唯一識何得執空以為涅槃智下外道修世禪但破欲色二有如渡小海不能破無色有如不能渡大海也由彼不破我心執空為病故有在令心有所詣也持說下即持衣說藥受百一及長衣說淨等輕位即吉由下釋結輕所以廣下大鈔云沙彌行事法用同僧羯磨一法不在數例自餘衆行普制同修說戒自恣既是常行不得別衆約界盡集自然遠近亦同僧法此方無譯凡譯有二種一者正譯二者義譯今謂無正譯耳以此方既無大聖出世復不度人出家無以將此方之事以正譯之故但從義也如下指二方之有也中方即中印也俱句即以義翻義以名翻名也煏皮逼切芻木西土草名也具四德五義可以比出家之土也令魔怖者魔恐減其眷屬故所以魔宮震動也本志即出家之人志在怖於四魔故如上即翻邪中下界頂住即波旬也身所聚謂五陰盛魔也以色有但壞心則不停故曰念念壞三毒貪瞋癡也劫掠力尚切奪也本言道士晉宋已來召釋子為道士道人故習鑿齒與謝安書云來此見釋道安故是遠勝非常之道士恨足下不同日而見李張即道家之姓治頭言能梳髮導氣也鬼卒言能驅䇿神鬼也皆彼之名耳後下即朋類衆也濫上濫釋之道士名也釋改之為道人不妨下以五天異道亦稱比丘及沙門也故向云不問邪正修道之士俱稱比丘今且據此方外道不稱則可專其一號知是事佛之者戒本即戒疏中以三義譯之又因果有三名在因名怖魔乞士破煩惱在果名殺賊應供及無生也尼五即八敬遣信等如下自明一輪者見思兩惑其猶二輪能運衆生入於惡道雜必云須陀洹雖有修道斷不淨業無見道斷不淨業無對事故不墮惡趣具不具故如車二輪具有所運隨一輪壞則無所堪今初果人方斷見惑八十八使全未斷思故曰一輪二十年毗奈耶云如百歲苾芻蓋所出不同八事三衣鉢坐具漉囊針線斧子惑盡見思俱亡也亦名上法受律下迦葉與五百弟子詣如來所世尊為說布施持戒訶欲不淨迦葉等即於座上諸塵垢盡得法眼淨佛言未來比丘於我法中快修梵行得盡苦際即名受具足戒也三語即皈佛法僧也義鈔云三語者積德非遠不感大聖託彼小聖故曰羅漢也三年因億耳比丘三年內待十人滿為初緣後至佛所乞邊方開五事斯一數也赤縣河圖云崑崙東南方五千里號曰神洲亦稱赤縣言赤者一云以帝王南面萬國朝宗南方赤故或曰取中心之處心府必赤帝既居中取象正與曹魏即魏世曹氏簡後魏拓跋氏並下事鈔云迄至曹魏之初僧徒極盛未稟歸戒止翦落殊俗設復齊懺事同祠祀嘉平即齊帝芳時初改元正始後更嘉平凡得五年法時中天竺僧曇摩迦羅此云法時誦諸部毗尼以魏嘉平年至洛陽立羯磨受法中夏戒律之始也準凡十僧大行佛事改先妄集出僧祇戒心又有安息國沙門曇諦亦善律學出曇無德羯磨即大僧受法之初也僧傳即梁傳也僧多信少者此約所受者前云中國僧多善心浮雜等據機悟漸乖故限於十破名是通如初果善來亦破見惑故應可名破結人法如云三語語是法授是人義鈔云有人不立上法得戒何者一無上法人二無上法教若下古人立難自通答下意云即名具足者是在羯磨前得羅漢果設年不滿二十由證果故可以替得不妨是羯磨言下發戒全無下言律中但有數胎閏一切十四日布薩且無羅漢足滿二十之義後成反古人之前成也第一受五分云童子迦葉不滿二十受具足戒後方生疑不知云何以事白佛佛集比丘僧問曰童子迦葉有所得不答言得須陀洹佛言此人乃是第一受具足戒然不名白四羯磨受以此證知初果尚然況復無學乃下即小年中自用胎閏等且無得果開也以無弘道言女人不能弘於佛道又遠於化益故抑遏而未度又若度者恐減五百年正法故後還舍衛即愛道等祈聽處祈聽許也時為三請即阿難也如來宣八敬之法村與阿難陀難頂受尊教授於愛道愛道聞之遵此八法作奉行之意即於阿難言下發具足戒僧尼各十先受本法雖在十人後正受戒大僧言下發故至二十人也姿貌下謂端正女人欲往受戒賊專伺候故特開爾返待使尼回告告前受者方發戒也曾皈公羊傳曰婦人謂嫁曰歸減八年即十二可得戒也有恐即有恐怖處也若下今斥制僧以戒下亦制僧故豈僧開而制尼一衆受以此方先未有尼故故師子國尼八人來云至宋地未經有尼何得二衆受戒是也十一衆即十僧并愛道也求那跋摩此云功德鎧一十一尼以先有師子國尼八人又往中國請尼俄而師子國尼鐵索羅等三人至京師足前成十一人據理但十尼即得也便請衆鎧為師壇上為尼重受當元嘉十年也善來破結加持律者問意云中國十人不言持律邊地五人言持律者何四人要滿能秉僧六人但可足但可足數不必精練依緣即人僧界等恐約數成恐言但約數成五便得故持制以持律為約勒之辭也非謂中國通於持破十人互望無破戒事可以省也能所俱齊者能教所教業成俱齊結豈待殺竟報方犯罪故曰殺盜不爾思具即思願具足耳此局法緣等者如善來非三語三語非破結是法局也又善來是初果破結是四是緣局也為五善來破結三語八敬羯磨各有當體也含六僧即五衆十衆尼即遣信小年義立二十人也通於僧尼皆列八種也一名字比丘乃至第八白四比丘六七破結善來二比丘通尼如來下此引百緣經也又賢愚經云蓮華色尼佛唱善來度相違與上多論不許何相違耶如下引論意有通局多下大師和會也通於僧尼亦有上根精進惑盡證聖者尼未有心即未有出家心也制斷三歸令與羯磨故十四年如來成道滿十四年尼方求乞出家此時三歸已廢故尼無此一受反通言僧若通敬尼者則亂大理也兩報即僧尼單者僧一衆受但一白四曰單尼二衆受三番白四曰復良由機有利純僧有淳正薄劣故也五千千字誤義鈔作百彼云佛滅度後五百年中解脫堅固可無一人八羅漢果三達智喜見約了達三世法也二時佛在佛滅時度仙付法藏說阿難恆水度五百仙人唱言善來頓成阿羅漢果此約阿難臨滅五百機發故耳非是常途通例南洲即閻浮提佛降迹故餘三洲不到故無此二受三天即東西北洲三天下也九億即九億家三億家見佛聞法三億見而不聞三億不見不聞不妨下有緣則處處普現又何但為三洲乎今且據此宗報身降生示迹在南洲耳諦論法化之身何剎不通非不如上言若餘方非見聞者即不如上具四緣也通三不疑者義鈔云如來一代三天下中可無一人八羅漢果羯磨因擯頭往餘二洲故得有也未𢷤謂三語廢後方擯賓頭故不通餘二洲義鈔云出耶尼是也加起僧坊謂十誦與上文並同唯更加言起僧房舍為異多下彼云婆提東洲名也亦因擯賓頭盧往大作佛事乃至有四部衆等北下以北方是八難之地化所不及故五受俱無也七種者五八十具禪定道俱戒也大戒即大乘戒望前次第故曰漸受又對小乘故曰大戒當局自通謂破結善來等各別名局同發無願曰通小戒謝以是盡形受故局報盡也與期即本要期亦名為願期願盡形戒亦須謝引五下此師似成實體內增起全成菩薩戒也故前云勝者受名餘四即善來破結三語八敬漸頓之義如下自明三種即五十具也不破威儀即下諸篇輕戒也若犯上篇盜淫等戒定是邊罪無由進受故不在言但說威儀也如下業雖有青黃等色蓋隨時受稱且本體不失也故言者約人故分三得體但是一以皆是形但無作又同是非色非心為體故多論下證上三人雖有三品實一無作乃至五戒文略若捨十戒也彼論云若言我是優婆塞非沙彌即失十戒五戒在若言在家出家一切盡捨我是三歸優婆塞三種戒俱失三歸在文列五戒即愛道先曾受五戒也後受八敬豈非是漸未下言未必先曾受五戒也出六如前具引不解此座即云我若不成正覺者終不破膝起此座色森衆多貌問與上無師復有何別答前約不對他此約自立誓問佛在因時得戒果時得戒答若依僧祇如來果中得戒故律云佛在菩提樹下最後心中廓然大悟自覺好證是名具足若依婆沙論亦果中得戒以自言不起此座而得漏盡之時果戒俱得若依五分因中得戒故彼律云二月八日夜半逾城乃至在一須摩那樹剃髮著袈裟即言我今已獲具足不言受也善見亦因中得戒以寶衣易麁布僧伽梨已披衣剃髮竟即言已獲具足四分無文若以義推瓶沙王見菩薩著袈裟乞食爾時未成道故知因中得戒然此太子王宮非實生雙樹非實滅不可定言問戒本防非佛既惡盡何以戒為答戒是功德法若當無戒乃至惡盡功德不滿是故須爾問佛名自然弟子號上法者答佛因不假師教會自然理得盡智故弟子不爾假師教也拘鄰亦名俱輪梵音轉也即陳如等五比丘準多論得見道也又善見云如來慈悲舉金色手以梵音喚應時得度衣鉢自降皆悉善來二論不同須陀耶彼經須陀品云佛在摩竭國波沙山中清旦位靜室起在外經行是時須陀沙彌在佛後行佛謂沙彌曰我今問義曰有常色及無常色為一義為有若干須陀白佛有常色及無常色者此義非一也所以然者有常色是內無常色是外以義故非有一也佛告須陀如汝所言快說此義乃至告曰今即聽汝為大比丘廣如彼第二十二卷中此則與佛對談得戒義鈔問曰何故尼中無論義得戒答性多煩惱難可校語不得與佛對談稱可聖心故七歲見論第七云佛於富婆羅彌寺經行問須波迦沙彌胮脹名或色名此二法者為同為異須波迦隨問而答佛問須波迦汝年幾答言我七歲世尊語須波迦汝與一切智人並善能答問正心我當聽汝受具足戒是名答問得具足戒三歸歸作語字為正以語即通歸不通也八重下云重法即八敬也五十八即五受十受八敬三人一受亦三人為二引也具文即具歸三寶也有缺即一語二語同歸言同一體故所謂佛即是法法即是僧戒疏云唯約心體義分三相如涅槃說三寶同性等二受即一語二語受也如何局此此一與四分同何在六局中收耶答且約見實名異故分為局若據取果證無學是則名同故曰宜知在通七種彼第二云見諦得戒唯五人等佛與陳如等五人夏安居至八月八日得入見諦成須陀洹餘更無得者自誓唯大迦葉一人得餘更無得者八法受戒唯愛道一人得更無得者善來三語三歸在世得滅後不得白四羯磨戒佛在世得滅後亦得又優樓頻螺迦葉兄弟門徒一千人舍利弗目連等門徒二百五十人合千二百五十人俱是善來度三語如疏下科所引度人數目白四一度繼續三寶作無邊利益七種戒中最勝最妙此文指上多論加結加後三結者名曰三歸但言歸依佛法僧者名三語也牛呞詩音即憍梵波捉此曰牛呞亦云牛迹以過去為牛故口有牛呞足有牛蹄之相呞說文云吐而噍才笑切嚼也兄弟七萬句絶彼云兄弟七萬人詣諸比丘諸比丘各盡三語受戒本無結歸無後三結耳無師彼第五云謂如來自誓摩訶迦葉見諦謂五比丘問答須陀夷也三歸彼云謂摩訶迦葉及三說也五衆邊地律師五衆受十衆中國十衆二部僧尼二部受八重謂摩訶波闍波提等五分多論只通愛通一人不通五百女人上疏云五百女人聞敬得戒此又通也部類不同遣信因達摩提那廣如彼文一教授者見論第七問曰何謂教授佛告迦葉汝應如是學言我於上中下座發慚愧心應聽一切善法置於心等大德迦葉以教授即得具戒是佛神力得也謂下大師會上即自誓受義也三歸問答如前解重法重則敬重名故會云即八敬也遣使八語者謂尼中本法一白四僧中正受一白四故曰八語即二十衆故曰僧尼俱白四也五下是比丘所行白四建立母論第一卷中正名上受具足何故名為上受具佛在世時不受戒直在佛邊聽法得阿羅漢名上受具故會云即破結也今言建立者彼論又云從今已去聽汝等立善根上受具故以得名也敕聽彼論云佛聽受具即下彼論云爾時佛在舍衛國比舍佉鹿母園中堂上問蘇陀耶沙彌義沙彌解義如佛所解稱如來意佛即告言汝從今已去若有疑惑恣汝來問亦即無戒故名敕聽受具雜心下出彼第三卷中自起謂佛也即上自覺受受師謂摩訶迦葉即下會名受師教而自誓也起升離生謂五比丘受也須陀指初受人即上問答今謂因問樂答也各下列人者彼第十四云毗沙師說有十種得具戒法一自然謂佛獨覺二得入正性離生謂五苾芻三佛命善來謂耶舍等四信受佛語為大師謂大迦葉五善巧酬答所問謂蘇陀夷六敬受八尊重法謂大生主七遣使謂法授尼八持律五人謂邊國九十衆謂中國十三說歸佛法僧謂六十賢部共集受具也疏中謂簡通局故與論文列一二等次不同也有四者一善來二三歸三略羯磨有三一善來二遣使三廣羯磨獨下謂獨覺有量功德至得諸佛世尊無量功德波羅蜜至得等前七種合有九種圓德也先白衣聖人即在俗已證初果者方感此度善下牒釋如文稍薄稍漸也先誦佛語即依教持誦及習善來之法止由機劣於前故於羅漢前三歸受也遮法文略難也秉白但秉一翻單白即發具戒此雖劣前而復後廣羯磨今所行白四也無下無三歸及略羯磨二受愛道即知遣使是八敬一受以阿難為傳使故依他善來依佛三歸依羅漢略廣通聖凡此結歸上了論依他兩字言下又牒上論圓德二字以次示之最後生即最後身也性得自性中發故非因他受苦法忍即見道中苦法智忍等前十五心無漏聖慧時也盡無生智此一約證無學後也具而言之有盡智無生智且盡智者有二解一云從金剛道後與無漏盡得俱故名盡智二云此盡智是解脫智此解脫道中一切惑染皆已盡故名盡智言無生智者即從盡智後有智生時一切煩惱更無再生之義故名無生智又約四諦而說即我已知苦是盡智不復更知是無生智我已斷集是盡智不復更斷是無生智我已修道盡智不復更修是無生智我已證滅是盡智不復更證是無生智三種功德即菩薩戒出家具戒無生智後一切佛法也又三祇功德亦圓滿也當部即了論此局他部各望所出律論為他部此通他部本應四分也有是法彼論正作戒自得者即自進修破結得戒論云見諦得戒以根本而言以佛說法故得證聖諦名從他得以義而推自以忍智明照真諦而得具戒則名自得初從下說初意後證下說次意藉緣如羯磨要藉多緣以法須白四人須十僧又多論云若佛在世若佛滅後一切時得故曰通末代也三歸反上假緣又少梵網下證從他為勝蓋無師故開自誓因下反上句勝髮即波斯匿王末利夫人女開佛授記已恭敬而立受十大願一世尊我從今日乃至菩提自世尊至此貫下九句於所受戒起犯心二於諸尊長不起慢心三於諸衆生不起恚心四於他身色及外衆具不起嫉心五於內法不起慳心六不為自己受畜財物凡有所受悉為成熟貧苦衆生七不自為己行四攝法為一切衆生故以不愛染心無猒足心無礙心攝受衆生八若見孤獨幽繫疾病種種厄難困苦衆生終不暫捨必欲安隱以義饒益令脫衆苦然後乃捨九若見捕養衆惡律儀及諸犯戒終不弃捨我得力時於彼處見此衆生應折伏者而折伏之應攝受者而攝受之何以故以折伏攝受故令法久住法久住故天人充滿惡道減少於如來所轉法輪而得隨轉見是利故救不捨十攝受正法終不忘失何以故忘失法者則忘大乘若忘大乘則忘波羅蜜已上證因強心猛豈在從他及多緣也舍利錯授人法者涅槃二十二云我昔住於波羅奈國時舍利弗教二弟子一觀白骨一令數息經歷多年各不得定以是因緣即生邪見言無涅槃無漏之法設其有者我應得之何以故我能善持所受戒故我於爾時見是比丘生邪見喚舍利弗而訶責之汝不善教云何乃為是二弟子顛倒說法汝二弟子其性各異一主浣衣一是金師之子應教數息浣衣之人應教骨觀以汝錯教令是二人生於惡邪我於爾時為是二人如應說法二人問已得阿羅漢果威儀不淨鬘髮不落無袈裟著身等二人佛及阿難也從佛佛令敬僧也佛於下彼論問曰佛得稱作和尚阿闍梨不答曰於弟子有和尚阿闍梨義佛不為人作和尚阿闍梨是故不得稱也三歸下彼云從諸比丘三語三歸受戒稱和尚阿闍梨不答曰不稱和尚得稱阿闍梨八敬如大愛道八法受戒亦得稱阿難為闍梨不得作和尚以各但一人秉更無餘人故論自問曰佛何以不為人作和尚阿闍梨答曰為平等故一下佛平等心一切令盡事無偏故二下若作和尚則有親踈既有親踈則有鬪諍三下若作和尚外道當言沙門瞿曇自言慈等一切與一作和尚不與一作和尚與凡夫無異四下若佛作和尚則墮僧數如受具戒三師七僧十衆受戒若作和尚則入十衆若入十衆即墮僧數無有佛寶若無佛寶不成三歸五下若作和尚則無佛不壞信餘三如別六下若作和尚則無念佛七下若作和尚弟子有病及諸苦難則應營理供給所須滅前人所有功德如昔一時有一比丘應得羅漢而有轉輪王業障不得漏盡佛欲除其障故即為比丘正富羅轉輪王福一時滅盡即得無著以是因緣故若作和尚有損無益八下若作和尚弟子有病應當看視飲食醫藥種種所須豈是自在法王所應為耶九下佛法流布有近有遠若作和尚諸有弟子若欲受戒不問近遠一切盡來則令衆生多受苦惱若不作和尚闍梨則令諸弟子無有如是諸苦難也十下若作和尚佛在世時理則可爾若佛滅後誰作和尚以是種種因緣佛不為弟子作和尚阿闍梨也我即在者即云我在僧數也今何云不在答下有兩種僧在應供而不在羯磨故下證不在羯磨僧令三寶位別故
