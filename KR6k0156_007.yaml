body:
  text: 天台沙門釋允堪述聖法由此戒法能成於聖雖凡夫中受亦彰此號隨具身口為具能損損即是破分成記用即成善記業非惡無記也又此記業能有力用故曰記用感下如大鈔問云今受具戒招生樂果為受為隨耶答受是緣助未有行功必須因隨對境防擬以此隨行至得聖果不親受體形俱一受已後終至盡形即八種無作屬形俱無作也相從從作戒故又自能起後隨行故所以成善記業也若據多論通四心得戒故彼問曰為善心中得戒為不善心中為無記心中為無心中得戒耶答曰一切盡得先以善心禮僧足已受衣鉢求和尚問清淨已受戒互跪合掌白四羯磨已相續善心戒色成就是謂善心中得戒若先次第法中常行善心起諸教業白四羯磨時或起貪欲瞋恚等諸不善念於此心中成就戒色是名不善心得戒也以本善心善教力故而得此戒非不善心力也先以善心起於教業白四羯磨時或睡或眠或於眠心而得戒色是名無記心中而得戒也先以善心起於教業白四羯磨時入滅盡定即於爾時成就戒色是名無心中而得戒也彼論雖通後三心皆由前有善記業故通感發也如律指十誦也是色屬善色也諸塵即上依身口成不離色等塵也對説即不可見無對説也雖下雖曰多引明證及所顯二戒俱是色也中陰死生二有中其色微細故豈約塵對言塵對則塵粗故顯此是細色也諸師橫判如上所出者是也意言如此言其戒體色量意云如中陰色也別者意謂何以作戒是色無作非色者分通大乘有施生成佛等義故業下善惡等業若無心者不成業也故下前有門論但約色為作戒體今加於心故得勝前所執之計也兼緣是色顯正是心異於前緣異前作戒色心緣也強目以前作戒既説色心於今無作須説非色心然本從心生今且望前彰異故強號非色心耳還熏下由初因心發得善法又熏本心成善種子然後能感當果有大用也心下謂心不可見如五蘊之中但以名收四心是也窮下即窮出無作體性各以五義求之且如非色者以五義來證一色有形段方所二色有十四二十種別三色可惱壞四色是質礙五色是五識所得無作俱無此義故知非色言非心者亦有五義一心是慮知二心有明暗三心通三性四心有廣略五心是報法無作亦不具此既各以五義求之不得故以第三聚非色非心為體不知下前云強目此曰何因皆強立二非之號耳問下既有種子何得説有戒謝義耶種由思生即四種思心要約期尅熏成色心種子要期雖滅種子何窮故有開花感果之功能力用故名無作若非種子如何將來有結果之義故遺教經云戒是正順解脫之本能為後習功不唐捐更能依體起修功超前體故曰隨心無絶豈同期願而有終焉圓教則全約大乘所説以下由妄覆心故造業妄妄體雖空著者成病故如來立戒警妄知非復本性淨不隨妄業成妄流轉盡苦源者則不淪生死便妄源盡也命召即是善來得度示本即善來是也傍緣即三羯磨等受妄分前境既曰終依心起前境悉妄分別耳以大乘畢竟推心為主也愚人謂異即不知本者執心境之異部分之殊強説有門以色為體空門以非色非心為體智下以智人了知能緣心所緣境不離唯心也以三界唯心萬法唯識故今隨緣轉變有彼有此有染有淨也欲下今欲令行人了此妄情妄業故使受戒以熏誡妄心令息妄復本結作善種以為其體然後使五分花開涅槃果就者此亦如來示善權之意也故力有常以熏種在故能牽後習使隨行而生善果成也起下生隨行也還下此受隨兩法但熏本心為善種子含在藏識如是漸漸息妄使妄波不生妄源自靜若下即不能起功用對治則忘心還熾妄業還增生死輪轉何有出期即攝律儀以律者法也故配法身以下推先過故下彰今德也以下亦推先過故下顯今德即攝善法成善法戒也苟善法成則總乎萬智報身成則酬於萬行行由智立故配報身以下彰過憎愛彼故殺愛己故存如是作業生死之尖今下彰德也前生則衆生也化身佛以化則無機不應以戒則無生不護身戒理齊故配化身猶下喻化身普應也如月在空有水即現化身周遍遇機即投涉言語謂古人不識宗旨妄有所説今為出之則無迷宗理有歸矣忪職容切驚也焭瞿營切獨也言但知驚懼單獨守護耳不下二句審上意若下彰過謂若不為出生死則空奉外之威儀如斯持戒不免生死不下如世俗士雖不受戒若能順於舊業令盡不增長三界集因者則苦果自息百論彼第一云有漏淨福無常故尚應捨何況雜罪福又云取福人天中生取罪人三惡道中生故無相智慧最為第一為天下彼云持戒有二種一者不淨二者淨不淨持戒者名中智人外曰何等不淨內曰持戒求樂報樂報有二一者生天二者人中富貴若持戒求天上與天女娛樂若人中受五欲樂是名不淨持戒阿難語難陀云如羝羊相觸將前而更却汝為欲持戒其事亦如是身雖能持戒心為欲所牽斯業不清淨何用是戒為外曰何等名淨戒內曰行者作是念一切善法戒為根本持戒之人則心不悔心不悔則歡喜歡喜則心樂心樂得一心則生實智實智生則得厭得厭則離欲離欲得解脫解脫得涅槃是名淨持戒如彼即第一卷云佛告舍利弗譬如蝙蝠欲捕鳥時則入穴為鼠欲捕鼠時則飛空為鳥而實無有鳥鼠之用其身臰穢但樂暗冥破戒比丘亦復如是既不入布薩自恣亦復不入王者使不名白衣不名出家等今識下謂上假實二宗所出之體未是了義乃同方便假名字説耳今考定之終歸大乘故曰域心於處也故經指妙經也具云十方佛土中唯有一乘法無二亦無三除佛方便説又云復以假名字引導於衆生等如命護戒如己命也浮囊此喻精持戒品大小通護也羅剎之喻者經云如人以羅剎女為妻生子則先食其子次噉其夫破戒之人亦復如是現世惡名死墮惡道如上所斥即前云無思反本妄分前境愚人謂異等文也難意云須識大小宗途豈令一槩如斯辨論自語相違若何融會若下大小俱心者上且據機分三種之別莫不皆從心起而況志當歸一良以仁者不見前文敘述出家七種大意輒起斯問也沓下即沓婆摩羅子捨無學身求堅固法施下即戒本云施一切衆生皆共成佛道捨下如三十捨財與僧還復得用不同他部一捨永捨塵下有部約根能見今宗約識能見故不可以四分全同小乘也故光師亦判入大乘律限自作如三師等他人如受戒人也待緣緣具成受也答下若約自誓則不待衆緣餘受不爾皆須之也雖然追以自心為本若無心者不成受也如牛二角喻作無作生則同時也有作無作者是作俱無作也第二念即三法竟時第二剎那也唯有無作也心論下此師引二論第一剎那具無作者皆謂形俱無作也方便與作時俱目作戒耳作戒是心無作非心故曰異也水鏡喻作面像喻無作後解指前後起也前即一時生也作俱無作正作時有無作同起也可言如牛二角生則同時不妨形俱無作仍後生也思業思約受者心業即業體具者釋上具作無作也今解下雖約同時亦不取第一師義以初師雖説同時不能分作俱與形俱之異今師作俱無作中已萌形俱之因義非斷絶也由本下因以成果得果不絶邊為言也至後剎那即三法竟一剎那時二戒俱滿即作戒及作俱無作也非乖俱體言其同也形俱即形俱無作其因已起但未至果此一正顯上一時也還與作俱但三法竟第一念未落謝時同上即與上作非乖俱體不妨形俱因成未現也二是下正釋果時無作也示現即前形俱之因至果時成現也三下即第二剎那二形俱謝戒體發時盡一形來無作也分二正受及受後通三即因時無作等多論且標一論其中亦有出成實者作休業止作若謝時此無作業亦止也能牽於後以因同為戒因故能牽後果也不下顯作則由心起此無作不由心起由是無作體故業量以盡一形故墮下即一發續現經流四心三性任運在故十大受即前云勝鬘十受備如前引八分分支也身造口業如人施物言是聖者當起有凡夫起者即身造口家大妄語結口之無作等者等取口造身業發身無作如深河誑淺令彼沒溺即口發身殺無作也無作品出成論也論下出成實九業品命終若大乘則經生不滅邪見以邪禁善令善無作不續也更令者事在之外更增從用善惡惡如弓刀例此可知也間雜同時者言此八業或間隔或相雜或同眨或前後且下舉一通收隨心亦名心俱入道即無漏道論云下此遮外難彼云有人云言出定則無今言出入常有雖在事亂無作不失但在定道心中轉增勝耳何下若云出定有者何名定慧心無作常生背支入本者即背七支入定道本時是背粗入細可説言發無作反上則無若然亦是隨定慧心入有出無也無餘即化火焚身入無餘依界身智俱亡方可説言無無作業初果下證上隨生死心無作常有以此聖人見惑已除得道俱戒雖有貪非婦不淫若在僧中惑心設起則捨戒還家故有欲飽還來之事故大論云初果生殺羊家寧死而不殺此皆道俱戒力自然無犯答中從言至未有行來答受義也既下至隨戒來答隨義也受下示通局兼染若兼穢染心則不發戒通持犯以持則淨犯則穢故曰通也皆依受故由有受故則有持犯輪翅如二輪兩翅也兩種即持犯也既言隨者則是隨逐受後而有也應非戒者戒本防非今既已犯如何名戒如前相領者前約隨從受後生今謂持戒犯戒亦從受後生若解前例不應致問而況未曉故以四種通之前二屬智佛言有二種智人一者從來不犯二者犯已能悔後二屬愚初雖未犯已屬怠墮不學教人也後則有過不悔為至愚矣乃是後時於後字上合有初字以受中作在初隨中作在後此既不久應在善收如何乃名作戒耶及終行副以後行副前受也不名獨善若作戒但名善則局狹不同以不遍於法界上起要期故宜作四句一善而非戒謂十中後三是也律不制單心犯二戒而非善即惡律儀三亦善亦戒十善中前七是也以不要期直爾修行故名善也今若云善則濫此句反此策勵故名戒也四俱非者身口無記八緣相始從請師終至第八對僧問難合云請師等八緣相文作及筆誤既通釋上隨作戒三義可分對別彰時受對場壇受時隨據正對境時唯善性不通惡無記也過境即有過之境境通色心者如加法持衣時緣衣鉢是色境如發諍中緣衆僧善觀心邊是心境餘戒例然不下言心不能盡緣由境不頓現故本釋上根末釋上條可即非現言豈可即有非現起故治即作方便對治由其觀能如對淫修不淨觀等前非不起者由觀之能也心因者如以下品心為受戒因終至無學亦下品戒中上二心即中品心得中品戒上品心得上品戒終至聖位亦一定也優劣如殺戒對人境則優心濃能防則心重非畜境則劣故心淡能防故輕三品異即上中下謂隨中作戒通多品也一品者即本受一品定也今謂所防多而能防少者莫敵禦不均耶受起下答能防一品所下答防三品重境如殺盜性重等戒境雖是重以難犯故輕心亦可遣也自下威儀中細唯吉羅以易犯故重心防遣因下若如此解則不可一例約重心對重境輕心對輕境也妙下結成今意倒謂功德如云欲不障道打三百下得福之義是也數齊不妨無作因起在作時果成當作謝則免一種之過矣如上即兩戒前後中重發如成論戒有重發肥羸不定隨下隨中對境有優劣則心分濃淡是以無作亦通澆薄淳重矣受一多論戒不重受亦不重發罪不重犯依本常定故羅漢心中下品戒也隨多者即隨行有增微也又大鈔難云何故戒有羸不羸耶答此對隨行不論受體以下雙釋不通重故釋上受一止下釋隨多一念即總作一念也實行異上虗願也非頓如正修慈悲觀對殺境時無暇更修少欲知足觀離盜也以行不頓修次第漸成故為長以懸擬一形故從行善生簡行惡時不生此與方便色心俱事上則無四心間起即善惡無記無心更互間起本體不失又任運三性恆有故如下即比前二種作戒解根條異中義同也前云受為行本隨後而生目為末也今應云受為根本隨依後起故曰枝條念念雖謝即後念起時前念謝也雖曰已謝不無後念續起於此不絶邊為戒生因故鈔云現在相續心中緣是也不爾非戒以惡死戒則不周亦有五同四異也斷相續意先惑業上願悉斷之強緣三寶及師僧業援即戒也以戒能援護故名受無作從願行發起也僧緣即人僧界法為緣也情本與下志意皆目受者隨下隨淫盜等境起防制心名為隨中作也作息下謂對治成已過非不起功德續生名隨中無作也俱眼下即受隨俱名無作大師云受謂壇場戒體隨謂受後對境護戒之心方便善成稱本清淨故也任運言任運從作後而起也七非身三口四也三宗即色非色善種子也四下受中無作體在對事防與隨中無作一等受體形期盡一形也隨非防過對境起也莫非俱護本所受體即受中無作能下説隨中無作相依持者隨假受生受繫隨護二法相藉亦猶輪翅非是非不也言此無作不是作俱無作顯作謝已無作常住此約隨中猛盛心修者若輕浮心亦不發也事息方有待作落謝後無作方生此下言此無作不與隨中作戒對起防非但是作戒防故夫下大師斥古同名過無作即是作也無因過事息方有故今若善解者得害死尸言尸有可害義也涅槃云若人斬截死尸以是業緣應墮地獄非非下非訓不論者即成論如人下證過去境又下證三世境過未已謝合云過去已謝未來未至文略問下因上第二義中慈功與行何以異耶七品怨親各有三品即上中下成六并不怨不親為一品合成七也今隨境分慈故亦有七故論即多論增減以惡心故戒則減反此非惡心是增也由下顯須遍發豈可同餘泛泛之善行耶現在相續簡過未及間斷也現在無非者以現在剎那中無非可防故何言不防何得言不防現非耶緣在懸對若約能緣心對所緣境時未即有非起也願下言發願欲除斷不妨正屬能所緣義也若下正示不定説非者以正防之時非若不起即屬未非非若已起即屬過去六塵為妙行者對境不犯即六塵清淨又豈可只在無學耶一境有異見者即迷人為畜故云異見今於異見中能防過不起蓋治功力強也反此力弱則其非過去要行懺蕩是坊過非現在未起即屬未起非才下説過去非故下説現在無非殄已起且殄是除殄防是遮防義自兩別何言防過去非耶犯已依懺蓋遵律法今防不懺正是其非故亦名防局論古説毗尼但殄過非不防未來戒但防未來不防過去是局也如四下謂言覔等諍已起故屬毗尼已殄也今或四諍將起明律之人善解觀察諍情如法為斷令諍不起豈非毗尼亦有殄未非何得但言殄過去耶但防具言受體但是防之具度也其性性即體也止作即止持作持弓刀喻受體執持喻隨行前陳喻過非未非起現在猶言未來過非因今生起如現在三支因為未來二支果是也名種即罪名種相以化教不分合雜而懺不識以不知篇聚所收故懺若通漫罪亦不出當起即未來法數過去未來約三世法數為言依生即衆生損壞約六大毀謗約佛等傳識傳度識處餘下即非境情也一切生境言無一衆生上不發也此是定義四分即身三口一也不相離以三者互闕則善不具不從一切得以上品心受必無中下二心故曰三品不俱故一切分具發七支也三品意下品心受五戒中品心受十戒上品心受具戒此下總束上文四支身三口一也故分不盡不發七支也惡意不死於一分衆生由有殺心故某衆生如但不殺四足於餘並殺等某分我但持殺盜而不持淫妄三處此處持他處破四時夏持冬破或但一月或但日中某緣太平則持戰鬪不持但得善顯善狹而戒寬也非所能境即惡心不死仍有殺心故也以下取例若如此者何名不害一衆生而得戒耶若下意云若只所能境上發者則有增減過文言損減字誤謂下如前取例以釋得捨得戒捨戒必假因緣今自然有增減者則得捨不假因緣是有乖也縱下言縱離得捨不假因緣復有何咎群行之首即戒為罪行元首也未有有時秋冬則未有春夏則有有時受戒至冬豈非有減冬時受戒至春豈非有增只於能中自有增減何獨如上致詰故下前後有人死而識在故得前後論草死性永亡故不可為例入般則入般涅槃灰滅身智亦是於衆生永無戒應減耶心謝約聖人説雖無犯戒心以外境在故戒不失也二下正通上難轉根僧轉為尼教尼等戒不現行耳恐復轉男豈可更受四下凡心惑在境界不空施下施則施惠慈則慈悲於一衆生亦得律儀者與前普遍生境俱無害心方成慈行豈不相違耶將此下答通立四即下五八十具可欺約妄也四戒淫盜殺妄三因緣用無貪等三歷成十二并歷酒戒共成十五一切酒草木米等所成者入般衆生入般約前四戒説不失皆謂境謝心不謝故後取取為妻也依禮即昏禮三境大小及口道四處腦咽心腰可下如淫一處餘處不壞今殺豈可同耶以殺一處三處壞故不得立四戒也命業即性戒七分即七支智下應先問云口四之中何故妄語在先將文通之三單貪嗔癡也三雙貪嗔嗔癡癡貪一合具貪嗔癡共成七毒過境即五戒罪境為七開淫支對三境也為八為十者因明八戒十戒如高牀等皆約非情上説三十五將七毒歷五戒故成此數遍生盡法界生命上有四戒非情即酒等五一飲酒二華鬘瓔珞香油塗身三高牀四歌舞倡伎故往觀聽五不過中食前八名戒後一號齊通成九戒以七毒歷之成六十三戒得六前五外加不得投生金像銀錢寶一戒以七毒歷之成七十戒故曰準知此律即本部同發身三口四七支也但結罪在第五篇猶有具戒可受故稱有願也三種善根亦無貪等餘則例知例餘法界情非情上各得七戒互起即三毒互起二三等分應為七門二三男開淫支為二女開為三便成女人九處男子八處也六十三戒七九成之五十六七八成之也自下即於非情戒境上各得七戒以此例餘法界之中得無量戒故喻塵沙金輪即金剛輪也反罪成福福即持戒功德也如明了論云四萬二千福河恆流是也如是例餘法界境上功德無量所以位高人天良由於此打搏打比丘搏比丘等是殺之種類故輕重打提殺夷故二下殺防命斷打防惱他又殺果打因故善惡法即餘種類戒是也若下意云十業之外若更有善惡法者何以但出十業戒耶答如文後三貪嗔癡也餘三五八十也今且論十前四殺盜淫妄後六綺語兩舌惡口并意三種屬善非戒也四人即五八十具也十善俱戒以菩薩持心戒故亦下以菩薩正制心犯聲聞制以業思故曰同相羯磨通昧以羯磨中不牒戒相故恐下恐犯後進入無緣由一受以難無宜再造十下後説至十三也四下若備論四戒是初篇根本欲廣其義此恐文繁故指如戒疏也誡其身心令審諦恭謹也且舉三號以佛通號有十今且舉三族姓女因上文中曰善男子故對尼以示彼則曰族姓女蓋呼召異餘文一同沙門桑門梵音轉耳非為翻沙門為桑門乏道以沙門良福由故能斷衆生饉乏以修八正道故能斷一切邪道涅槃云沙門名乏那者名道如是道者斷一切乏斷一切道以是義故修八正道為沙門那今言謙虗者亦乃疏主就門別作此釋言我貧乏於道是以古高僧多稱貧道是也自牧牧養也以謙和自養耳先聖云謙以自牧取其意取息惡行是上乏義也非家以家者即父母等家今入空門是非家也本習即在家時身口七支等過也八喻即取海八德以為喻故佛告阿難大海有八未曾有一大海漸漸深二潮不過限三不宿死尸四百川來會無復異稱阿含正符此喻五萬流悉歸而無增減六出生衆寶七大身衆生居住八同一醎味四河增一云四大河一曰恆加二曰辛頭三曰婆叉四曰私陀波四姓剎帝利婆羅門毗舍首陀四子懿摩王有四子一名光面二名象食三名路指四名莊嚴四子少有所犯王擯出國到雪山邊住直樹林中歸者如市鬱為強國故父王遙嘆曰我子釋迦因為姓也僧祐即大師之前身也孳音茲息也重輕淫則舉重不淨行舉輕故引摩觸等以配示也以皆是淫種類故齊名不淨行也總舉下即前輕重收棄收即摩觸粗語輕罪犯殘行懺收歸足數棄重縱懺還不足數即學悔也本防正列即夷罪也解脫道論彼曰云何頭為戒義答如人無頭一切諸根不復取塵是時名死如是比丘以戒為頭若頭斷已失諸善法於此佛法中謂之為死是戒為頭義同前即列相誡約答能也除疑者恐云燒埋壞色不入己故不犯盜故持斷同也呈示合作懲誡也至時下彼條部云優波離從座起白佛言若作減損意取五錢若過五錢自取若教人取自斷壞教人斷壞自破若教人破若燒若埋若壞色是犯不佛言一切波羅夷有人下妄指此方二樹與彼同耳黃細約色與形辨微砂舉小以比不在言在也猶云文不在茲乎是在也今謂細蟲十六分之一明在於教耳非可活反顯是死藥符祝下文作周六反或書畫符印或誦祝詞不證得者言自不證得也無色通收四定如前羯磨言不可增減也隨人説相言隨人受已隨人説相事在煩重也至三如今三人為一引也前後或遂人受戒了便説或前後總了通為説示亦無在也縱下如前後俱不説豈可新受人反致失戒耶但三師七證乖法式耳他仗仗持也言以他為依持也如涅槃下彼具云有人出世具煩惱性而少欲知足乃至正定正慧無戲論等不妨未斷煩惱為初依須斯二果為二依那含為三依羅漢為四依然下以魔亦能化作人四依説法故又須更立法四依以辨邪正經中涅槃云依義不依語依智不依識依法不依人依了義經不依不了義經波旬説證上魔或能作云何下言魔既能説如何取別故以教分者準教不得畜八不淨財及自手作食等今若反是説者知是魔也行四依即糞掃衣等如文所列四依釋上行字八正即八正道釋上法字四八四依八正也然下説行四依緣須糞掃衣腐藥等為內外資緣也心下説八正道由本迷故以八正之故下合結衆別如説恣等是衆益懺罪諸受等是別益立四意者約行四依以辨其意也依法即行四依之法也有待言身有所待衣食處等闕則命不可濟道難成立支立支持成立也前三即四依中前三種陳藥即陳舊腐藥乃至略食欲處欲有欲即下云治有惡欲是也謂下糞衣治好衣欲乞食治好食欲樹下治好處欲寂靜治有欲謂治有無情執之愛也如下科自明轉云愛取轉上四種病曰四愛取故第八問云聖種何等性答無貪善根性若眷屬是五陰性四種愛取對治故説四因衣生愛因食因臥具因有無有生愛仍自注釋云無有愛者愛斷滅也除上三及此餘愛總名有性已上正文今恐論意難明故特為釋之言於有生愛者謂有一類有情愚昧而自思云我雖為人貧窮下賤不如有福傍生願我死後得為龍馬等於此有上而生愛著佛令修聖道行而求出離得生好處言因無有生愛無有即是無也謂有一類有情因苦所逼便起思惟願我死後永無此身佛令斷除煩惱趣向涅槃化火焚身入無為依界方免後有不立藥即不立腐爛為第四也答下亦雜心論文彼云依乞食攝藥故又下彼正云又不一切時用故藥不別立大師回文取易故變論文言藥不常須故故不別立如薄俱羅一生無病不假於藥未來捨輪王易者以未得故為易也從答下俱雜心中文即下大師別引涅槃成上義也謂現在得財不起貪名知足未來得財不生貪號少欲故合結云少欲知足四塵色香味觸也八微四塵四微合言八也故心論云色香味觸極微八種如欲界中極微與香合味不相離有香則有味等文以四塵之粗假四微所成故總言八微也無貪下亦心論文以修上行故無貪也善五陰簡不善及無記也以於四境皆起善心少欲知足故多人方具以頭陀有十二種故蓋隨機各行故致人多也離坐為五合云離處頭陀篇云於處立五頭陀謂蘭若冢間樹下露坐隨坐分身不可約身以分也四法即今四依衆緣中根開百一下根開畜長若下示不可遍立也則令中下之人退道還家三人即上中下三根皆下如胎衣迦葉故須制教天須菩提故須聽教皆會道開遮明顯亦開上士者此顯如來不至盡形之制耳十住婆沙云若有因緣聽入塔寺有通有局不同外道盡形空處是也通道無不為通入三乘聖道故道緣約外説道因據內明五法即五邪也唯制不開要盡形也酥鹽等取魚肉也戒疏云調説酥鹽味重魚肉損生不具四義制不開則無慈心下根不入則不稱機既執一定故失開遮又是因立故非佛説謂語下示顛倒也由佛説八正為道因四依為道緣今乃反之戒本疏彼引鼻奈耶云諸佛常法食時僧壞至暮還須中間天人無悟道者天地暗冥若暮不知天地翻覆故也由厭本習者即外道之法既厭惡心切來投佛法宜先説四依苦行後授戒法故云後授據下申前説依所以恐後下説先戒後依故云知初戒故前後雖殊機應不失曰不徒然也止作二持止持謂四夷作持即四依以俱言三號故離有為即出三界入無為道也有作下作則成犯失聖道之源也隨因因謂因依也為避上依字故轉為因也分四即於制中又有四節十種四分謂牛嚼衣鼠嚙衣火燒衣此三彼國有者諱故棄之月水衣産婦衣若神廟中衣為鳥銜風吹離處者得取及塜間衣求願衣往還衣至冢上返將來王職衣不問新淨上色不得直用須作袈裟色受持俗所賤者亦據庸常之人説也果達道君子亦不然也如下引孔劉證是也未可與議則未可議論於道也劉子名協撰書三卷五十八篇窮悴無由自達及負其書候尚書沈約於車前獻之約覽而異之遂呼登車定交時人號此書為劉子今出防欲篇彼具云明者刳情以遣纍約欲以守貞方接所引二句章甫三禮圖云殷冠也一曰是殷之行道之冠章明也甫夫也謂章明丈夫之美德也縫掖縫大也掖謂兩袖也其被袖口二尺二寸大於餘衣乃儒之衣也嘉肴賈達注國語云肴爼也凡非穀而食之曰肴芳音謂金石絲竹之音尚書云酣酒嗜音謙光周易彖曰人道惡盈而好謙謙尊而先卑而不可喻君之終也忍下謂忍人之不忍割人之不割行人之不行是儒之君子也況出家之士而不能行乎約報盡形之報也四下既答言能何可後犯問下意謂戒體既在白四言下發合在羯磨竟時便問能持今至此方問者何太晚乎不鑽謂研也論語云鑽之彌堅有生即有識凡生前下先示淫盜等四境成止持後示糞衣等四行是作持此戒與行為最要故受已先示之也四相即四依之相知誰不犯不知令誰不犯今既立誓則知令己不犯也不問道俗以施通七衆故道相以割截壞色方是沙門衣相盜下次者令下位人合得而不得也惡日即惡鬼奪人命日坊亦僧坊也亦須知者知彼此二方各得所尚也隨相隨受訃之相雖多大意令淨心也言淨心者無使別他而自壅己等分染謂分有破戒等染不應福田不可計之故下引證熱下示當果也招提中含阿難受別房令施招提僧準此四方僧房亦爾平頭此方并汾州亦多作此屋上不起棟橫鋪散木以土覆之中間開溝泄水極長十間五間共一戶出入重屋即樓閣之類中高四廈此尺尖相王大殿證中高也叉手兩木交加若叉手也大小便有用治病也如云黃龍湯是也酥蜜分二即酥蜜各分二成四也以體有生熱堅突故油體無異故但一爾共成五藥深防若在後者恐有乘儀故忽犯言莫輕忽有所犯也因果盡然盡由皆也汝今既善出家福不虗棄必感善果也故曰果必至也受時二師即羯磨教授也非下即非隨行中和尚依止師也具足滿目七證也不慮妄受言不憂慮假妄而受也至下至説相隨機而説豈獨於此而為盡也如鈔即師資篇師他即依止也二師即和尚并依止離違因和尚命終出界等離便致有違戒律也五分成立即戒定慧解脫解脫知見成立方可離師識治能善了彼治過之能也下四聚提提舍惡作惡説二篇夷殘也俗年壯室謂二十受戒今又滿十夏則成儒禮三十壯有室也纍負言連纍負墮也左傳云無纍後人專獨約不依他也天音西天音也又戒疏云天語天書唯居大廈人云此方人言也皇姨舅者皇者大也皆父母之族故尊之今餘尼稱母氏亦例然便屢接形於法或參恐言於形亦屢許相參也法還千載謂能行八敬則不減五百年正法故也此由如來深知機根而施教藥也同上即同僧授沙彌法是也注云加尼字即云沙彌尼也增位於尼下衆中增此一位以僧中無故勸學即六法也難阻上去呼適爾雅云往也歸嫁也周易歸妹是也後喪從道謂喪亡婦事後乃入道也文列即下引律文説相云是中盡壽不得犯等既説淨心何止二年故得説盡形也二歲即注引律本云女人過起佛言與二歲羯磨此則得淨身也別教六法也位下在沙彌上也三衆下三衆也實同同沙彌十戒體也而異不妨加學六法故更從始學即重具二年也故有下以兩日當兩年或下雖二年具行而多犯六法若犯理須爾與而輕忽不行或少或多於六法中增減行也都盧猶言一時也謂下是釋謂式叉六法初受本法及具足戒一時成就曰㮯朴戒名無所稽故不足論也優長優弘長遠也百代無古言無古今耳一科皆歸非法也進戒進受具戒闕尼一位以尼中立下二衆今若不行六法即闕式叉一位何下言須受六法方可受具若下若沙彌尼須受六法方得戒者且如僧沙彌不受六法何以亦得具戒無文下言無有律文開尼不受六法便得具戒二下顯男沙彌不須六法也年初即年十八正月初一日受六法至年終是一年又至十九歲滿又是一年至二十正朝受具是正滿兩周年也此則盡善矣如是下謂十八歲時正月二日受六法望前少一日乃至臘月晦日受法則欠十一箇月畸二十八日亦名為得元日即正朝也最小亦十八歲沙彌尼但在暮年受六法故名小耳不違教相以一日當一年故亦是二年驗下以一年周足驗胎身以子處胎多則十箇月日況今一年矣豈下應先難云若爾與前年未授學法正朝進具有何別耶將文通之意謂前以兩日當兩年不可驗身胎故不可與彼同日而語也僧問滿不即問行六法滿不新受者答滿又云淨是則無有愧色耳何遽遽忽也恐失言我若不急受恐失却聖位也五儀即偏袒等五𮪭吐猥反股也俗作腿言今時人互跪以𮪭著地非跪之相俱䘖䘖和尚名故須預請也以對異僧異比丘僧也必還從僧以僧者衆也得下以尊彼故彼必授我法是得敬意也準相即威儀行相並同前望壇禮時儀軌也故曰遙折亦得遠雖得法以尼僧遙秉故不下若不召入説者知是戒我何法故須列相顯示得罪即吉輕重如淫是重相觸是輕有無如一切大尼戒應學是有除自手取食授尼是無即是開人尊釋如來法勝釋説六法不分自別雖不分一二三等數文相自別明戒正體是先十戒之體非今所學也但重舉本以生下六法為誡勸耳問下謂不淨淫欲沙彌已知何重舉那如下引例學宗正是六法也乃至略盜殺天分者謂淫盜殺妄此之四戒但前半是正戒體後半是正學宗此則霄壤永別矣無可對言後二戒更無重輕可對但且直舉以為學本又前四後半正為護前四重故是深防也後二人多喜犯重舉以誡約也增本位者由增式叉之位於大尼戒亦須同學學士謂僧沙彌亦通發七支及對萬境故應名學法士耶尊彼沙彌在二衆沙彌上也如下取例餘四即沙彌沙彌尼式叉大尼也二緣即自取并授食也唯開下言唯開式叉不從淨人受食已授與大尼此約無淨人處也不同下即一人受已通及餘人四衆戒下云尼同下三衆吉是也理自從人即自須從淨人邊受已方可進口二學法女即十歲十八也本服仍舊著五條也以下要沙彌時著縵衣故一當去呼下同斯漸言有斯漸變也為寒為寒故聽重重著豈為分上下耶緣起制僧者三衣之始本緣對僧非約下衆必若遇寒隨時助身之服著用非制也若下反詰若許沙彌通著者不應受大戒時方示三衣名相故知非也鉢下若據鉢亦同三衣沙彌未可受用僧器受用以結奉僧故得將常住別器足以資於形有也縱下縱有依十誦許沙彌持鉢者終是法未具也大受即受具戒時須用也非制故不問者即受十戒時不問衣鉢有無驗知不須略為四者即八善破羯也為七如注如上即上顯相中然下以羯磨統通一化三時故委而辨之法預尼言此一位唯廁尼中有也今下一則無此難緣二則價少半國設復有者無二衆受故十二歲學六法則二十二方得受戒故下引彌沙部師為證然也下大師立斷也或堪持戒宜從十二反此未能宜憑異解二十二如常即二歲學法年滿受具也宋已前即宋元嘉十年已前楊都以衆鎧初至楊州為尼受戒則僧尼各十故曰還依中國異者重解即下隨難解中師傅傅相也魯昭公云成童不就師傅父之罪也纍年加大僧二歲也二十餘戒具如尼單提豫嘗注尼戒本三卷欲知撿看可了就乞法中乞恐是請字即日謂作本法已當日便往僧中彼戒本云經宿方往比丘僧中與受具足戒者提故曰得罪非解則不失也若下如有隔日為復更受本法為即用舊法答下以律無文亦任後人取捨雖下大師約理自斷雖曰隔日本法在奈佛制本日往故義有涉疑今欲免疑者捨故本法重受已即往僧中乞受於理大善故曰如法如下如結界等若疑應捨已更結正是佛聽界亦不須即尼往僧中不用更結也今量量謂立量也尼有下將隨例受也以隨行懺僧殘既假僧尼八人行摩那埵四十人出罪今受中正發戒體豈可但二三尼往耶僧軌言羯磨是二衆秉持之法又是僧之正軌所為在尼即正受者豈同前指上謬解自然即自然界重加但於僧結界上重加唱結以尼望僧界為自然故不相叉者尼結界時當齊僧界上唱結不得兩界互出入相叉今作差字然論中作叉恐古通用紛然意言謂行事者紛亂各信意言耳謹下是今師義今下謂今取五分意單列各作一行也既云面各相對則東僧西尼本法尼在二衆之中也鈔云長鋪兩席使中央空二三尺許令申手相及然下僧尼相對故不無源也縱下大師義出謂或避譏涉尼在裏坐亦好如面南境僧在東坐而西尼在北坐朝南於理通得或若僧在前坐尼在後坐則成相背非成和相得聞餘法為得聞餘羯磨不答下初句縱但下奪加結即加法結界用僧下言為許得入何用僧更為受具中間人上非大尼下非沙彌尼犯罪不應教之吉以事證之如八敬度愛道已度餘五百女豈有十尼作本法當知在大僧言下發戒大須立法言大途二衆並須立法答下若尼不結界者但成僧秉中容非別謂於中容非法別衆也以無界約束故法用下事鈔云然此一法二衆同秉各有別衆非界無以攝人非界無以羯磨若不信須結但僧獨作應成事則不爾故知須結審委無疑請師即請尼師也何由由因也何因妄為師也是故須請義下言約義合有但律無請之辭句耳罪名男女入罪曰奴婢義須轉勢即轉語勢方便問也非女五言有此五者非正女也長引即云汝學戒清淨不答言已學戒清淨前後或問邊在後污男在前亦得但於十三不闕數者皆可今下恐長引問時不曉亦不得逐語而聲句謂隨逐人語而作聲也闕喻謂尼説相文中闕斷頭及多羅樹心等四喻故下引五分通示如前即猒謂符祝抑伏禱謂憑託鬼神是也不得下謂祝詛令彼受惡使不違越也多為下點字義也限相如云腋以下膝以上等是犯觸齊限也越滅違越絶滅也以犯故非尼及釋種女故一則違如來制二則無有所證注尼戒本大師親注尋本未見神思下誡輕浮弄精神者非蘭若以尼居蘭若恐有賊難若伽藍中有樹亦可行之故曰何妨等隨順即八敬法事鈔云如此八法應尊重恭敬讚歎盡戒不應違是也或可通收餘行釋衣藥受淨篇第四上明結前義下生後形有謂三界幻有之身也必須假衣被外形藥資內病受納有法故曰行相纍患纍也又纍縛在生即一報之身命也老子曰吾所以有大患者為吾有身及吾無身吾有何患多隨妄心恣已取捨也正觀少欲知足及五觀也乃至略中夜著第二衣如衣法即依揵度云爾時世尊在波羅奈國鹿野苑中時有五比丘往世尊所白言我等當持何等衣佛言聽持糞掃衣等是也仙苑婆沙亦云施鹿林謂梵摩達王樹林施衆鹿故亦號仙人論處謂羅勝仙人始於彼轉法故是以如來亦於此處轉四諦法輪度五拘鄰也道務以世尊出世急在於道於彼衣服立法尚疏由非本意後以過起故教生焉結使九結十使乃至五百結等故四分云懷拘於結使不應披袈裟賢愚彼説有一師子名堅誓身毛金色時獵師欲取之乃剃髮披袈裟內佩矛箭師子遂來相近因睡以箭中之師子尋覺見著袈裟念言此人不久必得解脫便説偈已命終佛言師子者我身是獵師者提婆是廣如第十三卷中如鈔二衣篇引雜含云修四無量者並剃鬚髮服三法衣出家也準此立名則慈悲者之服華嚴云著袈裟者捨離三毒等但莫專執者意謂莫專執一處説不能廣其生信若然者知何非道言皆道矣但專執不許著者乃妄之本耳如是下四皆此也如云一衣不能有慚愧三衣能故乃至一衣威儀不清淨三衣能故各有所在下衣院內作時著中衣上講入衆著上衣説法入聚落著五百問云無中衣時得著大衣上講禮拜小衣不近身淨潔得入衆無七條者五條亦得入衆食禮拜等事抄即二衣中異傳如四分云臥具慧上菩薩經云五條名中著衣七條名上著衣大衣名衆集時衣等莫下莫不由此方無名體相故致異傳也總號者增一云如來所著衣名曰袈裟所食者名為法食大師云此袈裟衣從色得名下文染作袈裟色味有袈裟味俗下此方字書本無袈裟字或從音單加沙至後方添下衣字乃云道服也安大師即彌天也梁僧傳義解科云道安法師外涉群書博物強識長安中衣冠子弟為詩賦者皆依之致譽時人有言曰學不師安義不中難初蘭田縣掘得一鼎容二十七斛邊有篆銘無能識者有問於安曰此古篆書云魯襄公所鑄乃書為頴文以此驗知安師善字書學而言梁者若據安師生在晉今言梁者恐載梁傳故六味即甘苦辛酸鹹淡也既言味豈可是衣也當知在六味中收如戒疏彼云文言作臥具謂如被也但以三衣總號此土先無不知何物而廣張有相同此被敷故即相翻或云臥具或敷具故僧祇云敷具者三衣名也又云如後坐具此方有之即物體相翻體相明了三衣無故所以有濫世並迷名都謂敷具如下取例釋名即漢劉熙撰斯服即袈裟也如鈔引經彼引悲華經云如來於寶藏佛所發願成佛時我袈裟有五功德一入我法中或犯重邪見等四衆於一念中敬心尊重必於三乘受記二者天龍人鬼若能恭敬此人袈裟少分即得三乘不退三者若有鬼神諸人得袈裟乃至四寸飲食充足四者若有衆生共相違反念袈裟力尋生悲心五者若在兵陳持此少分恭敬尊重常得勝他若我袈裟無此五力則欺十方諸佛又下即上引偈云雖被袈裟服不能除怨恨則不應此衣是也畦畔謂法之相若稻田之畦以分界畔也四利慈悲喜捨三善無貪等引鈔彼引華嚴云著袈裟者捨離三毒等戒本亦通指戒本疏內衣謂三衣中最在內故高勝以是入皇宮説法衣故又在二衣之上故僧伽翻衆者若順上義梨合在上僧伽下以向云伏外衆故又梵語多倒例如智論云槃名為趣涅名為出又如四分之義也五下鈔云律中無五七九名但名安陀會乃至僧伽梨人名七九條也從價鈔云七條者名中價衣餘二可準寒暑及輕重者分別功德論云為三時故制有三衣冬則著重夏則著輕春則著中是也第二門即此門是犯捨過財即曾經犯捨墮未捨懺者鈔云興利販易得者不成律云不以邪命得激發得相得犯捨墮衣不得作等言略事含謂注中但言邪命是言略也而含攝四邪五邪等故曰事含如經下寶梁經周那沙彌洗糞掃衣諸天取汁自洗身二下經云占想吉凶仰觀星宿推步盈虗皆所不應激發激動彼心發彼施也四下顯異惑衆也言下大釋論云淨目問舍利弗乞士者有四種食合藥種植田園名下口食仰觀星宿名仰口食四方巧語名方口食呪術卜算名四維口食害名律云蠶家乞綿用成臥具為俗所訶名殺生也佛因制戒不服之縱得已成斬壞塗壁此則永捨極誡今五下章服儀云大唐寒外三垂海濱大夏諸蕃有佛法處所被道服皆資氈布無用絲綿斯良證也此土齊魏名僧周隋高勝所服大衣皆資以布雖未委教暗與文同豈非慈側之深法衣依法也但下若離殺者手亦應慈念耳又化女織絹非蠶口之物此則如來所服事載靈感傳中順道者要作青黑木蘭三色也錦下示非法色也章服儀云如世朱紫非榮達則無服之異等例也不正壞色唯釋門所懷別邪正也九十六種外道其徒不倫或裸或衣或素或染莫有定者釋門不爾俱服染衣色非純上絶於奢靡又鈔云若細薄生疏綾羅錦綺紗縠細絹等並非法物律云文繡衣不成受持澄公梁傳云竺佛圖澄西域人本姓帛氏少出家清直務學誦經數百萬言善解文義以晉懷帝永嘉四年來適洛陽志弘大法善誦神呪能役使鬼物以麻油雜燕脂塗掌中千里外事皆徹見掌中如對面焉亦能令潔齋者見又聽鈴音以言事無不效驗至建平四年四月天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣是歲七月石勒死子弘襲位少時石虎廢弘自立遷都于鄴稱元建武傾心事澄有重於勒乃下書曰和尚國之大寶榮爵不加高祿不受何以旌德從今已往宜衣以綾錦乘以離輦朝會之日和尚升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆座皆起以彰其尊澄嘗與虎共升中臺澄忽驚曰變變幽州當火災仍取酒灑之久而笑曰救已得矣虎遣驗幽州云爾日火從四門起西南有黑雲來驟雨滅之雨亦頗有酒氣救氏神異極多備詳本傳不可下南山誡詞也意云何苦慕彼著衣不慕彼神異苟有彼之才之美此衣亦可著也如鈔彼引僧祇云青謂銅青黑謂雜泥等木蘭者謂諸果漿等又四分云若青若黑若木蘭一一色中隨意壞諸下指袈裟翻染義乃通漫且如諸色非染不成何止袈裟是則非尅定也今下彼云善來比丘瓦鉢貫左肩青色袈裟赤色鮮明大師云準似木蘭色也謂赤多而黑少非同南方正色故論云若見著五大色衣比丘有智慧者當言此是遭賊失衣比丘可即體同言豈可即同東方正青色北方正黑色耶木蘭鈔云子於蜀部親見木蘭樹皮赤黑色鮮明可以為染微有香氣亦有用作香者又章服儀云木蘭一染此方有之赤多而黑少若乾陀色經云見我弟子被服赤色謂呼是血論言我著赤衣映珠似肉等是也今有梵僧西來者著此色即其證也然赤為正色微有差殊此土真緋僧祇所斷明知不正即袈裟色五分下彼云肘量長短不定佛令隨身分量不必依肘鈔云雖爾亦須楷準故十祇中各立三品之量今準薩婆多中三衣長五肘廣三肘若極大者長六肘廣三肘半若極小者長四肘廣二肘半者並如法若過若減成受持以可截續故衣身即衣體也葉相謂條葉相也下二五條七條也章服儀云餘之二衣重單兩許糞衣五衲無論重數若下諸部會通僧伽梨者唯復無單例下重數既多增減之量可比下二衣文不可令小也以是尊重説法衣故至作時可自比度量料也既聽聽單作也是制制多重也大儀謂尊重之儀也取受衣之時即冬時也分別功德論中制有三時今既在冬時則輕非分也章服儀云但以變在人情不惟源本本在遮寒單疏非分名分但云安陀會乃至僧伽梨未見言五條七條以相別之九品者粗分三品細分九品則一品中有上中下也多論既約條數分例前五條為下衣七條為中衣義不失謂四下合數也俱舍頌云四州四惡趣成八六欲并梵天成七四禪四空處成八無想五那含成二已上共成二十五有疏言四有即四洲淨居即五那含天以那含果人雜修靜慮生五淨居所下始五條終二十五俱是隻數以奇屬陽偶屬陰陽主發生陰主肅殺故取陽數也如鈔彼引雜含云修四無量者服三法衣知慈悲之服也刀謂割截故色謂染壞故體謂十種糞衣故長多喻聖增短少喻凡減互乖謂長不依量也受取依教可以截續故犯缺以不加法義同無衣為下為遠離罪故必當受持若不加受與無衣同故言犯缺也著下釋注著用得罪義乖慈梵行或條多而成偶非慈育也或長少而短多非淨梵也通別短長謂短通而長別也六事一浣二染三舒張四碾治五裁六縫莫不下制截是本也不足則任聽揲葉以至於縵此則成未也故下云有思割本等意可見也如別僧祗葉極廣應四指極狹如積麥是也為了縫文恐有但解了律之縫文便乃執縫為是以四分但云縫僧伽梨故十誦下彼又云却刺者是佛所許如法畜用直縫不得是世人衣為異俗故又防外道故又云以一尺二尺物補衣皆應却刺若直縫者衣主命過應摘此物與僧及與看病人以下準此左肩上常以衣右角覆故出毗奈耶律章服儀云所以西來聖像東土靈儀衣在左肩無垂肘膝威儀不壞也今則不爾或有縫帶長垂銀鉤現臆金玉之飾亂舉於蒙心華俗之結觀縷於道服佛𦚾萬字條條間施在尼師壇坐坐成罪況復綾羅紗縠絲縷已是蠶衣文綵輕疏約教彌成俗服斯蓋並乖正則作者詳之聞下引儒教證欲使改訛也以緣周下此準多論意若善見中間破則失受乃多營衣由不敬故速破速破故多營故惱施然今又多營餘聽衣也故大師云今時夏末一月作衣但計裙袴之少多衫襦之厚薄綾細之精最靴靺之新華唯彼法衣置而不問是則重三聖之所輕厚九流之所薄用斯矯世不亦悲乎當知慣習所熏在心成種輕聖所重世世常輕重凡所輕世世常重如何開導靈府預善來之命哉律中下彼云若逢奔車逸馬當在上風避若有泥棘道迮者不得揩突門小側身下者曲身故曰稠人等必中即六年內也如三十即戒本云若減六年不捨故更作新者除僧羯磨律云有比丘得乾痟病糞掃臥具重不堪持行佛言從僧三乞更作新者當白二與之此則不滿六年也以下三世諸佛皆著此衣故五緣者四分衣法有五緣留僧伽梨一若有恐怖若疑怖二若雨若疑當雨三經營僧伽梨四若浣染五若深藏舉著紐律云若衣無紐隨入家家得越心悔有而不著越毗尼為緣即衣下壞故開餘習貪慢心也受後即受戒方持衣大約言先持大衣也律既無文致使隨情妄執已上先出古人之非也今下顯正義衣鉢既為受戒之大緣宜從五分受前為正兩時一教授師出衆問難時二在戒師前為受故云任機等大鈔云受後方持者亦隨兩存雖然戒壇經云諸部並在問難前今時在受戒後無文可出不足行用前令下出古義儀下今斥或下謂未得本意隨人抄出意下正立法餘兩五七條也肩上謂坐見初安肩上後令在左臂衣下却為如法有三即衣鉢坐具須坐下生受尼師壇法也自餘即餘雜聽衣也互加如縵衣通三種受不又五七條作大衣受得不答如文上文即五分加僧伽梨作下二衣下二衣作伽梨受隨名如云縵安陀會縵多僧等有六七條有二謂割截揲葉五條有三謂割截揲葉復葉縵衣有一共成六也無正衣如無大衣有二七條一為正受一作從大衣也通前正衣即十八品大衣更加此六種故成二十四也餘二即七條正有二品從有二十二五條正有二品從有二十一各有二十三通有從故也并縵衣故成二十四通合言之成七十二種三衣縵通三處合為一也綺支即祇支也亦云僧却踦梵音異耳此云掩腋衣是尼五衣之數故須加法受已此與僧不同故下言此二不通僧中為制衣別位即式叉并沙彌尼屬尼中故云別位四衣五條縵衣覆肩衣綺支也依論即多論上下二衣一當安陀會二當多羅僧他緣奪失燒漂等緣可權將僧尼三衣著亦須反披之成縵衣相也轉名但改比丘為式叉沙彌某甲等更下言若更細分恐成雜碎講者至時分之不出其文律無受之辭句耳故使妄説尤多無離言不離宿即是受持若下正斥若不曾加法何以律文云若疑應捨已更受也自犯罪即缺衣壞儀二吉也由下以不受則違失律法故須受之有下有師用僧祇辭句加法此是文不類也以彼律一夜通會四分專局明相緩急既別何成一體言明相者多論有三種色若日照閻浮提樹則有黑色若照樹葉則有青色若過樹照閻浮提界則有白色於三色中白色為正離衣至明相出犯捨墮十誦彼同護明相故或先下謂先受持後有難緣如四分中若失想道斷難緣等失受是也今難事訖疑心復生衣失受不失受既未決之故須捨已更受是如法也問下如疑不了即屬無知今何不結罪耶答下謂忽從事起非學能了故佛開之地了即明相現地色分明曉了也重結罪即不學無知也外緣或難緣財少難得者亦開如前五分次第下成事可例也有則單作結犯不疑若見下證非色不成受有緣開暫著非下例證非復不成受若有緣者亦開暫著如上指前辨重單中上二大衣七條同加安陀會謂將上十八品等同加作五條衣受演示即須知牒安陀會是今闕故正受二十五條是別牒從者條數不可一混何下意云何故開牒大衣作五條衣受況衣本別故心又了知如何通耶如下是釋借衣如俗中有被尚許借之有懼者當時人或有懼此行事成非遂將大衣縫合諸條葉明孔唯留五條明孔作割截相表是五條故今下正自言通上下今正衣通之何咎何須縫合諸條二衆僧尼鄭猶此方楚夏鄭衛音異爾如衣體看其條數長短隨時牒入若干若局牒一品則反成局狹故以若干字替之欲通收九品耳此下今斥言此不名如法語也若律中止有一戒言下衆結吉或可戒本中全失一衆結吉之文可言剩也況復諸戒皆有何剩之有乎論即多論如注引者是也以輕易重者寧可犯闕衣之輕吉羅罪不可犯離宿之重隨也若下如欲免離罪者除僧羯磨方開以下即以輕衣替重衣也餘下此外更無開文換易即獨住比丘三衣中須換易心念捨也壞相善見中間壞多論緣斷失是也或下即捨故受新是緣隔作即遙捨是得罪離衣提也俱句三亦捨衣亦得罪如以輕易重四非捨衣非得罪專受持者三一受三説捨但一説者可耶如下引例捨戒一説尚成捨衣一説豈不成乎問下何以結界解界同是白二亦是相違故答下結界是僧法故結解俱白二餘別即餘別法不可類結界衆法也昌言正教明言非謂不重以世所共行故不可從古即不須量也鈔云今則張衣相不同本法但云如法作不言肘量應成知非法既言如法自簡知非法也如文指注無人反顯有人須對首捨坊道僧坊道路也僧祇下引例也雖有非數設界內有比丘非足數者對亦不成如下且如結小界戒場大意亦在防惡比丘及免數集之勞衆法尚開今何苦約又如捨墮本對僧作令若無人亦開對首斯可照也若爾説戒何故待人將不下答通彼此則僧私同遵也任情安者或可待則待之不可則止未可例今心念於道路求之言中不了以獨作時無彼此問淨主之義是不了也後若有人故須更説故下疏云心念淨法既是別人捨心難盡且令轉換得延時限終須對説方始究竟如別即鈔中十五種自然界各各別護是也須離離男女近處不得護衣不爾則有離罪斯例如與女同坐等皆為涉譏故除村結攝衣界中除村村外界豈非限約兄弟分齊鈔云如父母兄弟兒子若異食異業雖同一處事各不同是名族界外道以不同故樂人歌伎惑人故王來有威勢故如此等處俱不得置衣常須近身取水鈔云別界者若作食處取水處便利處皆失衣即下指離衣戒中梯鑰有梯可登出入有鑰可得開戶反此名失別疏即戒本疏羯磨即作法攝衣如前已解皆下皆在戒本所收也理宜同護故為身以彼袈裟在上如五分法塔故為衣即三衣臥具僧氈席之類通三世受用故須護之穢溢恐流泄故佛在人倍言佛在人中身過量一倍也律呂六律六呂十二管并斗尺稱量皆起於黃鐘管亦依周定也相遵則通長五廣四也毗下四分七百結集中跋闍子擅行十事便於閻浮僧斷了言十事者一非時得二指抄食彼謂少故不犯二二村中間不作餘食法彼謂兩村之間非得食處三寺中得別衆彼見邪正即分各作成法便謂同見亦得四後聽可謂先作羯磨後説欲亦得五得常法執陰八事為常六得和合食謂酪是酥類可和合食不犯足七共鹽宿得食見盡形藥開無同宿罪今無法加故不合八飲未熟酒彼例果漿得食九得畜不截坐具如今文也十得畜金銀寶在己邊作淨主物想謂言得也但下伽論云不接頭者墮如法者準初量已截斷施緣若坐時膝在地上者依增量一頭一邊接裨之此是定教正文大師云不依此法一生無法處坐僧祇下通釋注中僧祇文也注中屈頭者即屈尺頭轉量縮量即未挄張後量水濕量亦束衣令皺後乾時長大也至廣長作者至猶極也除下反上句意云若除上非外依教而作則正法生己身也兩塗即上廣作及依教也增下雙遣著也鈔云執則障道是世善法違則障道不免三塗宅身宅居也言坐具是居身所履之物故僧祇云唯得敷坐無有受者言今時無有加法受者説下以畜長者方次開説淨若初受便説者則無教為準的也況復善見云坐具須受持不合淨施此明文顯不説淨也非道標不同三衣為道標幟也諸下謂諸部未見説坐具染作何色故大師約義須作袈裟色也律開減量律不犯中云若減量作今若加法時但云如法作亦得替文中應量字方文俗中貴士列飲食可方一丈也種食猶種種食也後式彼律云佛在蘇摩國作鉢壞未燒者令窰師燒成金鉢次成銀鉢皆言王若知者謂我能作金銀寶乃令埋之後燒作鐵鉢青如閻浮樹佛令用之曰蘇摩鉢從處立名石鉢唯佛者本起云如來念往佛以鉢受食時四天王即往頗那山上自然石中出四大鉢四王各取以上於佛佛乃總受纍左手中右手按之四際分明又智論云石有粗細細者不受垢膩故世尊自畜所以不聽比丘畜者以其重故佛乳哺力勝一萬白香象是故不以為重又慈愍諸比丘故不聽畜問侍者羅陀彌乃至阿難常侍世尊執持應器何以不憐愍答曰侍者雖執持佛鉢以佛威德力故恭敬尊重佛故不覺為重又阿難身力亦大故復次以細石鉢難得故粗者受垢膩故不聽用依律用即作黑赤色僧祇熏作孔咽色鴿色者如法律文廣有熏法須者看之多剝善見鐵鉢五熏已用土鉢二熏已用大師云此方用熏二遍入籠猶未變色用法不同掍油上古鈍切下余救切指歸云掍者以石磨瓦上用土脂楷便燒更不熏也油以桐荏子取油油物名油鉢相合云體量二種雖應色若不應量亦名非多論彼第五曰律師云論師有種種異説然以一義為正謂一鉢他僧祇鉢他正受四升受十五兩飯法寶云十五兩是西土稱也秦稱三十兩餘是西竺粳米釜飯時人或共計議謂上鉢受三鉢他飯一鉢他羮餘可食者半三鉢他飯可秦斗計二斗一鉢他羮餘可食物半復是秦斗一斗上鉢受秦斗三斗律師云無餘食物直言上鉢受三鉢他飯一鉢他羮留上空處今指不觸中中下二鉢可以準知晉法即同周也故鈔云此律姚秦時譯彼國用姬周之斗是也唐令侍中魏徵等撰二十卷唐律中令式格也斗者三斗為之謂唐一斗當用之三斗也率之謂俗算六粟為圭十圭為抄十抄為撮十撮為勺十勺為合升斗斛例增於十則知圭抄為本下斥鉢今鉢小也有下古人執律通文云量腹而食度身而衣趣足而已言通增減何必準上母論等必若下斥古又大師云必準正教世執小鉢者多大者全希豈非狹局貪著多益之相既號非法不合説淨受持如鈔彼引五百問云若一日都不用鉢食犯墮重病者開不用若出界去經宿不失五分護鉢如護眼睛洗鐵鉢聽去地一尺瓦鉢離地五六寸許等問但畜一鉢不加受法過限犯捨不答不犯由是制畜事同三衣但犯不受持鉢罪若有長者準衣説淨于闐即高昌于闐西域記云此國重財輕義少禮女尊男卑吉素皂凶犁面截耳斷髮裂衣殺生祭祀于闐月支土蕃風俗頗同藥下以有待之形假資方立外既衣鉢已受內須四藥濟形故次而明也鈔中彼云時藥謂飯乾飯魚肉等非時漿者僧祇一切豆穀麥煮之頭不卓破者之汁若酥油蜜石蜜十四種果漿是也七日藥者四分酥油生酥蜜石蜜等是也盡形藥者僧祇胡椒蓽茇呵梨勒乃至一切鹹苦辛甘等不任為食者是也五意多云一為斷盜切因緣二為作證明三為止誹謗四為成少欲知足五為生他信敬心令外道得益餘下彼云手受五義除自同類餘有六衆二趣皆成受也口法不爾必是同類先手受訖對法六和方得加也三種藥四中除時藥也舉宿具足而論須藥體無八患者得加口法一內宿二內煮三自煮四惡觸五殘宿六未曾手受七受已停過須臾八手受已變動失本味故互塞手受已無口受因他下即不喜沙門及驚急緣者開置地受如五分火燒馬屋送食置地也加口受彼下食時如僧祗口加三受是也即噉中前噉也三受手受口受是請故有別衆是足犯破威儀不得再食作餘食法者方得開後中前再食者無妨諸過即七過人食同住人即比丘也邪利活命所得也心境相當謂僧俗二心同緣一境相觸謂授食入手已淨人來觸理須再受持食寄寄在比丘處也後取已再施此比丘者開以先無心故若有心不得不成者不成受也輕心觸手淨人輕心授食時觸比丘手不成受廣如鈔即不受食戒中引了論云除自己及同類餘三類衆生隨一被教知比丘不得自取食食又知此可食物知比丘是受施人度與比丘若不解此義雖與不成受多論為作證明故非錯誤律中錯受酥油不成可通例也如善見下彼具云若乞食值風塵土落鉢中作念當與沙彌凡得還語沙彌如上因緣已沙彌受已云此是沙彌食今施與大德得食無犯十句四分受有二五種手與手受手與持物受持物與手受若持物授持物受若遙過物復有五種身衣曲肘器還以上四受若有因緣置地與若迎下五分所云從他淨人邊抄撮而取非法如下引例儉時八事豐時則閉今亦然也隨口約食隨著約衣隨人約房一食即初食時但一念也如是不能合云不能如是文倒若下不行即不作觀也毗尼母云受人信施不如法用放逸其心廢修道業入三塗受重苦故若不受苦報者食他信施食即破腹出衣即離身今未即受者果在地獄也對施四分云寧以熱鐵為衣燒爛身盡不著信心男女衣服寧在鐵牀燒身焦爛不受信心好牀臥具寧受鐵屋中住燒身不受房舍在中止宿寧吞熱鐵丸燒爛五臟從下而出不受信心捫摸其身何以故不因此墮三惡道故耘説文云除苗間穢也刈穫割也持戒第二此人雖曰持戒而食蓋不作觀故鈔云受施之時必須作念不作時得罪負人信施七學三界四向也己物即主用盤石盤大也即大石淨處捨受不苦不樂名捨受醉迷醉也謂食竟身心力強不計他也二下謂貪著香味身心安樂縱情取適故三下即食畢樂於光悅勝常也四下樂得充滿肥圓故轉載如油膏車焉問油之美惡故經即雜寶藏中有王試外道比丘好惡二食以驗知道法比丘乃至説偈如疏所引修道為續壽命假此報身報命成法身慧命故文中亦指鈔文也注精精即心神心下示貪急之心也耐忍也須臾下當觀入口已復吐出尚自惡見何況出時唯是不淨何足為貪羅剎以己嗔故是羅剎因因業既成果報須克縱後知者雖悔何追地位苟是大行大解可日銷萬金反此則杯水難受也大下此南山苦言也學者善思受苦是因言受苦以此為因則所為極是劣弱矣如法治其吉罪以別緣不具故以越下明相出時口法已失故有殘宿等罪也澱堂練反指歸云凝下滓也義通四藥者水淨之語惟有漿中約義而論四藥並當水淨也如屣下要令淨人著行七步一墮壞生也一吉不作淨也非時罪即提也各五舍利弗風病醫教服五種脂熊罷豬驢魚也又律云比丘有病因緣聽服五種藥酥油蜜生酥石蜜等分具風冷熱也戒疏彼引僧祇五藥及脂清淨無食氣一時頓受七日服之了論因病故開隨差為量止於七日又云世中蜜煎薑有病開服無病貪噉與犯法同何況蜜藕諸湯為貪所使則來報鐵漿亦是貪得如是例諸及鈔即四藥篇云加法盡形亦開自煮十誦若生食火淨亦開內宿餘三不合如鈔引二衣篇明作淨法六門一制説意二施主差別三開説進不四説之法用五辨施主存亡所以六明失法不同百一善見云餘衣唯得受持一不得多多即是長差降減作吉懺也失其實者不了染不染物也四分初日得衣二日不得乃至十一日通皆不犯如是等類具有八門餘七者二中間淨施三遣與人四失衣五故壞六作非衣七親厚意八忘去通不相染餘無法緣是犯今不得其實也尺下謂彼但知一肘是尺八一步是六尺上鉢是三斗而不知用何斗量是誦語也故大師云余曾遊晉魏及以關輔諸方律肆每必預筵至論尺斗廢興並未霑述故即刪補必下以上根但畜三衣中根畜百一下根畜長今下根既行説淨隨得即説者不可準中根人也母論云若放逸不説淨者以惡心故不滿十日皆犯捨墮等五等取雨衣覆瘡衣共成五十誦七種衣不作淨施三衣坐具雨衣覆瘡衣六七及百一供身具是也遇緣前人寄物路遠未入手之類施他即篤信檀越同類不可對比丘説淨不例猶言俗人不在此例故可請彼作也遣下多論云先求知法白衣語云若不知者告令解之至彼所云比丘之法不得畜錢寶金銀穀米等今以檀越為淨施主後得錢寶盡施檀越真實淨物過施主邊也展轉淨物不過也求即請也論既言求求即是請之意也非面謂非對面也他屬俱屬淨主也廣如鈔彼引僧祇云沙彌邊作淨此通展轉若受具稱無歲比丘若死得停十日更須説淨大師注云有人言真實主亡則失展轉者不失此未讀正律更牒本緣即更牒本主淨施緣也明曾為受之中與我我已受之又牒前命即文中汝與某甲且還付汝即文中是衣某已有汝為某甲善護持也隨時如衣言著用藥言服用鉢言受用俱淨由説故自無畜長過淨主不知又無貪畜過也不如受衣即三衣也若無人者心念開成後若有人不須重受以彼受衣被體非遣著故隨定一人貴存亡可知故十誦云不得稱三二人作淨應與一人得過制限十一日也以彼不知故得後下即還作己物想但得十日也一是受下加兩對三衣無人對首時亦可如此作法互捨受兩淨即他想展轉并捨故受新二種故鈔云律中捨新十日一易應是不説淨彼注云或可説淨故令展轉此則通二種人説淨也雖下謂界雖有人而是愚塞不知解者及狂亂不足非數之人皆開用此法也必下如有知解比丘或有他行夜間回者須得作法不得依此心念也非下以非法乞求及販賣所得者不合説淨由物體已犯不應淨法故故曰由早犯也不是意外是本説淨財易淨衣物來非本意外別得財也理須展轉據理須説淨今所以不説者但由非意外財也必下若寶主亡者理須別請主説一墮即開不説淨墮及默染二吉也
