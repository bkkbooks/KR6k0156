body:
  text: 天台沙門釋允堪述釋諸說戒法篇第五緣與因異者蓋緣疏而因親也其猶種物種子為因水土為緣又善惡二業皆有因緣也謐密音靜也安也初下即括示前二篇末下示說戒安恣分懺住持諸篇也則下結益正宗第四除前集法緣成外今說戒當正宗第四也如鈔即說戒篇餘道即外道以彼多竊用故彼但得外事而不知理本故如來後復制之與古佛同源方本其由為出界繫耳捨惡由戒止持故證善由戒作持故三受布薩即八日十四十五日皆清淨奉齊也淨住謂清淨者可同住也長養由戒淨故功德增長也齊下即南齊司徒蕭子良生封竟陵王薨謐文宣王因夢東方普光世界天王如來令修布薩事遂集淨住子二十卷即誦菩薩戒儀式其間頗有發願立誓讚頌序引也自恣亦爾以同是懺罪清淨義引下文有四段初從良下說依教故正法久住次從若至下雖來覆罪非法後或都下說破戒不來非法義如斯下至科末結損益如下結損然下結益得非來習為將來之善習緣也就僧義四簡別人等法也時節即十四十五十六食前食後等集僧下即鳴椎等三下鈔曰正說儀具有十種始前須處所終說竟法四下辨外來告淨多少重說等迷亂容不憶說戒時故須思識罪當懺疑罪發露須知事有言對事有此要須知所以也前二八日十四日後一十五日受令去呼維那受上座令白告亦得如下引例同界堂鈔云中國布薩有說戒堂至時便赴此無別所多在講食兩堂故云界堂即同界之堂也理須準承上下有儀上座說戒明律秉法少年佐助是合軌儀也反此則舉置乖矣舍羅謂西方以舍羅草為籌故從草以立名不開言不開不說者諸惡莫作律令說此一偈增一解云諸惡莫作戒具足清白之行諸善奉行心意清淨自淨其意除邪顛倒是諸佛佛教者去愚惑想戒淨故意淨意淨故無倒無倒故惑想滅偈序此長行序也三語對首三說也口授當告比近人示令去呼不得大衆同教致增混亂合誦齊聲誦也得補次人補之四下證上得補也如下如有位者垂告令時豈執文耶讀文作法此說羯磨也向云說戒羯磨俱是聖教但止作異耳不責雖是有罪之行而互不相責以世所同行故名種謂罪名種相也差人往懺謂同犯已彼此無由洗懺令差人往彼懺已清淨還反此處餘人可對彼懺次第成淨上起者往前墮在犯罪處故名為下罪相續故遮隨戒無作不生今若懺悔約遮相續還得受持清淨對治護故戒法續生稱之為起第二白法翻前犯罪時下故名為上是以懺悔總名上起也法是除緣以法是除罪之緣也如下引例證成別法夷須白四殘行別住等故不可也雖然苟具大解深明理觀者不在此簡恐縱實染故又遮防必對方除要後識了對人方除待淨人須問彼粥出釜時畫成不成字等方定其犯猶稱清淨戒是引發縱起一毒於一境上犯餘毒餘境上曾未犯故薩婆多云寧可一時發一切戒不可一時犯一切戒或貪心犯女一道但名污一淫戒自餘諸淫戒體光潔無行可違稱本受體豈下豈以犯一重而便自謂一切不淨耶故大師云有人犯一淫戒初乃惶懼後復思審謂言失戒遂即雷同隨過皆犯豈不由愚於教網自陷流俗焉知但犯一淫諸淫並皆不犯當篇殺盜常淨儼然下之五聚義同初受以律下釋上違教義意下謂雖有犯其人意謂不犯由心淨故開彼聞戒不得下釋上不得逼懺義也一不得聞戒以疑有罪故二不得懺悔以心未決故不知不脫者意云若心不知有犯何不便使令脫云何無罪而復言不得聽戒不得懺悔若爾顯是有罪未知進退如何答下若約自行成立不以不知故得脫要須審慎治令淨也無違心以意謂不犯故兩識識有識無也不可任情言不可使無罪行懺有罪不行一須具德言五人中一人須具十德及二十夏等兩處即尼請教誡自恣時如鈔云上座敕尼衆云大衆上下各並默然不云見罪者良由尼等內無缺犯外得清淨各精勤行道謹慎如法自恣此後戒即向下說戒也以此是說前之法故舊淨古約舊住人本知是淨故若下如來至第一重三問不須告已至則須告以不及前問不問主客荀舊住後主豈不須告故與古不同惡覺即不善尋伺也此難即前所立難也無文制說謂無律文制再來者告淨然下大師斷也謂起去再來中間有不聞之戒若憶有犯即須顯告不同在坐避喧故開心念發露僧法即前用白法同懺是也又下不同前對清淨比丘以前是對別今是對衆恐有喧故擬下若據律文對首心念為界無人方開今界內大衆並集何開心念今對下是釋言不可准同對首心念常條界內無人開作以此是但心念故提縛即同明了論也彼云人難者有人欲執縛比丘也具鈔指彼說戒中引諸部文是也乃至盛夏嚴冬准前略說緩急鈔云說戒師當量事緩急觀時進不緩則為廣三十九十略其餘者急則為說序已餘隨略之常下今常塗盛寒酷熱之時容可安緩敘致宜廣前序至四夷及後衆學滅諍等文而略中間十三已下廣戒又復應知從急至緩合十五略鈔云至序竟問清淨已應言諸大德是四波羅夷法僧常聞乃至諸大德是衆學法僧常聞一一各題通結七滅諍下如法廣說至末文也四分文中不了但言餘者僧常問今准毗尼母論說也難卒排門此合律從緩至急辨七略一擲也僧祇下牒注解也戒制下謂戒之正制是約事相若誦則為切要易明持犯經據心識以經是治心之要也又約理則憑託虗玄不定輕重卒難依護不下不可愛經面憎戒便謂誦經即是說戒故曰一也良由闕誦暫以代之清淨同見者戒體無違同一正見也前下前食即小食後食即中食是法別衆如界有三人一人傳欲至是對首法中別衆也法除若得一清淨比丘提罪已下皆可懺也上二篇且對發露若無人者准鈔云小罪責心已便說若有重吉羅已上有疑及識或云發露或云待人無明斷今準通解云須發露今日衆僧說戒我犯某罪不應說戒布薩三說五百下彼云一比丘住處有界主布薩日光向四方僧懺悔三說已獨坐高誦戒本釋諸衆安居篇第六出俗者謂出離俗有務修三乘聖道局事奔馳散亂則非修出世之業也邑野通收聚落村野情塵情謂六情塵謂六塵影取六根也顛仆訃那偃仆也巨壑喻所陷也三時春夏冬鈔云故律通制三時意存據道一下以夏中方尺之地悉並有蟲即正法念經云夏中除大小便餘則加趺而坐世謗如居士譏六群言踏生草木斷他命根外道尚自安居蟲鳥猶有巢窟因訶而制形心下通收三業也作法要期又是口業前三即對首心念忘成園界即僧伽藍園界即攝僧界也雙隻足有雙足一足入界所謂一腳踏界起安居心即名前坐今但約園界并雙隻成四并上三位成七將此曆對前中後安居則三七成二十一種又作法自然二界各有二十一成四十二種又五衆各有四十二則成二百一十種安居前之二法即對首心念此之五法忘成為一及界為四即園界界雙也二日前後安居二日也中間即中安居二十九日也以下合數謂以對首心念曆前中後三時二三成六又括界園兩處成十二又五衆各有十二成六十種以下忘成及界五法歷前後二日成十又對園界成二十又五衆各有二十成一百并前六十成一百六十種安居也一月一日從四月十六日至五月十六也涉三十一日兼閏約四五月說五法即忘成等五法前後兩夏即前安居并後安居兩日坐夏也各十六日前是四月十六日後是五月十六日尼提以遊化義少故重僧反故輕三十日坐從四月十六日至五月十五日皆得名前坐以初日有難故下例成也一日受歲同至七月十六日自恣後坐即五月十六日結人日日從七月十六日至八月十五日可隨無難日皆得受歲僧祇下此約前安居日在道中不可不結一越即不結一吉據下意云若前結日便成不應制後更結但前結者非是究竟安居處且順教至日行法及乎數日正坐以後為定行住行則遠至修安住則久居此處對念即對首心念先有要謂先要期此界今從外來與本心境相應雖無開成文下律忘不心念者若安居故來便成安居故知住人不入開例必下若舊住人有惡心者理在通限又大師云外來為事不為修安雖忘不開以非為安故來也若下意云若直爾得何須於前復立加法一位答下作法是制忘成是開約義俱立不可無也如上即三過是也蒸爾雅云盛也說文云蒸火氣上行也待量量度前事如法可往故鈔云受日緣務要是三寶請喚生善滅惡者聽往餘如彼文各下望化物邊且許不結必無事不安亦有小罪待形謂有待之形必假資濟也開捨捨即是聽初日則四月十六日得成若有差脫便不得結教法太急不名智人由如來是一切智人故開制得中不可常行言不可但行制四月而無開也王作閏月閏起自於王曆西土三時造曆夏初曆未出比丘期心已定故得合閏數滿出界成受不依閏也不成受依閏也昔下指前解今下不依閏名雖是同約義自別前不依閏而數今不依閏是除去閏月猶是依閏之別名正月除閏月外是正座月前四月戒本春殘一月在應求雨浴衣半月應用浴既在前四月則含後閏四月成百二十日彼衣是開法尚含閏而受夏是制教理宜通護即下大師和會二文本知有閏則依閏坐不合受不知有閏可數滿受歲即開受衣故鈔云既二文兼具至時隨緣夏初要心取閏不得依伽論若反前者通二論兩文本閏正月者凡閏以初月為正後月為閏閏餘者蓋是取日行度之餘以積成閏故既受正月不可取餘分在數也故曰何得攝閏等安居是制反顯受日是聽以聽同制義不可也五下應先問云迦提一月五月得含閏二六不將五事下通之諸妨即疑妨也近促含閏曰反此名促皆四月住如四月十六日結者至七月十六日解夏是四月也乃至閏四月一日結者虗坐一月至七月末解夏亦是四月住此一段也若閏下如二日結者不滿四月住以少一日故乃至閏月三十日結者但虗坐一日中間多少比之可了故曰漸減等此第二段若五下如五月一日結至七月末是三月住乃至五月十六日結至八月十六日出界亦三月住此第三段前安居望後五月一日得前名即初四月二十日結者方得一日明朝入閏越過閏後取五月六七三箇月為實坐故至七月末去後安居即五月一日結者至七月末尚少一日要至八月一日明相現出界是降一日也閏月一日結即閏四月一日結者以虗坐一月也故與五月一日結人同至八月且出界安居隔一日即閏四月三十日結者與五月一日結人是隔一日亦至八月且出界但前虗坐一日為異中間漸降亦可比知此下即屬前第二段閏四月位也皆三月住以未侵後閏故五月下此說第二品既少一日要越閏過取八月一日以補之則成四月住日日從五月三日乃至五月十六日結者皆虗坐閏七月一月取八月補之亦四月住隔一日五月一日望五月二日是隔一日也隔一月以二日結者侵閏虗坐一月故望前五月一日坐人至七月末出是隔一月也即五下示上十四日謂二日後從三日數至五月十六日結人是隔十四日也上言自恣一月者亦謂隔閏七月一月名隔月如五月十六日結者至初七月末方得七十五日明朝入閏要越過後取八月十六日出界亦四月住解界破夏二科如文可知但欲同法合界者為欲同法受利者各捨通結又十誦疏中亦明本非為夏進不不專作法以自然地上亦成安故若下謂若依古人執文云安居不竟解界破夏者亦可安居不竟自恣亦破夏耶以自恣通一月反難可知者今安居不竟自恣既不破夏反例安居不竟解界亦不破夏如何輒言解界破夏耶如在下又如結攝衣界後有緣須解應可解攝衣界時衣即名離今既不爾解界不失夏斯亦可同如何說言解界破夏有下敘由此師言初依自然地上安居夏中忽有半月一月緣須請法出界今須結界方可受日未知結時破不破耶昔下標舉失本自然以初依自然安居今既結作法地故結時破是也文下古自引證守強於本言勝於自然本地然下謂凡立心修行奉持者判罪宜通攝護從急遠於自然即後結法寬於本依自然界也但下要依本自然限齊內護夏以是本要心處故又若有難可依後寬結護夏無難不可故曰既無難緣不可後開若結界狹於自然者有說依新結界地護夏有說但依本時寬自然護何哉以下是釋由下言本立結界者意在作羯磨不為安居故今依本寬自然護者理在通成既下既不失前護衣例今依寬結地亦不失前坐彼文下出僧祇第八卷中出界去謂彼僧出三由旬界外可結也捨後結前者謂捨後住難地結取前無難地也或死餘去俱約比丘也既無依故開寬結顯今有難從後寬結護夏理無妨矣悠悠者遠意也須下顯成今意及會成第二師意也不下若不次第敘古無以顯今去取意耳背前結後者背此處受請安居而往彼處以定成不惱施主先請施主也亦下以貪往異處故皆須經宿要四月十六日結已經一宿方名前坐後結方成若有緣往彼再結成者由前已經一宿故為彼植福畢也顯前即未經一宿往彼續結不名前坐故曰破也雖下謂雖作背此意而往彼未經宿者亦不名破由再還者理名前坐所下出即日不許往彼再結得成之意若下若捨前求後安居不得者何以持衣許捨故受新耶別屬以衣是別屬故又不惱施主後訃別處安居則反上二意由依他處故非別屬又違前請故成可惱宿結二人曾經一宿曾經結已則有破也今欲彰顯有過故略不明於成亦深防之義便得罪者方有破夏罪也應成不成者據理於前家應成安居今違心別求故不成安居故得言破也後安居此望前得後名故下故知但只受請未名安居要須在界結已方名安也此結證上豈可受請即名安居初後一日四月十六日并五月十六日就犍度即安居犍度云前安居者住前三月後安居住後三月緣發即緣起以律云尼不安居故提餘分有缺言餘三衆亦分有所缺如僧有遊化義下三界未圓也五種者一謂誦戒至三十二至九十三誦比丘戒本四二部戒本夏多緣故須善通塞也制依第五謂廣誦二部律所以須者五分云有比丘自不知律又不依持律安居夏中生疑又問無處乃至佛言往持律處安居彼文明決指了論也疏即真疏第五即了論中在處無五過於此第五中復自有五過故解如疏思擇妨修禪觀也又須下解第四過中自分五德也又以下解論第五過正文也匏瓜出論語為七即於界分四并上三成七是也多論下彼問云佛從他安居自安居答曰有言從他安居有云自安居疏取後解四無所畏一一切智無所畏二漏盡無所畏三說障道無所畏四說盡苦道無所畏此四通名無所畏者於大衆中廣說自他智斷既決定無失則無微致恐懼之相故故稱無所畏不作三語彼論又問曰佛三語安居一語安居答曰佛一念安居不以口言以不忘故雙述牒某伽藍又牒聚落也世云人所傳西土如此也漢地以佛法當後漢時興故例稱之六月十六反前云五月十五日是有據也三代夏殷周也十月為歲暮則以十一月為歲首乃用周曆耳若然用之六月即夏之四月與今頗同來人即國中三藏春初約三時分則是春分第一日也豈越規猷雖前後不同皆以九十日為限屬春是春分末日也屬冬是冬分第一日也諸善根本以不放逸故諸善生長也故制依咨即依第五律師咨詢疑滯餘四即前四種律師問何不制依經論二師將二藏下答縱下以經論正理除邪倒也今苦有此疑者豈不問耶以新學之人分未之及所犯蓋微然於理有疑亦應有犯以非正制故不云依但制依律應新學也若下意云春冬亦有微細過何獨開依前四耶答下若約懷疑俱須問也但由春冬過少故開依前四種夏則反之故限第五如五分成即五分法身成立也所謂劣者依優賢者依聖乃至成佛亦有所師所謂法也五答增一云毗尼有五事答一序二制三重制四修多羅五隨順修多羅既曰隨順等即是依止法義也隨安無罪但隨安居亦無咎也準上者準上既有前後安居中安居亦可法上而作多論下彼第二云佛一切時前安居唯毗羅然國後安居以因緣故已上正文餘人目將來比丘有因緣可學在後無者不可故曰何事常後但略對境即除大德一心及對證問答等語七事凡有十七事皆開作心念也一坐即一坐夏中不得過三回忘後悔也伽論下證上園也我今下一足入界尚成雙足入者準成可知處界下似難詞佛下是釋問下意謂雙足入界成安今若雙足出界理名破夏此則相對可顯例今一足入界成安居一足出界應破夏利勝利益行人勝故以一足入界成安一足出界未破乘船道行約女人衣夏約界足論雙隻開結不同者蓋有益行人故也後二即忘成及界有人下既開忘成及界豈開後而重制中安居不得耶知何不為者既愚法受日出界知何事而不為蓋無知故猶下但智有受日法而不知衆別兩分非癡是何計互比丘對尼兩不足數通文通言五衆正作法時要本衆自相對兩界自然作法俱得以是對首法故餘半月一月既用羯磨須在作法界以文下古執羯磨緣非云受過七日法半月一月出界故未有緣如來有半月一月緣何得忘受一月等出界耶答爾何言過七日將文列下通之言羯磨是過七日之法非用過之過攝而通用約受一月復攝十日得通用不以法強者以羯磨法強可攝七日短法也一緣同為一佛事緣則不可雙受兩法若緣別者理通如下引例衆緣即衆多別緣也治生即販賣興利治理生命也不下不受但犯破夏小吉若受後往外種種破戒則難補大過矣阿含此云法歸不越四含所謂長中增雜也梵動經亦四分自指彼云爾時有比丘誦六十種經如梵動經等為求同誦人故欲人間遊行乃至佛言聽去使得一事趣得一事成者方應請法反此獲罪依事謂彼律隨事長短前事未竟其法不失四分不爾制限三品雖事在日滿法則失也故曰以法收事七夜四分但言七日部類不同返心言能回彼不信心也摩醯首羅正云摩醯濕伐羅摩醯亦云大濕伐羅此云自在於大千世界得大自在故形有八臂三目乘大白牛或云如藕泥色手臂各有執持西域多立此天像號為天祠人有乞願無不如意直去不用受日也顯緣四分中有同界安居因我故鬪外界僧尼鬪諍須我和滅聽直去然和滅之相難知約緣而受不傷大理重破下文云當界諸僧由我故便生鬪亂為重此和便出界去十四是檀越即為彼受戒懺悔布施等緣如謂緣事如法也或多或少合受俱得如下引例彼異種同懺尚得今異緣合受亦通隨依受之者為張受七日後更為王受半月亦得以緣別故不同古人以強攝短三期過三七日也異七日藥彼以病轉故法失文中即四分證上依日故大鈔問云此請七日得兼夜不答不得以文云至第七日當還不同十誦以彼文中受七夜故又不得改云七夜以部別不同雖然四分日光沒時法謝彼夜分盡時謝據理第七日俱還答言下律云不及非謂約路遠往返不及蓋約緣事為絆還界不及耳或事緣或情事但是如法皆開一下謂傍昔言也二下即倣像未實也三下由事虗限濫日數妄置也僥幸非分遇福也無事證上無實緣也減年雖開受日往應受戒彼若年未滿者緣亦非也五百下彼問云結坐受七日法為坐初受為臨行時受答初坐受者好若坐初不受亦可臨行時受三十九日亦爾懺悔彼論又問云夏中不受七日法暫小小出界故故得坐不答懺悔得準下若言夏初即受是有懸者又云不受七日暫小小出要須懺悔顯受日往以急例緩宜從急矣無佛所聽緣即不開聽之緣而妄託受日往者破夏互用無損者古謂為僧事受七日已用三日更有佛事便通餘用無咎十下古自引證答下十誦中白餘殘夜用謂同是一事未了却還本界今復往外恐疑不得故開白已往既云下南山語開三即七日半月一月破下既曰破安居去驗知不許重受有下若云修道今為三寶聽法因緣亦是修道何得制住初制或可十誦不重受約初立制而未顯後開或是一事上不許重非謂異事故鈔云十誦聽一七夜不聽二七夜謂一時雙牒二七夜前後用望下若再受七日法似重約事未重何也前是佛事此是法事等如下如請七日為張人受歸戒後又王人請受雖法是重約人未重故曰皆言最初留連律云比丘受七日出界外為母所留至意欲還而遂不及彼自念言為失歲不失歲乃至佛言不失父母兄弟姊妹本二夜叉鬼神難亦爾開聽越越其日數也何能不去等既官事豈可言曾受七日今不去耶未聽如來事去者諸比丘隨有緣來請者皆作如是言也顯不專輒故俟白佛十八緣即檀越請為衣鉢坐具針筒為比丘懺殘比丘尼請出罪沙彌受戒父母等廣如安居犍度中或更有收餘不盡也鈔云律列二十餘緣是也如下引例豈有前囑入村後有緣更曯不得耶有疑自有疑也豈下豈可前有疑開受日出問後有疑不開受耶若下若如上解許重受者十誦不許重義如何通釋二位即七夜并三十九夜重加雙牒加法也又以七夜後有三十九夜不可雙牒二七夜受若下若得重者何故十律用二法已後開破夏去耶依下以僧祇事訖須用中間別法還與十誦破安居去同只不可十誦用祇法也可用事訖以彼亦有法故唯不得於別事上用若互破夏頓受一月日法出界倒是成坐夏耶此皆反斥古人也約下斷歸今義若慮忘亦可再受日去如此則不慮某緣滿某緣未滿及續行日數之忘也卑摩羅叉晉言無垢眼論中既許重受翻十律時豈有不得況同是一人出故明了下二句是彼偈文解云真諦疏也三種緣即下文有事先成七日緣等此三各自為頭曆成三三句也論下此舉七日緣為頭曆成三句本處即先往界外處是則下結成上名義此下解通互所以為本有法故本處即安居處餘處即界外亦須當時通有緣可也若下第二有難緣為頭歷成三句望上三句次第當第四句也謂四有事先成有難因緣從更成有難因緣倣上初句陳相五有事先成有難因緣後成七日因緣倣上第二六有事先成有難因緣後成隨意因緣倣上第三又將第三隨意緣為頭曆成三句當第七句也即七有事先成隨意因緣後更成隨意因緣同初句八有事先成隨意因緣後成七日因緣同第二九有事先成隨意因緣後成有難因緣同第三然下上三緣九句但有緣應法不違初受心俱成反此敗矣無單反顯有重受也情挾贓賄非法為利故受日也故律云不應專為飲食故受七日去以法收緣以律但有七日法故不論緣是一二日也夏末五日言夏末止有五日在如何亦請七日法耶答解如文縱引十誦彼有二位受法縱夏末無三十九夜今有過七夜緣亦須請三十九夜以法定故今下若古人不許重受如夏末二三日在今又有七夜緣起先已受了今却作一月日法者是名非法破夏以是別緣故此重破古義也七月九日望十五日正滿七日至十六日自得出界為成不成耶後開無前開者謂十六日後有開十五日內無開也以七下釋成急施衣彼次第增中十六日自恣雖十五日自恣未得出界以夜分未盡故隨行言十五日隨行界外猶未屬犯以在限內故十六又自夏滿何故十五須返本界相出即明相出也又問下此還約七月九日受者以問夏成今問何為破夏答文可知若約下因便明十誦明相下意云若八日明相見身不及第七夜在界即成破也又復應知四分日沒時法謝十誦夜分盡時謝今盡時須在本界故如七下古人自引例若爾下立彼自難答下申彼答意今下正斥十誦明文彼云若中路聞死反戒八難起不應去又僧祇云中前和了中後即還若停住者準即破夏又明了論云請七日出界事訖不還破安居得小罪不同下斥上引欲法例以說欲詞中不牒欲緣為羯磨事故緣謝法在今請日牒事故事謝法失亦下斥上引加七日藥為例以病止亦不可用義反同此又下斥引狂法例以狂病雖止奈制乞解云何取例謬之甚矣故曰何因浪引通緣上下謂通於緣事有上有下亦開同僧作三法受故鈔云此有濫同僧法但令緣至三法受日口受顯是七日鑿寺為惡人穿鑿僧寺也通水通水路也月緣本部極有一月緣更無過者不同他部三十九夜等執下或目執緣不同者不可改四分羯磨作三十九夜及事訖受若要過月受須秉十誦僧祇等法可也以四分三法有準不可通行如鈔即定緣是非中故重及者謂前已引云十誦律佛制五衆並令安居今為不行又連受故重言及也四本即序引曹魏等四師出本是也初人即古本曹魏所翻者前雖有乞以羯磨中不牒乞辭恐增加羯磨故第二人即光師所述者兩遍牒事彼乞覆藏法中若僧時到前云今從僧乞百外覆藏羯磨於忍聽後略緣牒事也光師亦倣之前添乞辭忍聽後但牒某事緣也第三人即願師後述本六夜彼準摩那埵法亦牒乞也文局義通者謂初本白羯磨不牒乞後二本各牒乞是文各有所局然俱存告衆是義通也有人復有人斷上加乞是不應律文如白作白之制故成破夏增乞謂光師憑律乞覆藏法故滅乞謂曇諦憑本羯磨故雖然羯磨網骨不失大塗準律直誦但四句成白時到前不牒乞辭也杖囊老病開執杖須乞法今須羯磨中加乞是如法也以前單白中含故律羯磨中無者但譯者漏文耳三律僧祇十誦五分問下意云杖囊准白中含乞故加乞受日本律既無不可準者一往領辭也若爾羯磨前僧和諸法唯出功德中餘法皆無不應餘諸羯磨皆准著耶解下此蓋以理而推度也謂下言羯磨前和僧不同此前和用入羯磨乞則不爾若入法中即是增也受者多人好受利長遠不知節故所以須牒和令捨餘和法中無此義故不須牒也漏略或結集翻傳時漏略耳難起上去呼如自恣難遍一白後三語自恣是也五德即不愛等五當量下準上僧私之機轉變義勢亦無妨也問下受半月云受過七日法十五日出界外今受一月法何不言受過半月一月出界外而亦言過七日者答如文答下既牒十五日故須數滿若一月既不牒日數但齊一月不問大小也準下準白中緣非但餘過之一字十誦下事鈔云十誦令五衆受日五衆邊受準此當衆相共作之今若比丘對沙彌則文非可用口告謂心念已口告云今受七日往某處汝當知之本二在家時妻也因中彰果使將來不得淨果故說為難明了下彼云夏月安居有八難因緣令弃捨安居而不犯罪一王難二賊難三人難四非人難五𦚾行難六火難七水難八梵行難亦不得歲古人準此何用更論有夏無夏接界通收即捨此結前也四律中四分僧祇義含得夏中間通漫尋文可知博易梵行難也又下此師謂安居與夏兩義自殊若破安居夏法不失為夏以修道為務今若出界修道不輟名破安居不破夏反前即不覓安居處也前後即成前後安居也夷平也為重此和即敬重此和也以僧和故衆法可舉不爾疾滅正法故開自去至意即父母等至意留也道斷水陸道斷也高齊下即北齊高氏置十員僧統即法上洪遵等用統僧尼時昭玄寺謂之昭玄十統昭玄即昭玄司僧尼本係鴻臚寺至北齊係昭玄寺至唐延載元年方祠部司也今謂十統斷言得夏釋自恣法篇第七心性義開謂一夏修營不獨七支清淨抑亦心性開明陶冶戰國䇿曰範土曰陶冶謂鎔鑄也尸子云尤造九冶精靈即精神紏治即糾彈治罰也攝衆僧彼此舉懺令淨即成相攝也善惡相化善為能化惡為所化不孤獨犯已在衆外名孤今若悔已可入清衆故不孤獨苦言謂舉治謫罰之言也無病無破戒病惱懺悔則安樂也喜悅先時有罪故憂今悔已無瑕故喜何事乖越謂不順教也生知謂生而知之者上矣今既少故必須良友之琢磨也豈聖人乎言豈非聖人乎苟涉理稽道則語之有益豈以杜默為善乎白羊謂啞遭殺至死無聲空自狠戾今比丘不可爾也故下佛立法制異上外道令夏竟互相撿挍有罪無罪也中下中間若舍抱非法者非三乘之道標望也抱過生年懷抱過釁以度一生也少事不語者語多故過失則多今以方便誡止故亦須至布薩時共相問訊呪願即隨時回向發願偈讚等折伏如行梵壇法等亦非經久無犯無違僧制罪也大同說戒即集僧布設等各有所為律云僧十四日自恣尼十五日自恣此謂相依問罪故制異日及論作法三日通用克定一期十六日定今下斥非安居已顯十六日明相出方滿九十日古下縱欲依古十四日解夏須不得侵十五日明相又須坐守日滿未得即出十六明旦出界方無破夏反此名非緣以不及夏竟故柔軟不以粗獷者類上亦合有二句解之又慈心上亦合標云慈心不以瞋恚者七字方接慈心慰拔句必傳寫之脫也威儀經即三千威儀也五人要隻差五德但前後秉法差貴互入僧數故既犯清淨謂既有犯先懺令清淨方可受尼露罪前解即尼請教誡中如鈔彼云僧各在地上敷廗而坐以是互相舉過處牀慢相不絶不度者謂惑業苦海無不度也大德據鈔中大德下加一心念字下應上法下屬自己上屬衆僧一途釋其大小以上且言小者長老舍利弗稱長老顯是尊故大論舍利弗目連為佛左右二面弟子又法輪大將故知尊也阿難居後故稱賢者小己言五德小於己也為可對稱為大德不如鈔彼注云此僧祇文是也二略即二說并一說為二若三說者不名為略所以須白者四分云若賊等急難不可間緩者五德至上座前互跪白言今有難事不得一說當作羯磨各各三說文云大德僧聽若僧時到僧忍聽僧今各各共三語自恣白如是二說一說皆須單白以此自恣不對五德進不無由故須羯磨令衆同聞不受第五人欲者以四人無隻差五德義既不秉法無以受欲以欲正應衆法表心無二故說己心行通包三業云清淨故即法言即此自恣之法通該一化故曰十方同遵也鈔問云對僧自恣云是罪懺悔對首心念皆云清淨者何答僧中通有治舉之義加法容得具足別人雖有治舉攝治未能得盡故但言清淨舉心應僧約夏量德須滿二十夏及具十德也近下指妄行今又絶聞矣釋諸衣分法篇第八濟緣以迦提一月五月正為受利助外資之緣也福下令彼施者福不生於良田翻成汙澤故曰非地通局如二種僧得曰通二種現前曰局五利畜長衣等五除下離一月五月外為施塔因施塔故有物施僧也留過安居意欲在時內受準下既云作非時現前僧分此但隨施者心若為賞夏勞須在夏末受若不為賞夏勞一年之內俱得受如文如下六科自解時現前夏竟施此界僧也二下不為夏僧但隨本界僧施也二部但合施此處僧尼為異與前略同不須下既施入有限不須作法限約也當時即現受時隨家隨界言家者此約召僧至本家坐夏時竟故施界則通僧界中墮籌以好惡相參令不見者擲籌而分二種僧得即時僧得非時僧得隨一月五月內皆得受也隨處此界彼界也隨人要普集僧也但及得羯磨聲者皆得其分展轉者先差一五德以秉付分以緣中牒云僧今持是衣物與某甲當還與僧故餘下四人作對首分一人作心念分等半分者將衣物相參大分二分彼此得已各作法分也四定古謂一者時定唯局夏末二者處定在此界分三者人定坐夏僧方得四者法定直爾攝故若留至非時分者須作法也若下古自立難若云定者何以律令相待謂有緣出界令相待分不爾應囑人取分耶答下以出界比丘元此界安居故合同受施故兼有夏勞故後來即別界來者既非此界安居又無夏勞則不得分故云缺他二義何下反是時現前故下此約界中無人開心念受執衣加受竟外來無分為己作法故以此證知要須作法一人尚爾何况僧耶受持淨施者俱顯有法隔故又屬己故不爾後僧得初位即將檀越施亡僧物立為初位也就前即檀越施時及非時即時現前非時現前各有一部二部僧下又於僧得施中亦二時僧得非時僧得常住處即現布常住飲食處約界齊此界分隨僧外來亦沾分也此下二門即約界得并隨僧得亦各有一部二部僧一人心念法受二三四人對首受五人作展轉法受就二下即第二二部僧得中對面對二部僧面行施也二互施者施僧無僧尼得施尼無尼僧得也第二即上初位分二中當第二也三衆尼及式叉沙彌尼也今既無故僧全取分二衆僧及沙彌也既無尼全取分所下釋注中僧多尼少分作二分意也僧義不異者同是衆義又生福等故恐失福緣者令彼施生失生福之處故大鈔云莫非俱是福田故二衆互取釋僧下點注中所以名僧得者文也尋之可了西梵下如末利夫人施僧布薩錢大師云準義付他以比丘正制捉寶故非是衣相即未成可著衣也治輕望未犯重故奪行即奪三十五事中五五奪其供給也若亦懺殘中亦奪行何以開之將殘下答通沙下釋注中沙彌等與文也僧因相假以大僧之因假沙彌以成故行缺未滿無願毗尼故異部即五分所以下若據鈔中大師義斷云準此諸部二種現前等與二種僧得隨僧和合與守下大鈔云沙彌淨人四律並云若僧和合等與乃至四中與一淨人五中與一安居釋上時義各取分釋上現前非時簡夏安居也隨人亦是釋上現前義夏勞釋上時義作法釋上僧得義如鈔即二衣篇輕重儀為大鈔義窄故別卷流用欲斷輕重當究彼文中十科義講者隨科口消可也釋懺六聚篇第九五濁劫見煩惱衆生命濁也瑕疵玉病曰瑕人病曰疵是何位人或淨心地已上方便具造諸惡者可也不然自貽伊戚也知何不經謂三途遍歷也孰難言自己甚易遭苦也同舟周易略例云同舟而濟胡越何患乎異心非下以諸法本空而不了故執之為有隨下隨執有故便計我我所彼此之境然後起種種業也心變三界唯心萬法唯識也則知一切境界皆是心變今若見境即見自心由不了故妄謂外物是自心度自心返成纏縛既了因從妄起感後妄果當須息妄使復于本在次科明種類善惡種族流類也相續無間也苦世法謂是世界不安之法非出世淨法也慚愧涅槃云有二白法能救衆生一慚二愧慚者自不作惡愧者不教他作慚者內自羞耻愧者發露向人悔往悔已往之業也與下卑敬同但卑耻折伏為義懺字後立以此方字書本無乃後人立耳不造新由悔往故不更復作新業也已起無緣者謂知是妄起故此推往業也當下推新業雙下緣對往過續對新業由今懺故使雙礙不相續也業定彼十地經論說有黑業白業不可轉彼說有現報生報後報相故既說有報則業不可轉也罪則非有上智達妄故也下句反之則報定不亡也三時初中後也遇緣即遇善知識教令懺悔則可轉有從無轉重從輕等行除以善行除業故也若時報俱定第二俱句闍王即阿闍世王以殺逆故轉地獄長歲重業作人中七日受等是也若時不定報定第三句及時報下第四俱句問下意謂所作惡業已謝體同於無何言懺悔可滅耶悔有即罪因種子已成就故乃行懺耳非悔往昔已謝之事斷伏斷是永斷伏是暫伏未知何耶經下經即涅槃論指佛地等易奪下但暫轉易抑遏耳方伏不起此伏是正斷之伏非暫伏之伏隨至治際者要修三種理觀始得治滅性罪之邊際也故大鈔云篇聚依教自滅業道任自靜思是也依法即律修事懺也解惑修理觀融蕩也與事修大小事懺也有行有為行也對下理懺是空行若上要須上品業起上品極重心懺也下解斷上惑謂以下下品智斷上上品惑用上上品智斷下下品惑由上上品惑粗淺易斷故但用下下品智斷之下下品惑微細難斷故用上上品智斷也如諸見即身邊等見五利使也無始世來名為重惑凡夫迷倒不知為非故云誰謂是非作意下謂見道人以無漏智推窮尋究斷三界見惑一見永見如析大石一開永開不可重合七學人即三果四句也方便勝智要入見道發真無漏也藕𮈔即細微難斷故二相對不同者即以事理業惑相對明強劣也業下能招未來苦果故云生因中強也謂一業引一生多業能圓滿也惑下以見思二惑正障解脫若修理觀惑障方除此乃集因中勝耳懺業但有修事懺身口業是俱有也有二相除即事理兩懺以除業也有下謂六聚各隨篇懺是輕重不同也能下謂能修理智體無礙故是空所斷業體現行故是有霜焰不俱霜是冷性焰是熱性喻理懺時惡業不俱也經云衆罪如霜露慧日能消除是也隨牒下修事懺也斷下理懺也四住思開三界見合為一故成四住又三界無明通為一住即成五住今若斷者先斷見思方斷無明如下舉例如醒一隅則餘三隅亦可知矣故曰類遣懺下即律修事懺謂同篇合懺異聚別悔如下鋸木則片片自殊斫樹則斧斧隨異若下如防未起非例同斷惑初篇易防如粗惑不待勝心小吉難防如細惑要須勤守妄下謂真如隨緣妄染成垢垢染體不離自心故云知垢是心也意言下外塵本無第六識中意言分別為境今若息者塵境自遣如文即下別示行法中第五如教明證一科是也萬五千佛據佛名經中各誦一遍或一禮等阿彌陀此云無量壽等以有願力接念佛衆生故大師勤修羅剎如人娶羅剎女為妻後食其子將及於夫喻不善心修行但存得利為利所害亦如是也強緣即聖境目前以佛身遍一切處故又淨心誡觀云佛毛孔中豈容屏過但下言行人但不能至心故所被無驗若下懲勸心口心緣口誦功則大矣如下彼約懺時當自說己名及彼造惡耳福始從今起懺也罪終願期永斷也結心結契不堅固也或下或於夢中見塵境或於覺時見等豈非妄心所變耶若是下簡非魔境而元是妄由汝未出魔境故顯是妄起今又妄著故曰重起倒耶本即非本者若不知本所起外妄元是本心者何能靜於妄因又識了此復遣能了之心亦不可得若復執者斯又成妄若不爾者逐妄欣慶還復是病故勸早須明練俗下此仲尼之言也周易繫辭云大衍之數五十其用四十有九王弼曰四十九數之極也人終於此得不覺乎對下加四謂對下座應偏袒脫革屣互跪合掌若上座應加禮足如前指第二卷具儀中同衆一和合衆同戒受隨同也見者同一正見也命難恐帶罪而終開與同犯者懺四篇除夷以是斷頭故雖開懺終為學悔沙彌相及露地須申手相及具足或對首或羯磨等言教隨罪大小要須具也及呵責下第二句多身修業顯非一生能修大乘懺也遠通說者無生唯識理觀可言滅也况地前三賢猶有分段生死故業不云也增上忍者即上忍位也相似以入道方發真無漏不墮惡道亦不受女報故俱舍云忍不墮惡趣是也成實下引證不受總報也世上正見即相似無漏故故下如增一云大目連乞食為梵志所園瓦石打骨爛盡等又鴦掘摩羅已證無學尚有獄火焚身是以業能隨逐至聖不免但斷總報惡業別報不亡作善三界福善也金丸此雖貴重有燒手之患人天之福亦復如是無記不善不惡也慢習無敬相也作何物在者謂於六道未知何處受報故下云終盡百年恐同禽獸也不樂為罪者專精不犯人也叔世罕遇故云何由可逢但下即犯已能悔人也或懼犯而思懺亦末世所幸也事犯相互者即犯事與犯法不相應也又明白心有犯迷忘心無犯今並不達也濫褒過分下褒者聚斂之稱也謂輕重之罪同云一切所犯者悉懺悔也或對下說受懺人非也癡教愚於教也與奪識罪受懺名與反此名奪非數自有重過不入僧數安坐受懺又不分足別之相通名能所俱非今下先既妄造今亦妄滅覆下先覆今露並由心也營營與紛紜皆是妄業不安之相斯下言上是語言要須心行了達斯實非易故曰難矣非下言已雖非聖當學聖人之所修語云見賢思齊焉兩懺大小事理也伏業此伏是暫屈伏之伏也如石鎮草伏故不起不同前理懺永滅之伏也家大趂去還來也力勝互起善心勝則惡不起惡業勝則善不生故須常遠常照惡業方不得便也故下即俱舍論中引經種順解脫分善人聞說涅槃有德生死有過淚流毛竪也燋業如種子燋枯終不生長也故論下俱舍云聲聞修行利根三生第一修聲聞資糧順解脫分善作五停心觀別相念觀總相念觀第二修聲聞加行順決擇分作四諦十六心拋緣減行等第三生起智斷惑入於見道六十劫者初二十劫修資糧次二十劫修加行後二十劫入見道正理論舉喻釋云初位如下種次位如苗成後位如實結無潤不潤行人於三界受生也自下此約大乘說三賢謂位行向也分段即有分段生死身在故曰未亡暖頂四善根中前二位也以此二位所修善根皆有退動如調達是暖位人後造逆故至後忍位方無退動心須依理者常修習大乘三種觀也逐事即六時行道護持戒行此皆事也事理雙運卒盡一形鞭䇿其心十方下舉五悔也文少發願重逆即四重五逆也毋固毋我謂出論語彼具云子絶四毋意以道為度故不任意毋必用之則行捨之則藏故無專必毋固無可無不可也毋我唯道是從不有其身儒教尚乃抑制我心而從於道貴無我執也况出家者乎不可虗言無我而無實行也識業非有蓋目有病空則有花花實非也分下謂分見真理分際妄業也如磨鏡者不了實業非實迷於理懺如世磨鏡不及頓明也不識其畔畔田界也言不識理懺之限齊耳若樂下如律修事懺但除違制罪業道不除又修大乘事懺業種未除果在有漏若修理懺是出世無漏之福也二觀即人空法空二觀也對我下二句釋人空謂以推柝能觀之智破色明空但見虗妄搆立我性何在觀至極微分別不可得處留一鄰虗故云唯見是塵至此名為勝義也對陰下二句釋法空謂觀五蘊之法本亦空寂一一推求法亦有故云但唯名色求人下結示既能柝色見人法二空乃小乘性空行事生滅觀也空識為本者即相空唯識二觀也觀境心外語相即空猶屬粗淺了境唯識乃後深也謂大菩薩了境非境體唯是識是知三界唯心萬法唯識如別指凡聖行法中結正即夷殘等當聚別類即六聚中各有種類如摩觸是淫種類類等深褒褒聚也謂將別篇聚而同懺也此除疑者恐言不學不知故不犯所謂不以無知故得脫也以下若常懷持奉不憶而犯此方開耳違願初受時願心也不下由不學故迷非心迷也心不緣境謂不緣著正境如人作杌木想等鄉下如緣初識謂非人境是不學故不識非曰迷心源下雖是不學之人本迷故境想亦開持犯云但迷非學了故佛一切開又豈止學人耶故云斯亦免也止免六聚只免違制罪也終須慧觀即業道任自靜思也如上即前云增上忍中相似無漏惡道女報方得不受也道猶尚可言此生不得證於聖道猶且庶幾尚可當來之報甚畏故云奈生報何阿鼻脂亦云何鼻至梵音轉也都無覆今師約正懺時無一念覆者即開不同古人從犯後無一念覆方開覆緣不成如有迷忘等是或有下出古義若下今斥未必如緣如須提那子因本二犯故制豈可後犯亦約本二故曰何問新舊對下二篇言此須盡露下得將一乞餘未盡懺者亦開若生如人之再生也戒身即戒體離合或各別行覆或將覆衣長者總行俱得蹊術蹊小徑術亦道也隨夜謂隨逐夜結隨隱日或一日一夜乃至百夜或從清淨已來一二年等行補昔日之覆也伏折伏也勗誡也以見下釋僧喜意罪易言犯罪甚易也根本若望前覆藏等行此殘正是根本正障障於清修也與行加奪即三十五事奪行法也抄下若抄出排列則增繁卷軸故且略也名如戒疏彼云偷蘭名大遮言障善道等是也委付指文如大鈔詳委是也必對下顯捨墮須五人已上也貪慢如長衣是貪犯離衣是慢犯又三十是畜用失方九十是造作乖方對證即但對一人單提之罪即滅也與人布施與人也捨淨要來僧中捨已方可布施捨遣捨財遣著也非染謂非法染污之財不可作三衣數數下即著著結罪欲使行人離罪緣也五種即注遣與人乃至說淨等三境即注中僧若衆多若一人也問下上云若欲洗懺非別能除制僧為境對之生愧能絶後犯今對別人何名殷重羞愧耶界還僧法者界內有僧還須對僧作法無人方開唯制下若唯制對僧不開別懺者能懺之人極多所懺之僧難得思懺成淨無由也故隨下即隨方所有僧對僧無僧對別如現下釋同犯義各有所集隨自然法界集也如上即前辨僧體中對別盡集者雖許捨財對別亦復盡果集人懺罪別衆者謂制捨財必在僧懺罪但對一人也有人下此師要捨財悔罪俱須在僧以因財而生其罪捨懺當須符合豈可捨財在僧捨罪在別耶彼人即初師因捨即懺謂因捨財在僧即席懺罪既在衆中懺主不敢輒受故秉白和僧不妨其罪獨對懺主一人故云故罪別除若財事用盡者今財體既用已盡但懺本墮何須更集僧耶前人指次師謂聖制於戒本中前列者只為此罪乃因財事貪畜及慢情過固重罪亦須僧懺也如下舉例斥非若云衣財用盡不可對僧且如綿衣斬壞寶對俗人並捨非僧何故悔罪亦對僧耶若爾下云蠶綿二寶須對僧懺何故律中不別出答下以前衣事對僧而捨遂說對僧悔罪今此蠶寶捨不對僧故律略其對僧捨罪之文也豈可文略便不對僧懺罪耶本律既略故引十誦多論之文並制僧中明矣若爾下捨墮之罪制必在僧未審單墮亦通合懺否答下謂九十設因財事成犯與此三十貪慢之心有異約心則輕重兩分約罪則同是一墮故許合懺也問下約罪既同何分輕重答下三十貪慢之心作業既重故制捨財捨罪捨心心若不捨二捨不就故對勝境僧中悔也約罪約報豈有其異並用三說對悔也二定受衣順下解文合在第三列文倒也二離即聚落一宿離蘭若六夜離六年作新臥具未滿六年持不揲坐具俱下凡是受持者則不須說淨及捨也隱囊謂合繒彩作囊內軟物於中以隱靠也輕重儀云隱囊如意正作隱屩𧙕上音腳即草履也下音末即壯襪也尼衣等取販賣餘衣也皆為有過不應淨法主無即所寄物人命過也邊表謂邊方無人可對聽入手十日後方有犯長也亦得共分去呼謂二三人共有一段之物既未分破不知何者屬我耶本不淨財以不淨故設受不成既不成受離亦無過故不須捨為界下出四礙也上定三位即定長財定餘捨定受衣也隨處各捨以彼此皆是僧故又有重還義故不須集也捨心淨由作決捨心斯成淨也還衣未說謂衆僧還衣竟未及說淨還見遺忘長衣通皆被染也皆依後捨但將後忘者入捨不染已捨財也兩犯初見忘財便謂我物即是貪染一犯也輒指施人不將入捨二犯也問下實有遺忘之財而意謂無律開成捨界中有僧謂無應同成法答下衣財非情不礙成捨界內有僧心自謂無失於撿教故不可一例也須宿淨心者要經宿還也得罪犯缺衣壞儀之吉也量時或僧難集當席還之鈔中指懺六聚中故論指多論如注所引三相衣捨悔罪心斷遠行謂懺罪比丘忽有遠行之緣亦聽即席還也非望送者謂心非所望彼忽自送也文成捨意若無捨心者僧不還彼應須犯重由彼捨故僧但犯吉故下云捨財用非重是也乃本律分通大乘五義之一也請主即請懺悔主立誓要期要即期也用盡或壞或盡也雖無衣財可捨懺罪亦從僧乞是同故曰本罪亦隨牒入初師謂衣財用盡心懺本罪則同九十更不須集僧乞懺此文照之缺僧之義為正矣上殘釋上有殘段不捨之義也多下雖牛嚼等衣或有尺寸須捨上引十誦五分火燒等衣不須捨者必是碎壞不入尺寸也受用犯衣謂受用犯捨隨諸衣而吉羅今將吉羅與墮罪同懺此僧祇異聚許合懺有人依誦僧祇故云不成以下正出四分異聚不許合懺多列指注中委引律文為今世人多言所對但不同犯亦開受懺此古義也同犯不同犯雖殊非淨之境是不合向彼懺蕩必兼命難方始開耳此今義也以經下明間緩從容之時不得向有犯者懺悔當須知識清淨之者能生我之勝心乃可耳豈唯前境者言豈獨前境是淨抑又行人對之使發其勝心耳且如僧殘尚須多人為勝境方發行人勝心也必欲下欲往彼懺卒乃橫尸雖未及懺許成清淨此乃托彼勝境因心又督也準此下謂內關於外境境勝心殷則其罪可滅也及此徒行懺法罪無由淨故不可不選具兼偷蘭者以懺偷蘭亦請懺主故非有謂有者此說能懺之漫也覆說二過覆即覆藏說即說戒默妄等罪犯者無知非說不曉誰具生知之理也三品為本即上列根本覆藏說戒默妄及著用犯也九品謂於上三品上各有初夜覆藏一品并隨夜展轉二品也先懺方便即六品吉也二覆一根本覆藏二默妄覆藏并著用共三品也如鈔即懺篇若撿下凡受人懺罪先須撿問覆藏等罪有先懺無則但懺本墮故大師云勿誦常語令他繁憒也答云善立誓也名實實即體謂依文謹誦即失所犯之名及罪體也惡數破戒之惡恐及非數今不懼罪責非數之過故說無耻故曰覆墮下世無幾如文者自責是第六答言爾是第七立誓別過私過也明即明日也輕他即召僧也別業各自有緣也四句一多而易集二多而難集三少而易集四少而難集知識彼之親友也如論即多論畜心斷當日得財是也無纍礙即捨心斷也兩指即注中兩指同上是也雖有財事即九十中亦有因財事犯者但非制捨耳釋雜法住持篇第十流通者流行通衍正法於萬二千載使不墜于地也凡有五種流通具如戒疏裔衣末也葉枝葉也通目末世比丘耳佳運釋迦一化之時末分三分中此當末也念法如念日月是知布薩遠近緣身而求即收食處乃至康羸等五次下釋種俱名念義除蓋蓋則通收五蓋等前後前即食前後即非時表非法相表去非就如也道素素謂清素或可作表後緣即聽捨去別擇師也友成假朋友琢磨以成其器未有不須友以成者也寫行去呼寫法律正行也又使比丘依言起行也耄禮云八十日耄康成云耄惛忘也泌部即泌州部謂部屬綿上縣名鸞巢村名前輕後重謂前但兩卷後增二倍前重後輕以前義門廣曰前重而後多略是後輕據理下此大師之謙也言前後雖曰重出據理義則未之有聞若論附詞則始終炳煥也無嫌下冀後之覽者無嫌不至隱悉也法事已備矣始宋皇祐三年辛卯終癸巳正月十三日於淨住清思堂解畢時年四十九十記已成惟願將此善緣莊嚴淨國壽終此土蓮華化生見佛證真廣度群品後之覽者知我志焉正源之興其來久矣巨宋皇祐間真悟智圓律師草創製造釋羯磨疏也妙通宣和年遊學錢塘無相真教律師講疏多不用記師云正源無板寫多錯謬所以不用尋以兵火摳衣慎水西嵓因律師以記主傳授之記敷演記主付玩玩付因也其記頗詳嘆乎茲文流傳經久未嘗刊板三豕渡河四狙從欲加以後昆談窺其短不美其長伊何徒哉心行若是負先德之訓導者也况平記主心慧難測身證莫知蘊出倫之見彰獨斷之才草創戒業二記及諸記行世中興南山一宗何異荊溪光大佛壠之教歟妙通忝廁來裔擬廣南山之道刊板行世俾大部三記悉備晚進免之異求開記功成聊紀歲月聖宋紹興十八年戊辰後安居日蕭山煏芻妙通於會稽資聖講堂題
