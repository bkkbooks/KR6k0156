body:
  text: 天台沙門釋允堪述善來下依四分言善來一種唯被聖位不通二凡內凡外凡解非圓明猒心非極道即道前屬二凡位極聖即佛所呼也五下須提那子既犯初戒此屬凡也則部別不同耳今又約多分為言是初果位也故祗疏云善來言下果戒俱得果謂初果外凡者散修事觀未緣諦理對於加行稱之為外未證聖果道眼未明故名為凡今既言非外凡顯是內凡漸見諦理稱之為內二受人即三語八敬人所得能持故不羸誓持無退故不捨非受餘報故不變根復離邪見故不斷善始下二句結示也多論云以福德深厚不退以內凡位有信根增世第一中有信力增不可傾動如根不屈可伏如力既有根力則不壞不屈故曰不退故義鈔云內凡已去得不壞信成就不退何下律第三十云諸比丘受教人間遊行說法時有聞法得信欲受具足時諸比丘將欲受具戒者詣如來所未至中道失本信意不得受具乃至佛令諸比丘自今已去聽三語受具以此文證何言三歸等不斷善根始終堅固不退耶出家信即事中之信不壞信即理中之信義鈔解信有二一事中出家信二理不壞信彼言失者謂失事而非理也失事疲苦即母論云於中路有生悔心者即還歸家是失事信也故犯思惑未盡故無著即羅漢以見思惑盡故無實犯餘下三果既有故犯故知二凡有故不疑別苦即別報望不受三塗總報為言成論下雙證有故犯而無總報四分下愛道八敬受得初果五百女十一人中受是通內外兩凡也此絕言議此謂位唯在聖人也故義鈔云無欲迦葉修道進德惑盡解滿會性空故上法而發具戒也又下云三毒皆盡凡六義鈔云善根又薄故盡白四果向四果四向也涅槃下引文證通果向也彼三十九云有梵志名淨梵出家受戒時佛勅陳如將至僧中為作羯磨令得出家十五日後諸漏永盡得羅漢果驗知初度是初果不久得無學花尼即蓮花色尼若賢愚經蓮花色尼佛唱善來度部別說不同五分下彼云陀驃十四出家十六道成羅漢年滿二十羯磨受戒於座下即律云於座上遠塵離垢得法眼淨對人即佛法金口所呼令盡苦也文下四分云快修梵行盡苦源也心境前云斷一切惡修一切善是也五下前云正說正法作是說已髮落衣變便得戒也見空即性空謂了名色性本空故形同作比丘相也無學即對羅漢也文下彼欲往佛所中途而止佛令諸比丘三語度也心境自有受心對羅漢境等作業三語竟為業如三語指同上作也得道為緣即前五緣中第一緣也餘破結三語八敬不言者又後三須形同者與善來何及乎能轉變以是初果之機佛一呼形變故不預假也又後三不對佛故曰不爾總別即能受有五所對有七等如下具解心奢奢侈也言有逸蕩故三結前云歸猶結也則三結者屬三歸不結者屬三語四徧一白三羯磨也結一即一回結歸四受離破結外餘四受也我欲欲是希樂即屬求乞即下即是求乞之相也但下以僧須十人情和稍難若不遜順乞請無由牒名入法凡地知內凡也既屬內凡即有故犯燸心即內凡四善根中第一位煖者從喻得名如人近火得火之前相謂見道無漏智起能燒迷理惑薪名之為火今加行位雖未近無漏智已得智火之前相故名煖也退作五逆者以四位中忍位行人方無退墮故俱舍云忍終不斷善反顯前煖頂二位俱有退也欣下反顯不能欣上也故致戒有羸弱退道捨戒還家也二形帶男女二形也餘四即善來等既無羸等四過故曰無災患也萬載且指末法之運若據釋迦一化盡者當六萬之修齡七萬獨覺出世八萬彌勒下生備如壇經道宗鈔中三天除北洲餘下如善來唯佛召三語八年前興八敬緣在二人唯南洲佛出世故有也破結微通義鈔云如來一代三天下中可無一人入羅漢果又以賓頭所化通三可知末下說破結少而羯磨通也百一十羅漢律第三十云諸比丘汝等人間遊行勿二共行又律受戒中世間有百一十羅漢等謂佛先度令分頭廣化方有三語息則八年後興羯磨十四年多論云佛遣阿難故特制前三乞也不同前四略含乞意名相罪名種相也三受即善來三語破結人初二屬內凡破結唯四果故曰已上也八敬雖曰內凡以正陳名相故除之具縛以凡夫全未斷惑故制相如壇下說四重相是也俗化收上五八羯磨犯後者八年已三語廢即制羯磨受是也十戒中列和尚者下文云三語已前未論相攝因過須師方制和尚故羯磨興者意存師資又下云八年羯磨方有十戒今十戒中有和尚驗知在羯磨後也因過因人受後犯過聞師教授故方兩攝即師資互攝也至三即今三人同一列受也餘善來等不限多少佛教佛親呼善來比丘修清淨行正說正法作是說已方感戒故學人即阿難白佛佛令傳八敬法故論教以皆是如來開制又同發一無作故四過即四重以初果生惡國道力不作惡雖不犯性亦有犯遮又可四過取下有羸等四過亦通後制以下反顯制後亦不作也又善來度時未制遮戒比丘後犯方制下文云善來㝡先以陳如為首如上所被即前云三語八敬非外大愛道八敬法受戒則十四年後愛道方剃髮求受八敬故義鈔引婆沙論云佛成道十四年後以八敬度女人自此已後以羯磨度具女人阿難有和尚顯阿難是羯磨度今八敬是阿難授故知八敬在羯磨後也年減以不稱羯磨度破結方開方有下在羯磨後有也故前云羯磨犯後故有十戒是也未曾有後漢失譯嘗撿彼經無有此文恐指名錯今謂羅睺九歲出家受十戒顯是如來成道後得九年方有十戒也羯磨既在八年興則知在先也就事辨緣注中五緣是也言下指下正授戒體中文也乃疏中懸判耳諸有即三有滅欲五欲也茲學即戒餘何指定慧萬行便感如善來等從緣要假人僧界法等多緣方發無作有無有則緣具足得戒無則緣缺不得戒也唱言顯是如來所制也或下大師約二義解二種羯磨也諸受即五人受十人受二十人受邊方義立十人受遣信受小年曾歸受母論但就緣言者彼論五緣得成一和尚如法二二阿闍梨如法三一僧清淨四羯磨成就五眾僧和合與欲此就外緣解也多釋即多論彼云若受者在家受五戒八戒出家受十戒隨五戒破一重受八戒不得乃至不得受具足戒及作和尚即十三難人初難攝此就自因解也今下大師會二論總成五緣也能受人所對境發心乞戒心境相應事成究竟文云及具則心境相應也終即事成究竟又五即一是人等以能名濫謂能受中有人非人畜生人中又有黃門二形等非簡別無以顯濫在生在或作出指掌如指示掌中之物言其易見也着樂多者多論云以五道而言唯人道得戒餘四道不得如天道以着樂深重不能得戒如目連勸釋提桓因佛世難值何不數數相近語受正法帝釋欲解目連意故遣使勅一天子令來反覆三喚猶故不來此一天子唯有一婦有一伎樂以染欲情深雖復天帝命重不能自割後不應已而來帝釋問曰何故爾耶即以實而對帝釋語目連曰此天子唯有一天女一伎樂以自娛樂不能自割况作天主種種宮觀無數天女天須陀食自然百味百千伎樂以自娛樂雖知佛世難遇正法難聞而以深樂種縛不得自在等修羅下多論云凡受戒法以勇猛心自誓決斷然後得戒今疑惑故非得限道下言本在會正理向涅槃也今若諂誑何能得之報局局猶劣也又受報不一名局如下偈云地獄中陰身猶如融鐵聚熱惱燒然苦不可為譬喻如下彼云諸天着樂心多善心力弱何由得戒餓鬼以飢渴苦惱身心燋然地獄無量苦惱種種楚毒心意着痛無緣得戒畜生中以業障故無所曉知無受戒法雖處處經中說龍受齋法以善心故而八齋一日一夜得善心功德不得齋也以業障故以四天下而唯三天下單越無有佛法亦不得戒悅動物情如阿說感於身子出家是也二十餘猶如眼一種自有多相故律云或青黃赤爛紅白水晶極深三角大張斜瞋等眼也五分僧祇者鈔引五分云諸比丘度截手脚耳鼻截男根頭排眼出極老無威儀極醜一切毀辱僧者皆不許度若已度得戒或先有相嫌以小小斥事作留難似瞎似跛似短似小父母不聽等作留難者吉羅僧祇云盲者若見手掌中文若省目聾者高聲得聞躃者捉履曳尻行鞭瘢若凸凹若治與皮不異得印瘢人破肉也用銅青等作字獸形侏儒者或上長下短或下長上短一切有遮不應與出家若已出家不應駈出僧得越罪淨舍宅為貴人之所處淨身器作妙戒之所依淨衣即新白色衣也雖無戒犯約白衣也生報當生報也相違作業與戒相違也下列覆露智論云佛望弟子住於中道故着三衣外道裸身無恥白衣多貪重着也今疏中覆即是白衣露即外道一露一覆故曰二邊今三衣不多不少是合中道也實相同本言堤條等相同如來本制也褊衫今右邊者是也正背即今褊衫縫合背後者或是褡膊故二衣篇云今時着褊袒褡膊方裙諸裙是也方裙即女人上馬裙因郗皇后施僧裿不滿也謂作法者至時緣赴別眾非法等如不足數所明如論即母論通不破戒者如四分不足數中所謂羯磨人神足在空隱沒離見聞等又捨戒中顛狂瘂聾中邊等人雖不破戒約緣故不足無下羅漢尚有悞犯況餘下凡頓約不破方足今此下謂邊僧若多開本法不得今若僧多而不堪預者用五無爽我倒有我人顛倒故不和不和則有不肯同遵今集者為遣此故也羯磨下謂此大法正是和僧之詞也以法在眾成眾通足別傳不難以和諧通決寄此言被事得成決者此羯磨法也四緣即大鈔云一切羯磨必須具四法一法二事三人四界上下將一法為頭以人僧界比度括之鈔云若欲通知細尋此門上下橫括庶無差貳是也若借應與價直五分令主捨之亦不明得不今準薩婆多論得戒必誦十誦羯磨依彼開成準急無損未及言未及法滅也離合約緣故離就義可合雖合七成四若局成敗又可合四成二也餘違不合指上七緣中前後六種若違俱判不成如結界不成是也唯事須論獨第六資緣一種多論彼問曰不除鬚髮得戒不答得戒但非威儀若無衣鉢得不答言得戒有下斷上文如下取例若無衣鉢從彼說得戒者亦可無和尚依彼說得戒耶今師取此若借下此一說約有得義雖曰假借以正受時有故但獲妄告僧之過也義下亦古師義準故大鈔云昔人義準四分和尚法中若知借衣鉢受戒不得不知者得此乃人判終違律文必敬佛言再受依法聲教勸依四分也大師之意要準急教恐後例闕慢心增盛今時弊風頗多也聖師之心寧不在垂告今日乎知法有力勸早備之尚欲以身期出生死豈以此緣頓礙發足勉之勉之上雖並默即不稱自己名及和尚陳乞等縱下即無心行乞縱有所乞而同非乞也界成収上七緣中一與七也僧具収上二三四緣也法正収上第五白四教法也緣合収上第六資緣具足也雖具此七意不緣念戒者即是內心不稱所緣戒境也心下反上句也自下即心境俱不相應及能受所對等緣但使不順教者俱入非也罪業下既心不當境等雖受無戒蓋師無善誘之心資闕欽承之道罪福既不精純故罪與業而互相投也八相即經中始從請師終乎正問八法往來片無差失也五行白虎通曰謂金木水火土也言行者天行之氣也中人簡生而知之者上矣蕃胡謂佛法離五即土未到東夏先到蕃胡地故彼傳梵語變也失其近語力生於師語實遠矣乖聲論者與上正梵鄔波陀耶聲有少乖如優與鄔訶與耶是聲乖轉也如上所述即鄔波陀耶彥琮生隋姓李趙郡人也少而聰敏才藻新清始師令誦須大拏經凡七千言一日便徹十歲出家後預翻譯勅於洛陽上林園立翻經舘以處之關輔所獲佛經五百六十四夾一千三百五十餘部並崑崙書多梨樹葉勅琮次翻分為七例所謂經律讚論方字雜書等七相近與上正梵相近學務教以四民之業五常之行也慧明訓以三乘聖道出世正行也如下此方俗律比挍師如世之叔父也故禮記檀弓云事親有隱而無犯左右就養無方服勤至死致喪三年事師無犯無隱左右就養無方服勤至死心喪三年致喪者謂戚容稱其服心喪者戚容如父而無服故有差降也彼俗雖爾若望出家以道法濟神神遠有出世之益則功又過之矣連枝兄弟謂又降等以之須如親兄弟也故師嫌讓處資如弟是也此背喻非踈越敦遇敦崇顧遇也學後故稱弟言在我後解生故稱子如父生子博士禮記曰君子知至學之難易而知其美惡然後能博喻然後為師父後魏書曰梁越字玄覽少而好學博綜經傳無所不通性淳和篤信行無擇魏初為禮經博士束脩論語孔子曰自行束脩已上吾未嘗無誨焉若弟子乖其法則乃非禮也邪緣即同邪利活命也是以古高僧未甞為利故說一句法今時師訓不以求道為志而先圖利養者不亦悞乎出道下言心存出道形雖卑折師於其資不可侮慢亦須敬而授之又資受道於師不可不先敬而後受焉當日求益無以空腹而虗往矣故知師資共相敬重方能道隆也為束即約束也無輙離五夏已上行德成立者可也十誦云若恐餓死當於日日見和尚處住恐不得者若五日十五日若二由旬半若至自恣時一一隨緣來見和尚行事鈔即師資篇後必思犯下善見以不請故多造非法諸師訶責反云誰請大德為我和尚佛因制之若不請者不得與受得罪故知非我輙授因汝請故後若犯時可訶責而令思悔傍教今時多立引請人是也答詞師須有答領之詞也無者不成至於下如受懺悔持奉者若是已上應答云爾若是已下答云可故曰兼前二也意以下大師在四種俱言以反義聯續餘師眾即七證也搦寧厄切指歸云握也律云下道一搦今取相綰握以為師資也布訂丁定切猶臨時安布配訂也本意如受者欲某人為師今並不論義準者大鈔云七證師義須準請以羯磨法非是獨秉必取此人證無錯謬若論發戒功與三師齊德何謂不請乎傳即論傳鈔曰論傳云和尚者外國語等又云相傳云和尚為力生闍梨為正行注云解紏正弟子行聲相近耶夜聲近通輕重者六種闍梨中前者位輕後者位重一下即今為剃頂上髮者出家所依得出家者授經所從授經乃至四句偈也教授即教授威儀者羯磨今壇上秉法者依止乃至依止一宿也成目即名目也如鈔彼云五種闍梨鈔闕剃髮要多己五夏方號闍梨餘未滿者雖從受誦未霑勝名又上四種闍梨不得攝入而替依止等外有僧釋註餘師也戒本人發戒從此人也加尊曰尊人尊師也事緣四分云界外問遮難等五分中以赴過故聽安戒壇外眼見處等假先問緣須在外也所以爾者恐在眾惶怖有無差互屏處怖微安審得實故不如法即帶遮難也何得聞者即壇上問難時先作白和故許聞成後許今始聞為成後聞白四也今若不聞何由聞後如下且如非足數者不可訶法獨此初受人開訶者為成一生戒體故問既未受戒安知成敗答約生而知之者也如名字有悞豈不曉也通七反往來豈無知者故立下大鈔云若多人共受應兩處安置一多人行立令望見僧赴敬重意二將問難者離僧及離沙彌行處於中問緣必在同處亦得恐後問如前心不尊重等及下即教授師下壇問時不令彼坐問也去取恭慢即去慢取恭今時互跪在威儀師前問之甚合理也由界下四分云由界外脫衣看致令受者慚耻稽留受戒事佛言不得露形看返還再歸家也至受下若律文云不問十三難者則不得戒又約律本但問十三難事及論作法但問諸遮大師義準著問遮之前是也故須合問就下分文問答釋注中問云誰能與某甲作教授師等通別如通答但云受戒羯磨則通下法別答則云差教授師出眾問難和僧單白羯磨則下須別別和答也非本意在問難遮且以問衣鉢緣為陶誘之法非無須問非謂遮法無故不問然亦須問也亦如前後要先問名字衣鉢後問遮難不可倒也十遮十六中合有五種病為一也謂十戒釋上度此人義高勝古人不見業疏解鈔高勝處為壇上悞也縵衣今時沙彌着五條非也即加五分於此便加法受也準的或戒師受亦得加者即加法受持也體不同法女是下流不得僭大僧之法今既開二眾同秉故不可闕也例今亦然如和尚例要先請而後受今先加而納具事可類也又緣非中衣鉢和尚兩俱牒故前緣示文應語言善男子諦聽等文定占審定占度虗實也玄果涅槃果也亡言亡無也謂無涉虗受之言也因檢因露衣看檢故制問也稽留稽滯留礙也染是生因者謂穢染之心是生難之因也且據者言難未必止十三爾故大鈔云略述難相如邪見生等是也具緣具通別二緣也業果身口造業將必感果生報當生之報也反戒一則違反戒律二則反戒還家先既犯重今又再來是不許也若當時清淨捨戒者亦開分在下由隔在清淨眾外也大鈔亦云此人罪重名佛海邊外之人也不堪重入淨戒海也乃至準論白衣五戒八戒沙彌十戒破於重者同名邊罪云云者指妄開所以終下斷淨具猶淨器也僧祇云若斯須二果及凡夫持戒尼被人污者初人受樂者是壞尼淨行中後人犯不名淨行壞尼難若那含羅漢初後人俱名難也故知惟是淨境也方成難攝尼中反之即問云汝不犯清淨比丘不此謂在俗持犯若受戒已犯者正名邊罪所収聖財即盜聽僧眾說戒羯磨也四分云若至一人二人三人眾僧所共羯磨說戒皆滅擯餘如鈔中二道即內外二道直収破內者若但破外者許度律中令度出家對僧與沙彌戒四月試之使志性和柔深信明著方為受具也沙彌下本是外道來投出家受沙彌戒也復本外道又再來者未成破內也要須受大戒方成破也如下云二破兩難不通未具也壞本即性重也後四觸八覆隨也既同名夷罪何不成難答如文刑其勢即割其勢也中禁天子內門取中央黃義終無登趣以黃門志性不定無大操故大鈔云今時或截少分心性未改兼有大操大志者準依五分應得男子有五即生犍妬變半也女五謂螺筋鼓角脉也人非化生顯是胎生也遺陰父母遺體也是色陰攝也殺羅漢損三界福也人僧即破法輪僧如調違立五邪法結三聞達等令三千禪誦不行人起疑心為象頭山是真佛耶王舍城是真佛耶故曰使應悟失解出血約惡心出血若善心者開四等即慈悲喜捨非人謂八部鬼神變作人形而受戒律中五分天子阿修羅犍闥婆子化為人等畜生者亦為變形為人而來者律中龍變形而受佛言畜生於我法中無所長益此上二趣若依本形是人通識恐變而來故須問之二形謂一報具男女二根也先得下謂若先受戒後變猶尚失戒况初帶受者為難可知五鈍貪嗔癡慢疑也餘如文夷蘭如殺父母犯夷出血犯蘭答下屬逆業也夷等屬罪也業在己運罪由報得故約己為體也如下彼但成業不結犯故重者如殺父母犯夷此罪屬邊又犯逆蘭可下言豈可以蘭罪開懺而本業不障戒也故判業為體不由作事者言不約作殺盜等事為言但望違如來重制邊是也若論下此正約事說不約教論故引外道為證所以邊合逆分三祖即始祖曾祖高祖也以生己身之遠故打棒打通手足棒通竹木世謂惡逆即俗律也有六四分云若至一人一二人二三人三四人眾所四共羯磨五說戒六四輕即上四兩重即後二眾別上三是別下三是眾不從重分言不約其重自分為一俱眾法者大鈔義詳共一人作對首眾法皆成障戒又云必聽眾法心念亦成難攝此則收上一二三人又下意云若逆不分者則濫俗也以俗亦造五逆故今分則顯僧有夷蘭之罪異於俗也邊罪從法者即從犯法破內法以彰名也隱相隱婬盜殺妄四相也若下如隨說婬不収下三又道則三境浴禁邪婬又下三眾但犯吉羅退道清淨捨戒無過犯已捨者先有重夷今若隨境舉一則不能通攝但以邊名則収人収犯攝相攝境盡在其中矣何得殊名意云既從境是一何以破等殊名耶此下言易知耳謂內外據兩道境壞尼專尼淨境雖境名是齊而對境結業有異故須名簡又俱是無戒故不同邊罪境雖有異俱是性重故又同是有戒故延除言不可延於後時使難除去也法緣即僧界法等雖備亦不感戒也餘下反上二義不具者盡在遮攝年待滿衣待求故曰待求便是也曾受曾受滿分戒者二破破僧及破內外道未受受白衣未受五八也如下謂黃門先曾受具後變作也此通曾受及未曾受故不得邊名殺及非人畜二形亦爾故曰通受及未受因斯義故不名邊難由通未受故是方便即出血是殺之方便後四即八夷中後四戒也破下言破僧若不通沙彌者亦可將破罪是邊攝不以法還戒即清淨捨戒尚無重得之理何有重受問邊之義若爾既無領上古人也但下正斥止有十二難耳何以律令問尼十三難耶不問又是違教進退之間何以為依憑違教法即前云邊罪從法既曰違法則有尼有違五八十戒故可問邊成十三難也後來即破內已重來初作初去時例同調達破法但獲蘭也着下如比丘着外道衣犯蘭斯亦同也重違即於重罪有違也海外即佛海邊外故得名邊雖經說齊亦多論文彼具云雖處處經說龍受齋法己善心故而受八齋一日一夜得善心功德不德齋也以業障故難地八難地也以福報障因具福報故有着樂無心受戒長含云須彌山北天下有單越國其土方正縱廣一萬由旬人面亦方像彼地形有大樹王名菴婆羅圍七由旬高百由旬枝葉四布五十由旬多有諸山浴地花果豐茂無數眾鳥和鳴地生軟草槃縈右旋色如孔翠香如婆師耎若天衣其地純眾寶成柔軟以足蹈之凹下四寸舉足還復地平如掌又彼土四面有阿耨達地縱廣百由旬以七寶砌出四大河廣十由旬眾鳥和鳴無有溝坑荊棘蚊虻毒虫等陰陽調適百草常生無有冬夏常有自然粳米如白華聚猶忉利天食復有自然釜鑊摩尼珠名焰光置於釜下及飯熟時珠光自滅有樹名曲躬葉葉相次天雨不漏男女止宿其下又香樹高七十里花果繁茂果熟自然皮破香出又生種種衣嚴身之具又生種種食河中有眾寶紅人民欲入洗浴遊戲時脫衣岸上乘舡中流樂訖度水遇衣便着先出先着後出後着不求本衣以至香樹樹為曲躬手取樂器妙聲和雅阿耨龍王數起青雲遍覆而降甘露於中後夜海中凉風微吹人身舉體快樂人身顏貌同等不可分別其貌少壯如閻浮提二十歲人口齒平正潔白髮紺青色垂下八指齊眉而止欲心起時熟視女人捨之而去彼女隨逐往詣園林若先世為父母親屬者樹不曲蔭各自散去若非親者樹則曲蔭隨意娛樂一日二日或至七日遂乃捨去懷姙七日便產隨生男女置四衢道有諸行人出指甘乳充遍兒身過七日已其兒長成與彼人等男向男眾女向女眾大小便時地開事訖還合亦無畜積壽定千歲死盡生天命終不相哭泣莊嚴死屍置四衢道有鳥名憂慰禪伽接彼死屍置於他方等故知福報多故却為難地也三天下多論云閻浮提瞿耶尼弗婆提及三天中間海洲上人一切得戒如瞿尼弗婆提賓頭盧往彼六作佛事有四部眾東方亦有比丘在彼而作佛事有四部眾人有四種者一男二女三黃門四二根四種人中唯男女得戒故曰唯二具得越濟即破內外道者下云雖不入彼但着彼衣樂見亦是越濟受佛戒須是法器餘諸雜報盖不足言也如下準多論云若天若龍若神鬼若單越若不男二根種種罪人盡得受三歸也人天聖障文義欲順時應云障人天聖文倒不生猶不發也惡見起邪見也更有四人離上十三難惡見外曰更有後二以第三四人各有身業行殺故不問出與不出俱應駈也永遮後一亦約永不乞者方成難攝無根即無男女二根也一道大小便道共處也乃有眾者猶言乃有眾多難也且下應先難云若有眾多難者何故但列十三難耶將文答通既言且列故知不盡爾不問不得以不審知故餘下即十三之外有則不得如無根一道等無下即無此難而不問者其戒冥獲問上云不問不得者答上是備出十三人合閤不問故不得也今在文外故無者不問自得戒也戒中即戒律中雖下謂雖作法加被由障得戒者方名難也故列十三自外不列曰餘此人別難収如下示別難相也能變證有心障得戒是難自下證無心不名難問下若約有心乞障成難者且如小年亦有心乞應名難耶答如文若下云小年待滿九歲和尚亦應待滿何故一得一不得耶答下若約不滿理俱是遮止由和尚是緣疎已年是因正故因不可闕也類下如式叉受六法不滿不得受例今不滿豈可得也八障聞思即下八難障聞思二慧一住善處彼云謂中國善人者生值佛世正願正見是也善根者不聾瘂等初輪即住善處二下即依善人摧佛前佛後難三下即發正願摧世智辨聦四下植善根此下結此八難俱無心故不及難収唯五逆以於佛羅漢邊及僧邊無心聞法故障聞思也又殺父母必無聞思俗戒即五八戒也前引成論云五逆賊住壞尼等若為白衣不遮施慈等善有世間戒何咎故云所簡別也業寬邊尼等収九難故報中収二根及非畜故㝡狹獨収黃門故五道人天三塗也報寬以五道各有總別報故煩惱是中如天及北洲煩惱少故業即十業天與北洲亦少論即雜心彼云地獄眾生有五不善業惡口綺語貪恚耶見單越有四不善業綺語貪恚邪見餘三洲人畜餓鬼及欲界天並具十業故云餘則說十業也煩惱下雜心云三障中煩惱障㝡大惡次業障次業障以煩惱障能轉業障業障轉報障故若無我以有身見故報障難轉如成論說報有三種若此身造業即此身受名現報雖此世造業來世受是名生報此世造業過次世受是名後報雖三時有異即畢竟受故又雜心云報障㝡大故因時可轉果時不可轉故餘下即煩惱與業也若能斷煩惱餘十業則可轉也懺法下即懺六聚中局一於十三難中非畜各但収一十一除上二難說業有九者即邊尼等九無惡戒言不犯邊等惡戒也不說業障謂非畜不造總報引業也別業如為犬馬則有慳糠草等如下即業障品中又人下黃形并上九成人中具十一難非下言非畜雖兼有黃形以自屬難收故更不說也見耆婆說者彼論云大目犍連弟子有病上忉利天以問耆婆正值諸天入歡憙園爾時目連在路側立一切諸天無𮨇視者耆婆後至𮨇見目連向舉一手乘車直過目連自念此本人間是我弟子而今受天福樂以着樂故都失本心即以神力制車令住耆婆下車禮目連足目連種種因緣責其不可耆婆答目連言以我人中為大德弟子是故舉手問訊頗見諸天有爾者不生天以着樂染心不得自在是使爾耳目連問耆婆曰弟子有病當云何治耆婆答曰唯以斷食為本餘如前引除出血破僧佛不親遊故無此二子注小注也無一者無破僧也若下若云尼無破僧者何故尼同僧犯殘耶尼但方便戒疏云雖無破輪體得立主伴堅持五法以訓於人故犯也無二破約未曾受戒者則非邊非破十難無二破及邊罪也受未具戒即沙彌戒也義鈔云若受沙彌戒十難如上及壞尼以受十戒後縱有犯尼自屬邊罪若下若但具十今於非畜理須倒無何得為有容變作己身受時容有業報變者畢竟始終無也若受具下謂受具戒已戒羸未捨前也以有戒故犯則成邊又得聞說戒羯磨故非賊住縱有汙尼自在邊攝具有加賊住壞尼成十三也形即二形生也非下即非人畜生今若轉變作者其戒即失若約五種神通暫轉故非失也不失戒義鈔云五種黃門若受戒後生者五非重業則不失戒然有擯不擯別且就犍中自截須擯以厭身故或為他犍及報生者皆不須擯非厭身故然不可以擯故即失戒也知邊名喻知邊罪是約喻為言以佛法海外開教即開聽捨戒還家之教一說成者尚須解語况初受假多力而不解語耶容豫安緩詳審之貌累劫一受之後遠期會聖今滯於發足故亦累於未來也豈下以因望果也勗誡勉也晉魏京輔備如前解以下即向所述懸示一科麤言即於女人前說麤惡婬欲語者彼若不解亦應成犯何故律中解者方犯遲下指彼師也將非解者即沙彌不解言義者本受亦不了即所受師如此不會莫成一問一答但不成耶故下彼師又不結通出言狂簡故曰周章然得戒不得戒初時已定不由後之妄通而補前之不得重受謂疑前不解不得又疑前受中下品心故又重增也轉根即轉為男子文中下以四分不辨持破二尼故注引祇律也那含以三果欲界思惑盡故四果三界惑俱亡故不必受樂也是以初中後人汙彼者成難也由彼二人已斷愛染故成論云如一兩鹽投之恒河不壞味也前二果者初斷見惑欲思未盡彼事云須斯二尼他逼受染自分未亡凡夫亦清淨尼也以初受樂其境已壞故初人汙者成難中後非難以當分未能除染故修道者從初果已末直至四果向皆修道攝今謂修道中至三果已後及無學四果來染愛皆斷向云那含羅漢一切成難是也壞下問意云言壞尼成難婬是耶觸是耶答中取婬成難非取觸也故云婬是有本有本即有漏生死之本也觸即方便能至根本故云染緣隨重八事即捉手捉衣入屏處共立共語共行身相倚共期三處大小便口道辟下梵云辟支迦羅此云緣覺稟十二因緣而得果者也亦云獨覺出無佛世獨宿孤峰者也餘果初二兩果有受染故見下即見諦下迷理惑也潤業即業生煩惱也別報不招三塗總報也如成論云具二種結故墯惡道聖人斷一種故不墮惡道條部彼云特有比丘作如是念我強捉男子行婬彼不受樂得無犯即便行婬疑佛言汝波羅夷是隅隅者角也舉一角可知三角也動猶省察也如注既云盜聽說戒羯磨知非盜財也二偷和下是偷法也俱偷形法俱偷也再三初聽不解雖開若至三者亦不許也共一比丘如行對首說戒者是也不共作法雖曰不共以盜聽故亦不得由說下釋共一人及僧所成難也四月試之此據初制說見說彼六十二見樂欲受業也雖不即為早屬破內故曰越濟人也結髮事火即結髮梵志事火梵志如下引證此即長含癈四月所試之教也難得自知言此難唯彼自得知也要依十誦審問朽爛即壞爛也墯即墮落也惡賊為怨所截也同十誦可作沙彌依五分者彼云時有比丘為欲火所燒不能堪忍乃至佛所責言汝愚癡人應截不截不應截而截告諸比丘若都截者滅擯猶留卵者依篇懺之準此以明則未受具也截者終無明教開受受法即律受戒犍度中也一下如眼一緣自有二十餘種同次同一列而亦有次也僧名彼律二十三云若不稱僧名不名受具足心念答不出言也大喚答語麤礦餘下彼復云不稱和尚名不稱受具足戒人名如上即胎閏等筭滿者得不滿不得無正文開即無文開借衣鉢及着俗服等準論大鈔云必誦十誦羯磨依彼開成盡養養去聲呼下二養字上聲呼無犯以非親兒故僧祇親兒彼此不聽自來兒養兒餘處得受息言不須問也以父母俱亡故負債大鈔云諸部但言不應義準理得此方有還意故尊勝僧寶也卑劣下賤人也如法放大鈔云今有人放奴出家者若取出家功德經若放奴婢及以男女得福無量律中不明放者但言自來投法度之本不可尋言不可推尋舊事家生義重故買得損財抄得損力故此三彼此不得他下即他與奴及自來奴據下大師義斷將非賤為譏本即為他所譏如上云同是奴聚則放亦不可且夫紹釋迦之種實金輪之裔安以庸徒輙廁高位今時不肖但希力用法器全無斯亦自負耳如奘師選慈恩出家陌上一見眉秀目郎舉錯踈略乃嘆曰將家之子矣於是乎度之為百本疏主豈不光我佛教與後學誡之如是語即主家之語以希彼再為奴故犯重佛邊有守護主及本施主須結夷無者結蘭餘如下鈔云若得佛家牛馬亦不得使使佛牛奴得大罪僧祇寺主摩摩帝互用佛法僧物謂言不犯佛言波羅夷九等即九品若國皇許者亦聽度之如佛道論衡中勝蘭開化與五嶽道士焚教得勝于時五品已上揚成侯劉善峻等九十三人出家時帝侍衛九品已上鎮遠將軍姜氏等一百七十五人出家此官人出家之始有名有祿即六省五監等有名無祿如丁憂等有祿無名如致士者無名無祿如除名者小罪多論違王制者吉丈夫案大載禮云丈者長也夫者扶也言長扶制萬物也古之冠而成人通名丈夫也凡一切男女若具四法則名丈夫一近善知識二能聽法三思惟義四如說而行事惱即寒熱飢渴等理觀能制心修三種觀也事鈔云以建心慕遠清節不群卓然風霜不改其操鏗然憂憙未達其心便為丈夫之貌也壯室禮內則曰男三十壯有室女二十壯而嫁當此覊於情欲也出家者少故曰無任網正等七歲即上問答受也揮下喻如有人以手揮空豈能有礙彩畫作餅豈能止飢今喻空願而無隨行也德瓶智論第十三云持戒之人無事不得破戒之人一切皆失譬如有人常供養天其人貧窮一心供養滿十二歲求索富貴天愍此人自現其身而問之曰汝求何等答言求富貴欲令心之所願一切皆得天與一器名曰寶瓶而語之言所須之物從此瓶出其人得已應意所欲無所不得得如意已具作好舍象馬車乘七寶具足乃至憍佚立瓶上舞瓶即破壞一切眾物亦一時滅持戒之人亦復如是種種妙樂無願不得若人敗戒憍佚自恣亦如彼人破瓶失物明下有人得如意寶珠所願皆遂損之失利貧窮匪遙十事如注所引四句今準和尚知不知中四句先須明彼方解此意今為引彼自省此意彼云爾時有從不持戒和尚受具足戒後有疑問佛佛言汝知和尚不持戒否答言不知佛言得名受具足戒一句復有從不持戒和尚受具足戒已有疑問佛佛言汝知和尚不持戒否報言知汝知不應從此人受具足戒否報言不知佛言此得受具足戒二句爾時復有從不持戒和尚受具足戒後有疑問佛佛言汝知和尚不持戒否答言知汝知從此人不應受具足戒否答言知佛言汝知從如此人受具足戒不得具足戒否報言不知佛言得名受具足戒三句爾時有從不持戒和尚受具足戒後有疑問佛佛言汝知和尚不持戒否答曰知佛言汝知如此人不應從受具足戒否答言知佛問言汝知從如此人受具足戒不名受具足戒否答言知佛言不名受具足戒四句今但於和尚位上用小年借衣字變而讀之則兩箇四句皆可領也並是第四句不得為齊年前三句不同衣鉢何下釋所以不解即上不知句也雖不知亦不可也次佛制小年不得故計之即計算之也本受無疑又顯前諸句若有疑者決定不得前開開得戒也反顯非是後計時方開得也育王下證聖人尚有癩病也由是下約四果為言以不受後有身故有餘業總集現受也梗選註云病也腫上文證切下武亘切直視貌掉慢邪心動念曰掉自恃輕他曰慢憒心亂也故下引證賊住不知不名為難授戒闇昧故亦非授非數不足數中後意即示僧中復問也一尋八尺也教師即教授師也餘僧即餘九僧中間下恐中間闊遠非數上下之人次第亦須相及以露相顯故也恐有下大師立法也恐有人見譏之言上下相遠今但令藂坐則不相遠矣斯曲就物情之見也戒師和白即羯磨師對眾問難先須白和言此人豈可足數耶亦何須五古謂四人亦可證受也所制五者正為差出及戒師白和下入數故準下大師且順古商略也若望牒名正差可言不入數及後召入教授須在數也戒下望和僧時似不入數也然是白僧為彼後下言正受時戒師在數如下彼律是戒師和召沙彌即非差出故始終在五收也又為彼受戒人非是自為故入僧攝故曰俱為情事為捉下即教授師且為執持也正當其務正當教授之務何下言何得專輙便希為受須先從僧乞已方秉白和僧問難然後與受也白已教乞僧祇約戒師作法和僧已方教彼三乞廣如彼第二十三卷中行隨師即受後隨行從師學通故也結集如一翻單白差優波離結集律藏等是也互有無者以戒師不差故和後問教授師已差故不須和問也先差後和俱是僧義也以下顯戒師白和意也少有差者前則廣示後乃略提貴再審耳占視兆曰占今衣鉢是得戒之兆故今且將此以定問詞下被上達者以戒法下為六道福田上則三乘因種也通徧則諸天乃至如來也俱非問言不名為問也以不解了故通有無言有罪耶無罪耶若言罪則不分有無非定意本言也字非是定彼本意乃助詞耳兩音即邪與也字膝下舉童幼小時撫育長大非父母而不能今乃加害豈近人倫天所不容佛亦不度中音中天梵音也此方義翻曰生若言阿羅漢則翻無生以不受後有生故又翻殺賊應供如常聞也此下解上無生義又難者以僧有兩種故須分也若破羯磨僧則不成難破法輪僧方成難也今即屬後也邪五法因調達立也盡形下列五非法彼但執盡形之制故屬邪爾又多論云調達倒說云八聖道趣向泥洹反更遲難修行五法以求解脫其道甚速故說為非法也慧解導前猶人之識路也行實隨後猶人之依道而行也善登梵天如耆婆善心為佛治病針刺出血受梵天報惡下即調達如前即僧祇云依舊文問今時微有但是背如來教妄言非法誘諸年少者亦微有之真容即佛正身形像是佛滅後今亦有敬之則光現或損之容有血流得不為難乎有下第二師也則與無二亦白四諫故不疑不疑像非佛故餘下如焚經卷則屬盜論俗云即尸子解也得同得同宿也從重則天子修羅子故有同宿犯重義何者如天女有時下降事是也故輕不說即地獄等來之既希故所不說不讀觀音以觀音經云人非人也言下指彼解非人之詞也即下指斥訛立疑神之像也耻聲問云汝是畜生不等聲也大鈔云脫有高達俗士來受戒時語云汝是畜生不若聞此言一何可怪應方便轉問應語是出方便言也所引即上引之謂此身中具男女根正乖道器汝今無不此亦方便巧問也良是下如戒本云共戒同戒以共戒即受體共也同戒即隨行同也受隨既同故委問無容濫入四分亦爾鈔云及論作法但問諸遮似不問難故曰亦爾雖然若律云不問十三難者即不得戒故須問也諸結者諸師準著問遮前也僧祇有二彼二十三云教有二種若略若廣云何略今僧中當問汝有者言有無者言無云何廣如僧一一說今疏從一一下是彼廣中文也已上彼約教師在空靜處告沙彌之詞殘令後悔據理先悔已方可重受也亦部分不同二義別即名與字義別也名以定體字以彰德僧中識者即有名博識之者初立己名後朋友尊之故以字代之如僧傳真觀字聖達疏主法徧等是也愚下指不學人謂名字一也並下言問時但改云汝名何等則愚智齊曉也轉名如問云汝是大道人不無正斷無文斷云不問不得戒無損如負債者此方自有還義豈曰障戒自下離前隨難解外曰餘然指略要須善問善答不爾則非問也戒緣是發戒正緣也師資名字即和尚名並自己名及已是丈夫也此三人不可缺以師則終壽所依己則正受之目丈夫即有操可受反此非其可也增減如伽論云聾聞羯磨聲者得受五分或有先相嫌以小小斥事作留難吉羅如鈔即受戒篇中教發戒緣一門是也有師未詳何許人也大鈔亦云各隨境論別鈔應有三十餘紙要而言之不出情與非情空有二諦滅理涅槃佛說聖教文字卷軸形像塔廟地水火風虗空識等法界為量並是戒體同下彼云上座一人補如來也苟能如是開道令人得戒趣解脫者豈有異哉懷大即上品心也謂我今發心受戒為成三聚戒故趣三解脫門正求泥洹果及以此法引道眾生令至涅槃令正法久住如此發心尚是邪想況不發者定無尊尚故曰定難容納如善戒經彼云云何名戒所謂七眾戒比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷菩薩摩訶薩若欲受持菩薩戒者先當淨心受七眾戒七眾戒者即是淨心趣菩薩戒如世間人欲請大王先當淨治所居宅舍等在後即納法時此時下言教授及正受之時促不能廣張也要須先教令開心府故大鈔云必受前時智者提授使心心相續見境明淨不得臨時方言發心若約臨時師授法相尚自虗浮豈能令受者得上品心耶但具依文即依此註文也餘道即解六道眾生多是戒障使猒惡三有而出離也正報自己身心也四問白與三羯磨各問各答也僧祗十誦指註中引文計下應先問云何故此白中言莫餘覺餘思惟餘諸法事不如是告者將文通之是羯磨竟即結歸中竟字是也發戒足也故大鈔云謂將第三說已云僧已忍與某甲事竟此時羯磨竟依下牒注以釋即六念法中要分時分坐次故須明記之有人下解智論竟時也剎那約第一剎那也律師下此約至誰不忍者說是竟也今下大師理斷二度即第一第二羯磨也次第三望前似是竟也引後即第三羯磨至說字時可成前事猶言豈可法成在前耶故眾下若眾不說則成忍默可說得成不忍則成訶破理可通收至後結歸時方為定義若然又不違智論羯磨竟與汝受戒竟之文也上卷即結界中云故至竟字結前點相此義定矣一切即三性中俱發得也聞出罪白解上知時犯後睡不覺解上不知時清淨準下彼既聞白已睡尚得出罪顯今聞白已睡應是得戒今俱不作謂三羯磨俱不作亦應感戒也以白中已知作故答下前指沙彌也雖入無記不妨作白是和僧之本由大眾同知後作羯磨教意乃圓則緣非乖也若不作不成如人下取例也前事不犯即不犯殺根本也殺戒中結罪既爾則受亦非果緣成假眾緣所成也前心異作即前明白心異後作時迷妄心者不成根本故曰無有業也假緣方感自己雖入無記假他有記之緣故得發戒也不坐所教即所教人不坐殺盜罪也以下謂所教人起狂心故若下如教時是明白心及所教到彼殺盜此能教發狂三性之中能教得殺罪故曰但使遂本意能教得無作今下出例以從僧乞例初時明白心也僧隨其意例所教也能乞雖入無記所受且非故約所受明白心發他能受無記心中戒也若如前例即所教起狂也前緣不具如僧數少界相漠落等亦應感戒但以能受有心故後半即但取能教起狂一半不具亦同感戒之文前半即所教起狂屬前半之文也今將所教類僧能受雖曰有心所受若乃無心則不得戒前半所教無心能教亦自成重以受是緣具緣闕則次不發戒殺盜自約損境境損定當得罪故曰不同前半所教也乃至起業即始從發心禮僧合掌乞戒等直至羯磨未竟時忽起不善假前之善不善心中成就也教作即教彼陳乞等非不善得者非謂一向在不善心中得皆由前有善心發故無記及無心中亦復如是通前共四種心也答下不結亦成夏如忘成及界得成前坐等又下受是懸對塵沙法上願遍發故又期限一形所以三羯磨竟便發也安居期日為滿復有前後坐故須約日滿方成夏也極多以境多故戒相亦多也約心定共通漏無漏心道俱為無漏心也從緣即塵沙萬境也緣境既遍戒亦同等無量等等取大地無邊戒亦無邊草木無量戒亦無量虗空大海戒德高深亦復如是以此文證理通法界今下涅槃云戒有二種一者作戒二者無作戒是準涅槃之義也及以三者何不更立作及無作別為一種成三耶相假無作假作生作假無作延一形故一念薩婆多云一念色有身口教等第二念中唯有無教得未曾得謂無始來未曾得此白淨法今念念中悉能得故則短下文闕合云以作防非則短無作防非則長無作起無所從切疑此一句悞文與上同以上云若但無作不能自生二法作無作也道力所成如破結道俱戒體頓起也三合即作無作何不合為第三耶上是問數此是問合義不同也法體唯二以作戒體是色心無作戒體非色心又作與無作名又差別慈瞋五句無第三者律增一云有五句語無第三句時與非時此句無第三實與不實此句無第三損減利益此句無第三麤礦柔和此句無第三瞋恚慈心此句無第三是為五句無第三已上正文皆由二體不同故如上即非通萬境等如人下極香喻善戒極臭喻惡戒正執時喻作放下有香臭在手喻無作又無慇重心受者如人執不香臭物是也雜心云如手執香華雖復捨之餘氣續生非如執木石等一剎那爾時作戒未落無作又起是名根本善業成道也若第二剎那唯有無作如下結無三合陶家輪範土之家車上旋物車體喻報色動轉喻方便色故曰身動身方便身動阿毗曇心論云有教者身動餘識四三心性也心論云如受善戒人不善無記心中彼猶相隨是也成論下彼問曰何法名無作因心下是彼答辭也彼自引經云若種樹園林造井橋梁等是人所為福晝夜增長兩法作無作也善惡即善律儀戒惡律儀戒也一下即制斷諸惡法心論彼第三卷業品中偈云身業當知二謂作及無作口業亦如是意業當知思已上偈文彼自釋云身業二種作性及無作性作者身動身方便無作者身動滅已與餘識俱彼性隨生謂善受戒穢污即惡心無記心現在前善戒隨生惡戒人善無記心現在前惡戒隨生口業亦如是口業二種作無作性如前說意業當知思者意業是思自性有欲今意業是無作性則不然意非作性非色故及三種故無作亦名不樂亦名離亦名捨亦名不作已上長行今言初念無作七種一名律儀二名波羅提木叉律儀三名妙行四名業道五名波羅提木叉六名業七名尸羅五種名者除第五波羅提木叉及除第四業道故曰五種也廣如彼論第十卷所明也警也者警䇿三業也古下即韓康伯云防患曰戒體狀即二戒體性相狀知受知折旋俯仰處敬之受而未知所受之法體是何耶答如文戒論解戒律之論也行途但明戒行之途道也業理即業體之理道也首題云四分律故假實假即成論實即多宗以成實談空多宗說有以四分一宗分通大乘故順空門也根能見者如雜心偈云自分眼見色非彼眼識見彼自解云是故餘識俱時則不見以餘識俱空故並下有心方結無心不犯皆是色者顯不約心也身口七支皆約色論也不同此宗犯即問心無心不犯善惡業不離身口所造之業此業即名也又於業下推其體者即作無作是也一者所謂無作是也異者善惡業不同略名略善惡業名詮體但言作無作故動靜作為動無作為靜又身動滅已與餘識俱體有肥羸義屬動也不隨四心三性所變義屬靜也如諸塵指所造色塵也微細難見非凡所矚例於無作難陳其相也如論即多成二論本宗以四分虗通無係成實不滯實有義勢相關故得附彼出體故曰假名宗也緣搆成者假眾緣搆造以成正是作義也多解如下所陳色心約五蘊而論一蘊是色四蘊是心如䖍跪求乞是身口作色遍緣三世起斷惡修善是心以此共成作戒體也業具即器具之具皆但是心即心王也離心無思若離心王則無心所思以心所思從心王起故若有心無其思則不成其業以身口是無記故十四種色即眼等五根色等五境地等四大也今身口色是此所收故屬無記非下既屬無記非成作惡造善之性則又不成善惡之業也色聲色總身業聲收語業四大動此師取假色為體是罪福性故口業亦爾不取實報聲也但取聲上有曲折表彰名口業也問下此宗即指成實彼問曰若無作是色相有何咎答曰色聲香味觸五法非罪福性故不以色性為無作也又佛說色是惱壞相無作非惱壞相不可得故非色性已上論文何下正難答下意云我向所立以色聲為體者不取實報色聲但取方便假色聲爾一念即初剎那時也以但了色聲總相故非罪福性第二念去分別善惡是罪福性故曰相續色聲也前念落謝唯意識緣知意能成業故云是罪福性故論下指成論不相應行品彼具云有人言名句字是心不相應行此事不然即法名聲性法入所攝聲性為聲之體性也助成名句者助成音韻曲折也問下應云思從心起既用心為體身口業亦從色心起應同以心為體耶答下外言思與心同時而起但體別爾故彼言心即是思也然下今立以心王亦未必便是心所思思下以非心外別有故意謂舉心王未該心所言心所必屬心王故得言離心無思又下立外義謂外道說身口二業不假心成如說欲從對生不從心起故說下破佛言欲從心起等離心無思無身口業身業相續者前立相續色聲為體身色相續終始可見聲名句業斷絕不續非眼可見意無所緣故云應無口作體也青等等取黃赤白黑及餘色也無記即聲當體屬無記是發戒之方便爾遠從要期生約始登壇求乞時說也又云下約世相論實有斷續據其始終為成一受今能受人求乞是始眾僧加法是終互假相成故非就一以辨也又下謂口雖落謝身以表語故四心識受想行也三聚以彼論有四聚一色二心三非色非心四無為共收八十四法今當第三又第三一聚自有十七法今無作一法當第十七也是不相應行攝彼第二云不相應行者無作業也塵大謂色等五塵地等四大是無記故今無作體非無記也形相方圓長短等十四如前二十者顯色有十二謂青黃赤白光影明暗煙雲塵霧此局無記色形有八即長短高下方圓斜正此通三性今無表非此二色也惱壞成論云是色若壞即生憂惱又云有情有惱非情有壞質礙如墻壁等有質像隔礙故五識心所得即色等五塵為五識所得如眼識得可見有對色等無下結歸非色緣知緣慮即知也慮知即思慮知覺也明暗若意識取色境等則分明若單意緣落謝五塵則暗昧三性善惡無記故廣略偏緣三世名廣但緣一世名略報法謂肉團心如蓮花界方一寸晝開夜合為心王所依處是報得法隨其宿業根有利鈍上根人有七竅下根略有三二一或全無者如經即成實無作品中自引經也彼正云精進人隨壽得福多故久受天樂若但善心何能有多福是人不能常有善心故以此證功在無作不因心也又若無作是心不能長遠故又說種樹等福德晝夜常增長又說持戒堅固若無無作云何當說福常增長及堅持戒已上論文又下亦成論第七卷無作品中文以但制身口七支故意無戒律儀三性下彼云若人在不善無記心若無心亦名持戒故知爾時有無作也已上正文意云三性之中何故名持戒良由前有受中無作故以下推所以先立難云何故三性有無作耶況無作從作生今三性之中本無有作云何有無作由此下是釋謂此無作業體是非色非心故今雖行惡等三性本所作戒發得無作不名漏失當知此之無作從先作上發起者又復應知此無作若是心者則隨三性之變良由非心故不隨變故彼亦指成實色等等取聲香味觸五塵也非罪福性反顯無作是罪福性故不可將色等為無作也又下亦彼論自引佛說也非惱壞彼正云無作中惱壞相不可得故非色性也問下彼論問曰無作是身口業性身口業即是色答下意云是無作但從身口意業生故說為身口業性其實非是身口業性以身口業性是色今無作且非色故又下彼論正云又或但從意生無作是無作云何名色性以從意生故如下若云無作是色者且如無色界亦有無作豈是色耶已上皆疏主暗用成實文故下引涅槃第十八卷中文結證前非色也觸對者身根能覺觸餘根能對礙蓋為有色故今無作既無此理故知非色雖曰無色若善修方便法體自具問至為體來領上義也作下正難也意云無作是善惡性故不用色為體也今作戒亦是善惡性應非色為體耶作戒依色即正報之色用即方便假色今作戒與二色同時而起故得用色為體實法宗即多宗也計下以實宗與四分宗計不同故不可約彼以出體今所以明者然律下是釋所以五蘊五相者謂五蘊各有體相故且如色有遠近內色外色等亦有與實宗兼涉者故可重出彼體又俱是佛教故但由機見執計不同耳五下涅槃經云如五百比丘問舍利弗佛說身因何者是邪舍利弗言諸大德汝等各得正解脫自應識之何緣問耶有比丘言大德我未得正解脫時意謂無明即是身因作是觀時得阿羅漢復有無明行識乃至五欲即是身因爾時五百比丘各各自說己解已共往佛所說之舍利弗白佛如是諸人誰是正說誰不正說佛告舍利弗善哉一一比丘無非正說三無為俱舍云擇滅非擇滅虗空無為也廣如第一卷中四相生住異滅也雜心論云一切有為法生住及異滅是也皆色損益如以身色殺彼四處腦咽心腰得死此名以色損色也反此則益名持一支既爾諸支例然若下此說不從心結也其下其實不彼心念結犯何耶以劣機不制心戒故故涅下彼自引證既經云無作色又心論言假色審知二戒俱是色也十一色即眼等五根色等五塵法處無表也五根四塵雖不可見有耳根可對故曰不可見有對也餘香等亦爾法入即能受者無作假色即法處無表非為眼所對非極微成又非意所緣知故曰不可見無對也三色即上三色八色香味觸眼耳鼻舌身此八非作戒體無對即用假色是無作戒體身作始從登壇已去直至羯磨竟來是可見有對色口作約陳乞時是不可見有對也無作一發續現時是不可見無對色也五根五塵此約實色也各有分隔故曰障礙有對七心即六識并本意根如眼識界非耳識界等也以各有所對故能緣心如緣落謝五塵是也今無作既非三對故屬無對也本報即報得之色有好惡報得之聲有清濁等方便即於報色聲上起折旋音韻也方便也聲不取報得實色聲也身動身方便謂報得身處是身之方便色也故取此為作戒體皷動下辨亦一也以全體報色作方便色故又下說亦異也任下如今世端正是酬過去之因長下屈申或令長短高下是方便色隨今所設非酬報故報下謂報得之身是實色唯無記故方便假色通於善等三性如今跪拜等豈非是善性既有通局是異也報由下又往業現起約二世論如下水濕喻報色波動喻方便色問下意云方便若以報色為體且報色是無記方便亦應是無記何得說言方便通三性而為記業耶答下言色無善惡性因皷動以成善惡故若爾下責上答辭色無善惡也心論下彼業品云善者淨身心口動如施戒等不善者不善身心口動如殺生等無記者無記心口身動今約善戒故曰清淨心動身口色兩現外有善惡二緣生內善惡二色也由下轉釋上經論之文也像轉從緣喻所起方便通善惡也本面不改喻報色是定唯無記也唯是方便此簡非是報法二種即身口無作非報非報色也是方便是方使色也異色因異者目方便色也因者因報色也謂下是釋報色之果者以報色為因方便為果望後起昔名果是以下結二無作非是報色及方便色也餘二性即惡無記性非異色因等等取非異色果也本受不失只由是無作故在此二心不失耳惟下言此無作從方便色中以辨成就也作但一念即三羯磨竟時第一剎那由作戒落謝也今無作既盡一形故非受中之作若然則此異色果者目無作假色也因者目於作戒也以作戒發起無作即作是無作假色之因也不作下具云不作異色因異色果者謂隨中作是異色因隨中無作是異色果又非下謂隨中作及無作從方便色心俱也事止則無並是戒因故文云以俱短故明知受體無作假方便成就於前緣故稱無表也穢惡即惡性現在前言受中無作不識也隨生即運運增長也非餘即餘惡無記中如論即雜心等者等取惡作也俱無記者是顯色故高下屬形色也故通三性收善性由是善戒故三聲者雜心云聲入者三種謂因受四大聲因不受四大聲因俱聲因受四大者謂咽喉唇舌因緣發聲因不受四大聲者謂風鈴樹等因緣發聲因俱聲者謂擊皷吹唄因緣聲彼聲一一有二種謂可意不可意今疏簡第二聲也今下即第二因受聲又是善性收二性善惡也以惡戒亦發無作故無記非業者雜心云無記心羸劣故局善且望善能禁惡為言若受惡戒亦禁善也始終從請師已來為始三法竟時號終善而非戒謂但屬其善而非是戒也答下若約要期受者則名為戒以戒儀局故餘一切善亦名律儀由律儀通行無涯故餘汎爾十業無要期者是善非戒若唯一念意謂若但在三羯磨竟時第一念得名作戒者以前登壇請師來或有非緣亦應感戒令且不爾要俱如法故須始終通收為作戒體口止下謂彼口之陳乞已了心緣又不可測故非耳聞意雖近緣要通取三業說始終也若爾與論羯磨第一念名作戒莫有相違不答論且就成滿時為言非為以前不名作戒又妨下此師意謂口雖落謝身可表故桑榆下解上獨樂之體用桑榆木所成也麝輪比之可解恐新學未知例作云如麝獸是報色殺者取臍是方便色將麝香體米用喻作戒也香體散壞唯有氣在喻無作也若然豈有捨麝獸等而獨取氣乎今作戒亦爾七種者即七善律儀也無色此宗執言無作是色也下引證亦同十種戒即十種善戒謂有莊嚴釋上作色及成已釋上無作色謂無方便即但有實報作色而無方便虔重色故但有作色無無作色也四大造毗婆沙云造是因義能造屬作戒無作從作生故屬四大造俱舍云四大造即地水火風也或名四大種所造色也更相障礙者能造既有障礙所造亦可分之既說可分斯成色性雜心云以作是色故彼亦名色出三有對即障礙有對境界有對所緣有對出過此三故曰無對今既曰色即屬有對何言無對一下即五根對五塵也通緣非礙以意根通緣諸塵且非局礙又無作之色與餘麤色別也故下云非色者不同可見有對色故曰色非色別金河西域記云阿氏多伐底河唐言無勝舊云阿利羅䟦提河訛也正言㕧剌拏伐底河譯曰有金河是產閻浮金處去城西北三四里西峯不遠至娑羅林即世尊在此河入滅故曰金河已後指南即指南車今謂各能指示人之迷方耳四部一曇無德二十誦三五分四僧祇故曰此方所傳四部乃斷也殷盛也不倫倫等也自晉即五王子渡江南立東晉也假名宗即成實也出有部體依成論出十誦戒體是不得宗耳多雜即薩婆多及雜心論以此二論俱屬有門論彼文出四分體亦失宗耳碩大也各用開律或依成論或準多宗任人依用以俱是聖論故本致大師要在約宗以判也界品具云心界品出第一卷有作戒字誤影喻無作樹喻作也謂樹動故影亦動又下彼具云如世尊說形質故是色無作亦非色以作是色故彼亦名色界品下彼問云色乃至識有何相答礙相是色相乃至分別是識相彼過去色雖不礙曾礙故即先曾礙也當來色雖未礙當礙故後必礙也極微一一雖不礙眾微集則礙無作雖不礙以作色是礙故彼亦礙假宗四分也實教多雜也神洲戒疏云此土神洲亦稱赤縣是也約下以始則誦曇諦所翻四分羯磨及下即依十誦判持犯及多雜出體也緩急如十誦接俗楷定於時數急也御法例通於無準緩也四分反矣不同彼約色此約非色是道理事義全別也依理言此戒能趣三乘正理故以理為體故解云謂此聖法能為道務如鈔即大鈔中戒有大用一科是也故律云如是諸佛子修行禁戒本終不迴邪流沒溺生死海又戒經云若有自為身欲求於佛道當尊重正戒是則戒有趣聖道之能也光師準此即受五緣以能受中五緣為體即局人道乃至得少法是也此五若具方感於戒若然則以緣作體晉師即東晉諸師斯下如光師下則約理通漫為倒齊末則拋體取緣為倒河北則以空附有為倒江南則以假宗實為倒既倒且濫則宗途綱骨非一體矣理道義味成非僻矣其間更欲摘掇揣度過濫則不可勝任斥彈之言耳
